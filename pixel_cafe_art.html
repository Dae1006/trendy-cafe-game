<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Trendy Cafe - Pixel Art Premium</title>
<style>
body {
  margin: 0;
  background: #0d0d1a;
  font-family: 'Courier New', monospace;
  color: #e8e8e8;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
h1 {
  color: #FFD700;
  margin: 20px 0;
  text-align: center;
}
canvas {
  border: 2px solid #FFD700;
  border-radius: 8px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}
.controls {
  margin: 20px 0;
  display: flex;
  gap: 10px;
}
button {
  background: #16213e;
  color: #FFD700;
  border: 2px solid #FFD700;
  padding: 10px 20px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  border-radius: 5px;
}
button:hover {
  background: #FFD700;
  color: #0d0d1a;
}
.info {
  margin: 20px 0;
  text-align: center;
  color: #a0a0b0;
}
</style>
</head>
<body>
<h1>☕ Trendy Cafe - Pixel Art Premium</h1>
<canvas id="cafeCanvas" width="800" height="480"></canvas>
<div class="controls">
  <button onclick="addCustomer()">+ Khách hàng</button>
  <button onclick="addTable()">+ Bàn</button>
  <button onclick="toggleDayNight()">🌙/☀️</button>
</div>
<div class="info">
  <p>Click "Khách hàng" để thêm nhân vật | Click "Bàn" để thêm bàn</p>
  <p>Animation: Steam rising, barista walking, customers idle sway</p>
</div>

<script>
const canvas = document.getElementById('cafeCanvas');
const ctx = canvas.getContext('2d');
let af = 0;
let isNight = false;
let customers = [];
let tables = [];
let steamParticles = [];
let barista = {x: 400, y: 300, targetX: 400, phase: 0};

// Color palette - premium cafe theme
const COLORS = {
  bg: '#0d0d1a',
  wall: '#16213e',
  floor: '#1a1a3e',
  counter: '#5C3317',
  counterTop: '#8B4513',
  machine: '#777',
  machineDark: '#555',
  machineGold: '#FFD700',
  shelf: '#3d2b1f',
  shelfItem: '#F5DEB3',
  cup: '#fff8dc',
  coffee: '#3c2415',
  window: '#87CEEB',
  moon: '#f0f8ff',
  plant: '#27ae60',
  plantDark: '#1e8449',
  table: '#8B4513',
  tableTop: '#A0522D',
  tableLeg: '#5C3317',
  chair: '#3d2b1f',
  chairSeat: '#5C3317',
  skinTone: '#FFDBAC',
  neonPink: '#FF1493',
  neonBlue: '#00BFFF',
  lampGlow: 'rgba(255, 215, 0, 0.3)',
  shadow: 'rgba(0, 0, 0, 0.2)'
};

function drawBackground() {
  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, 480);
  gradient.addColorStop(0, isNight ? '#0a0a1a' : COLORS.wall);
  gradient.addColorStop(0.5, isNight ? '#1a1a2a' : COLORS.wall);
  gradient.addColorStop(1, isNight ? '#0d0d1a' : COLORS.floor);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 800, 480);
  
  // Floor pattern
  for (let i = 0; i < 800; i += 40) {
    for (let j = 240; j < 480; j += 40) {
      const isHighlight = (i + j) % 80 === 0;
      ctx.fillStyle = isHighlight ? '#22224a' : '#16163e';
      ctx.fillRect(i, j, 38, 38);
    }
  }
  
  // Floor reflection
  ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
  ctx.fillRect(0, 240, 800, 2);
}

function drawWindow() {
  // Window frame
  ctx.fillStyle = '#000';
  ctx.fillRect(50, 80, 120, 100);
  
  // Window glass
  ctx.fillStyle = COLORS.window;
  ctx.fillRect(52, 82, 116, 96);
  
  // Window frame details
  ctx.strokeStyle = '#3d2b1f';
  ctx.lineWidth = 4;
  ctx.strokeRect(50, 80, 120, 100);
  
  // Window cross bars
  ctx.strokeStyle = '#3d2b1f';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(110, 80);
  ctx.lineTo(110, 180);
  ctx.moveTo(50, 130);
  ctx.lineTo(170, 130);
  ctx.stroke();
  
  // Moon and stars through window
  ctx.fillStyle = COLORS.moon;
  ctx.beginPath();
  ctx.arc(80, 100, 8, 0, Math.PI * 2);
  ctx.fill();
  
  // Stars
  for (let i = 0; i < 5; i++) {
    const x = 60 + Math.random() * 80;
    const y = 90 + Math.random() * 70;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y, 2, 2);
  }
  
  // Curtains
  ctx.fillStyle = '#16213e';
  ctx.fillRect(40, 75, 15, 110);
  ctx.fillRect(165, 75, 15, 110);
}

function drawCounter() {
  // Counter body
  ctx.fillStyle = COLORS.counter;
  ctx.fillRect(250, 280, 300, 60);
  
  // Counter top
  ctx.fillStyle = COLORS.counterTop;
  ctx.fillRect(250, 280, 300, 10);
  
  // Counter edge highlight
  ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.fillRect(250, 280, 300, 2);
  
  // Counter shadow
  ctx.fillStyle = COLORS.shadow;
  ctx.fillRect(250, 340, 300, 5);
  
  // Wood grain effect
  for (let i = 250; i < 550; i += 15) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(i, 290, 1, 50);
  }
}

function drawEspressoMachine() {
  const mx = 450, my = 200;
  
  // Machine body
  ctx.fillStyle = COLORS.machine;
  ctx.fillRect(mx, my, 60, 80);
  
  // Machine top
  ctx.fillStyle = COLORS.machineDark;
  ctx.fillRect(mx + 5, my - 5, 50, 10);
  
  // Machine front panel
  ctx.fillStyle = COLORS.machineDark;
  ctx.fillRect(mx + 5, my + 10, 50, 20);
  
  // Group heads
  ctx.fillStyle = COLORS.machineDark;
  ctx.fillRect(mx + 10, my + 35, 15, 25);
  ctx.fillRect(mx + 35, my + 35, 15, 25);
  
  // Steam wand
  ctx.fillStyle = '#888';
  ctx.fillRect(mx - 5, my + 45, 8, 35);
  
  // Stacked cups
  ctx.fillStyle = COLORS.cup;
  ctx.fillRect(mx + 65, my + 10, 15, 15);
  ctx.fillRect(mx + 65, my + 25, 15, 15);
  ctx.fillRect(mx + 65, my + 40, 15, 15);
  
  // Coffee cup on machine
  ctx.fillStyle = COLORS.cup;
  ctx.fillRect(mx + 10, my + 55, 20, 25);
  ctx.fillStyle = COLORS.coffee;
  ctx.fillRect(mx + 12, my + 57, 16, 5);
  
  // Machine gold details
  ctx.fillStyle = COLORS.machineGold;
  ctx.fillRect(mx + 15, my + 15, 30, 2);
  ctx.fillRect(mx + 15, my + 20, 2, 2);
  ctx.fillRect(mx + 15, my + 25, 2, 2);
}

function drawShelves() {
  // Shelf board
  ctx.fillStyle = COLORS.shelf;
  ctx.fillRect(300, 180, 200, 8);
  
  // Shelf items
  const items = [
    {x: 310, y: 150, w: 15, h: 30, c: COLORS.shelfItem},
    {x: 330, y: 145, w: 10, h: 35, c: '#333'},
    {x: 350, y: 155, w: 20, h: 25, c: COLORS.shelfItem},
    {x: 375, y: 140, w: 12, h: 40, c: '#27ae60'},
    {x: 395, y: 150, w: 10, h: 30, c: COLORS.cup},
    {x: 410, y: 155, w: 15, h: 25, c: '#8e44ad'},
    {x: 430, y: 145, w: 12, h: 35, c: COLORS.cup},
    {x: 450, y: 140, w: 10, h: 40, c: '#2980b9'},
    {x: 465, y: 155, w: 15, h: 25, c: COLORS.shelfItem},
    {x: 485, y: 150, w: 10, h: 30, c: '#e74c3c'},
    {x: 500, y: 155, w: 20, h: 25, c: COLORS.shelfItem},
    {x: 525, y: 145, w: 10, h: 35, c: '#f39c12'}
  ];
  
  items.forEach(item => {
    ctx.fillStyle = item.c;
    ctx.fillRect(item.x, item.y, item.w, item.h);
  });
}

function drawLamps() {
  for (let i = 0; i < 4; i++) {
    const lx = 200 + i * 100;
    
    // Lamp chain
    ctx.fillStyle = '#444';
    ctx.fillRect(lx, 20, 2, 160);
    
    // Lamp shade
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(lx - 15, 180, 30, 15);
    ctx.fillRect(lx - 10, 175, 20, 5);
    
    // Lamp glow
    const glow = 0.3 + Math.sin(af * 0.05 + i * 1.5) * 0.15;
    const gradient = ctx.createRadialGradient(lx, 200, 0, lx, 200, 150);
    gradient.addColorStop(0, `rgba(255, 215, 0, ${glow})`);
    gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(lx - 150, 180, 300, 300);
  }
}

function drawTables() {
  tables.forEach(table => {
    const {x, y} = table;
    
    // Table shadow
    ctx.fillStyle = COLORS.shadow;
    ctx.fillRect(x + 5, y + 5, 80, 60);
    
    // Table top
    ctx.fillStyle = COLORS.tableTop;
    ctx.fillRect(x, y, 80, 10);
    
    // Table edge
    ctx.fillStyle = COLORS.table;
    ctx.fillRect(x, y + 10, 80, 5);
    
    // Table legs
    ctx.fillStyle = COLORS.tableLeg;
    ctx.fillRect(x + 10, y + 15, 5, 40);
    ctx.fillRect(x + 65, y + 15, 5, 40);
    
    // Table top reflection
    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.fillRect(x + 5, y + 1, 70, 2);
    
    // Chairs
    ctx.fillStyle = COLORS.chair;
    ctx.fillRect(x - 15, y - 20, 25, 10);
    ctx.fillRect(x - 15, y - 10, 25, 5);
    ctx.fillRect(x + 70, y - 20, 25, 10);
    ctx.fillRect(x + 70, y - 10, 25, 5);
    
    // Chair legs
    ctx.fillRect(x - 10, y - 10, 3, 15);
    ctx.fillRect(x + 5, y - 10, 3, 15);
    ctx.fillRect(x + 75, y - 10, 3, 15);
    ctx.fillRect(x + 90, y - 10, 3, 15);
    
    // Cup on table
    ctx.fillStyle = COLORS.cup;
    ctx.fillRect(x + 30, y - 8, 15, 18);
    ctx.fillStyle = COLORS.coffee;
    ctx.fillRect(x + 32, y - 6, 11, 3);
  });
}

function drawDecorations() {
  // Menu board
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(650, 120, 60, 80);
  ctx.fillStyle = '#1a2744';
  ctx.fillRect(652, 122, 56, 76);
  
  // Menu text
  ctx.fillStyle = COLORS.cup;
  ctx.fillRect(655, 130, 50, 2);
  ctx.fillRect(655, 135, 40, 2);
  ctx.fillRect(655, 140, 45, 2);
  ctx.fillRect(655, 145, 35, 2);
  ctx.fillRect(655, 150, 42, 2);
  
  // Neon signs
  ctx.fillStyle = COLORS.neonPink;
  ctx.fillRect(300, 60, 200, 8);
  ctx.fillRect(300, 70, 200, 8);
  
  // Neon glow effect
  const neonGlow = 0.3 + Math.sin(af * 0.08) * 0.2;
  ctx.fillStyle = `rgba(255, 20, 147, ${neonGlow})`;
  ctx.fillRect(300, 60, 200, 20);
  
  // Floor mat
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(650, 300, 80, 40);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.fillRect(652, 302, 76, 36);
  
  // Tip jar
  ctx.fillStyle = COLORS.cup;
  ctx.fillRect(600, 260, 25, 35);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(602, 265, 21, 8);
  ctx.fillStyle = '#888';
  ctx.fillRect(600, 295, 25, 5);
  
  // Plants
  for (let i = 0; i < 3; i++) {
    const px = 100 + i * 250;
    // Plant pot
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(px, 380, 30, 25);
    // Plant leaves
    ctx.fillStyle = COLORS.plant;
    ctx.fillRect(px + 5, 350, 20, 30);
    ctx.fillRect(px + 10, 330, 10, 20);
    ctx.fillStyle = COLORS.plantDark;
    ctx.fillRect(px + 12, 360, 6, 15);
  }
}

function drawCustomers() {
  customers.forEach((customer, index) => {
    const time = af * 0.1;
    const bob = Math.sin(time + index * Math.PI / 2) * 0.3;
    const cx = customer.x + Math.sin(time * 0.3 + index) * 2;
    const cy = customer.y + bob;
    
    // Body
    ctx.fillStyle = customer.shirt;
    ctx.fillRect(cx, cy, 40, 50);
    
    // Arms
    ctx.fillStyle = COLORS.skinTone;
    ctx.fillRect(cx - 5, cy + 10, 5, 30);
    ctx.fillRect(cx + 40, cy + 10, 5, 30);
    
    // Legs
    ctx.fillStyle = '#333';
    ctx.fillRect(cx + 5, cy + 50, 15, 20);
    ctx.fillRect(cx + 20, cy + 50, 15, 20);
    
    // Head
    ctx.fillStyle = COLORS.skinTone;
    ctx.fillRect(cx + 5, cy - 30, 30, 30);
    ctx.fillStyle = customer.hair;
    ctx.fillRect(cx + 5, cy - 35, 30, 15);
    
    // Eyes
    ctx.fillStyle = '#333';
    ctx.fillRect(cx + 10, cy - 20, 5, 5);
    ctx.fillRect(cx + 25, cy - 20, 5, 5);
    
    // Mouth
    if (customer.mood > 0.7) {
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(cx + 12, cy - 12, 16, 3);
    } else {
      ctx.fillStyle = '#333';
      ctx.fillRect(cx + 12, cy - 12, 16, 2);
    }
    
    // Mood indicator
    const patienceX = cx - 10;
    ctx.fillStyle = '#333';
    ctx.fillRect(patienceX, cy - 45, 60, 5);
    const patienceColor = customer.mood > 0.7 ? '#28a745' : customer.mood > 0.3 ? '#FFD700' : '#e74c3c';
    ctx.fillStyle = patienceColor;
    ctx.fillRect(patienceX, cy - 45, 60 * customer.mood, 5);
  });
}

function drawBarista() {
  const bx = barista.x + Math.sin(af * 0.1) * 3;
  const by = barista.y + Math.cos(af * 0.15) * 0.5;
  
  // Body
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(bx, by, 50, 60);
  
  // Apron
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(bx + 5, by + 5, 40, 50);
  
  // Arms
  const armWave = Math.sin(af * 0.2) * 0.5;
  ctx.fillStyle = COLORS.skinTone;
  ctx.fillRect(bx - 5, by + 10 + armWave, 5, 30);
  ctx.fillRect(bx + 50, by + 10 - armWave, 5, 30);
  
  // Legs
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(bx + 10, by + 60, 15, 20);
  ctx.fillRect(bx + 25, by + 60, 15, 20);
  
  // Head
  ctx.fillStyle = COLORS.skinTone;
  ctx.fillRect(bx + 10, by - 20, 30, 30);
  ctx.fillStyle = '#2c1810';
  ctx.fillRect(bx + 10, by - 25, 30, 15);
  
  // Mustache
  ctx.fillStyle = '#4a3728';
  ctx.fillRect(bx + 15, by - 8, 20, 3);
  
  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(bx + 15, by - 15, 5, 5);
  ctx.fillRect(bx + 25, by - 15, 5, 5);
  
  // Apron details
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(bx + 20, by + 15, 10, 10);
  ctx.fillRect(bx + 15, by + 35, 20, 3);
}

function drawSteam() {
  steamParticles.forEach((particle, index) => {
    const alpha = particle.life * 0.5;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
  });
}

function updateCustomers() {
  customers.forEach(customer => {
    customer.mood -= 0.0003;
    if (customer.mood < 0.2) customer.mood = 0.2;
  });
}

function updateSteam() {
  // Add new steam particles
  if (Math.random() > 0.9) {
    steamParticles.push({
      x: 470 + Math.random() * 10,
      y: 200,
      vx: (Math.random() - 0.5) * 0.2,
      vy: -0.3 - Math.random() * 0.3,
      life: 1,
      size: 2
    });
  }
  
  // Update existing steam
  for (let i = steamParticles.length - 1; i >= 0; i--) {
    const p = steamParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
    if (p.life <= 0) {
      steamParticles.splice(i, 1);
    }
  }
}

function createCustomer() {
  const shirts = ['#e74c3c', '#2980b9', '#27ae60', '#8e44ad', '#f39c12', '#1abc9c', '#3498db', '#e67e22'];
  const hairs = ['#4a3728', '#2c1810', '#DAA520', '#8B4513', '#FF8C00', '#C0C0C0'];
  
  return {
    x: 200 + Math.random() * 400,
    y: 350 + Math.random() * 50,
    shirt: shirts[Math.floor(Math.random() * shirts.length)],
    hair: hairs[Math.floor(Math.random() * hairs.length)],
    mood: 0.5 + Math.random() * 0.5
  };
}

function addCustomer() {
  customers.push(createCustomer());
}

function addTable() {
  if (tables.length < 6) {
    tables.push({
      x: 100 + tables.length * 120,
      y: 320
    });
  }
}

function toggleDayNight() {
  isNight = !isNight;
}

function init() {
  // Initial customers
  for (let i = 0; i < 4; i++) {
    customers.push(createCustomer());
  }
  
  // Initial tables
  for (let i = 0; i < 3; i++) {
    tables.push({x: 150 + i * 150, y: 320});
  }
}

function render() {
  // Clear canvas
  ctx.clearRect(0, 0, 800, 480);
  
  // Draw all scene elements
  drawBackground();
  drawWindow();
  drawCounter();
  drawEspressoMachine();
  drawShelves();
  drawLamps();
  drawTables();
  drawDecorations();
  drawCustomers();
  drawBarista();
  drawSteam();
  updateCustomers();
  updateSteam();
}

function loop() {
  af++;
  render();
  requestAnimationFrame(loop);
}

// Initialize and start
init();
loop();

// Global functions for buttons
window.addCustomer = addCustomer;
window.addTable = addTable;
window.toggleDayNight = toggleDayNight;
</script>
</body>
</html>
