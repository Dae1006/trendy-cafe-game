<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coffee Quan Trendy Cafe v2.0 - Pixel Art Edition</title>
<link rel="stylesheet" href="styles.css">
<style>
body { font-family: 'Courier New', Courier, monospace; }
* { font-variant-emoji: text; }
#hdr .coin-display, #hdr .level-display, .nb,
#weather, #loading .loading-text, .cust,
.icon-only, [data-tab], #notif {
    font-family: 'Segoe UI Emoji', 'Noto Color Emoji', 'Apple Color Emoji', 'Android Emoji', 'EmojiOne Color', sans-serif !important;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Coffee Dang mo quán...</div>
</div>

<div id="notif"></div>

<div id="hdr">
  <div class="coin-display">Dollar <span id="coins">500</span></div>
  <div class="level-display">Lv.<span id="lv">1</span> Star<span id="xp">0</span>/<span id="xpn">100</span></div>
</div>
<div id="xp-wrap"><div id="xp-bar"></div></div>

<div id="weather">Sun Nang</div>

<div id="scene-wrap">
  <canvas id="scene-canvas"></canvas>
</div>

<div id="locs"></div>

<div id="nav">
  <button class="nb on" data-tab="orders">Orders</button>
  <button class="nb" data-tab="menu">Menu</button>
  <button class="nb" data-tab="chart">Chart</button>
  <button class="nb" data-tab="staff">Staff</button>
  <button class="nb" data-tab="supplier">Supply</button>
  <button class="nb" data-tab="shop">Shop</button>
  <button class="nb" data-tab="items">Items</button>
  <button class="nb" data-tab="quests">Quest</button>
  <button class="nb" data-tab="up">Up</button>
  <button class="nb" data-tab="achieve">Achi</button>
</div>

<div id="pnl">
  <div class="pan on" id="p-orders"><div id="ol"></div></div>
  <div class="pan" id="p-menu"><div id="ml"></div></div>
  <div class="pan" id="p-chart"><div id="cl"></div></div>
  <div class="pan" id="p-staff">
    <div id="hl"></div>
    <div id="sll"></div>
  </div>
  <div class="pan" id="p-supplier"><div id="slp"></div></div>
  <div class="pan" id="p-shop"><div id="so"></div></div>
  <div class="pan" id="p-items">
    <div id="fl"></div>
    <div id="il"></div>
  </div>
  <div class="pan" id="p-quests"><div id="ql"></div></div>
  <div class="pan" id="p-up"><div id="ul"></div></div>
  <div class="pan" id="p-achieve"><div id="al"></div></div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <div id="modal-body"></div>
    <button class="btn" onclick="closeModal()">Dong</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
