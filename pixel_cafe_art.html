<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Trendy Cafe - Pixel Art Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e8e8e8;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
#gameCanvas{image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid #FFD700;border-radius:8px;margin:10px 0}
#ui-panel{display:flex;gap:20px;padding:10px 20px;background:linear-gradient(135deg,#16213e,#1a1a4e);border:2px solid #FFD700;border-radius:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.ui-stat{text-align:center;min-width:80px}
.ui-stat .label{font-size:10px;color:#a0a0b0}
.ui-stat .value{font-size:14px;color:#FFD700;font-weight:bold}
#controls{display:flex;gap:8px;padding:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 16px;border:2px solid #FFD700;background:#16213e;color:#FFD700;cursor:pointer;font-family:inherit;font-size:11px;border-radius:5px;transition:all 0.2s}
.btn:hover{background:#FFD700;color:#0d0d1a}
.btn:active{transform:scale(0.95)}
#scene-info{font-size:11px;color:#a0a0b0;padding:5px;text-align:center}
</style>
</head>
<body>
<div id="ui-panel">
<div class="ui-stat"><div class="label">Coins</div><div class="value" id="ui-coins">1000</div></div>
<div class="ui-stat"><div class="label">Customers</div><div class="value" id="ui-customers">0</div></div>
<div class="ui-stat"><div class="label">Orders</div><div class="value" id="ui-orders">0</div></div>
<div class="ui-stat"><div class="label">Level</div><div class="value" id="ui-level">1</div></div>
<div class="ui-stat"><div class="label">Reputation</div><div class="value" id="ui-rep">⭐⭐⭐</div></div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="scene-info">Trendy Cafe - Pixel Art Edition | Click seats to serve customers</div>
<div id="controls">
<button class="btn" onclick="game.addCustomer()">+ Customer</button>
<button class="btn" onclick="game.serveRandom()">Serve All</button>
<button class="btn" onclick="game.addTable()">+ Table</button>
<button class="btn" onclick="game.toggleDayNight()">🌙/☀️</button>
<button class="btn" onclick="game.clearCustomers()">Clear</button>
</div>

<script>
// ===== PIXEL ART GAME ENGINE =====
const P = 3; // pixel scale
const W = 100;
const H = 70;

const canvas = document.getElementById('gameCanvas');
canvas.width = W * P;
canvas.height = H * P;
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const COLORS = {
  bg: '#0d0d1a', bgWall: '#16213e', floor: '#1a1a4e',
  gold: '#FFD700', goldDim: '#b8960f', red: '#FF6347',
  green: '#28a745', blue: '#3498db', brown: '#8B4513',
  darkBrown: '#5C3317', cream: '#F5DEB3', white: '#ffffff',
  skin: '#FFDBAC', hairBrown: '#4a3728', hairDark: '#2c1810',
  hairBlonde: '#DAA520', shirtRed: '#e74c3c', shirtBlue: '#2980b9',
  shirtGreen: '#27ae60', shirtPurple: '#8e44ad',
  counter: '#5C3317', counterTop: '#8B4513', machine: '#666666',
  window: '#87CEEB', lamp: '#FFD700', plant: '#2ecc71',
  plate: '#ffffff', cup: '#f5f5dc', coffee: '#3c2415',
  night: '#0a0a1a', nightWall: '#0f1a3e'
};

// ===== GAME STATE =====
let game = {
  coins: 1000,
  level: 1,
  reputation: 3,
  ordersServed: 0,
  nightMode: false,
  tables: [],
  customers: [],
  steamParticles: [],
  animFrame: 0,
  lastServeTime: 0,
  
  init() {
    this.tables = [
      {x:15, y:45, seatX:18, seatY:50, seated:false, customer:null},
      {x:35, y:45, seatX:38, seatY:50, seated:false, customer:null},
      {x:55, y:45, seatX:58, seatY:50, seated:false, customer:null},
      {x:75, y:45, seatX:78, seatY:50, seated:false, customer:null}
    ];
    this.spawnInitialCustomers();
    this.loop();
  },

  spawnInitialCustomers() {
    for(let i = 0; i < 2; i++) this.addCustomer();
  },

  addCustomer() {
    const shirtColors = [COLORS.shirtRed, COLORS.shirtBlue, COLORS.shirtGreen, COLORS.shirtPurple];
    const hairColors = [COLORS.hairBrown, COLORS.hairDark, COLORS.hairBlonde];
    const c = {
      x: -5,
      y: 38,
      targetX: 0,
      seated: false,
      seatedAt: -1,
      shirt: shirtColors[Math.floor(Math.random()*shirtColors.length)],
      hair: hairColors[Math.floor(Math.random()*hairColors.length)],
      skinTone: COLORS.skin,
      mood: 0.7 + Math.random()*0.3,
      waiting: 0,
      animated: false,
      animT: 0
    };
    // Find empty seat
    for(let i = 0; i < this.tables.length; i++) {
      if(!this.tables[i].seated) {
        this.tables[i].seated = true;
        this.tables[i].customer = c;
        c.seated = true;
        c.seatedAt = i;
        c.targetX = this.tables[i].seatX;
        c.y = this.tables[i].seatY;
        break;
      }
    }
    if(!c.seated) {
      c.targetX = 5;
    }
    this.customers.push(c);
    this.updateUI();
  },

  serveRandom() {
    let served = 0;
    for(let i = this.customers.length-1; i >= 0; i--) {
      const c = this.customers[i];
      if(c.seated && c.waiting > 0.5) {
        // Animate serving
        c.animated = true;
        c.animT = 0;
        this.addSteam(c.targetX, c.y - 12);
        this.coins += 25;
        this.ordersServed++;
        c.waiting = 0;
        served++;
        setTimeout(() => {
          const idx = this.customers.indexOf(c);
          if(idx > -1) {
            this.customers.splice(idx, 1);
            if(c.seatedAt >= 0 && this.tables[c.seatedAt]) {
              this.tables[c.seatedAt].seated = false;
              this.tables[c.seatedAt].customer = null;
            }
          }
          this.updateUI();
        }, 1500);
      }
    }
    if(served === 0) this.addCustomer();
    this.updateUI();
  },

  addTable() {
    const idx = this.tables.length;
    if(idx >= 8) return;
    const x = 10 + idx * 10;
    this.tables.push({x, y:45, seatX:x+3, seatY:50, seated:false, customer:null});
    this.updateUI();
  },

  clearCustomers() {
    for(let c of this.customers) {
      if(c.seatedAt >= 0 && this.tables[c.seatedAt]) {
        this.tables[c.seatedAt].seated = false;
        this.tables[c.seatedAt].customer = null;
      }
    }
    this.customers = [];
    this.updateUI();
  },

  toggleDayNight() {
    this.nightMode = !this.nightMode;
    this.updateUI();
  },

  addSteam(x, y) {
    for(let i = 0; i < 3; i++) {
      this.steamParticles.push({
        x: x + (Math.random()-0.5)*3,
        y: y,
        vx: (Math.random()-0.5)*0.3,
        vy: -0.3 - Math.random()*0.3,
        life: 1.0,
        size: 1 + Math.floor(Math.random()*2)
      });
    }
  },

  updateUI() {
    document.getElementById('ui-coins').textContent = this.coins;
    document.getElementById('ui-customers').textContent = this.customers.length;
    document.getElementById('ui-orders').textContent = this.ordersServed;
    document.getElementById('ui-level').textContent = this.level;
    const stars = '⭐'.repeat(Math.min(5, this.reputation));
    document.getElementById('ui-rep').textContent = stars;
  },

  // ===== DRAWING FUNCTIONS =====
  drawPixel(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x*P), Math.floor(y*P), Math.max(1,Math.floor(w*P)), Math.max(1,Math.floor(h*P)));
  },

  drawRect(x, y, w, h, color) {
    this.drawPixel(x, y, w, h, color);
  },

  drawCafeScene() {
    const bg = this.nightMode ? COLORS.night : COLORS.bgWall;
    const floor = this.nightMode ? '#0a0a2e' : COLORS.floor;
    
    // Background wall
    this.drawRect(0, 0, W, H, this.nightMode ? COLORS.night : COLORS.bg);
    this.drawRect(0, 0, W, H/2, bg); // wall
    this.drawRect(0, H/2, W, H/2, floor); // floor
    
    // Floor pattern
    for(let i = 0; i < W; i += 6) {
      for(let j = Math.floor(H/2); j < H; j += 6) {
        this.drawRect(i/1, j/1, 5/1, 5/1, (i+j)%12===0 ? '#1e1e5e' : '#16163e');
      }
    }
    
    // Wall trim
    this.drawRect(0, H/2-0.5, W, 1, '#333366');
    
    // Window on left wall
    const winX = 5, winY = 8;
    this.drawRect(winX, winY, 12, 10, this.nightMode ? '#0a1530' : COLORS.window);
    this.drawRect(winX-0.5, winY-0.5, 13, 11, '#4a3728');
    this.drawRect(winX+5.5, winY-0.5, 1, 11, '#4a3728');
    this.drawRect(winX-0.5, winY+4.5, 13, 1, '#4a3728');
    
    // Window light beam
    if(!this.nightMode) {
      ctx.fillStyle = 'rgba(255,215,0,0.03)';
      ctx.fillRect((winX+12)*P, winY*P, 30*P, 20*P);
    }
    
    // Moon/stars if night
    if(this.nightMode) {
      this.drawRect(winX+2, winY+2, 2, 2, '#fffde7');
      this.drawRect(winX+6, winY+3, 1, 1, '#fffde7');
      this.drawRect(winX+8, winY+6, 1, 1, '#fffde7');
    }
    
    // Counter (back wall)
    this.drawRect(20, H/2-4, 55, 4, COLORS.counter);
    this.drawRect(20, H/2-4, 55, 0.5, COLORS.counterTop);
    
    // Espresso machine on counter
    this.drawRect(65, H/2-8, 4, 4, COLORS.machine);
    this.drawRect(66, H/2-9, 2, 1, COLORS.machine);
    // Machine details
    this.drawRect(67, H/2-7, 1, 2, '#FFD700');
    // Steam from machine
    if(Math.random() > 0.7) {
      this.addSteam(67, H/2-10);
    }
    
    // Shelves above counter
    this.drawRect(25, H/2-12, 45, 0.5, '#3d2b1f');
    // Items on shelves (cups, bottles)
    for(let i = 0; i < 10; i++) {
      const sx = 27 + i * 4.3;
      this.drawRect(sx, H/2-14, 1.5, 1.5, i%3===0 ? COLORS.cream : '#95a5a6');
      if(i%3===0) this.drawRect(sx+0.5, H/2-15, 0.5, 0.5, COLORS.brown);
    }
    
    // Barista station
    this.drawRect(50, H/2-6, 6, 2, '#2c3e50');
    this.drawRect(51, H/2-8, 1, 2, '#34495e');
    
    // Hanging lamps
    for(let i = 0; i < 3; i++) {
      const lx = 25 + i * 20;
      this.drawRect(lx, 5, 0.3, H/2-10, '#333366'); // chain
      this.drawRect(lx-1, H/2-8, 3, 1.5, COLORS.gold); // lamp shade
      // Lamp glow
      if(!this.nightMode) {
        const glow = 0.02 + Math.sin(this.animFrame*0.05 + i)*0.01;
        ctx.fillStyle = `rgba(255,215,0,${glow})`;
        ctx.fillRect((lx-2)*P, ((H/2-6.5)*P), 5*P, 15*P);
      } else {
        ctx.fillStyle = `rgba(255,215,0,${0.08+Math.sin(this.animFrame*0.08+i)*0.03})`;
        ctx.fillRect((lx-2)*P, ((H/2-6.5)*P), 5*P, 15*P);
      }
    }
    
    // Plant in corner
    this.drawRect(90, H/2-10, 3, 3, '#27ae60');
    this.drawRect(91, H/2-7, 1, 1, COLORS.brown);
    this.drawRect(88, H/2-7, 7, 1, '#5C3317');
    
    // Tables and seats
    for(let i = 0; i < this.tables.length; i++) {
      const t = this.tables[i];
      if(t.x > W) continue;
      
      // Table
      this.drawRect(t.x, t.y, 5, 0.5, COLORS.brown);
      this.drawRect(t.x+2, t.y+0.5, 1, 3, COLORS.darkBrown);
      this.drawRect(t.x+1, t.y+3.5, 3, 0.5, COLORS.darkBrown);
      
      // Table top
      this.drawRect(t.x+0.5, t.y-0.3, 4, 0.3, COLORS.counterTop);
      
      // Cup on table
      if(t.seated && t.customer) {
        this.drawRect(t.x+2, t.y-1.5, 1, 1.2, COLORS.cup);
        this.drawRect(t.x+2.3, t.y-1.2, 0.4, 0.3, COLORS.coffee);
      }
      
      // Seat (chair)
      this.drawRect(t.seatX-1, t.y+4, 3, 1, COLORS.darkBrown);
      this.drawRect(t.seatX-0.5, t.y+5, 0.3, 1.5, COLORS.darkBrown);
      this.drawRect(t.seatX+1.2, t.y+5, 0.3, 1.5, COLORS.darkBrown);
    }
    
    // Cash register
    this.drawRect(82, H/2-7, 3, 3, '#555555');
    this.drawRect(83, H/2-8, 2, 1, '#666666');
    
    // Decorative items
    this.drawRect(8, H/2-6, 2, 2, '#8e44ad'); // flower vase
    this.drawRect(9, H/2-7, 1, 1, '#e74c3c'); // flower
  },

  drawCustomer(c) {
    const {x, y, shirt, hair, skinTone, animT} = c;
    
    if(animT !== undefined && animT < 1) {
      // Serve animation - cup flies to table
      c.animT += 0.05;
    }
    
    // Head
    this.drawRect(x, y-6, 2.5, 2.5, skinTone);
    // Hair
    this.drawRect(x+0.2, y-7, 2, 1, hair);
    
    // Eyes
    this.drawRect(x+0.5, y-5, 0.3, 0.3, '#333');
    this.drawRect(x+1.5, y-5, 0.3, 0.3, '#333');
    
    // Body/shirt
    this.drawRect(x, y-3.5, 2.5, 3, shirt);
    
    // Arms
    this.drawRect(x-0.5, y-2.5, 0.5, 2, skinTone);
    this.drawRect(x+2.5, y-2.5, 0.5, 2, skinTone);
    
    // Legs
    this.drawRect(x+0.3, y-0.5, 0.7, 2.5, '#2c3e50');
    this.drawRect(x+1.3, y-0.5, 0.7, 2.5, '#2c3e50');
    
    // Feet
    this.drawRect(x+0.2, y+2, 0.8, 0.5, '#333');
    this.drawRect(x+1.2, y+2, 0.8, 0.5, '#333');
    
    // Mood indicator (patience bar)
    if(c.seated) {
      const patience = Math.max(0, c.waiting);
      this.drawRect(x-1, y-9, 3, 0.3, '#333');
      const moodColor = patience > 0.7 ? '#28a745' : patience > 0.3 ? '#FFD700' : '#e74c3c';
      this.drawRect(x-1, y-9, 3*patience, 0.3, moodColor);
    }
  },

  drawWalkingCustomer(c) {
    const {x, y, shirt, hair, skinTone} = c;
    const walkBob = Math.sin(this.animFrame * 0.2) * 0.2;
    
    this.drawRect(x, y-6+walkBob, 2.5, 2.5, skinTone);
    this.drawRect(x+0.2, y-7+walkBob, 2, 1, hair);
    this.drawRect(x+0.5, y-5+walkBob, 0.3, 0.3, '#333');
    this.drawRect(x+1.5, y-5+walkBob, 0.3, 0.3, '#333');
    this.drawRect(x, y-3.5+walkBob, 2.5, 3, shirt);
    this.drawRect(x-0.5, y-2.5+walkBob, 0.5, 2, skinTone);
    this.drawRect(x+2.5, y-2.5+walkBob, 0.5, 2, skinTone);
    this.drawRect(x+0.3, y-0.5+walkBob, 0.7, 2.5, '#2c3e50');
    this.drawRect(x+1.3, y-0.5+walkBob, 0.7, 2.5, '#2c3e50');
  },

  drawSteamParticles() {
    for(let i = this.steamParticles.length-1; i >= 0; i--) {
      const s = this.steamParticles[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life -= 0.02;
      if(s.life <= 0) { this.steamParticles.splice(i, 1); continue; }
      const alpha = s.life * 0.5;
      this.drawRect(s.x, s.y, s.size, s.size, `rgba(255,255,255,${alpha})`);
    }
  },

  update() {
    this.animFrame++;
    
    // Update customers walking in
    for(let c of this.customers) {
      if(!c.seated) {
        c.x += (c.targetX - c.x) * 0.05;
        if(Math.abs(c.x - c.targetX) < 0.3) c.x = c.targetX;
      } else {
        c.waiting += 0.002;
        // Update seat position
        if(c.seatedAt >= 0 && this.tables[c.seatedAt]) {
          c.targetX = this.tables[c.seatedAt].seatX + 1;
          c.y = this.tables[c.seatedAt].seatY - 2;
        }
      }
    }
  },

  render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    this.drawCafeScene();
    
    // Draw seated customers
    for(let c of this.customers) {
      if(c.seated) this.drawCustomer(c);
    }
    
    // Draw walking customers (not seated)
    for(let c of this.customers) {
      if(!c.seated) this.drawWalkingCustomer(c);
    }
    
    this.drawSteamParticles();
    
    // Night overlay
    if(this.nightMode) {
      ctx.fillStyle = 'rgba(0,0,20,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  },

  loop() {
    this.update();
    this.render();
    requestAnimationFrame(() => this.loop());
  }
};

game.init();
game.updateUI();
</script>
</body>
</html>
