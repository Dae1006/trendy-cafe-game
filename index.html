<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Cafe - Pixel Art</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0d0d1a;color:#e8e8e8;overflow:hidden;height:100vh;display:flex;flex-direction:column;width:100vw}
#top-bar{width:100%;display:flex;justify-content:space-around;padding:6px 8px;background:linear-gradient(135deg,#16213e,#1a1a4e);border-bottom:2px solid #FFD700;font-size:12px;flex-wrap:wrap;gap:2px}
.stat{padding:3px 6px;border:1px solid #333;border-radius:3px;font-size:11px}
.gold{color:#FFD700;font-weight:bold}
#canvas-wrap{width:100%;flex:0 0 auto;background:#0d0d1a;overflow:hidden;position:relative}
#gameCanvas{width:100%;height:320px;display:block;background:#87CEEB;image-rendering:pixelated;image-rendering:crisp-edges}
#main{width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column}
#tabs{display:flex;border-bottom:2px solid #0f3460;background:#0f3460;flex-shrink:0}
.tab{flex:1;padding:10px 6px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;cursor:pointer;white-space:nowrap;font-size:11px;text-align:center}
.tab.active{color:#FFD700;background:rgba(255,215,0,0.2)}
.tab:hover{background:rgba(255,215,0,0.1)}
#content{flex:1;overflow-y:auto;padding:8px;background:#1a1a2e}
.card{padding:8px;margin:5px 0;background:linear-gradient(145deg,#0f3460,#16213e);border:1px solid #2a3a5e;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.card.rare{border-color:#9b59b6}
.btn{padding:6px 12px;border:1px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px}
.btn:hover{box-shadow:0 2px 8px rgba(255,99,71,0.4)}
.btn:disabled{background:#555;cursor:not-allowed}
.btn.green{background:#28a745}
.btn.blue{background:#3498db}
.btn.gold{background:#DAA520;color:#000}
.notif{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#0f3460;color:#FFD700;padding:5px 12px;border:1px solid #FFD700;border-radius:6px;font-size:11px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
.notif.show{opacity:1}
.weather-bar{padding:4px 8px;background:#0d0d1a;border-bottom:1px solid #333;font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.upgrade-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.quest-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px}
.quest-card.done{border-color:#28a745;background:rgba(40,167,69,.1)}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6347);transition:width .5s}
.trend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:6px}
.trend-card{padding:6px;text-align:center;font-size:10px;cursor:pointer;border-radius:4px;border:1px solid #333;background:#16213e}
.trend-card.common{border-color:#aaa}.trend-card.rare{border-color:#9b59b6}.trend-card.epic{border-color:#e74c3c}.trend-card.legendary{border-color:#FFD700;background:linear-gradient(145deg,#2c1a4a,#1a1a4e)}
.supplier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px}
</style>
</head>
<body>

<div id="top-bar">
  <span class="stat">💰 <span class="gold" id="money">500</span></span>
  <span class="stat">⭐ <span class="gold" id="level">Lv.1</span></span>
  <span class="stat">📅 Ngày <span id="day">1</span></span>
  <span class="stat">🧑‍🍳 <span id="staff">0</span></span>
  <span class="stat">👥 <span id="custCount">0</span></span>
</div>

<div class="weather-bar" id="weather-bar"></div>

<div id="canvas-wrap">
  <canvas id="gameCanvas" width="480" height="300"></canvas>
</div>

<div id="main">
  <div id="tabs">
    <button class="tab active" data-tab="location">📍 Vị trí</button>
    <button class="tab" data-tab="menu">☕ Menu</button>
    <button class="tab" data-tab="staff">👥 Staff</button>
    <button class="tab" data-tab="upgrade">🔧 Nâng cấp</button>
    <button class="tab" data-tab="trend">🔥 Trend</button>
    <button class="tab" data-tab="supplier">📦 Vật tư</button>
    <button class="tab" data-tab="quest">📋 Nhiệm vụ</button>
  </div>
  <div id="content"></div>
</div>

<div class="notif" id="notif"></div>

<script>
// ======== GAME STATE ========
const GS = {
  coins:500, level:1, xp:0, xpNeeded:100,
  currentLocation:'street', unlockedLocations:['street'],
  ownedItems:{}, ownedRecipes:[], menuUnlocked:1,
  autoServeRate:0, upgradesBought:[], questsCompleted:[],
  dailyRevenue:0, totalRevenue:0, totalServed:0,
  gameDay:1, lastDayChange:Date.now(),
  supplierStock:{beans:10,milk:20,cups:200},
  animCustomers:[], animFrame:0, tick:0,
  lastServeRevenue:0
};

// ======== DATA ========
const LOCATIONS={
  street:{name:'Vỉa hè',emoji:'🚶',cost:0,revenueMult:1,customers:3,bg:'#87CEEB'},
  mall:{name:'Trung tâm TM',emoji:'🏬',cost:5000,revenueMult:2.5,customers:5,bg:'#B0E0E6'},
  garden:{name:'Sân vườn',emoji:'🌳',cost:15000,revenueMult:2,customers:4,bg:'#90EE90'},
  rooftop:{name:'Rooftop',emoji:'🌃',cost:50000,revenueMult:3.5,customers:6,bg:'#4A3068'},
  festival:{name:'Lễ hội',emoji:'🎪',cost:100000,revenueMult:4,customers:8,bg:'#FF6347'}
};

const MENU_ITEMS=[
  {id:'coffee',name:'Cà phê đen',emoji:'☕',price:25,cost:5,needsBeans:true,needsMilk:false},
  {id:'milk_coffee',name:'Cà phê sữa',emoji:'🥛',price:30,cost:8,needsBeans:true,needsMilk:true},
  {id:'espresso',name:'Espresso',emoji:'☕',price:35,cost:5,needsBeans:true,needsMilk:false},
  {id:'matcha',name:'Trà matcha',emoji:'🍵',price:40,cost:10,needsBeans:false,needsMilk:false},
  {id:'smoothie',name:'Sinh tố',emoji:'🥤',price:45,cost:12,needsBeans:false,needsMilk:true},
  {id:'cake',name:'Bánh mì',emoji:'🥪',price:35,cost:8,needsBeans:false,needsMilk:false},
  {id:'ice_tea',name:'Trà đá',emoji:'🧊',price:15,cost:3,needsBeans:false,needsMilk:false},
  {id:'bubble_tea',name:'Trà sữa',emoji:'🧋',price:50,cost:12,needsBeans:false,needsMilk:true},
  {id:'tropical',name:'Nước ép dừa',emoji:'🥥',price:55,cost:15,needsBeans:false,needsMilk:true},
  {id:'signature',name:'Signature',emoji:'🍸',price:80,cost:20,needsBeans:true,needsMilk:true}
];

const TREND_ITEMS=[
  {id:'t_meme_dog',name:'🐶 Meme Chó Vàng',rarity:'common',effect:'revenue',value:.05,desc:'+5% doanh thu',cost:200},
  {id:'t_meme_cat',name:'🐱 Mèo hoang',rarity:'common',effect:'revenue',value:.03,desc:'+3% doanh thu',cost:150},
  {id:'t_mu_jersey',name:'⚽ Áo MU',rarity:'common',effect:'customers',value:1,desc:'+1 khách',cost:300},
  {id:'t_girl_boy',name:'💃 Cô Bé Chú Bé',rarity:'rare',effect:'revenue',value:.1,desc:'+10% doanh thu',cost:1000},
  {id:'t_ba_tram',name:'💯 Ba Trăm',rarity:'rare',effect:'customers',value:2,desc:'+2 khách',cost:1500},
  {id:'t_tu_hien',name:'🎤 Tú Hien Style',rarity:'rare',effect:'revenue',value:.15,desc:'+15% doanh thu',cost:2000},
  {id:'t_lam_pham',name:'🏆 Lam Phẩm',rarity:'epic',effect:'revenue',value:.2,desc:'+20% doanh thu sig',cost:5000},
  {id:'t_sieu_toc',name:'⚡ Siêu Tốc',rarity:'epic',effect:'customers',value:5,desc:'+5 khách',cost:8000},
  {id:'t_vua_cafe',name:'👑 Vua Cà Phê',rarity:'legendary',effect:'revenue',value:.5,desc:'+50% doanh thu!',cost:20000},
  {id:'t_omega',name:'💫 Omega Plus',rarity:'legendary',effect:'all',value:.3,desc:'+30% tất cả!',cost:50000}
];

const UPGRADES=[
  {id:'u_staff1',name:'👨‍🍳 Thuê nhân viên',desc:'Tự động phục vụ 1 khách/phút',cost:1000,type:'auto_serve',value:1},
  {id:'u_staff2',name:'👩‍🍳 Thêm nhân viên',desc:'Tự động phục vụ thêm 2 khách/phút',cost:3000,type:'auto_serve',value:2},
  {id:'u_staff3',name:'👨‍🍳👩‍🍳 Đội bếp',desc:'Tự động phục vụ thêm 5 khách/phút',cost:8000,type:'auto_serve',value:5},
  {id:'u_menu1',name:'📋 Mở rộng menu',desc:'Thêm 5 món mới',cost:2000,type:'unlock_menu',value:5},
  {id:'u_deco1',name:'🪑 Bàn ghế mới',desc:'+10% doanh thu',cost:1500,type:'revenue',value:.1},
  {id:'u_deco2',name:'🎵 Nhạc nền',desc:'+5% doanh thu',cost:800,type:'revenue',value:.05},
  {id:'u_sign1',name:'🪧 Bảng hiệu LED',desc:'+20% khách vãng lai',cost:5000,type:'customers',value:.2},
  {id:'u_wifi1',name:'📶 WiFi miễn phí',desc:'+10% doanh thu',cost:1200,type:'revenue',value:.1},
  {id:'u_aircon1',name:'❄️ Điều hòa',desc:'+15% doanh thu',cost:3500,type:'revenue',value:.15},
  {id:'u_parking1',name:'🅿️ Chỗ đỗ xe',desc:'+15% khách xa',cost:4000,type:'customers',value:.15}
];

const QUESTS=[
  {id:'q1',title:'Ngày đầu khai trương',desc:'Phục vụ 10 khách',type:'serve',target:10,reward:{coins:200,xp:50},done:false,progress:0},
  {id:'q2',title:'Thu thập meme',desc:'Sở hữu 1 item trendy',type:'collect',target:1,reward:{coins:300,xp:75},done:false,progress:0},
  {id:'q3',title:'Triệu phú cà phê',desc:'Kiếm 5000 coin',type:'earn',target:5000,reward:{coins:1000,xp:150},done:false,progress:0},
  {id:'q4',title:'Nâng cấp quán',desc:'Mở vị trí mới',type:'upgrade',target:1,reward:{coins:2000,xp:200},done:false,progress:0},
  {id:'q5',title:'Bộ sưu tập',desc:'Có 5 items khác nhau',type:'collect_all',target:5,reward:{coins:3000,xp:300},done:false,progress:0},
  {id:'q6',title:'Doanh thu khủng',desc:'Kiếm 20000/ngày',type:'daily_earn',target:20000,reward:{coins:5000,xp:500},done:false,progress:0},
  {id:'q7',title:'Hoàn thành bộ sưu tập',desc:'Sở hữu tất cả items',type:'complete_all',target:TREND_ITEMS.length,reward:{coins:20000,xp:2000},done:false,progress:0}
];

const WEATHER_MAP={
  sunny:{emoji:'☀️',name:'Nắng',mod:1.0},
  cloudy:{emoji:'⛅',name:'Nhiều mây',mod:1.05},
  rainy:{emoji:'🌧️',name:'Mưa',mod:.75},
  hot:{emoji:'🔥',name:'Nóng',mod:1.15},
  tet:{emoji:'🎊',name:'Tết',mod:2.5}
};

// ======== CANVAS SETUP ========
const canvasEl = document.getElementById('gameCanvas');
const canvasCtx = canvasEl.getContext('2d');
const CW=480,CH=300;
canvasCtx.imageSmoothingEnabled=false;
canvasEl.style.background='#87CEEB';

// ======== PIXEL ART HELPERS ========
function dr(x,y,w,h,color){canvasCtx.fillStyle=color;canvasCtx.fillRect(Math.round(x),Math.round(y),w,h);}

// ======== COLOR UTILITIES ========
function lerpColor(c1,c2,t){
  var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  var r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  var r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}
function darken(hex,factor){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[Math.max(0,Math.round(r*(1-factor))),Math.max(0,Math.round(g*(1-factor))),Math.max(0,Math.round(b*(1-factor)))].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}

// ======== HELPER FUNCTIONS ========
function getWeather(){
  const cycle=GS.gameDay%180;
  const season=cycle<60?'summer':(cycle<120?'rainy':'cool');
  const probs=season==='summer'?{sunny:.35,cloudy:.25,rainy:.2,hot:.1,tet:0}:season==='rainy'?{sunny:.1,cloudy:.15,rainy:.45,hot:0,tet:.1}:{sunny:.15,cloudy:.3,rainy:.15,hot:0,tet:.3};
  const rand=Math.random(),cum=0;let c=0;
  for(const[t,p]of Object.entries(probs)){c+=p;if(rand<=c)return WEATHER_MAP[t];}
  return WEATHER_MAP.sunny;
}

function getRevenuePerMin(){
  const loc=LOCATIONS[GS.currentLocation];
  let base=loc.customers*30,mult=loc.revenueMult;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){const item=TREND_ITEMS.find(i=>i.id===id);if(item&&item.effect==='revenue')mult+=item.value*cnt;}
  for(const id of GS.upgradesBought){const u=UPGRADES.find(x=>x.id===id);if(u&&u.type==='revenue')mult+=u.value;}
  const w=getWeather();mult*=w.mod;
  return Math.floor(base*mult);
}

function getCustomerCount(){
  const loc=LOCATIONS[GS.currentLocation];let base=loc.customers;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){const item=TREND_ITEMS.find(i=>i.id===id);if(item&&item.effect==='customers')base+=item.value*cnt;}
  for(const id of GS.upgradesBought){const u=UPGRADES.find(x=>x.id===id);if(u&&u.type==='customers')base+=u.value*base;}
  return Math.floor(base);
}

function showNotif(text){
  const n=document.getElementById('notif');n.textContent=text;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2500);
}

function addXP(n){
  GS.xp+=n;while(GS.xp>=GS.xpNeeded){GS.xp-=GS.xpNeeded;GS.level++;GS.xpNeeded=Math.floor(GS.xpNeeded*1.5);showNotif(`⭐ Lên cấp ${GS.level}!`);}
}

function checkQuests(){
  QUESTS.forEach(q=>{
    if(q.done)return;
    if(q.type==='serve')q.progress=Math.min(GS.totalServed,q.target);
    if(q.type==='earn')q.progress=Math.min(Math.floor(GS.totalRevenue/100),q.target);
    if(q.type==='collect'||q.type==='collect_all'||q.type==='complete_all')q.progress=Math.min(Object.keys(GS.ownedItems).filter(k=>GS.ownedItems[k]>0).length,q.target);
    if(q.type==='upgrade')q.progress=Math.min(GS.unlockedLocations.length-1,q.target);
    if(q.progress>=q.target){q.done=true;GS.coins+=q.reward.coins;GS.xp+=q.reward.xp;showNotif(`🎉 ${q.title}! +${q.reward.coins}K +${q.reward.xp}XP`);}
  });
}

// ======== CUSTOMER SPAWNER ========
function spawnCustomer(){
  const loc=LOCATIONS[GS.currentLocation];
  const skinColors=['#FDBCB4','#D2B48C','#8D5524','#C68642','#FFE0BD'];
  const hairColors=['#2C1810','#8B4513','#DAA520','#1C1C1C','#A0522D','#C04000'];
  const shirtColors=['#E74C3C','#3498DB','#2ECC71','#9B59B6','#F39C12','#1ABC9C','#E67E22','#2980B9'];
  GS.animCustomers.push({
    x:CW+20,y:240+Math.random()*10,
    targetX:60+Math.random()*300,targetY:240+Math.random()*20,
    state:'entering',timer:0,hit:0,
    color:shirtColors[Math.floor(Math.random()*shirtColors.length)],
    skin:skinColors[Math.floor(Math.random()*skinColors.length)],
    hair:hairColors[Math.floor(Math.random()*hairColors.length)],
    hat:Math.random()>.75?['🎩','🧢','👒'][Math.floor(Math.random()*3)]:null,
    name:['An','Bình','Chi','Dung','Em','Giang','Hoa','Lan','Mai','Ngọc','Oanh','Phuc','Quang','Son','Tuan'][Math.floor(Math.random()*15)],
    speed:1.5+Math.random()
  });
}

// ======== MAIN GAME LOOP (throttled to 10fps) ========
let lastLoop=0;
const TICK_MS=100; // game tick every 100ms = 10 ticks/sec
function gameLoop(ts=0){
  if(ts-lastLoop<TICK_MS){requestAnimationFrame(gameLoop);return;}
  lastLoop=ts;

  GS.animFrame++;GS.tick++;

  // Revenue tick every 6 ticks = 600ms
  if(GS.tick%6===0){
    const rev=getRevenuePerMin();
    GS.dailyRevenue+=rev;GS.totalRevenue+=rev;GS.lastServeRevenue=rev;
    addXP(3);checkQuests();
  }

  // Auto serve every 6 ticks (600ms)
  if(GS.autoServeRate>0&&GS.tick%6===0){
    const served=GS.autoServeRate;
    const autoRev=Math.floor(getRevenuePerMin()*0.3*served);
    GS.coins+=autoRev;GS.totalRevenue+=autoRev;GS.totalServed+=served;addXP(served*2);checkQuests();
  }

  // Day change every 600 ticks = 60 seconds
  if(GS.tick%600===0){GS.gameDay++;GS.dailyRevenue=0;showNotif(`📅 Ngày ${GS.gameDay}!`);}

  // Spawn customers
  const maxCustomers=getCustomerCount();
  const activeCount=GS.animCustomers.filter(c=>c.state==='entering'||c.state==='sitting').length;
  if(activeCount<maxCustomers&&GS.tick%15===0){
    const count=GS.currentLocation==='festival'?2:GS.currentLocation==='rooftop'?1:1;
    for(let i=0;i<count;i++)if(GS.animCustomers.filter(c=>c.state==='entering'||c.state==='sitting').length<maxCustomers)spawnCustomer();
  }

  // Auto serve visual: add served customers
  if(GS.autoServeRate>0&&GS.tick%6===0){
    const served=GS.autoServeRate;
    for(let s=0;s<served;s++){
      GS.animCustomers.push({x:80+Math.random()*200,y:160,auto:true,targetX:80+Math.random()*300,targetY:230+Math.random()*20,state:'entering',timer:0,hit:0,color:'#27AE60',skin:'#FDBCB4',hair:'#2C1810',hat:null,name:'Staff',speed:2.5});
    }
  }

  // Update animated customers
  for(let i=GS.animCustomers.length-1;i>=0;i--){
    const c=GS.animCustomers[i];
    if(c.state==='entering'){
      const dx=c.targetX-c.x,dy=c.targetY-c.y;const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>2){c.x+=dx/dist*c.speed;c.y+=dy/dist*c.speed;}else{c.state='sitting';c.drinkTime=0;}
    }else if(c.state==='sitting'){
      c.drinkTime=(c.drinkTime||0)+1;
      if(c.drinkTime>90){c.state='leaving';c.timer=0;GS.coins+=getRevenuePerMin()/Math.max(getCustomerCount(),1);GS.totalServed++;addXP(1);checkQuests();c.hit=10;}
    }else if(c.state==='leaving'){c.timer++;c.x+=c.speed+1;if(c.x>CW+40)GS.animCustomers.splice(i,1);}
    if(c.hit>0)c.hit--;
  }
  while(GS.animCustomers.length>15)GS.animCustomers.shift();

  updateUI();
  renderCanvas();
  requestAnimationFrame(gameLoop);
}

// ======== RENDER CANVAS ========
function renderCanvas(){
  if(!canvasCtx){console.log('Canvas ctx not ready!');return;}

  const c=canvasCtx;
  const f=GS.animFrame;
  const hour=(f/60)%24;
  const isNight=hour>=19||hour<6;
  const isDusk=hour>=17&&hour<19;
  const isDawn=hour>=5&&hour<7;
  const loc=LOCATIONS[GS.currentLocation];
  const weather=getWeather();

  // === SKY (detailed gradient based on time of day) ===
  let skyTop,skyMid,skyBot;
  if(isDawn){
    const t=(hour-5)/2;
    skyTop=lerpColor('#0a0a2a','#FF6B35',t);skyMid=lerpColor('#1a1a3e','#FFB347',t);skyBot=lerpColor('#0d0d2a','#FF8C00',t);
  }else if(isDusk){
    const t=(hour-17)/2;
    skyTop=lerpColor('#87CEEB','#1a0a2e',t);skyMid=lerpColor('#B0E0E6','#AD1457',t);skyBot=lerpColor('#E0F7FA','#FF6F00',t);
  }else if(isNight){
    const t=Math.sin((hour-19)/5*Math.PI)*0.3+0.7;
    skyTop='#0a0a1a';skyMid='#111133';skyBot='#1a1a2e';
  }else{
    skyTop='#87CEEB';skyMid='#B0E0E6';skyBot='#E0F7FA';
  }
  const skyGrad=c.createLinearGradient(0,0,0,180);
  skyGrad.addColorStop(0,skyTop);skyGrad.addColorStop(0.5,skyMid);skyGrad.addColorStop(1,skyBot);
  c.fillStyle=skyGrad;c.fillRect(0,0,CW,180);

  // Ground
  const groundGrad=c.createLinearGradient(0,180,0,CH);
  const groundBase=isNight?'#1a1a2e':isDusk?'#3d2b1f':isDawn?'#546E7A':'#78909C';
  groundGrad.addColorStop(0,groundBase);groundGrad.addColorStop(1,darken(groundBase,0.3));
  c.fillStyle=groundGrad;c.fillRect(0,180,CW,CH-180);

    c.fillStyle=cust.skin;
    dr(cx-1-armSwing,cy+24,4,3,cust.skin);
    dr(cx+17+armSwing,cy+24,4,3,cust.skin);

    // Drinking animation
    if(cust.state==='sitting'&&cust.drinkTime>5&&cust.drinkTime<40){
      dr(cx+18,cy+4,8,8,'#F5F5F5');dr(cx+19,cy+5,6,6,'#6F4E37');
    }

    // === HEAD (rounded face) ===
    c.fillStyle=cust.skin;
    dr(cx+3,cy-1,14,13,cust.skin);
    dr(cx+4,cy-3,12,3,cust.skin);
    dr(cx+2,cy+10,2,2,cust.skin);
    dr(cx+14,cy+10,2,2,cust.skin);
    // Hair
    c.fillStyle=cust.hair;
    dr(cx+2,cy-4,16,4,cust.hair);
    dr(cx+1,cy-3,3,5,cust.hair);
    dr(cx+14,cy-3,3,5,cust.hair);
    dr(cx+3,cy-5,12,2,cust.hair);
    // Eyes (looking direction)
    c.fillStyle='#FFFFFF';c.fillRect(cx+5,cy+2,3,3);c.fillRect(cx+10,cy+2,3,3);
    c.fillStyle='#333';c.fillRect(cx+6,cy+3,2,2);c.fillRect(cx+11,cy+3,2,2);
    // Eye highlights
    c.fillStyle='#FFFFFF';c.fillRect(cx+7,cy+2,1,1);c.fillRect(cx+12,cy+2,1,1);
    // Mouth
    if(cust.state==='sitting'&&cust.drinkTime>5&&cust.drinkTime<40){
      c.fillStyle='#C44569';c.fillRect(cx+7,cy+9,4,2);
    }else{
      c.fillStyle='#C44569';c.fillRect(cx+8,cy+9,3,1);
    }
    // Blush
    c.fillStyle='rgba(255,150,150,0.3)';
    c.fillRect(cx+3,cy+7,3,2);c.fillRect(cx+12,cy+7,3,2);

    // === DRINK ANIMATION (when sitting) ===
    if(cust.state==='sitting'&&cust.drinkTime>5&&cust.drinkTime<40){
      c.fillStyle='#FFF';c.fillRect(cx+17,cy-2,8,8);
      c.fillStyle='#6F4E37';c.fillRect(cx+18,cy-1,6,6);
      for(let s=0;s<3;s++){
        const sx=cx+20+Math.sin(f*0.03+s)*2;
        const sy=cy-8-s*4-Math.sin(f*0.02+s)*2;
        c.fillStyle=`rgba(200,200,200,${0.15-s*0.04})`;
        c.beginPath();c.arc(sx,sy,2+s,0,Math.PI*2);c.fill();
      }
    }

    // === NAME BUBBLE ===
    if(cust.state==='sitting'){
      const bubbleY=cy-20+Math.sin(f*0.1)*2;
      c.fillStyle='rgba(255,255,255,0.9)';c.beginPath();c.arc(cx+8,bubbleY,11,0,Math.PI*2);c.fill();
      c.strokeStyle='#999';c.lineWidth=1;c.stroke();
      c.fillStyle='#333';c.font='7px monospace';c.textAlign='center';c.fillText(cust.name,cx+8,bubbleY+3);
    }

    // === MONEY PARTICLE ===
    if(cust.hit>0){
      c.fillStyle='#FFD700';c.font='14px serif';c.textAlign='center';c.fillText('💰',cx+8,cy-32+cust.hit);
      cust.hit--;
    }
  });

  // === AUTO-SERVE BARISTA (detailed) ===
  if(GS.autoServeRate>0){
    const bx=80+Math.sin(f*0.02)*40;
    const by=floorY-25;
    const walk=f%60<30;
    const ls=walk?Math.sin(Math.floor(f)*0.4)*2:0;
    c.fillStyle='rgba(0,0,0,0.12)';c.beginPath();c.ellipse(bx+8,by+32,6,2,0,0,Math.PI*2);c.fill();
    c.fillStyle='#333';dr(bx+4+ls,by+20,4,10,'#333');dr(bx+10-ls,by+20,4,10,'#333');
    c.fillStyle='#2C1810';dr(bx+3+ls,by+29,5,2);dr(bx+9-ls,by+29,5,2);
    c.fillStyle='#FFFFFF';dr(bx+2,by+8,14,12,'#FFFFFF');
    c.fillStyle='#FFD700';dr(bx+5,by+12,8,8,'#FFD700');
    c.fillStyle='#FDBCB4';dr(bx+4,by-2,10,10);
    c.fillStyle='#2C1810';dr(bx+3,by-5,12,4);dr(bx+3,by-4,2,5);dr(bx+11,by-4,2,5);
    c.fillStyle='#333';c.fillRect(bx+6,by+1,2,2);c.fillRect(bx+10,by+1,2,2);
    c.fillStyle='#C44569';c.fillRect(bx+7,by+5,3,1);
    c.fillStyle='#BDBDBD';dr(bx+1,by+18,14,1,'#BDBDBD');
  }

  // Customer count indicator
  const active=GS.animCustomers.filter(c=>c.state==='entering'||c.state==='sitting').length;
  if(active>0){
    c.fillStyle='rgba(0,0,0,.6)';c.fillRect(5,5,60,16);
    c.fillStyle='#FFD700';c.font='bold 10px monospace';c.textAlign='left';c.fillText(`👥 ${active} khách`,10,17);
  }

  // Revenue indicator
  c.fillStyle='rgba(0,0,0,.6)';c.fillRect(CW-80,5,75,16);
  c.fillStyle='#2ECC71';c.font='bold 10px monospace';c.textAlign='right';c.fillText(`💰 +${GS.lastServeRevenue}K/phút`,CW-10,17);

  c.font='10px monospace';c.textAlign='center';
}

// ======== UI RENDERING ========
let _lastUI={money:'',level:'',day:'',staff:'',cust:'',weather:'',rev:'',perMinute:''};
function updateUI(){
  const cm=GS.coins.toLocaleString();
  const lv='Lv.'+GS.level;
  const dy=GS.gameDay;
  const sf=GS.autoServeRate+' khách/phút';
  const cc=getCustomerCount();
  const w=getWeather();
  const rev=getRevenuePerMin();
  let dirty=false;
  if(_lastUI.money!==cm){document.getElementById('money').textContent=cm;_lastUI.money=cm;dirty=true;}
  if(_lastUI.level!==lv){document.getElementById('level').textContent=lv;_lastUI.level=lv;}
  if(_lastUI.day!==dy){document.getElementById('day').textContent=dy;_lastUI.day=dy;}
  if(_lastUI.staff!==sf){document.getElementById('staff').textContent=sf;_lastUI.staff=sf;}
  if(_lastUI.cust!==cc){document.getElementById('custCount').textContent=cc;_lastUI.cust=cc;}
  const wText=w.emoji+' '+w.name;
  const rText='Doanh thu: '+rev+'K/phút';
  const pText=cc+' khách/phút';
  const dText='Ngày '+GS.gameDay;
  if(_lastUI.weather!==wText||_lastUI.rev!==rText||_lastUI.perMinute!==pText||_lastUI.day!==dText){
    _lastUI.weather=wText;_lastUI.rev=rText;_lastUI.perMinute=pText;_lastUI.day=dText;
    document.getElementById('weather-bar').innerHTML=`<span>${wText}</span><span>📊 ${rText}</span><span>👥 ${pText}</span><span>📅 ${dText}</span>`;
  }
}

function renderTab(name){
  const el=document.getElementById('content');let h='';
  if(name==='location'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📍 Chọn vị trí quán</h3>';
    for(const[id,loc]of Object.entries(LOCATIONS)){
      const unlocked=GS.unlockedLocations.includes(id);
      const active=GS.currentLocation===id;
      h+=`<div class="card" style="margin:3px 0"><div><span style="font-size:16px">${loc.emoji}</span> <strong>${loc.name}</strong><br><small>👥${loc.customings} KH/phút | 💰x${loc.revenueMult}</small></div><button class="btn ${active?'blue':''}" ${(unlocked?'':'')} ${(!unlocked&&GS.coins<loc.cost)?'disabled':''} onclick="changeLocation('${id}')">${active?'✅ Đang dùng':(!unlocked?`🔒 ${loc.cost}K`:'📍 Chọn')}</button></div>`;
    }
  }else if(name==='menu'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">☕ Menu Đồ uống</h3>';
    MENU_ITEMS.slice(0,GS.menuUnlocked).forEach(item=>{
      h+=`<div class="card"><div><span style="font-size:18px">${item.emoji}</span> <strong>${item.name}</strong><br><small>💰${item.price}K | Giá vốn: ${item.cost}K | ${item.needsBeans?'☕ ':''}${item.needsMilk?'🥛':''}</small></div><button class="btn green" onclick="sellItem('${item.id}')">Phục vụ</button></div>`;
    });
  }else if(name==='staff'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">👥 Tự động phục vụ (Staff)</h3>';
    h+=`<div class="card"><div><strong>Tổng staff: ${GS.autoServeRate} khách/phút</strong><br><small>Staff đang hoạt động trên canvas (áo vàng, di chuyển liên tục)</small></div></div>`;
    [{n:'👨‍🍳 Thuê nhân viên',d:'+1 khách/phút',c:1000,id:'u_staff1'},{n:'👩‍🍳 Thêm nhân viên',d:'+2 khách/phút',c:3000,id:'u_staff2'},{n:'👨‍🍳👩‍🍳 Đội bếp',d:'+5 khách/phút',c:8000,id:'u_staff3'}].forEach(u=>{
      const bought=GS.upgradesBought.includes(u.id);
      h+=`<div class="upgrade-card"><div><strong>${u.n}</strong><br><small>${u.d}</small></div><button class="btn gold" ${bought||GS.coins<u.c?'disabled':''} onclick="buyUpgrade('${u.id}',${u.c},'auto_serve',1)">${bought?'✅ Đã mua':u.c+'K'}</button></div>`;
    });
  }else if(name==='upgrade'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">🔧 Nâng cấp quán</h3>';
    UPGRADES.forEach(u=>{
      const bought=GS.upgradesBought.includes(u.id);
      h+=`<div class="upgrade-card"><div><strong>${u.name}</strong><br><small>${u.desc} (+${u.value*100}%)</small></div><button class="btn gold" ${bought||GS.coins<u.cost?'disabled':''} onclick="buyUpgrade('${u.id}',${u.cost},'${u.type}',${u.value})">${bought?'✅ Đã mua':u.cost+'K'}</button></div>`;
    });
  }else if(name==='trend'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">🔥 Item Trendy</h3><div class="trend-grid">';
    TREND_ITEMS.forEach(item=>{
      const owned=GS.ownedItems[item.id]>0;
      h+=`<div class="trend-card ${item.rarity}" onclick="buyTrend('${item.id}')"><strong>${item.name}</strong><br><small>${item.desc}</small><br><span style="color:${owned?'#2ECC71':'#FFD700'}">${owned?'✅ sở hữu':item.cost+'K'}</span></div>`;
    });
    h+='</div>';
  }else if(name==='supplier'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📦 Vật tư</h3>';
    h+=`<div class="card">☕ Đậu: <strong class="gold">${GS.supplierStock.beans}</strong> | 🥛 Sữa: <strong class="gold">${GS.supplierStock.milk}</strong> | 🥤 Cốc: <strong class="gold">${GS.supplierStock.cups}</strong></div>`;
    h+='<div style="display:flex;gap:4px;margin-top:6px">';
    [{k:'beans',c:50,a:10,n:'☕ 10 đậu (50K)'},{k:'milk',c:40,a:10,n:'🥛 10 sữa (40K)'},{k:'cups',c:20,a:50,n:'🥤 50 cốc (20K)'}].forEach(s=>{
      h+=`<button class="btn blue" style="flex:1;font-size:10px" ${GS.coins<s.c?'disabled':''} onclick="buySupply('${s.k}',${s.c},${s.a})">${s.n}</button>`;
    });
    h+='</div>';
  }else if(name==='quest'){
    h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📋 Nhiệm vụ</h3>';
    QUESTS.forEach(q=>{
      h+=`<div class="quest-card ${q.done?'done':''}"><strong>${q.done?'✅':'📌'} ${q.title}</strong><br><small>${q.desc}</small><div class="progress-bar"><div class="progress-fill" style="width:${(q.progress/q.target)*100}%"></div></div><small>${q.progress}/${q.target} | TT: ${q.reward.coins}K + ${q.reward.xp}XP</small></div>`;
    });
  }
  el.innerHTML=h;
}

// ======== ACTIONS ========
window.changeLocation=function(id){
  const loc=LOCATIONS[id];
  if(GS.unlockedLocations.includes(id)){GS.currentLocation=id;showNotif(`📍 Chuyển đến ${loc.name}`);}
  else if(GS.coins>=loc.cost){GS.coins-=loc.cost;GS.unlockedLocations.push(id);GS.currentLocation=id;showNotif(`🎉 Mở quán: ${loc.name}!`);addXP(100);checkQuests();}
  else{showNotif('💸 Không đủ tiền!');}
  renderTab(document.querySelector('.tab.active').dataset.tab);
};
window.buyUpgrade=function(id,cost,type,value){
  if(GS.upgradesBought.includes(id)||GS.coins<cost)return;
  GS.coins-=cost;GS.upgradesBought.push(id);
  if(type==='auto_serve')GS.autoServeRate+=value;
  if(type==='unlock_menu')GS.menuUnlocked=Math.min(GS.menuUnlocked+value,10);
  showNotif(`✅ ${UPGRADES.find(u=>u.id===id).name}!`);
  renderTab(document.querySelector('.tab.active').dataset.tab);
};
window.sellItem=function(id){
  const item=MENU_ITEMS.find(i=>i.id===id);if(!item)return;
  if(GS.supplierStock.beans<=0||GS.supplierStock.milk<=0||GS.supplierStock.cups<=0){showNotif('⚠️ Thiếu vật tư!');return;}
  if(item.needsBeans)GS.supplierStock.beans--;
  if(item.needsMilk)GS.supplierStock.milk--;
  GS.supplierStock.cups--;
  GS.coins+=item.price;GS.totalRevenue+=item.price;GS.totalServed++;
  addXP(3);showNotif(`+${item.price}K từ ${item.name}! ${item.emoji}`);checkQuests();updateUI();
};
window.buyTrend=function(id){
  const item=TREND_ITEMS.find(i=>i.id===id);if(!item||GS.ownedItems[id]>0||GS.coins<item.cost)return;
  GS.coins-=item.cost;GS.ownedItems[id]=1;showNotif(`🔥 ${item.name}!`);addXP(item.cost>5000?200:50);checkQuests();renderTab('trend');
};
window.buySupply=function(key,cost,amt){if(GS.coins<cost)return;GS.coins-=cost;GS.supplierStock[key]+=amt;showNotif(`📦 Mua ${amt} ${key}!`);updateUI();};

// ======== TABS ========
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTab(btn.dataset.tab);});
});

// ======== INIT & START ========
QUESTS.forEach(q=>{if(typeof q.progress==='undefined')q.progress=0;});
updateUI();renderTab('location');

// Initial customers on canvas
setTimeout(()=>spawnCustomer(),1000);
setTimeout(()=>spawnCustomer(),2000);
setTimeout(()=>spawnCustomer(),3000);

// Start the game loop
console.log('Game init!');
try{requestAnimationFrame(function(ts){gameLoop(ts);});}catch(e){console.log('Game loop error:',e);}
</script>
