<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Cafe Trendy</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1410;font-family:'Courier New',monospace;color:#f5e6d3;display:flex;flex-direction:column;height:100vh;overflow:hidden}#topbar{display:flex;gap:6px;padding:6px 8px;background:#2a1f15;border-bottom:1px solid #4a3520;font-size:11px;flex-shrink:0}.sb{display:flex;gap:3px;padding:3px 7px;background:#3d2b1a;border-radius:4px}.vl{color:#ffd700;font-weight:bold}#game{flex:1;display:flex;overflow:hidden}.canvas-box{flex:1;display:flex;align-items:center;justify-content:center}.canvas-box canvas{image-rendering:pixelated;background:#0f0b08;border-radius:4px}#side{width:260px;background:#2a1f15;border-left:1px solid #4a3520;display:flex;flex-direction:column}.side-tabs{display:flex;border-bottom:1px solid #4a3520}.side-tab{flex:1;padding:6px 2px;text-align:center;background:#3d2b1a;border:none;color:#c9a96e;font-size:10px;cursor:pointer;border-right:1px solid #4a3520}.side-tab.act{background:#2a1f15;color:#ffd700}#panel{flex:1;overflow-y:auto;padding:6px;font-size:11px}#panel::-webkit-scrollbar{width:5px}.msg-log{position:absolute;bottom:8px;left:8px;background:rgba(42,31,21,.9);border:1px solid #4a3520;border-radius:4px;padding:4px 6px;font-size:9px;color:#b89a6e;max-width:200px}.mg{margin-bottom:1px}</style></head><body>
<div id="topbar"></div>
<div id="game"><div class="canvas-box"><canvas id="gc"></canvas><div class="msg-log" id="ml"></div></div><div id="side"><div class="side-tabs"><button class="side-tab act" onclick="tab('menu')">Menu</button><button class="side-tab" onclick="tab('staff')">Staff</button><button class="side-tab" onclick="tab('eco')">Eco</button></div><div id="panel"></div></div></div>
<script>
const T=32,CL=16,RW=12,TM=500,HPT=0.5;
const MENU=[{id:'espresso',n:'Espresso',p:3,w:10},{id:'latte',n:'Latte',p:5,w:18},{id:'pho',n:'Pho',p:8,w:45},{id:'cake',n:'Cake Slice',p:5,w:5},{id:'sandwich',n:'Sandwich',p:6,w:30},{id:'mocha',n:'Mocha',p:6,w:24},{id:'matcha',n:'Matcha Latte',p:6,w:22},{id:'smoothie',n:'Smoothie',p:6,w:20},{id:'egg_coffee',n:'Viet Egg Coffee',p:8,w:30},{id:'pho_biet',n:'Pho Bo',p:9,w:50}];
const CTS=[{id:'cl',n:'Coffee Lover',c:'#8B4513'},{id:'nomad',n:'Nomad',c:'#4a90d9'},{id:'couple',n:'Couple',c:'#e84393'},{id:'family',n:'Family',c:'#fdcb6e'},{id:'biz',n:'Business',c:'#636e72'}];
let G={m:500,r:0,d:1,tick:0,queue:[],staff:[],decs:[],orders:[],ct:0,revenue:0,exp:0,repT:0,tips:0,w:'sunny',paused:false,over:false},cid=0;
const cv=document.getElementById('gc'),cx=cv.getContext('2d');cv.width=CL*T;cv.height=RW*T;ctx=cv.getContext('2d');

// Map generation - simple cafe layout
let map=[];for(let y=0;y<RW;y++){map[y]=[];for(let x=0;x<CL;x++){if(y===0||x===0||x===CL-1)map[y][x]={t:'wall'};else if(x>=4&&x<=9&&y<=2)map[y][x]={t:'counter'};else map[y][x]={t:'floor'};}}

// Seats
let seats=[];for(let x=5;x<=8;x++)seats.push({x,y:3,occ:null});
for(let r=6;r<=10;r++)for(let x=7;x<=9;x++){if(seats.length<40)seats.push({x:x,y:r,occ:null});}

function wlk(x,y){return y>=0&&y<RW&&x>=0&&x<CL&&map[y][x]&&map[y][x].t!=='wall';}
function astar(sx,sy,ex,ey){const o=[{x:sx,y:sy,g:0,f:0,p:[sx+','+sy]}];const c=new Set();let it=0;while(o.length>0&&it<200){it++;o.sort((a,b)=>a.f-b.f);const cur=o.shift();if(cur.x===ex&&cur.y===ey)return cur.p.map(p=>p.split(',').map(Number));c.add(cur.x+','+cur.y);for(const[dx,dy]of[[0,1],[0,-1],[1,0],[-1,0]]){const nx=cur.x+dx,ny=cur.y+dy;if(nx<0||ny<0||nx>=CL||ny>=RW)continue;const k=nx+','+ny;if(c.has(k))continue;const w=map[ny][nx].t==='wall'?99:1,g2=cur.g+w,f2=g2+(Math.abs(nx-ex)+Math.abs(ny-ey));if(!o.find(v=>v.x===nx&&v.y===ny))o.push({x:nx,y:ny,g:g2,f:f2,p:[...cur.p,nx+','+ny]});}}return[{x:sx,y:sy}];}

function addMsg(t,cls){const l=document.getElementById('ml');const d=document.createElement('div');d.className='mg';d.style.color=cls==='good'?'#4ecdc4':cls==='bad'?'#ff6b6b':'#ffd700';d.textContent=t;l.prepend(d);if(l.children.length>8)l.removeChild(l.lastChild);}

function spawnCust(){const free=seats.find(s=>!s.occ);if(!free||G.queue.length>=8)return null;
const best=CTS[Math.floor(Math.random()*CTS.length)];
const c={id:++cid,type:best,x:-1,y:-1,seat:free,st:'entering',pat:30+Math.random()*60|0,mp:0,ord:null,et:0};c.mp=c.pat;G.queue.push(c);return c;}

function updateCust(){const rm=[];for(const ci of G.queue){if(ci.st==='entering'){ci.x=1;ci.y=2;ci.st='moving';}
else if(ci.st==='moving'&&!ci.seat.occ){const p=astar(ci.x,ci.y,ci.seat?ci.seat.x:7,ci.seat?ci.seat.y:6);if(p.length>1&&wlk(p[1][0],p[1][1])){ci.x=p[1][0];ci.y=p[1][1];}else{ci.seat.occ=ci;ci.st='seated';ci.pat=40+Math.random()*80|0;ci.mp=ci.pat;}}
else if(ci.st==='seated'&&!ci.ord){ci.pat--;if(ci.pat<=0){rm.push(ci);addMsg(ci.type.n+' bỏ đi vì chờ lâu!','bad');}else{const it=MENU[Math.floor(Math.random()*MENU.length)];ci.ord={...it};ci.st='cooking';G.orders.push({id:ci.id,prep:it.w,el:0,st:'preparing'});addMsg(ci.type.n+' gọi '+it.n,'good');}}
else if(ci.st==='cooking'){const ord=G.orders.find(o=>o.id===ci.id&&o.st==='preparing');if(ord){ord.el++;if(ord.el>=ord.prep){ord.st='done';addMsg('✅ Đã sẵn sàng!','good');}if(ci.pat<=0){rm.push(ci);G.r=Math.max(0,G.r-2);addMsg(ci.type.n+' giận dữ bỏ đi!','bad');}}
else if(ci.st==='eating'){ci.et++;if(ci.et>3){const tip=Math.floor(ci.ord.p*0.15);G.m+=ci.ord.p+tip;G.tips+=tip;G.revenue+=ci.ord.p+tip;G.repT++;ci.seat.occ=null;addMsg(ci.type.n+' trả $'+(ci.ord.p+tip)+' (tip: $'+tip+')','good');rm.push(ci);}}
}G.queue=G.queue.filter(c=>!rm.includes(c));}

function updateStaff(dt){for(const s of G.staff){const pend=G.orders.find(o=>o.st==='preparing');if(pend){const p=astar(s.x||7,s.y||1,7,2);if(p.length>1&&wlk(p[1][0],p[1][1])){s.x=p[1][0];s.y=p[1][1];}else if(G.orders.find(o=>o.id===pend.id&&o.st==='preparing')){pend.st='done';addMsg(s.n+' phục vụ xong!','good');}}
else{s.st2='idle';const bp=astar(s.x||7,s.y||1,6,1);if(bp.length>1&&wlk(bp[1][0],bp[1][1])){s.x=bp[1][0];s.y=bp[1][1];}}}}

function hireStaff(name,cost){if(G.m<cost)return;G.m-=cost;G.staff.push({id:cid+1,name:name,x:6,y:1,stamina:100,lvl:1});addMsg('Đã tuyển '+name+' ($'+cost+')','good');}
function buyDecor(name,cost){if(G.m<cost)return;G.m-=cost;G.decs.push({name:name});addMsg('Mua decor: '+name,'good');G.r+=5;}

let lt=0,ta=0;function gameLoop(ts){if(G.over)return;const d=ts-lt;lt=ts;ta+=d;while(ta>=TM&&!G.paused){ta-=TM;onTick();}render();requestAnimationFrame(gameLoop);}
function onTick(){G.tick++;const tH=G.tick*HPT;const curH=Math.floor((6+tH)%24);
if(curH>=21){addMsg('Đã đóng cửa! Day '+G.d+' xong. Revenue: $'+G.revenue,'good');G.m-=G.exp;dai();return;}
if(G.tick%30===0)G.w=G.w==='sunny'?'sunny':'rainy';
const h=(6+tH)%24;let sp=3;if(h>=7&&h<=9)sp=18;else if(h>=11&&h<=13)sp=12;else if(h>=17&&h<=20)sp=15;
if(G.r>50)sp+=3;if(Math.random()*100<sp){spawnCust();G.ct++;}
updateCust();updateStaff(TICK_MS);updateUI();}

function dai(){G.d++;G.tick=0;G.m-=G.exp;G.revenue=0;G.ct=0;G.queue=[];G.orders=[];}
function endDay(){addMsg('📅 Ngày '+G.d+' kết thúc! Revenue: $'+G.revenue+`, Expenses: $${G.exp}`,'good');}

function render(){ctx.fillStyle='#0f0b08';ctx.fillRect(0,0,cv.width,cv.height);
for(let y=0;y<RW;y++)for(let x=0;x<CL;x++){const t=map[y][x];if(!t)continue;ctx.fillStyle=t.t==='wall'?'#5C4A32':t.t==='counter'?'#7B4A3A':'#4a3520';
ctx.fillRect(x*T,y*T,T,T);if(t.t==='wall'){ctx.fillStyle='#4a3520';ctx.fillRect(x*T,y*T,T,3);}else if(t.t==='counter'){ctx.fillStyle='#8B5A3A';ctx.fillRect(x*T+1,y*T+1,T-2,T/2);}}
G.queue.forEach(c=>{if(c.x>=0){const px=c.x*T,py=c.y*T;ctx.fillStyle=c.type.c;ctx.fillRect(px+8,py+6,16,14);ctx.fillStyle='#f0d0a0';ctx.fillRect(px+10,py,12,8);const hc=['#2c1810','#8B4513','#D2691E'];ctx.fillStyle=hc[c.id%3];ctx.fillRect(px+10,py-2,12,3);
const pct=Math.max(0,c.pat/c.mp),cl2=pct>.5?'#4ecdc4':pct>.2?'#ffd700':'#ff6b6b';ctx.fillStyle='#1a1410';ctx.fillRect(px+4,py-10,24,3);ctx.fillStyle=cl2;ctx.fillRect(px+4,py-10,24*pct,3);}});
G.staff.forEach(s=>{const px=(s.x||6)*T,py=(s.y||1)*T;ctx.fillStyle='#c48b3a';ctx.fillRect(px+8,py+6,16,14);ctx.fillStyle='#f0d0a0';ctx.fillRect(px+10,py,12,8);ctx.fillStyle='#c48b3a';ctx.fillRect(px+8,py-2,20,4);if(s.st2!=='idle'){ctx.font='10px sans-serif';ctx.fillText('⚡',px+12,py-6);}});
G.orders.forEach((o,i)=>{if(o.st==='preparing'){const ox=7*T+((i%4)*6),oy=1*T-8;ctx.font='bold 10px sans-serif';ctx.fillStyle='#ff8c00';ctx.fillText('🔥',ox,oy);}});
// Night effect
const tH3=G.tick*HPT,h2=6+tH3;let dk=0;if(h2>20)dk=(h2-20)*.08;if(h2<7)dk=(7-h2)*.06;if(dk>0){ctx.fillStyle='rgba(0,0,25,'+Math.min(dk,.3)+')';ctx.fillRect(0,0,cv.width,cv.height);}
// Rain
if(G.w==='rainy'){ctx.strokeStyle='rgba(100,180,255,.12)';for(let i=0;i<30;i++){const rx=(Date.now()/8+i*41)%cv.width,ry=(Date.now()/3+i*49)%cv.height;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+1,ry+7);ctx.stroke();}}}

let curTab='menu';function switchTab(p){curTab=p;document.querySelectorAll('.side-tab').forEach((t,i)=>t.classList.toggle('act',['Menu','Staff','Eco'][i]===p));renderP();}
function renderP(){const pc=document.getElementById('panel');if(curTab==='menu')pc.innerHTML=rMenu();else if(curTab==='staff')pc.innerHTML=rStaff();else pc.innerHTML=rEco();}

function rMenu(){let h='<b style="color:#ffd700">☕ MENU</b><br>';
MENU.forEach(it=>{h+=`<div style="padding:4px;margin:3px 0;background:#3d2b1a;border-radius:3px;cursor:pointer" onclick="serveCust('${it.id}')"><span style="color:#f5e6d3">${it.n}</span> <span style="color:#ffd700">$${it.p}</span></div>`;});
return h;}

function serveCust(itemId){const item=MENU.find(m=>m.id===itemId);const seated=G.queue.find(c=>c.st==='seated');if(!seated)return addMsg('Chưa có khách nào ngồi!','bad');if(seated.ord)return addMsg('Khách này đã order rồi!','bad');
seated.ord={...item};seated.st='cooking';G.orders.push({id:seated.id,prep:item.w,el:0,st:'preparing'};addMsg(`Đang phục vụ ${item.n} cho ${seated.type.n}`,'good');renderP();}

function rStaff(){let h='<b style="color:#ffd700">👤 NHÂN VIÊN</b><br>';
if(!G.staff.length)h+='<p>Chưa có nhân viên. Hire từ đây:</p>';
G.staff.forEach(s=>{h+=`<div style="padding:4px;margin:3px 0;background:#3d2b1a;border-radius:3px">${s.name} Lv${s.lvl}</div>`;});
['Barista($500)','Cook($400)','Server($300)','Cashier($250)'].forEach(s=>{const cost=parseInt(s.match(/\$(\d+)/)[1]);const name=s.replace(/\(.*\)/,'');h+=`<div style="padding:4px;margin:3px 0;background:#2d6b2d;border-radius:3px;cursor:pointer" onclick="hireStaff('${name}',${cost})">${name} - $${cost}</div>`;});
return h;}

function rEco(){const profit=G.revenue-G.exp;let h='<b style="color:#ffd700">💼 KINH TẾ</b><br>';h+=`<div>💰 Tiền: <span class="vl">$${G.m}</span></div>`;h+=`<div>⭐ Reputation: ${Math.round(G.r)}</div>`;
h+=`<div>☕ Doanh thu hôm nay: $${G.revenue}</div><div>💸 Chi phí hôm nay: $${G.exp}</div>`;h+=`<div>📊 Lợi nhuận: <span style="color:${profit>=0?'#4ecdc4':'#ff6b6b'}">$${profit}</span></div>`;
h+=`<div>💵 Tip hôm nay: $${G.tips}</div><div>👥 Khách ngày ${G.d}: ${G.ct}</div>`;return h;}

function updateUI(){document.getElementById('topbar').innerHTML=`<div class="sb">💰 <span class="vl">$${G.m.toLocaleString()}</span></div><div class="sb">⭐ <span class="vl">${Math.round(G.r)}</span></div><div class="sb">👥 <span class="vl">${G.queue.length}/8</span></div><button class="sb" style="cursor:pointer" onclick="G.paused=!G.paused">${G.paused?'▶':'⏸'}</button>`;renderP();}

// Init
addMsg('☕ Chào mừng! Hire staff từ tab Staff, rồi click món menu để phục vụ khách.','good');updateUI();lt=performance.now();requestAnimationFrame(gameLoop);setInterval(()=>{if(G&&!G.over)try{localStorage.setItem('cafe_save',JSON.stringify(G));}catch(e){}},60000);
</script></body></html>
