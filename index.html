<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendy Cafe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Press Start 2P',monospace;background:#1a1a2e;color:#e8e8e8;min-height:100vh;max-width:480px;margin:0 auto;font-size:10px;line-height:1.6}
#hdr{display:flex;justify-content:space-between;padding:10px 15px;background:#16213e;border-bottom:4px solid #FFD700}
#hdr .v{color:#FFD700}
#nav{display:flex;overflow-x:auto;border-bottom:2px solid #0f3460}
.nb{padding:8px 10px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;font-size:8px;cursor:pointer;white-space:nowrap}
.nb.on{color:#FFD700;background:rgba(255,215,0,.1)}
#pnl{min-height:300px;padding:10px}
.pan{display:none}.pan.on{display:block}
.btn{padding:6px 12px;border:2px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:8px;margin:2px}
.btn:disabled{background:#555;cursor:not-allowed}
.card{padding:8px;margin:4px 0;background:#0f3460;border:2px solid #000;display:flex;justify-content:space-between;align-items:center}
.card .nm{font-weight:bold}
.card .pr{color:#FFD700}
.r-bar{height:6px;background:#333;border:1px solid #000;margin:3px 0}
.r-fill{height:100%;background:#28a745}
.empty{padding:20px;text-align:center;color:#a0a0b0}
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#0f3460;color:#FFD700;padding:8px 16px;border:3px solid #FFD700;font-size:8px;display:none;z-index:999}
</style>
</head>
<body>
<div id="notif"></div>
<div id="hdr"><div>💰 <span class="v" id="coins">500</span></div><div>Lv<span class="v" id="lv">1</span></div></div>
<div id="nav"></div>
<div id="pnl"></div>

<script>
// GAME STATE
var G = {
  coins: 500, lv: 1, xp: 0, xpn: 100,
  staff: [], items: {}, ups: [],
  served: 0, totalRev: 0, rev: 0,
  orders: [
    {id: 1, name: 'Cà phê đen', icon: '☕', price: 25},
    {id: 2, name: 'Trà sữa', icon: '🧋', price: 50},
    {id: 3, name: 'Sinh tố', icon: '🥤', price: 45}
  ],
  tab: 'orders'
};

var MENU = [
  {id: 'coffee', name: 'Cà phê đen', icon: '☕', price: 25, cost: 5},
  {id: 'milk_coffee', name: 'Cà phê sữa', icon: '🥛', price: 30, cost: 8},
  {id: 'espresso', name: 'Espresso', icon: '☕', price: 35, cost: 5},
  {id: 'matcha', name: 'Trà matcha', icon: '🍵', price: 40, cost: 10},
  {id: 'bubble_tea', name: 'Trà sữa', icon: '🧋', price: 50, cost: 12},
  {id: 'smoothie', name: 'Sinh tố', icon: '🥤', price: 45, cost: 12}
];

var TABS = [
  {id: 'orders', label: '📋 Order'},
  {id: 'menu', label: '🍽️ Menu'},
  {id: 'staff', label: '👥 Staff'},
  {id: 'shop', label: '🛒 Shop'},
  {id: 'stats', label: '📊 Stats'}
];

var TREND = [
  {id: 't_dog', name: '🐶 Meme Chó', cost: 200, desc: '+5% rev'},
  {id: 't_cat', name: '🐱 Mèo hoang', cost: 150, desc: '+3% rev'},
  {id: 't_girl', name: '💃 Cô Bé', cost: 1000, desc: '+10% rev'},
  {id: 't_sieu', name: '⚡ Siêu Tốc', cost: 8000, desc: '+5 khách'}
];

var STAFF = [
  {id: 'barista', name: '☕ Barista', cost: 300, sk: 0.6},
  {id: 'chef', name: '👨‍🍳 Đầu bếp', cost: 400, sk: 0.7},
  {id: 'senior', name: '🧑‍💼 Senior', cost: 800, sk: 0.9}
];

// === RENDER NAV ===
function renderNav() {
  var el = document.getElementById('nav');
  if (!el) return;
  var html = '';
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    html += '<button class="nb' + (G.tab === t.id ? ' on' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
  }
  el.innerHTML = html;

  // ATTACH EVENTS
  var btns = el.querySelectorAll('.nb');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.onclick = function() {
        G.tab = btn.getAttribute('data-tab');
        render();
      };
    })(btns[i]);
  }
}

// === RENDER PANEL ===
function renderPanel() {
  var el = document.getElementById('pnl');
  if (!el) return;
  var html = '';
  if (G.tab === 'orders') html += renderOrders();
  else if (G.tab === 'menu') html += renderMenu();
  else if (G.tab === 'staff') html += renderStaff();
  else if (G.tab === 'shop') html += renderShop();
  else if (G.tab === 'stats') html += renderStats();
  el.innerHTML = html;

  // ATTACH EVENTS
  el.querySelectorAll('.btn').forEach(function(btn) {
    var fn = btn.getAttribute('onclick');
    if (fn) {
      try { btn.onclick = new Function(fn.replace(/^onclick="|";?$/g, '')); }
      catch(e) { console.log('onclick error:', fn); }
    }
  });
}

// === ORDERS ===
function renderOrders() {
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">📋 Đơn hàng</h3>';
  if (G.orders.length === 0) {
    html += '<div class="empty">⏳ Hết đơn</div>';
  } else {
    for (var i = 0; i < G.orders.length; i++) {
      var o = G.orders[i];
      html += '<div class="card">' +
        '<div><span class="nm">' + o.icon + ' ' + o.name + '</span></div>' +
        '<div><span class="pr">' + o.price + '₫</span>' +
        ' <button class="btn" onclick="serve(' + i + ')">SERVE</button></div></div>';
    }
  }
  return html;
}

// === MENU ===
function renderMenu() {
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">🍽️ Menu</h3>';
  for (var i = 0; i < MENU.length; i++) {
    var m = MENU[i];
    html += '<div class="card">' +
      '<div><span class="nm">' + m.icon + ' ' + m.name + '</span><div style="color:#a0a0b0;font-size:7px">Cost: ' + m.cost + '₫</div></div>' +
      '<div><span class="pr">' + m.price + '₫</span></div></div>';
  }
  return html;
}

// === STAFF ===
function renderStaff() {
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">👥 Nhân viên (' + G.staff.length + '/6)</h3>';
  for (var i = 0; i < STAFF.length; i++) {
    var s = STAFF[i];
    html += '<div class="card">' +
      '<div><span class="nm">' + s.name + '</span><div style="color:#a0a0b0;font-size:7px">Skill: ' + Math.floor(s.sk * 100) + '%</div></div>' +
      '<div><span class="pr">' + s.cost + '₫</span>' +
      ' <button class="btn" onclick="hireStaff(\'' + s.id + '\')">THUÊ</button></div></div>';
  }
  if (G.staff.length > 0) {
    html += '<div style="margin-top:10px;font-size:9px;color:#FFD700"> auto-serve chạy mỗi 8s</div>';
  }
  return html;
}

// === SHOP ===
function renderShop() {
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">🛒 Shop Meme</h3>';
  for (var i = 0; i < TREND.length; i++) {
    var t = TREND[i];
    var bought = G.items[t.id];
    html += '<div class="card">' +
      '<div><span class="nm">' + t.name + '</span><div style="color:#a0a0b0;font-size:7px">' + t.desc + '</div></div>' +
      '<div><span class="pr">' + t.cost + '₫</span>' +
      ' <button class="btn" onclick="buyItem(\'' + t.id + '\')" ' + (bought ? 'disabled' : '') + '>' + (bought ? '✅' : 'MUA') + '</button></div></div>';
  }
  return html;
}

// === STATS ===
function renderStats() {
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">📊 Thống kê</h3>';
  html += '<div style="font-size:9px;line-height:2"><span style="color:#a0a0b0">Coin: </span><span style="color:#FFD700">' + G.coins + '₫</span><br>';
  html += '<span style="color:#a0a0b0">Level: </span><span style="color:#FFD700">' + G.lv + '</span><br>';
  html += '<span style="color:#a0a0b0">Phục vụ: </span><span style="color:#FFD700">' + G.served + '</span><br>';
  html += '<span style="color:#a0a0b0">Doanh thu: </span><span style="color:#FFD700">' + G.totalRev + '₫</span></div>';
  return html;
}

// === ACTIONS ===
function serve(idx) {
  if (idx < 0 || idx >= G.orders.length) return;
  var o = G.orders[idx];
  G.coins += o.price;
  G.rev += o.price;
  G.totalRev += o.price;
  G.served++;
  G.orders.splice(idx, 1);
  show('✅ +' + o.price + '₫ | ' + o.name);
  render();
}

function buyItem(id) {
  var t = TREND.filter(function(x) { return x.id === id; })[0];
  if (!t || G.coins < t.cost || G.items[id]) return;
  G.coins -= t.cost;
  G.items[id] = 1;
  show('✅ Mua: ' + t.name);
  render();
}

var hireIds = {};
function hireStaff(id) {
  if (G.staff.length >= 6) { show('❌ Đầy nhân viên!'); render(); return; }
  var s = STAFF.filter(function(x) { return x.id === id; })[0];
  if (!s) return;
  var cost = Math.floor(s.cost * Math.pow(1.5, hireIds[id] || 0));
  if (!hireIds[id]) hireIds[id] = 0;

  if (G.coins < cost) { show('❌ Cần ' + cost + '₫'); render(); return; }
  G.coins -= cost;
  hireIds[id]++;
  G.staff.push({
    id: id,
    name: s.name,
    sk: s.sk,
    mood: 100
  });
  show('✅ Thuê: ' + s.name);
  render();
}

function show(msg) {
  var el = document.getElementById('notif');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2000);
}

// === MAIN RENDER ===
function render() {
  document.getElementById('coins').textContent = G.coins;
  document.getElementById('lv').textContent = G.lv;
  renderNav();
  renderPanel();
}

// === AUTO SERVE (every 8s) ===
setInterval(function() {
  if (G.staff.length === 0) return;
  for (var i = 0; i < G.staff.length; i++) {
    var s = G.staff[i];
    var served = Math.floor(s.sk * (s.mood / 100));
    if (served > 0 && G.orders.length > 0) {
      var o = G.orders[0];
      G.coins += Math.floor(o.price * 0.8);
      G.totalRev += Math.floor(o.price * 0.8);
      G.served++;
      G.orders.splice(0, 1);
      s.mood = Math.max(0, s.mood - 3);
    }
  }
  render();
}, 8000);

// === START ===
render();
console.log('Game started!');
</script>
</body>
</html>
