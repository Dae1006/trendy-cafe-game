// ============ AUDIO ENGINE ============
const AudioEngine = {
  ctx: null,
  init: function() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  },
  play: function(freq, dur, type='sine') {
    if (!this.ctx) this.init();
    if (!this.ctx) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
      gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start();
      osc.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  },
  coin: function() { this.play(880, 0.15); setTimeout(()=>this.play(1100, 0.1), 80); },
  serve: function() { this.play(660, 0.1); setTimeout(()=>this.play(880, 0.1), 60); setTimeout(()=>this.play(1100, 0.15), 120); },
  buy: function() { this.play(440, 0.2); setTimeout(()=>this.play(660, 0.15), 100); },
  levelUp: function() { 
    [523,659,784,1047].forEach((f,i) => setTimeout(()=>this.play(f,0.2,'square'), i*100)); 
  },
  error: function() { this.play(220, 0.3, 'sawtooth'); },
  click: function() { this.play(500, 0.05); },
  orderNew: function() { this.play(700, 0.1); setTimeout(()=>this.play(900, 0.1), 80); }
};

// ============ UTILITY FUNCTIONS ============
function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }
function clamp(v,min,max) { return Math.max(min,Math.min(max,v)); }
function pick(arr) { return arr[rand(0,arr.length-1)]; }

function notify(msg, duration=2000) {
  const area = document.getElementById('notif-area');
  const el = document.createElement('div');
  el.className = 'notif-item animate';
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, duration);
}

  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.style.color = color;
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 1000);
}

  };
}

function getRepCustomerModifier() {
  // Rep thấp → khách đến ít (auto-balance: cần speed phục vụ kịp)
  // Rep 0-30:  0.3x (rất ít khách)
  // Rep 30-50: 0.5x
  // Rep 50-70: 0.7x
  // Rep 70-90: 1.0x (bình thường)
  // Rep 90-120: 1.3x (khách đông)
  // Rep 120-160: 1.6x
  // Rep 160-220: 1.9x
  // Rep 220+: 2.2x (full)
  const r = G.rep;
  if (r < 30) return 0.3;
  if (r < 50) return 0.5;
  if (r < 70) return 0.7;
  if (r < 90) return 0.9;
  if (r < 120) return 1.1;
  if (r < 160) return 1.4;
  if (r < 220) return 1.8;
  return 2.2;
}

function autoGenerateOrder() {
  if (G.orders.length >= calculateMaxOrders()) return;
  
  // Apply difficulty scaling to order interval
  const phase = getDifficultyPhase(G.gameDay || 1);
  const baseInterval = CONFIG.orderInterval[G.lv-1] || 5000;
  
  // REP-BASED CUSTOMER SCALING
  // Nếu tốc độ phục vụ < tốc độ order → rep thấp sẽ tự động tăng khách (cân bằng)
  // Nếu tốc độ phục vụ > tốc độ order → rep cao nhận thêm khách thưởng
  const repMod = getRepCustomerModifier();
  
  // Fan customer modifier (sports events)
  const fanMod = getFanCustomerModifier();
  
  // Calculate service capacity (orders per minute)
  let totalSkill = 0;
  G.staff.forEach(s => {
    const sDef = STAFF.find(st => st.id === s.id);
    if (sDef && s.mood > 5) {
      let speedBuff = 0;
      if (sDef.buff === 'all_speed') speedBuff += sDef.buffVal;
      totalSkill += s.skill * (s.mood / 100) * (1 + speedBuff);
    }
  });
  const serviceCapacity = totalSkill * (60 / (lastAutoServeInterval / 1000)); // orders per minute, dynamic based on difficulty
  const orderRate = 60 / (baseInterval * phase.orderMult / 1000); // orders per minute incoming
  
  // Balance factor: nếu service capacity < incoming order rate → giảm repMod để khách không quá tải
  // Nếu service capacity > incoming → tăng repMod để có nhiều khách hơn
  let balanceMod = 1.0;
  if (orderRate > serviceCapacity && serviceCapacity > 0) {
    balanceMod = serviceCapacity / orderRate; // < 1, giảm khách để phù hợp
  } else if (serviceCapacity > 0) {
    balanceMod = Math.min(1.5, serviceCapacity / orderRate); // > 1, tối đa 1.5x
  }
  
  const effectiveRepMod = repMod * balanceMod * fanMod;
  const interval = Math.floor(baseInterval * phase.orderMult / effectiveRepMod);
  
  const now = Date.now();
  
  if (now - G.lastOrderTime > interval) {
    const order = generateOrder();
    G.orders.push(order);
    G.lastOrderTime = now;
    AudioEngine.orderNew();
    updateUI();
  }
}

// ============ GAME ACTIONS ============
function serveOrder(idx) {
  if (idx < 0 || idx >= G.orders.length) return;
  const o = G.orders[idx];
  
  // DYNAMIC DIFFICULTY
  const phase = getDifficultyPhase(G.gameDay || 1);
  const profitMult = phase.profitMult;
  const inflation = phase.inflation;
  
  // COST INFLATION - nguyên liệu tăng giá
  const ingredientCost = Math.floor(o.cost * inflation);
  
  // PREMIUM STORAGE reduction
  const costReduction = 1 - (G.equipment.premium_store || 0) * 0.10;
  const finalCost = Math.floor(ingredientCost * costReduction);
  
  // PROFIT MULTIPLIER - profit chậm hơn
  const rawRevenue = o.price + o.tip;
  let revenue = Math.floor(rawRevenue * profitMult);
  
  // Revenue bonus from trends
  let bonus = 1;
  G.trendItems.forEach(t => {
    if (t.revenueBonus) bonus += t.revenueBonus;
  });
  
  // Revenue bonus from equipment
  bonus += (G.equipment.espresso_mach || 0) * 0.05;
  if (G.equipment.chandelier) bonus += (G.equipment.chandelier || 0) * 0.05;
  
  // Revenue bonus from venue
  bonus += getVenueBonus() - 1;
  
  revenue = Math.floor(revenue * bonus);
  
  // MASTER buff: +15% profit on orders > 50₫
  if (G.staffBuffs.highroll > 0 && o.price > 50) {
    revenue = Math.floor(revenue * 1.15);
  }
  
  // FAN customer tip bonus
  if (o.fanType && FAN_CUSTOMERS[o.fanType]) {
    const fan = FAN_CUSTOMERS[o.fanType];
    revenue = Math.floor(revenue * (fan.revenueMult || 1));
    const fanTipBonus = Math.floor(finalTip * (fan.tipMult || 1));
    G.totalTips += (fanTipBonus - finalTip);
  }
  
  // SMART POS buff: tip bonus
  const tipMult = 1 + (G.equipment.smart_pos || 0) * 0.20;
  const finalTip = Math.floor(o.tip * tipMult);
  
  // NET PROFIT
  const netProfit = revenue + finalTip - finalCost;
  
  G.coins += netProfit;
  G.totalRevenue += revenue;
  G.totalExpenses += finalCost;
  G.totalServed++;
  G.ordersToday++;
  G.totalTips += finalTip;
  
  // XP gain
  const xpGain = Math.floor(o.price * 1.5) + (finalTip > 0 ? 5 : 0);
  G.xp += xpGain;
  
  // Reputation gain
  const repGain = 1 + Math.floor(G.repStars * 0.3);
  G.rep = Math.min(CONFIG.maxRep, G.rep + repGain);
  
  // Clear bankruptcy watchdog if coins recovered
  if (G.coins >= 0 && G.bankruptcyWatchdog) {
    clearTimeout(G.bankruptcyWatchdog);
    G.bankruptcyWatchdog = null;
    G.bankruptcyStartTime = null;
  }
  
  AudioEngine.serve();
  notify(`✅ Served ${o.customer.icon} ${o.name}! +${revenue}₫ (-${finalCost}₫ = ${netProfit}₫ net)`);
  
  checkLevelUp();
  updateUI();
}

function checkLevelUp() {
  // DÙNG do...while để up nhiều level nếu XP dư
  while (G.lv < 100) {
    const nextXp = CONFIG.xpPerLevel[G.lv];
    if (G.xp < nextXp) break;
    
    G.xp -= nextXp;
    G.lv++;
    AudioEngine.levelUp();
    
    const reward = LEVEL_REWARDS[G.lv];
    if (reward) {
      G.coins += reward.coins;
      reward.rewardItems.forEach(id => {
        if (id === 'all_equipment') {
          EQUIPMENT.forEach(eq => { G.equipment[eq.id] = eq.maxLv; });
        } else if (id === 'all_trends') {
          TRENDS.forEach(t => {
            if (!G.trendItems.find(x => x.id === t.id)) {
              G.trendItems.push({...t, revenueBonus: t.id === 't_doge' ? 0.05 : t.id === 't_secretmenu' ? 0.60 : 0.10, repBonus: 5});
            }
          });
        } else if (id === 'espresso_mach_3') {
          G.equipment.espresso_mach = Math.max(G.equipment.espresso_mach, 3);
        } else if (id === 'fridge_2') {
          G.equipment.fridge = Math.max(G.equipment.fridge, 2);
        } else if (id === 'auto_espresso') {
          G.equipment.auto_espresso = Math.max(G.equipment.auto_espresso, 1);
        } else if (id === 'cooling_sys') {
          G.equipment.cooling_sys = Math.max(G.equipment.cooling_sys, 1);
        } else if (id === 'premium_store') {
          G.equipment.premium_store = Math.max(G.equipment.premium_store, 1);
        } else if (!G.unlockedMenu.includes(id)) {
          G.unlockedMenu.push(id);
        }
      });
      notify(`🎉 LEVEL ${G.lv}! +${reward.coins.toLocaleString()}₫ coins! ${reward.desc}`, 4000);
    } else {
      notify(`🎉 LEVEL ${G.lv}! Great progress!`, 3000);
    }
    
    // Auto-unlock menu based on equipment
    if (G.equipment.bakery >= 1 && !G.unlockedMenu.includes('croissant')) G.unlockedMenu.push('croissant');
    if (G.equipment.bakery >= 2 && !G.unlockedMenu.includes('waffle')) G.unlockedMenu.push('waffle');
    if (G.equipment.bar_counter >= 1 && !G.unlockedMenu.includes('mocha')) G.unlockedMenu.push('mocha');
    if (G.equipment.bar_counter >= 2 && !G.unlockedMenu.includes('tiramisu')) G.unlockedMenu.push('tiramisu');
    if (G.lv >= 2 && !G.unlockedMenu.includes('latte')) G.unlockedMenu.push('latte');
    if (G.lv >= 2 && !G.unlockedMenu.includes('matcha')) G.unlockedMenu.push('matcha');
    if (G.lv >= 4 && !G.unlockedMenu.includes('cheesecake')) G.unlockedMenu.push('cheesecake');
    if (G.lv >= 6 && !G.unlockedMenu.includes('special')) G.unlockedMenu.push('special');
    // Auto-unlock menu based on level
    if (G.lv >= 10 && !G.unlockedMenu.includes('croissant')) G.unlockedMenu.push('croissant');
    if (G.lv >= 10 && !G.unlockedMenu.includes('waffle')) G.unlockedMenu.push('waffle');
    if (G.lv >= 20 && !G.unlockedMenu.includes('mocha')) G.unlockedMenu.push('mocha');
    if (G.lv >= 20 && !G.unlockedMenu.includes('tiramisu')) G.unlockedMenu.push('tiramisu');
    if (G.lv >= 30 && !G.unlockedMenu.includes('cheesecake')) G.unlockedMenu.push('cheesecake');
    if (G.lv >= 50 && !G.unlockedMenu.includes('special')) G.unlockedMenu.push('special');
  }
}

function hireStaff(idx) {
  if (G.staff.length >= CONFIG.maxStaff) { notify('❌ Staff full!'); return; }
  const s = STAFF[idx];
  if (G.coins < s.cost) { notify('❌ Not enough coins!'); AudioEngine.error(); return; }
  
  G.coins -= s.cost;
  const skillRange = s.sk;
  G.staff.push({
    id: s.id,
    name: s.name,
    skill: (skillRange[0] + skillRange[1]) / 2 + (Math.random() * (skillRange[1]-skillRange[0]) / 2),
    mood: 100,
    hired: Date.now()
  });
  
  // Staff event notification
  let eventMsg = `✅ Hired ${s.name}!`;
  if (s.buffDesc) {
    eventMsg += ` 🔥 ${s.buffDesc}`;
    G.staffEvents.unshift({ type: 'hire', name: s.name, buff: s.buffDesc, time: Date.now() });
    if (G.staffEvents.length > 20) G.staffEvents.pop();
  } else {
    G.staffEvents.unshift({ type: 'hire', name: s.name, buff: null, time: Date.now() });
  }
  
  AudioEngine.buy();
  notify(eventMsg, 3000);
  updateUI();
}

function buyEquipment(id, event) {
  const eq = EQUIPMENT.find(e => e.id === id);

  const currentLv = G.equipment[id] || 0;
  if (currentLv >= eq.maxLv) { notify('❌ Max level!'); return; }
  
  const cost = Math.floor(eq.cost * (currentLv + 1));

function fireStaff(idx) {
  if (idx < 0 || idx >= G.staff.length) return;
  const s = G.staff[idx];
  const staffDef = STAFF.find(st => st.id === s.id);
  const refund = staffDef ? Math.floor(staffDef.cost * 0.5) : 0;
  
  if (confirm(`🔥 Sa thải ${s.name}? Nhận lại ${refund}₫`)) {

    AudioEngine.error();
    notify(`🔥 Fired ${s.name}! Refund: ${refund}₫`);

// ============ FINANCIAL MANAGEMENT ============
function calculateStaffSalaries() {
  let total = 0;
  G.staff.forEach(s => {
    const staffDef = STAFF.find(st => st.id === s.id);
    if (staffDef && staffDef.salary) {
      total += staffDef.salary;
    }
  });
  return total;
}

function calculateFixedCharges() {
  const venue = VENUE_TYPES[G.venueLevel] || VENUE_TYPES[0];
  const base = CONFIG.fixedCharges || { rent: 80, electricity: 40, water: 20, internet: 15, insurance: 25, maintenance: 30 };
  const baseTotal = base.rent + base.electricity + base.water + base.internet + base.insurance + base.maintenance;
  return baseTotal + venue.bonusRent;
}

function calculateMaxOrders() {
  const venue = VENUE_TYPES[G.venueLevel] || VENUE_TYPES[0];
  return CONFIG.maxOrders + G.equipment.seating + venue.maxOrders - 8;
}

function getVenueBonus() {
  const venue = VENUE_TYPES[G.venueLevel] || VENUE_TYPES[0];
  return venue.bonusRevenue;
}

function getNextVenue() {
  return G.venueLevel + 1 < VENUE_TYPES.length ? VENUE_TYPES[G.venueLevel + 1] : null;
}

function upgradeVenue() {
  const next = getNextVenue();
  if (!next) { notify('🏆 Đã nâng cấp hết!'); return; }
  if (G.coins < next.cost) { notify('❌ Không đủ tiền!'); AudioEngine.error(); return; }
  if (!confirm(`🏪 Nâng cấp lên ${next.icon} ${next.name}?\nChi phí: ${next.cost}₫\n+${next.maxOrders - 8} max orders\n+${next.bonusRent}₫ fixed charges`)) return;
  
  G.coins -= next.cost;
  G.venueLevel++;
  AudioEngine.levelUp();
  notify(`🎉 Đã nâng cấp lên ${next.icon} ${next.name}!`);
  updateUI();
}

function processFinancialCycles() {
  const now = Date.now();
  
  // === DIFFICULTY WARNING CHECK ===
  const phase = getDifficultyPhase(G.gameDay || 1);
  if (previousDifficultyPhase && phase !== previousDifficultyPhase) {
    notify(`⚠️ ${phase.warning}`, 5000);
  }
  previousDifficultyPhase = phase;
  
  // Pay staff salaries with difficulty scaling
  if (now - G.lastSalaryPaid >= CONFIG.staffSalaryInterval) {
    let salaries = calculateStaffSalaries();
    const staffMult = phase.staffSalaryMult;
    salaries = Math.floor(salaries * staffMult);
    
    if (salaries > 0) {
      G.coins -= salaries;
      G.totalExpenses += salaries;
      G.lastSalaryPaid = now;
      notify(`💸 Lương nhân viên: -${salaries}₫ (G${G.staff.length} staff, difficulty x${staffMult.toFixed(2)})`, 3000);
    }
  }
  
  // Pay fixed charges with venue scaling
  if (now - G.lastChargesPaid >= CONFIG.fixedChargesInterval) {
    const charges = calculateFixedCharges();
    G.coins -= charges;
    G.totalExpenses += charges;
    G.lastChargesPaid = now;
    notify(`🏦 Fixed charges: -${charges}₫ (rent+utilities+insurance+tax)`, 3000);
  }
  
  // Reputation buff (from Legend Chef) - passive rep gain
  if (G.staffBuffs.reputation > 0 && now - G.lastProfitCheck >= 60000) {
    G.rep = Math.min(CONFIG.maxRep, G.rep + G.staffBuffs.reputation);
  }
  
  // Check bankruptcy
  checkBankruptcy();
  
  // Update daily profit
  if (now - G.lastProfitCheck >= 60000) {
    G.dailyProfit = G.totalRevenue - G.totalExpenses;
    G.lastProfitCheck = now;
    if (G.dailyProfit > G.bestDay) G.bestDay = G.dailyProfit;
  }
}

function checkBankruptcy() {
  if (G.coins <= CONFIG.bankruptcyThreshold) {
    if (!G.bankruptcyStartTime) {
      G.bankruptcyStartTime = Date.now();
      notify(`⚠️ WARNING! coins âm! ${Math.ceil((CONFIG.bankruptcyTime - CONFIG.bankruptcyWarningTime)/1000)}s until bankruptcy!`, 5000);
      setTimeout(() => {
        if (G.coins <= CONFIG.bankruptcyThreshold) {
          notify(`💀 BANKRUPTCY WARNING! ${Math.ceil((CONFIG.bankruptcyTime - (Date.now() - G.bankruptcyStartTime))/1000)}s remaining!`, 3000);
        }
      }, CONFIG.bankruptcyWarningTime);
    }
    
    if (Date.now() - G.bankruptcyStartTime >= CONFIG.bankruptcyTime) {
      gameOver();
    }
  } else {
    if (G.bankruptcyStartTime) {
      G.bankruptcyStartTime = null;
      notify(`✅ Recovered! Coins back to positive.`, 2000);
    }
  }
}

function gameOver() {
  AudioEngine.error();
  const safeRev = typeof G.totalRevenue === 'number' && !isNaN(G.totalRevenue) ? G.totalRevenue : 0;
  const safeExp = typeof G.totalExpenses === 'number' && !isNaN(G.totalExpenses) ? G.totalExpenses : 0;
  const safeServed = typeof G.totalServed === 'number' && !isNaN(G.totalServed) ? G.totalServed : 0;
  setTimeout(() => {
    alert(`💀 BANKRUPTCY! 💀\n\nYour cafe has gone bankrupt!\n\nFinal Stats:\n- Total Revenue: ${safeRev.toLocaleString()}₫\n- Total Expenses: ${safeExp.toLocaleString()}₫\n- Net Profit: ${(safeRev - safeExp).toLocaleString()}₫\n- Orders Served: ${safeServed.toLocaleString()}\n- Final Level: ${G.lv}\n- Reputation: ${G.rep}\n\n💡 Tips: Fire unnecessary staff, Monitor fixed charges, Keep coins positive!`);
    localStorage.removeItem('trendyCafeV7');
    location.reload();
  }, 100);
}

  if (!G.gameDay) G.gameDay = 1;
  if (Date.now() - G.lastDayChange >= 60000) {
    G.gameDay++;

    // V8: Season tracking
    currentSeason = getCurrentSeason(G.gameDay);
    
    // V8: Sports events
    tickSportsEvent();
    triggerRandomSportsEvent();
    
    // Legend Chef reputation buff trigger
    if (G.staffBuffs.reputation > 0) {
      G.rep = Math.min(CONFIG.maxRep, G.rep + G.staffBuffs.reputation);
      notify(`⭐ Legend Chef buff: +${G.staffBuffs.reputation} rep (daily)`);
    }
    
    // Staff mood decay (daily)
    G.staff.forEach(s => {
      s.mood = Math.max(0, s.mood - 1);
    });
    
    notify(`📅 Ngày ${G.gameDay}! (Difficulty phase: ${getDifficultyPhase(G.gameDay).startDay}+)`, 3000);
  }
  
  let changed = false;
  
  // Decrease patience for all orders
  for (let i = G.orders.length - 1; i >= 0; i--) {
    G.orders[i].timeLeft -= 1000;
    if (G.orders[i].timeLeft <= 0) {
      const lost = G.orders[i];
      G.orders.splice(i, 1);
      G.rep = Math.max(0, G.rep - 3);
      notify(`😡 ${lost.customer.icon} ${lost.customer.name} left! Rep -3`, 3000);
      changed = true;
    } else {
      // Chỉ cập nhật thanh patience, KHÔNG rebuild DOM
      const el = document.getElementById('patience-' + i);
      if (el) {
        const pct = Math.max(0, (G.orders[i].timeLeft / G.orders[i].patience) * 100);
        const color = pct > 60 ? '#28a745' : pct > 30 ? '#FFD700' : '#FF6347';
        el.style.width = pct + '%';
        el.style.background = color;
      }
    }
  }
  // Chỉ rebuild khi có đơn mới đến hoặc đơn bị mất (số đơn thay đổi)
  if (G.orders.length !== lastOrderCount) {
    lastOrderCount = G.orders.length;
    if (G.tab === 'orders') renderOrders();
  }
}, 1000);

// ============ AUTO SERVE (staff) ============
let lastAutoServe = 0;
let lastAutoServeInterval = 3500;
setInterval(function() {
  const now = Date.now();
  if (now - lastAutoServe < lastAutoServeInterval) return; // dynamic throttle
  
  if (G.staff.length === 0 || G.orders.length === 0) return;
  
  let servedAny = false;
  
  // === DYNAMIC DIFFICULTY ===
  const phase = getDifficultyPhase(G.gameDay || 1);
  
  // === FIX: Update serve interval based on difficulty phase ===
  // When difficulty increases (orderMult decreases), staff serve faster to keep up
  lastAutoServeInterval = Math.max(1500, Math.floor(3500 * phase.orderMult));
  
  // CALCULATE ACTIVE BUFFS
  let allSpeedBuff = 0;
  let tipsBuff = 0;
  let highrollBuff = 0;
  let coopBuff = 0;
  let repBuff = 0;
  let autoServeBuff = 0;
  let moodRecoverBuff = 0;
  
  G.staff.forEach(s => {
    const sDef = STAFF.find(st => st.id === s.id);
    if (sDef && sDef.buff) {
      switch(sDef.buff) {
        case 'all_speed': allSpeedBuff += sDef.buffVal; break;
        case 'tips': tipsBuff += sDef.buffVal; break;
        case 'highroll': highrollBuff += sDef.buffVal; break;
        case 'coop': coopBuff += sDef.buffVal; break;
        case 'reputation': repBuff += sDef.buffVal; break;
      }
    }
  });
  if (G.equipment.auto_espresso) autoServeBuff = G.equipment.auto_espresso * 0.10;
  if (G.equipment.cooling_sys) moodRecoverBuff = G.equipment.cooling_sys * 0.15;
  
  G.staffBuffs = { all_speed: allSpeedBuff, tips: tipsBuff, highroll: highrollBuff, reputation: repBuff, coop: coopBuff };
  
  // === AUTO SERVE speed bonus (must calculate before patience check) ===
  let autoServeRate = lastAutoServeInterval * (1 - autoServeBuff);
  if (autoServeRate < 1000) autoServeRate = 1000;
  
  // === FIX: Ensure all orders have sufficient patience for staff to actually serve ===
  // If any order's patience is less than serve interval, restore it to the proper level
  const minPatience = CONFIG.baseServeTime * (1 + (G.lv - 1) * 0.05);
  const minServeBuffer = autoServeRate * 1.2; // 20% buffer over serve interval
  const requiredPatience = Math.max(minPatience, minServeBuffer);
  G.orders.forEach(o => {
    if (o.timeLeft > requiredPatience) {
      // Cap timeLeft to prevent orders from having impossible patience
      o.timeLeft = requiredPatience;
    }
    o.patience = Math.max(o.patience, requiredPatience);
  });
  
  let tickServed = 0;
  
  for (let si = 0; si < G.staff.length; si++) {
    if (G.orders.length === 0) break;
    
    const s = G.staff[si];
    if (s.mood < 5) continue;
    
    // CO-OP SERVE: Master/Epic Coach reduce time by 50%
    let serveMod = 1;
    if (coopBuff > 0 && si === G.staff.length - 1) {
      serveMod = Math.min(serveMod, 0.5);
    }
    
    // === AUTO SERVE speed bonus ===
    let autoServeRate = lastAutoServeInterval * (1 - autoServeBuff);
    if (autoServeRate < 1000) autoServeRate = 1000;
    
    // === DYNAMIC SERVE COUNT based on staff skill ===
    // All speed buff from Manager
    const speedMult = 1 + allSpeedBuff;
    
    // Mood recovery bonus from Cooling System
    const moodRecoveryRate = 2 + moodRecoverBuff * 2;
    
    // Tính skill thực tế → bao nhiêu đơn mỗi staff có thể serve mỗi tick
    // Công thức: skill * mood% * speedBuff * scaleFactor
    // Base scaleFactor = 2, tăng lên khi difficulty cao để multi-staff vẫn hữu ích
    const difficultyServeBonus = (1.0 - phase.orderMult) * 2; // 0.0 -> 0.2 -> 0.4 -> 0.6
    const skillValue = s.skill * (s.mood / 100) * speedMult;
    const servedCount = Math.max(1, Math.ceil(skillValue * (2 + difficultyServeBonus)));
    
    for (let srv = 0; srv < servedCount && G.orders.length > 0; srv++) {
      const o = G.orders[0];
      let bonus = 1;
      G.trendItems.forEach(t => { if(t.revenueBonus) bonus += t.revenueBonus; });
      bonus += (G.equipment.espresso_mach || 0) * 0.05;
      if (G.equipment.chandelier) bonus += (G.equipment.chandelier || 0) * 0.05;
      
      // HIGH ROLLER buff
      let revenue = Math.floor((o.price + o.tip) * phase.profitMult * bonus);
      if (highrollBuff > 0 && o.price > 50) {
        revenue = Math.floor(revenue * 1.15);
      }
      
      // PREMIUM STORAGE
      const costReduction = 1 - (G.equipment.premium_store || 0) * 0.10;
      const menuDef = MENU.find(m => m.id === o.menuId);
      const finalCost = menuDef ? Math.floor(menuDef.cost * phase.inflation * costReduction) : 0;
      
      const netProfit = revenue - finalCost;
      G.coins += netProfit;
      G.totalRevenue += revenue;
      G.totalExpenses += finalCost;
      G.totalServed++;
      G.ordersToday++;
      
      // SMART POS + Senior tips buff
      const tipMult = 1 + (G.equipment.smart_pos || 0) * 0.20;
      const finalTip = Math.floor(o.tip * tipMult);
      const finalTipWithBuff = tipsBuff > 0 ? Math.floor(finalTip * (1 + tipsBuff)) : finalTip;
      G.totalTips += finalTipWithBuff;
      
      // XP gain
      const xpGain = Math.floor(o.price * 1.5) + (finalTipWithBuff > 0 ? 5 : 0);
      G.xp += xpGain;
      G.rep = Math.min(CONFIG.maxRep, G.rep + 1);
      
      // Mood decay with cooling system
      const decay = CONFIG.moodDecayRate[G.lv-1] || 2;
      s.mood = Math.max(0, Math.min(100, s.mood - decay + moodRecoverBuff * 2));
      
      G.orders.splice(0, 1);
      tickServed++;
    }
  }
  
  if (tickServed > 0) {
    servedAny = true;
    lastAutoServe = Date.now();
    // Hiển thị danh sách staff đã serve
    const servingStaffNames = G.staff
      .filter(s => s.mood > 5)
      .slice(0, Math.min(tickServed, G.staff.length))
      .map(s => s.name.split(' ')[0])
      .join(', ');
    if (tickServed > 1) {
      notify(`🤖 ${tickServed} đơn: ${servingStaffNames} — phục vụ xong!`);
    } else {
      notify(`🤖 ${servingStaffNames} — phục vụ 1 đơn!`);
    }
    checkLevelUp();
    updateUI();
  }
}, 3500); // Every 3.5s

// ============ MOOD RECOVERY ============
setInterval(function() {
  let moodRecoverBuff = 0;
  G.staff.forEach(s => {
    const sDef = STAFF.find(st => st.id === s.id);
    if (sDef && sDef.buff === 'reputation') moodRecoverBuff += 2;
  });
  const baseRecovery = 2 + (G.equipment.cooling_sys || 0) * 0.3 + moodRecoverBuff;
  G.staff.forEach(s => {
    if (s.mood < 100) {
      s.mood = Math.min(100, s.mood + baseRecovery);
    }
  });
}, 10000); // Every 10s

// ============ SAVE / LOAD ============
function saveGame() {
  try {
    // Sync sports event to game state
    if (currentSportsEvent) G.sportsEvent = {...currentSportsEvent};
    const saveData = JSON.stringify(G);
    localStorage.setItem('trendyCafeV7', saveData);
  } catch(e) {}
}

function loadGame() {
  try {
    const data = localStorage.getItem('trendyCafeV7');
    if (data) {
      const saved = JSON.parse(data);
      // Merge with defaults
      Object.keys(saved).forEach(key => {
        if (G.hasOwnProperty(key)) {
          G[key] = saved[key];
        }
      });
      
      // Ensure new fields exist
      if (!G.staffBuffs) G.staffBuffs = { all_speed:0, tips:0, highroll:0, reputation:0, coop:0 };
      if (!G.lastDayChange) G.lastDayChange = Date.now();
      
      // Ensure trend items have bonus fields
      G.trendItems.forEach(t => {
        const trendDef = TRENDS.find(x => x.id === t.id);
        if (trendDef) {
          t.revenueBonus = trendDef.id === 't_doge' ? 0.05 :
                           trendDef.id === 't_cat' ? 0.03 :

                           trendDef.id === 't_chef' ? 0.30 :
                           trendDef.id === 't_neon' ? 0.12 :
                           trendDef.id === 't_rooftop' ? 0.25 :
                           trendDef.id === 't_artwall' ? 0.20 :
                           trendDef.id === 't_privroom' ? 0.18 :
                           trendDef.id === 't_petzone' ? 0.15 :
                           trendDef.id === 't_gaming' ? 0.22 :
                           trendDef.id === 't_livemusic' ? 0.35 :
                           trendDef.id === 't_aromatherapy' ? 0.40 :
                           trendDef.id === 't_rooftopgarden' ? 0.50 :
                           trendDef.id === 't_smartorder' ? 0.45 :
                           trendDef.id === 't_secretmenu' ? 0.60 :
                           trendDef.id === 't_book' ? 0.10 : 0;
          t.repBonus = trendDef.id === 't_plant' ? 2 :
                       trendDef.id === 't_art' ? 8 :
                       trendDef.id === 't_artwall' ? 12 :
                       trendDef.id === 't_privroom' ? 8 :
                       trendDef.id === 't_petzone' ? 15 :
                       trendDef.id === 't_book' ? 10 :
                       trendDef.id === 't_livemusic' ? 10 :
                       trendDef.id === 't_aromatherapy' ? 12 :
                       trendDef.id === 't_rooftopgarden' ? 15 :
                       trendDef.id === 't_smartorder' ? 20 :
                       trendDef.id === 't_secretmenu' ? 25 : 0;
        }
      });
      
      // Ensure new equipment fields exist
      ['auto_espresso','cooling_sys','premium_store','outdoor_tent','chandelier','smart_pos'].forEach(eq => {
        if (!G.equipment[eq]) G.equipment[eq] = 0;
      });
      
      // Sync currentSportsEvent
      currentSportsEvent = G.sportsEvent || null;
      
      // V8: Season tracking
      if (G.gameDay) currentSeason = getCurrentSeason(G.gameDay);
      
      notify('💾 Game loaded! V8 Ultimate', 1500);
    }

}

setInterval(saveGame, 30000); // Auto-save every 30s

// ============ RENDER: TRENDS TAB ============
function renderTrends() {
  const panel = document.getElementById('panel-trends');
  if (!panel) return;
  
  const owned = G.trendItems || [];
  const ownedIds = owned.map(t => t.id);
  const day = G.gameDay || 1;
  
  // Filter trends based on level unlocks
  let available = TRENDS.filter(t => {
    if (t.r === 'common') return day >= 1;
    if (t.r === 'rare') return day >= 20;
    if (t.r === 'epic') return day >= 40;
    if (t.r === 'legend') return day >= 60;
    if (t.r === 'mythic') return day >= 90;
    return false;
  });
  
  // Calculate trend revenue stats for ranking
  const trendStats = {};
  owned.forEach(t => {
    const base = TRENDS.find(x => x.id === t.id);
    trendStats[t.id] = {
      ...t,
      base: base,
      revenue: Math.floor((t.revenueBonus || 0) * 10000),
      rep: t.repBonus || 0,
      isOwned: true
    };
  });
  
  // Hot trends = owned trends with highest revenue bonus
  const hotTrends = Object.values(trendStats)
    .filter(t => t.isOwned)
    .sort((a, b) => (b.revenueBonus || 0) - (a.revenueBonus || 0))
    .slice(0, 3);
  
  let html = '';
  
  // === HOT TRENDS ===
  if (hotTrends.length > 0) {
    html += '<div class="section-title">🔥 Hot Trends (Top Revenue)</div>';
    hotTrends.forEach(t => {
      html += `<div class="card ${t.r === 'epic' ? 'epic' : t.r === 'rare' ? 'rare' : ''}">`;
      html += `<div><strong>${t.icon} ${t.name}</strong><br>`;
      html += `<span class="gold">+${Math.floor((t.revenueBonus || 0) * 100)}% revenue</span>`;
      if (t.rep) html += ` | +${t.rep} rep`;  
      html += `</div><span style="font-size:10px;color:#28a745">✅ OWNED</span></div>`;
    });
  }
  
  // === OWNED TRENDS ===
  html += `<div class="section-title">🛒 Đã Mua (${owned.length}/${TRENDS.length})</div>`;
  if (owned.length > 0) {
    owned.forEach(t => {
      html += `<div class="card">`;
      html += `<div><strong>${t.icon} ${t.name}</strong> <span class="gold" style="font-size:10px">[${t.r.toUpperCase()}]</span><br>`;
      html += `<span style="font-size:11px">${t.desc}</span></div>`;
      html += `<span style="font-size:10px;color:#FFD700">+${Math.floor((t.revenueBonus||0)*100)}% rev</span></div>`;
    });
  } else {
    html += '<div class="empty">Chưa mua xu hướng nào. Mua từ danh sách bên dưới!</div>';
  }
  
  // === MARKETPLACE - trends for sale ===
  html += '<div class="section-title">📈 Xu Hướng Mới</div>';
  available.forEach(t => {
    const isOwned = ownedIds.includes(t.id);
    const canAfford = G.coins >= t.cost;
    if (isOwned) {
      html += `<div class="card new-card"><div>`;
      html += `<strong>${t.icon} ${t.name}</strong> <span class="gold" style="font-size:10px">[${t.r.toUpperCase()}]</span><br>`;
      html += `<span style="font-size:11px">${t.desc}</span></div>`;
      html += `<span style="font-size:11px;color:#28a745">✅ ĐÃ MUA</span></div>`;
    } else {
      html += `<div class="card new-card"><div>`;
      html += `<strong>${t.icon} ${t.name}</strong> <span class="gold" style="font-size:10px">[${t.r.toUpperCase()}]</span><br>`;
      html += `<span style="font-size:11px">${t.desc}</span></div>`;
      html += `<button class="btn ${canAfford ? 'green' : ''}" onclick="buyTrend('${t.id}')" ${!canAfford ? 'disabled' : ''}>${t.cost.toLocaleString()}₫</button></div>`;
    }
  });
  
  panel.innerHTML = html;
}

// ============ RENDER: EVENTS TAB ============
function renderEvents() {
  const panel = document.getElementById('panel-events');
  if (!panel) return;
  
  const day = G.gameDay || 1;
  const season = getCurrentSeason(day);
  let html = '';
  
  // === CURRENT SEASON ===
  html += '<div class="section-title">🌤️ Mùa Hiện Tại</div>';
  html += `<div class="card">`;
  html += `<div><strong>${getSeasonEmoji()} ${getSeasonName()} Season</strong><br>`;
  html += `<span style="font-size:11px">${getSeasonDescription()}</span></div></div>`;
  
  // === SEASONAL DEMAND BONUS ===
  const sMenu = SEASONAL_MENUS[season];
  if (sMenu && sMenu.shift) {
    html += '<div class="section-title">📊 Mùa Này Hot Món</div>';
    Object.entries(sMenu.shift).forEach(([menuId, mult]) => {
      const menu = MENU.find(m => m.id === menuId);
      if (menu) {
        html += `<div class="card"><div>`;
        html += `<strong>${menu.icon} ${menu.name}</strong><br>`;
        html += `<span class="gold">+${Math.floor((mult-1)*100)}% demand mùa này</span></div>`;
        html += `<span style="font-size:11px">${mult.toFixed(1)}x</span></div>`;
      }
    });
  }
  
  // === ACTIVE SPORTS EVENT ===
  const activeEvent = G.sportsEvent || currentSportsEvent;
  html += '<div class="section-title">⚽ Sự Kiện Thể Thao</div>';
  if (activeEvent && activeEvent.daysLeft > 0) {
    html += `<div class="card epic"><div>`;
    html += `<strong>${activeEvent.icon} ${activeEvent.name}</strong><br>`;
    html += `<span style="font-size:11px">${activeEvent.desc}</span><br>`;
    html += `<span class="gold">Còn ${activeEvent.daysLeft} ngày!</span></div>`;
    html += `<span style="font-size:11px;color:#e74c3c">🔴 ACTIVE</span></div>`;
  } else {
    html += '<div class="card"><span style="color:#a0a0b0">Không có sự kiện thể thao nào đang diễn ra</span></div>';
  }
  
  // === UPCOMING EVENTS ===
  html += '<div class="section-title">📅 Sự Kiện Sắp Tới</div>';
  
  // Level milestone events
  const nextMilestone = Object.entries(LEVEL_REWARDS).find(([lv, r]) => parseInt(lv) > day && r);
  if (nextMilestone) {
    const lv = nextMilestone[0];
    const reward = nextMilestone[1];
    html += `<div class="card new-card"><div>`;
    html += `<strong>🎯 Lv.${lv} Reward</strong><br>`;
    html += `<span style="font-size:11px">${reward.desc}</span></div>`;
    html += `<span class="gold">+${reward.coins.toLocaleString()}₫</span></div>`;
  }
  
  // Seasonal transition
  const c = day % 360;
  let nextSeason = '', nextEmoji = '';
  if (c < 90) { nextSeason = 'Summer'; nextEmoji = '☀️'; }
  else if (c < 180) { nextSeason = 'Autumn'; nextEmoji = '🍂'; }
  else if (c < 270) { nextSeason = 'Winter'; nextEmoji = '❄️'; }
  else { nextSeason = 'Spring'; nextEmoji = '🌸'; }
  
  const seasonDays = [90-c, 90, 90, 90];
  let daysToNext = 90;
try { const _idx = ['spring','summer','autumn','winter'].indexOf(season?.name.toLowerCase()); if (_idx >= 0 && _idx < seasonDays.length) daysToNext = seasonDays[_idx]; } catch(e){} 
  html += `<div class="card new-card"><div>`;
  html += `<strong>${nextEmoji} Chuyển mùa: ${nextSeason}</strong><br>`;
  html += `<span style="font-size:11px">Sau ${Math.abs((day % 90) === 0 ? 90 : 90 - (day % 90))} ngày</span></div></div>`;
  
  // === SPORTS EVENTS PREVIEW ===
  html += '<div class="section-title">🏆 Sự Kiện Thể Thao Có Sẵn</div>';
  SPORTS_EVENTS.slice(0, 5).forEach(ev => {
    html += `<div class="card" style="font-size:11px"><div>`;
    html += `<strong>${ev.icon} ${ev.name}</strong><br>`;
    html += `<span>${ev.desc}</span></div>`;
    html += `<span style="color:#a0a0b0">${ev.duration} ngày</span></div>`;
  });
  
  panel.innerHTML = html;
}
