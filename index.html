<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Cafe - Pixel Art</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0d0d1a;color:#e8e8e8;overflow-x:hidden;min-height:100vh}
#top-bar{width:100%;max-width:480px;display:flex;justify-content:space-around;padding:6px 8px;background:linear-gradient(135deg,#16213e,#1a1a4e);border-bottom:2px solid #FFD700;font-size:12px;flex-wrap:wrap;gap:2px}
.stat{padding:3px 6px;border:1px solid #333;border-radius:3px;font-size:11px}
.gold{color:#FFD700;font-weight:bold}
#canvas-wrap{width:100%;max-width:480px;position:relative}
#gameCanvas{width:100%;height:200px;display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#main{max-width:480px;margin:0 auto;padding:8px}
#tabs{display:flex;overflow-x:auto;border-bottom:2px solid #0f3460;background:#0f3460}
.tab{padding:8px 10px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;cursor:pointer;white-space:nowrap;font-size:11px}
.tab.active{color:#FFD700;background:rgba(255,215,0,0.2)}
.tab:hover{background:rgba(255,215,0,0.1)}
#content{min-height:300px;padding:8px;background:#1a1a2e;max-height:42vh;overflow-y:auto}
.card{padding:8px;margin:5px 0;background:linear-gradient(145deg,#0f3460,#16213e);border:1px solid #2a3a5e;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.card.rare{border-color:#9b59b6}
.card.epic{border-color:#e74c3c}
.card.legendary{border-color:#FFD700;background:linear-gradient(145deg,#2c1a4a,#1a1a4e)}
.btn{padding:6px 12px;border:1px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px}
.btn:hover{box-shadow:0 2px 8px rgba(255,99,71,0.4)}
.btn:disabled{background:#555;cursor:not-allowed}
.btn.green{background:#28a745}
.btn.blue{background:#3498db}
.btn.gold{background:#DAA520;color:#000}
.notif{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#0f3460;color:#FFD700;padding:5px 12px;border:1px solid #FFD700;border-radius:6px;font-size:11px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
.notif.show{opacity:1}
.location-bar{display:flex;gap:4px;overflow-x:auto;padding:6px;background:#0d0d1a;flex-wrap:wrap}
.loc-btn{padding:5px 8px;border:1px solid #333;border-radius:4px;background:#16213e;color:#ccc;font-family:inherit;font-size:10px;cursor:pointer;white-space:nowrap}
.loc-btn.active{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.1)}
.loc-btn:disabled{opacity:.4;cursor:not-allowed}
.upgrade-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.quest-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px}
.quest-card.done{border-color:#28a745;background:rgba(40,167,69,.1)}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6347);transition:width .5s}
.trend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:6px}
.trend-card{padding:6px;background:#16213e;border:1px solid #333;border-radius:4px;font-size:10px;cursor:pointer;text-align:center}
.trend-card.common{border-color:#aaa}
.trend-card.rare{border-color:#9b59b6}
.trend-card.epic{border-color:#e74c3c}
.trend-card.legendary{border-color:#FFD700;background:linear-gradient(145deg,#2c1a4a,#1a1a4e)}
.weather-bar{padding:4px 8px;background:#0d0d1a;border-bottom:1px solid #333;font-size:11px;display:flex;align-items:center;gap:6px}
.supplier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px}
.supplier-item{padding:6px;text-align:center;background:#16213e;border:1px solid #333;border-radius:4px}
.supplier-item .qty{color:#FFD700;font-size:14px}
</style>
</head>
<body>

<div id="top-bar">
  <span class="stat">💰 <span class="gold" id="money">500</span></span>
  <span class="stat">⭐ <span class="gold" id="level">Lv.1</span></span>
  <span class="stat">📅 Ngày <span id="day">1</span></span>
  <span class="stat">🧑‍🍳 <span id="staff">0</span></span>
</div>

<div class="weather-bar" id="weather-bar"></div>

<div id="canvas-wrap">
  <canvas id="gameCanvas" width="480" height="200"></canvas>
</div>

<div id="main">
  <div id="tabs">
    <button class="tab active" data-tab="location">📍 Vị trí</button>
    <button class="tab" data-tab="menu">☕ Menu</button>
    <button class="tab" data-tab="staff">👥 Staff</button>
    <button class="tab" data-tab="upgrade">🔧 Nâng cấp</button>
    <button class="tab" data-tab="trend">🔥 Trend</button>
    <button class="tab" data-tab="supplier">📦 Vật tư</button>
    <button class="tab" data-tab="quest">📋 Nhiệm vụ</button>
  </div>
  <div id="content"></div>
</div>

<div class="notif" id="notif"></div>

<script>
// ======== GAME STATE ========
let GS = {
  coins:500, level:1, xp:0, xpNeeded:100,
  currentLocation:'street', unlockedLocations:['street'],
  ownedItems:{}, ownedRecipes:[], menuUnlocked:1,
  autoServeRate:0, upgradesBought:[], questsCompleted:[],
  dailyRevenue:0, totalRevenue:0, totalServed:0,
  gameDay:1, lastDayChange:Date.now(),
  supplierStock:{beans:10,milk:20,cups:200},
  staff:[],
  customerAnim:{queue:[],served:0},
  tickTimer:0, serveTimer:0
};

const LOCATIONS={
  street:{name:'Vỉa hè',emoji:'🚶',cost:0,revenueMult:1,customers:3,bg:'#87CEEB'},
  mall:{name:'Trung tâm TM',emoji:'🏬',cost:5000,revenueMult:2.5,customers:5,bg:'#B0E0E6'},
  garden:{name:'Sân vườn',emoji:'🌳',cost:15000,revenueMult:2,customers:4,bg:'#90EE90'},
  rooftop:{name:'Rooftop',emoji:'🌃',cost:50000,revenueMult:3.5,customers:6,bg:'#4A3068'},
  festival:{name:'Lễ hội',emoji:'🎪',cost:100000,revenueMult:4,customers:8,bg:'#FF6347'}
};

const MENU_ITEMS=[
  {id:'coffee',name:'Cà phê đen',emoji:'☕',price:25,cost:5,needsBeans:true,needsMilk:false},
  {id:'milk_coffee',name:'Cà phê sữa',emoji:'🥛',price:30,cost:8,needsBeans:true,needsMilk:true},
  {id:'espresso',name:'Espresso',emoji:'☕',price:35,cost:5,needsBeans:true,needsMilk:false},
  {id:'matcha',name:'Trà matcha',emoji:'🍵',price:40,cost:10,needsBeans:false,needsMilk:false},
  {id:'smoothie',name:'Sinh tố',emoji:'🥤',price:45,cost:12,needsBeans:false,needsMilk:true},
  {id:'cake',name:'Bánh mì',emoji:'🥪',price:35,cost:8,needsBeans:false,needsMilk:false},
  {id:'ice_tea',name:'Trà đá',emoji:'🧊',price:15,cost:3,needsBeans:false,needsMilk:false},
  {id:'bubble_tea',name:'Trà sữa',emoji:'🧋',price:50,cost:12,needsBeans:false,needsMilk:true},
  {id:'tropical',name:'Nước ép dừa',emoji:'🥥',price:55,cost:15,needsBeans:false,needsMilk:true},
  {id:'signature',name:'Signature',emoji:'🍸',price:80,cost:20,needsBeans:true,needsMilk:true}
];

const TREND_ITEMS=[
  {id:'t_meme_dog',name:'🐶 Meme Chó Vàng',rarity:'common',effect:'revenue',value:.05,desc:'+5% doanh thu',cost:200},
  {id:'t_meme_cat',name:'🐱 Mèo hoang',rarity:'common',effect:'revenue',value:.03,desc:'+3% doanh thu',cost:150},
  {id:'t_mu_jersey',name:'⚽ Áo MU',rarity:'common',effect:'customers',value:1,desc:'+1 khách',cost:300},
  {id:'t_girl_boy',name:'💃 Cô Bé Chú Bé',rarity:'rare',effect:'revenue',value:.1,desc:'+10% doanh thu',cost:1000},
  {id:'t_ba_tram',name:'💯 Ba Trăm',rarity:'rare',effect:'customers',value:2,desc:'+2 khách',cost:1500},
  {id:'t_tu_hien',name:'🎤 Tú Hien Style',rarity:'rare',effect:'revenue',value:.15,desc:'+15% doanh thu',cost:2000},
  {id:'t_lam_pham',name:'🏆 Lam Phẩm',rarity:'epic',effect:'revenue',value:.2,desc:'+20% doanh thu sig',cost:5000},
  {id:'t_sieu_toc',name:'⚡ Siêu Tốc',rarity:'epic',effect:'customers',value:5,desc:'+5 khách',cost:8000},
  {id:'t_vua_cafe',name:'👑 Vua Cà Phê',rarity:'legendary',effect:'revenue',value:.5,desc:'+50% doanh thu!',cost:20000},
  {id:'t_omega',name:'💫 Omega Plus',rarity:'legendary',effect:'all',value:.3,desc:'+30% tất cả!',cost:50000}
];

const UPGRADES=[
  {id:'u_staff1',name:'👨‍🍳 Thuê nhân viên',desc:'Tự động phục vụ 1 khách/phút',cost:1000,type:'auto_serve',value:1},
  {id:'u_staff2',name:'👩‍🍳 Thêm nhân viên',desc:'Tự động phục vụ thêm 2 khách/phút',cost:3000,type:'auto_serve',value:2},
  {id:'u_staff3',name:'👨‍🍳👩‍🍳 Đội bếp',desc:'Tự động phục vụ thêm 5 khách/phút',cost:8000,type:'auto_serve',value:5},
  {id:'u_menu1',name:'📋 Mở rộng menu',desc:'Thêm 5 món mới',cost:2000,type:'unlock_menu',value:5},
  {id:'u_deco1',name:'🪑 Bàn ghế mới',desc:'+10% doanh thu',cost:1500,type:'revenue',value:.1},
  {id:'u_deco2',name:'🎵 Nhạc nền',desc:'+5% doanh thu',cost:800,type:'revenue',value:.05},
  {id:'u_sign1',name:'🪧 Bảng hiệu LED',desc:'+20% khách vãng lai',cost:5000,type:'customers',value:.2},
  {id:'u_wifi1',name:'📶 WiFi miễn phí',desc:'+10% doanh thu',cost:1200,type:'revenue',value:.1},
  {id:'u_aircon1',name:'❄️ Điều hòa',desc:'+15% doanh thu',cost:3500,type:'revenue',value:.15},
  {id:'u_parking1',name:'🅿️ Chỗ đỗ xe',desc:'+15% khách xa',cost:4000,type:'customers',value:.15}
];

const QUESTS=[
  {id:'q1',title:'Ngày đầu khai trương',desc:'Phục vụ 10 khách',type:'serve',target:10,reward:{coins:200,xp:50},done:false,progress:0},
  {id:'q2',title:'Thu thập meme',desc:'Sở hữu 1 item trendy',type:'collect',target:1,reward:{coins:300,xp:75},done:false,progress:0},
  {id:'q3',title:'Triệu phú cà phê',desc:'Kiếm 5000 coin',type:'earn',target:5000,reward:{coins:1000,xp:150},done:false,progress:0},
  {id:'q4',title:'Nâng cấp quán',desc:'Mở vị trí mới',type:'upgrade',target:1,reward:{coins:2000,xp:200},done:false,progress:0},
  {id:'q5',title:'Bộ sưu tập',desc:'Có 5 items khác nhau',type:'collect_all',target:5,reward:{coins:3000,xp:300},done:false,progress:0},
  {id:'q6',title:'Doanh thu khủng',desc:'Kiếm 20000/ngày',type:'daily_earn',target:20000,reward:{coins:5000,xp:500},done:false,progress:0},
  {id:'q7',title:'Hoàn thành bộ sưu tập',desc:'Sở hữu tất cả items',type:'complete_all',target:TREND_ITEMS.length,reward:{coins:20000,xp:2000},done:false,progress:0}
];

const WEATHER_MAP={
  sunny:{emoji:'☀️',name:'Nắng',mod:1.0},
  cloudy:{emoji:'⛅',name:'Nhiều mây',mod:1.05},
  rainy:{emoji:'🌧️',name:'Mưa',mod:.75},
  hot:{emoji:'🔥',name:'Nóng',mod:1.15},
  tet:{emoji:'🎊',name:'Tết',mod:2.5}
};

// ======== CANVAS SETUP ========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W=480,H=200;
ctx.imageSmoothingEnabled=false;
let animFrame=0;

// ======== GAME HELPERS ========
function getWeather(){
  const cycle=GS.gameDay%180;
  const season=cycle<60?'summer':(cycle<120?'rainy':'cool');
  const probs=season==='summer'?{sunny:.35,cloudy:.25,rainy:.2,hot:.1,tet:.0}:
    season==='rainy'?{sunny:.1,cloudy:.15,rainy:.45,hot:0,tet:.1}:
    {sunny:.15,cloudy:.3,rainy:.15,hot:0,tet:.3};
  const rand=Math.random(),cum=0;
  let c=0;
  for(const[t,p]of Object.entries(probs)){c+=p;if(rand<=c)return WEATHER_MAP[t];}
  return WEATHER_MAP.sunny;
}

function getRevenuePerMin(){
  const loc=LOCATIONS[GS.currentLocation];
  let base=loc.customers*30;
  let mult=loc.revenueMult;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){
    const item=TREND_ITEMS.find(i=>i.id===id);
    if(item&&item.effect==='revenue')mult+=item.value*cnt;
  }
  for(const id of GS.upgradesBought){
    const u=UPGRADES.find(x=>x.id===id);
    if(u&&u.type==='revenue')mult+=u.value;
  }
  const w=getWeather();
  mult*=w.mod;
  return Math.floor(base*mult);
}

function getCustomerCount(){
  const loc=LOCATIONS[GS.currentLocation];
  let base=loc.customers;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){
    const item=TREND_ITEMS.find(i=>i.id===id);
    if(item&&item.effect==='customers')base+=item.value*cnt;
  }
  for(const id of GS.upgradesBought){
    const u=UPGRADES.find(x=>x.id===id);
    if(u&&u.type==='customers')base+=u.value*base;
  }
  return Math.floor(base);
}

function showNotif(text){
  const n=document.getElementById('notif');
  n.textContent=text;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2000);
}

function checkQuests(){
  QUESTS.forEach(q=>{
    if(q.done)return;
    if(q.type==='serve'&&q.progress<q.target){
      GS.totalServed>=(q.progress+1)&&q.progress<q.target?q.progress++:null;
      q.progress=Math.min(GS.totalServed,q.target);
    }
    if(q.type==='earn'&&q.totalRevenue>=(q.progress+1)*q.target*10)q.progress=Math.min(Math.floor(GS.totalRevenue/100),q.target);
    if(q.type==='collect'){
      q.progress=Math.min(Object.keys(GS.ownedItems).filter(k=>GS.ownedItems[k]>0).length,q.target);
    }
    if(q.type==='collect_all'){
      q.progress=Math.min(Object.keys(GS.ownedItems).filter(k=>GS.ownedItems[k]>0).length,q.target);
    }
    if(q.type==='upgrade')q.progress=GS.unlockedLocations.length-1;
    if(q.type==='complete_all')q.progress=Math.min(Object.keys(GS.ownedItems).filter(k=>GS.ownedItems[k]>0).length,q.target);
    if(q.progress>=q.target){
      q.done=true;GS.coins+=q.reward.coins;GS.xp+=q.reward.xp;
      showNotif(`🎉 Nhiệm vụ: ${q.title}! +${q.reward.coins}K +${q.reward.xp}XP`);
    }
  });
}

function addXP(n){
  GS.xp+=n;
  while(GS.xp>=GS.xpNeeded){
    GS.xp-=GS.xpNeeded;GS.level++;GS.xpNeeded=Math.floor(GS.xpNeeded*1.5);
    showNotif(`⭐ Lên cấp ${GS.level}!`);
  }
}

// ======== GAME LOGIC ========
let gameTick=0;
function gameLoop(){
  animFrame++;
  gameTick++;

  // Revenue every 10 seconds = ~6 ticks per min => revenue per tick
  if(gameTick%60===0){
    const rev=getRevenuePerMin();
    GS.dailyRevenue+=rev;GS.totalRevenue+=rev;
    addXP(5);
    checkQuests();
  }

  // Day change every 600 ticks (~10 min real)
  if(gameTick%600===0){
    GS.gameDay++;GS.dailyRevenue=0;
    showNotif(`📅 Ngày ${GS.gameDay} bắt đầu!`);
  }

  // Auto serve
  if(GS.autoServeRate>0&&gameTick%60===0){
    const served=GS.autoServeRate;
    GS.coins+=getRevenuePerMin()*0.5;
    GS.totalServed+=served;
    addXP(served);
    GS.customerAnim.served+=served;
    showNotif(`🤖 Staff phục vụ ${served} khách! +${getRevenuePerMin()*.5}K`);
  }

  // Spawn animated customers
  if(gameTick%120===0){
    const count=getCustomerCount();
    for(let i=0;i<Math.min(count,5);i++){
      GS.customerAnim.queue.push({
        id:Date.now()+i,
        x:W+20,y:120+Math.random()*30,
        targetX:40+Math.random()*300,targetY:140+Math.random()*30,
        state:'entering',timer:0,
        color:['#E74C3C','#3498DB','#2ECC71','#9B59B6','#F39C12','#1ABC9C'][Math.floor(Math.random()*6)],
        skin:['#FDBCB4','#D2B48C','#8D5524','#C68642'][Math.floor(Math.random()*4)],
        hair:['#2C1810','#8B4513','#DAA520','#1C1C1C'][Math.floor(Math.random()*4)],
        hat:Math.random()>.7?['🎩','🧢','👒'][Math.floor(Math.random()*3)]:null
      });
    }
  }

  // Update animated customers
  GS.customerAnim.queue.forEach((c,i)=>{
    if(c.state==='entering'){
      c.timer++;
      if(c.timer<60){
        c.x-=3;c.y+=(c.targetY-c.y)*.05;
      }else if(c.timer<120){
        c.y+=(c.targetY-c.y)*.05;
      }else{
        c.state='sitting';c.timer=0;
        c.drinkTimer=0;
      }
    }else if(c.state==='sitting'){
      c.drinkTimer++;
      if(c.drinkTimer>80){
        c.state='leaving';c.timer=0;
        c.targetX=W+20;c.targetY=140;
        GS.coins+=getRevenuePerMin()/getCustomerCount();
        GS.totalServed++;addXP(1);
        checkQuests();
      }
    }else if(c.state==='leaving'){
      c.timer++;c.x+=3;
      if(c.x>W+30)GS.customerAnim.queue.splice(i,1);
    }
  });

  updateUI();
  requestAnimationFrame(renderCanvas);
}

// ======== PIXEL ART RENDERER ========
const PX=2;
function drawRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(x,y,w,h);}

function drawCafe(){
  const loc=LOCATIONS[GS.currentLocation];
  // Sky
  drawRect(0,0,W,80,'#87CEEB');
  // Wall
  drawRect(0,80,W,60,'#F5E6CA');
  // Wall pattern
  for(let x=0;x<W;x+=20){drawRect(x,80,1,60,'rgba(139,105,20,.08)');}

  // Window
  drawRect(180,10,120,70,'#4A3068');
  drawRect(182,12,116,66,'#5B9BD5');
  drawRect(239,12,2,66,'#8B6914');
  drawRect(182,45,116,2,'#8B6914');

  // Sun
  const hour=(animFrame/60)%24;
  if(hour<18){
    drawRect(280+hour*3,20,12,12,'#FFD700');
    drawRect(282+hour*3,22,8,8,'#FFF8DC');
  }else{
    drawRect(295,15,10,10,'#F5F5DC');
    drawRect(298,13,7,7,'#4A3068');
  }

  // Counter
  drawRect(20,140,100,50,'#6F4E37');
  drawRect(20,140,100,6,'#DEB887');
  drawRect(120,160,15,20,'#444');
  drawRect(122,158,11,14,'#666');
  // Machine light
  const glow=Math.sin(animFrame*.05)*.3+.7;
  drawRect(121,157,3,3,`rgba(0,255,0,${glow})`);
  drawRect(126,157,3,3,`rgba(255,100,0,${glow})`);

  // Shelves
  drawRect(20,95,100,5,'#8B6914');
  drawRect(20,125,100,5,'#8B6914');
  // Items on shelf
  MENU_ITEMS.slice(0,6).forEach((item,i)=>{
    drawRect(30+i*14,110,10,14,item.emoji==='☕'?'#6F4E37':item.emoji==='🥛'?'#C4A882':item.emoji==='🍵'?'#6B8E23':'#E74C3C');
    drawRect(32+i*14,112,6,10,'#FFF');
  });

  // Tables
  const tablePositions=[[160,170],[280,170],[380,170]];
  tablePositions.forEach(([tx,ty])=>{
    drawRect(tx,ty,40,4,'#8B6914');
    drawRect(tx+5,ty+4,3,30,'#6F4E37');
    drawRect(tx+32,ty+4,3,30,'#6F4E37');
  });

  // Entrance
  drawRect(400,120,50,80,'#5C4033');
  drawRect(402,122,46,76,'#8B6914');
  drawRect(440,150,4,4,'#FFD700');
  // OPEN sign
  const sg=Math.sin(animFrame*.08)*.3+.7;
  drawRect(405,130,40,12,`rgba(0,255,0,${sg})`);
  ctx.fillStyle='#000';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText('MỞ',425,139);

  // Floor
  for(let x=0;x<W;x+=15){for(let y=180;y<H;y+=15){
    drawRect(x,y,15,15,(x+y)%30===0?'#D2B48C':'#C4A882');
  }}

  // Lighting
  [[100,30],[200,30],[300,30]].forEach(([lx,ly],idx)=>{
    const g=Math.sin(animFrame*.03+idx)*.15+.85;
    drawRect(lx-1,ly-1,4,4,`rgba(255,248,220,${g})`);
    drawRect(lx-1,0,2,ly,'#333');
    const cone=ctx.createRadialGradient(lx,ly,3,lx,ly+100,50);
    cone.addColorStop(0,`rgba(255,248,220,${.12*g})`);
    cone.addColorStop(1,'rgba(255,248,220,0)');
    ctx.fillStyle=cone;
    ctx.beginPath();ctx.moveTo(lx-3,ly);ctx.lineTo(lx-50,ly+120);ctx.lineTo(lx+50,ly+120);ctx.fill();
  });

  // Draw animated customers
  GS.customerAnim.queue.forEach(c=>{
    const cx=Math.round(c.x),cy=Math.round(c.y);
    const f=Math.floor(animFrame)%20;
    const walk=c.state==='entering'||c.state==='leaving';
    const ls=walk?Math.sin(f*.4)*2:0;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.beginPath();ctx.ellipse(cx+6,cy+30,7,3,0,0,Math.PI*2);ctx.fill();

    // Body
    drawRect(cx+1,cy+12,12,10,c.color);
    // Head
    drawRect(cx+3,cy,9,9,c.skin);
    // Hair
    drawRect(cx+2,cy-1,11,3,c.hair);
    drawRect(cx+2,cy,2,5,c.hair);
    drawRect(cx+11,cy,2,5,c.hair);
    // Eyes
    drawRect(cx+5,cy+3,2,1,'#333');
    drawRect(cx+9,cy+3,2,1,'#333');
    // Mouth
    drawRect(cx+6,cy+7,3,1,'#C44569');
    // Legs
    drawRect(cx+3+ls,cy+22,4,8,'#333');
    drawRect(cx+9-ls,cy+22,4,8,'#333');

    // Drinking animation
    if(c.state==='sitting'&&c.drinkTimer>5&&c.drinkTimer<40){
      drawRect(cx+12,cy+4,6,6,'#F5F5F5');
      drawRect(cx+13,cy+5,4,4,'#6F4E37');
    }

    // Hat
    if(c.hat){
      drawRect(cx,cy-4,14,4,c.hat==='🎩'?'#333':c.hat==='🧢'?'#E74C3C':'#F5DEB3');
    }

    // Name
    ctx.fillStyle='#FFF';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText('👤',cx+6,cy-8);
  });

  // Rain
  const weather=getWeather();
  if(weather.emoji==='🌧️'){
    for(let i=0;i<20;i++){
      const rx=185+Math.random()*115;
      const ry=(animFrame*2+i*10)%66+12;
      ctx.strokeStyle='rgba(100,149,237,.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-1,ry+4);ctx.stroke();
    }
  }
}

function renderCanvas(){
  ctx.clearRect(0,0,W,H);
  drawCafe();
  requestAnimationFrame(renderCanvas);
}

// ======== UI RENDERING ========
function updateUI(){
  document.getElementById('money').textContent=GS.coins.toLocaleString();
  document.getElementById('level').textContent=`Lv.${GS.level}`;
  document.getElementById('day').textContent=GS.gameDay;
  document.getElementById('staff').textContent=GS.autoServeRate;

  const w=getWeather();
  document.getElementById('weather-bar').innerHTML=`<span>${w.emoji} ${w.name}</span><span>📊 ${getWeather().name} (${w.mod*100}%)</span><span>👥 ${getCustomerCount()} khách/phút</span><span>💰 ${getRevenuePerMin()}K/phút</span>`;
}

function renderTab(name){
  const c=document.getElementById('content');
  let html='';

  if(name==='location'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📍 Chọn vị trí quán</h3>';
    for(const[id,loc]of Object.entries(LOCATIONS)){
      const unlocked=GS.unlockedLocations.includes(id);
      const active=GS.currentLocation===id;
      html+=`<div class="card" style="margin:3px 0">
        <div><span style="font-size:16px">${loc.emoji}</span> <strong>${loc.name}</strong>
        <br><small>👥${loc.customings} KH/phút | 💰x${loc.revenueMult}</small></div>
        <button class="btn ${active?'blue':''}" ${(!unlocked&&GS.coins<loc.cost)?'disabled':''} onclick="changeLocation('${id}')">
          ${active?'✅ Đang dùng':(!unlocked?`🔒 ${loc.cost}K`:'📍 Chọn')}
        </button></div>`;
    }
  }else if(name==='menu'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">☕ Menu Đồ uống</h3>';
    MENU_ITEMS.slice(0,GS.menuUnlocked).forEach(item=>{
      html+=`<div class="card">
        <div><span style="font-size:18px">${item.emoji}</span> <strong>${item.name}</strong>
        <br><small>💰${item.price}K | Giá vốn: ${item.cost}K</small>
        <br><small>${item.needsBeans?'☕ ':''}${item.needsMilk?'🥛':''}</small></div>
        <button class="btn green" onclick="sellItem('${item.id}')">Phục vụ</button></div>`;
    });
  }else if(name==='staff'){
    const autoServeNames=['👨‍🍳 Thuê nhân viên','👩‍🍳 Thêm nhân viên','👨‍🍳👩‍🍳 Đội bếp'];
    const autoServeCosts=[1000,3000,8000];
    const autoServeVals=[1,2,5];
    const bought=GS.upgradesBought.filter(id=>id.startsWith('u_staff'));
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">👥 Tự động phục vụ</h3>';
    html+=`<div class="card"><div><strong>Tổng staff: ${GS.autoServeRate} khách/phút</strong><br><small>Đang hoạt động: ${bought.length} thiết bị</small></div></div>`;
    autoServeNames.forEach((name,i)=>{
      const b=bought.includes('u_staff'+(i+1));
      html+=`<div class="upgrade-card">
        <div><strong>${name}</strong><br><small>+${autoServeVals[i]} khách/phút</small></div>
        <button class="btn gold" ${b||GS.coins<autoServeCosts[i]?'disabled':''} onclick="buyUpgrade('u_staff${i+1}',${autoServeCosts[i]})">
          ${b?'✅ Mua rồi':autoServeCosts[i]+'K'}
        </button></div>`;
    });
  }else if(name==='upgrade'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">🔧 Nâng cấp quán</h3>';
    UPGRADES.forEach(u=>{
      const bought=GS.upgradesBought.includes(u.id);
      html+=`<div class="upgrade-card">
        <div><strong>${u.name}</strong><br><small>${u.desc} (+${u.value*100}%)</small></div>
        <button class="btn gold" ${bought||GS.coins<u.cost?'disabled':''} onclick="buyUpgrade('${u.id}',${u.cost},'${u.type}',${u.value})">
          ${bought?'✅ Đã mua':u.cost+'K'}
        </button></div>`;
    });
  }else if(name==='trend'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">🔥 Item Trendy</h3>';
    html+='<div class="trend-grid">';
    TREND_ITEMS.forEach(item=>{
      const owned=GS.ownedItems[item.id]>0;
      html+=`<div class="trend-card ${item.rarity}" onclick="buyTrend('${item.id}')">
        <strong>${item.name}</strong><br>
        <small>${item.desc}</small><br>
        <span class="${owned?'gold':''}">${owned?'✅ sở hữu':item.cost+'K'}</span>
      </div>`;
    });
    html+='</div>';
  }else if(name==='supplier'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📦 Vật tư</h3>';
    html+=`<div class="card">☕ Đậu: <strong class="gold">${GS.supplierStock.beans}</strong> | 🥛 Sữa: <strong class="gold">${GS.supplierStock.milk}</strong> | 🥤 Cốc: <strong class="gold">${GS.supplierStock.cups}</strong></div>`;
    html+='<div style="display:flex;gap:4px;margin-top:6px">';
    [{key:'beans',cost:50,amt:10,label:'☕ 10 đậu (50K)'},{key:'milk',cost:40,amt:10,label:'🥛 10 sữa (40K)'},{key:'cups',cost:20,amt:50,label:'🥤 50 cốc (20K)'}].forEach(s=>{
      html+=`<button class="btn blue" style="flex:1;font-size:10px" ${GS.coins<s.cost?'disabled':''} onclick="buySupply('${s.key}',${s.cost},${s.amt})">${s.label}</button>`;
    });
    html+='</div>';
  }else if(name==='quest'){
    html+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:6px">📋 Nhiệm vụ</h3>';
    QUESTS.forEach(q=>{
      html+=`<div class="quest-card ${q.done?'done':''}">
        <strong>${q.done?'✅':'📌'} ${q.title}</strong><br>
        <small>${q.desc}</small>
        <div class="progress-bar"><div class="progress-fill" style="width:${(q.progress/q.target)*100}%"></div></div>
        <small>${q.progress}/${q.target} | Phần thưởng: ${q.reward.coins}K + ${q.reward.xp}XP</small>
      </div>`;
    });
  }
  c.innerHTML=html;
}

// ======== ACTIONS ========
window.changeLocation=function(id){
  const loc=LOCATIONS[id];
  if(GS.unlockedLocations.includes(id)){
    GS.currentLocation=id;showNotif(`📍 Chuyển đến ${loc.name}`);
  }else if(GS.coins>=loc.cost){
    GS.coins-=loc.cost;GS.unlockedLocations.push(id);GS.currentLocation=id;
    showNotif(`🎉 Mở quán mới: ${loc.name}!`);addXP(100);checkQuests();
  }else{showNotif('💸 Không đủ tiền!');}
  renderTab(document.querySelector('.tab.active').dataset.tab);
};

window.buyUpgrade=function(id,cost,type,value){
  if(GS.upgradesBought.includes(id)||GS.coins<cost)return;
  GS.coins-=cost;GS.upgradesBought.push(id);
  if(type==='auto_serve')GS.autoServeRate+=value;
  if(type==='unlock_menu')GS.menuUnlocked+=value;
  showNotif(`✅ ${UPGRADES.find(u=>u.id===id).name}!`);
  renderTab(document.querySelector('.tab.active').dataset.tab);
};

window.sellItem=function(id){
  const item=MENU_ITEMS.find(i=>i.id===id);
  if(!item)return;
  if(GS.supplierStock.beans<=0||GS.supplierStock.milk<=0||GS.supplierStock.cups<=0){
    showNotif('⚠️ Thiếu vật tư!');return;
  }
  if(item.needsBeans)GS.supplierStock.beans--;
  if(item.needsMilk)GS.supplierStock.milk--;
  GS.supplierStock.cups--;
  GS.coins+=item.price;GS.totalRevenue+=item.price;GS.totalServed++;
  addXP(3);showNotif(`+${item.price}K từ ${item.name}! ${item.emoji}`);
  checkQuests();updateUI();
};

window.buyTrend=function(id){
  const item=TREND_ITEMS.find(i=>i.id===id);
  if(!item||GS.ownedItems[id]>0||GS.coins<item.cost)return;
  GS.coins-=item.cost;GS.ownedItems[id]=1;showNotif(`🔥 ${item.name}!`);
  addXP(item.cost>5000?200:50);checkQuests();
  renderTab('trend');
};

window.buySupply=function(key,cost,amt){
  if(GS.coins<cost)return;GS.coins-=cost;GS.supplierStock[key]+=amt;
  showNotif(`📦 Mua ${amt} ${key}!`);updateUI();
};

// ======== TABS ========
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTab(btn.dataset.tab);
  });
});

// ======== INIT ========
QUESTS.forEach(q=>{if(typeof q.progress==='undefined')q.progress=0;});
updateUI();
renderTab('location');
gameLoop();
</script>
</body>
</html>
