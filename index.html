<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>вҳ• QuГЎn Trendy CafГ© вҖ” Pixel Art Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--gold:#FFD700;--accent:#FF6347;--green:#28a745;--red:#dc3545;--txt:#e8e8e8;--dim:#a0a0b0}
body{font-family:'Press Start 2P',monospace;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto;image-rendering:pixelated;font-size:10px;line-height:1.6;overflow-x:hidden}
#hdr{display:flex;justify-content:space-between;padding:10px 15px;background:linear-gradient(135deg,var(--bg),var(--bg3));border-bottom:4px solid var(--gold);font-size:9px;position:sticky;top:0;z-index:10}
#hdr .v{color:var(--gold);text-shadow:1px 1px 0 #000}
#xp-wrap{height:6px;background:#333;border-bottom:2px solid #000}
#xp-bar{height:100%;background:linear-gradient(90deg,#4169E1,#9932CC);width:0%;transition:width .3s}
#weather{padding:6px 15px;background:linear-gradient(90deg,#FF6347,#FF8C00);border-bottom:4px solid #000;font-size:8px}
#scene{height:160px;position:relative;overflow:hidden;border-bottom:4px solid var(--bg3)}
#cafe-bg{position:absolute;inset:0;background:linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)}
#cafe-bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:4px 4px;pointer-events:none}
#custs{position:absolute;bottom:5px;left:0;width:100%;height:60px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.cust{font-size:24px;animation:bot .8s infinite alternate;filter:drop-shadow(2px 2px 0 #000)}
@keyframes bot{from{transform:translateY(0)}to{transform:translateY(-6px)}}
#locs{display:flex;gap:4px;padding:6px;background:var(--bg);border-bottom:4px solid var(--bg3);overflow-x:auto}
.lb{flex:1;min-width:55px;padding:6px 3px;border:2px solid #000;background:var(--bg3);color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit;text-align:center}
.lb.on{background:var(--bg);color:var(--gold);border-color:var(--gold)}
.lb:disabled{opacity:.3;cursor:not-allowed}
#nav{display:flex;position:sticky;bottom:0;background:var(--bg);border-top:4px solid var(--gold);z-index:10;overflow-x:auto}
.nb{flex:1;min-width:40px;padding:8px 2px;border:none;background:transparent;color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit;white-space:nowrap;border-top:3px solid transparent}
.nb.on{color:var(--gold);background:rgba(255,215,0,.12);border-top-color:var(--gold)}
#pnl{min-height:300px;background:var(--bg2)}
.pan{display:none;padding:10px}
.pan.on{display:block}
.pan h3{font-size:10px;color:var(--gold);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--bg3)}
.btn{padding:6px 12px;border:2px solid #000;border-radius:0;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-size:8px;box-shadow:2px 2px 0 #000;transition:all .05s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn:disabled{background:#555;cursor:not-allowed;transform:none;box-shadow:2px 2px 0 #000;opacity:.5}
.btn.g{background:var(--green)}.btn.o{background:var(--red)}
.card{padding:8px;margin:4px 0;background:var(--bg3);border:2px solid #000;border-bottom:3px solid #000;display:flex;justify-content:space-between;align-items:center;font-size:8px}
.card .nm{font-weight:bold;line-height:2}
.card .pr{color:var(--gold)}
.r-bar{height:6px;background:#333;border:1px solid #000;margin:3px 0;overflow:hidden}
.r-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
.r-fill.high{background:#28a745}.r-fill.mid{background:#FFD700}.r-fill.low{background:#dc3545}
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--gold);padding:8px 16px;border:3px solid var(--gold);box-shadow:0 4px 0 #000;font-size:8px;z-index:999;display:none}
.flt-row{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.flt-btn{padding:4px 8px;border:2px solid #000;background:var(--bg3);color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit}
.flt-btn.on{background:var(--bg);color:var(--gold);border-color:var(--gold)}
.st-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;font-size:8px}
.st-l{color:var(--dim)}.st-v{color:var(--gold)}
.empty{padding:20px;text-align:center;color:var(--dim);font-size:9px}
.auto-label{font-size:7px;color:#28a745;margin-top:2px}
</style>
</head>
<body>
<div id="loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:14px;color:var(--gold);flex-direction:column;gap:10px">
  <div class="spinner" style="width:40px;height:40px;border:4px solid var(--bg3);border-top-color:var(--gold);animation:spin .8s linear infinite;border-radius:50%"></div>
  <div>вҳ• Дҗang mб»ҹ quГЎn...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="notif"></div>

<div id="hdr">
  <div>рҹ’° <span class="v" id="coins">500</span></div>
  <div>Lv<span class="v" id="lv">1</span> вӯҗ<span class="v" id="xp">0</span>/<span class="v" id="xpn">100</span></div>
</div>
<div id="xp-wrap"><div id="xp-bar"></div></div>
<div id="weather">вҳҖпёҸ NбәҜng</div>
<div id="locs"></div>
<div id="scene"><div id="cafe-bg"></div><div id="custs"></div></div>

<div id="nav">
  <button class="nb on" data-tab="orders">рҹ“ӢOrder</button>
  <button class="nb" data-tab="menu">рҹҚҪпёҸMenu</button>
  <button class="nb" data-tab="stats">рҹ“ҠStats</button>
  <button class="nb" data-tab="staff">рҹ‘ҘStaff</button>
  <button class="nb" data-tab="shop">рҹӣ’Shop</button>
  <button class="nb" data-tab="items">рҹҺ’Items</button>
  <button class="nb" data-tab="quests">рҹ“ҢQuest</button>
  <button class="nb" data-tab="up">в¬ҶпёҸUp</button>
</div>

<div id="pnl">
  <div class="pan on" id="p-orders"><div id="ol"></div></div>
  <div class="pan" id="p-menu"><div id="ml"></div></div>
  <div class="pan" id="p-stats"><div id="sl"></div></div>
  <div class="pan" id="p-staff"><div id="hl"></div><div id="sll"></div></div>
  <div class="pan" id="p-shop"><div id="so"></div></div>
  <div class="pan" id="p-items"><div id="fl"></div><div id="il"></div></div>
  <div class="pan" id="p-quests"><div id="ql"></div></div>
  <div class="pan" id="p-up"><div id="ul"></div></div>
</div>

<script>
// === DATA ===
const LOCS=[
  {id:'street',name:'Vб»үa hГЁ',emoji:'рҹҡ¶',cost:0,rm:1,cust:3,bg:'linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)'},
  {id:'mall',name:'TMall',emoji:'рҹҸ¬',cost:5000,rm:2.5,cust:5,bg:'linear-gradient(to bottom,#f5f5f5 0%,#c0c0c0 60%,#808080 100%)'},
  {id:'garden',name:'SГўn vЖ°б»қn',emoji:'рҹҢі',cost:15000,rm:2,cust:4,bg:'linear-gradient(to bottom,#87CEEB 0%,#228B22 60%,#006400 100%)'},
  {id:'rooftop',name:'Rooftop',emoji:'рҹҢғ',cost:50000,rm:3.5,cust:6,bg:'linear-gradient(to bottom,#0a0a2e 0%,#1a1a4e 60%,#2a2a6e 100%)'},
  {id:'festival',name:'Lб»… hб»ҷi',emoji:'рҹҺӘ',cost:100000,rm:4,cust:8,bg:'linear-gradient(to bottom,#FF69B4 0%,#FF8C00 50%,#9370DB 100%)'}
];
const MENU=[
  {id:'coffee',name:'CГ  phГӘ Д‘en',icon:'вҳ•',price:25,cost:5},
  {id:'milk_coffee',name:'CГ  phГӘ sб»Ҝa',icon:'рҹҘӣ',price:30,cost:8},
  {id:'espresso',name:'Espresso',icon:'вҳ•',price:35,cost:5},
  {id:'matcha',name:'TrГ  matcha',icon:'рҹҚө',price:40,cost:10},
  {id:'smoothie',name:'Sinh tб»‘',icon:'рҹҘӨ',price:45,cost:12},
  {id:'cake',name:'BГЎnh mГ¬',icon:'рҹҘӘ',price:35,cost:8},
  {id:'ice_tea',name:'TrГ  Д‘ГЎ',icon:'рҹ§Ҡ',price:15,cost:3},
  {id:'bubble_tea',name:'TrГ  sб»Ҝa',icon:'рҹ§Ӣ',price:50,cost:12},
  {id:'tropical',name:'NЖ°б»ӣc Г©p dб»«a',icon:'рҹҘҘ',price:55,cost:15},
  {id:'signature',name:'Signature',icon:'рҹҚё',price:80,cost:20}
];
const TREND=[
  {id:'t_dog',name:'рҹҗ¶ Meme ChГі VГ ng',r:'common',ef:'rev',v:.05,cost:200,desc:'+5% rev'},
  {id:'t_cat',name:'рҹҗұ MГЁo hoang',r:'common',ef:'rev',v:.03,cost:150,desc:'+3% rev'},
  {id:'t_mu',name:'вҡҪ ГҒo MU',r:'common',ef:'cust',v:1,cost:300,desc:'+1 khГЎch'},
  {id:'t_astro',name:'рҹ§Ӣ TrГ  Astro',r:'common',ef:'rev',v:.1,cost:400,desc:'+10% trГ  sб»Ҝa'},
  {id:'t_girl',name:'рҹ’ғ CГҙ BГ©',r:'rare',ef:'rev',v:.1,cost:1000,desc:'+10% rev'},
  {id:'t_ba',name:'рҹ’Ҝ Ba TrДғm',r:'rare',ef:'cust',v:2,cost:1500,desc:'+2 khГЎch'},
  {id:'t_sieu',name:'вҡЎ SiГӘu Tб»‘c',r:'epic',ef:'cust',v:5,cost:8000,desc:'+5 khГЎch'},
  {id:'t_vua',name:'рҹ‘‘ Vua CГ  PhГӘ',r:'legendary',ef:'rev',v:.5,cost:20000,desc:'+50% rev'},
  {id:'t_omega',name:'рҹ’« Omega Plus',r:'legendary',ef:'all',v:.3,cost:50000,desc:'+30% all'},
];
const STAFF=[
  {id:'s_barista',name:'вҳ• Barista',cost:300,sk:.6,auto:'+60%/phГәt'},
  {id:'s_chef',name:'рҹ‘ЁвҖҚрҹҚі Дҗбә§u bбәҝp',cost:400,sk:.7,auto:'+70%/phГәt'},
  {id:'s_senior',name:'рҹ§‘вҖҚрҹ’ј Senior Barista',cost:800,sk:.9,auto:'+90%/phГәt'},
  {id:'s_manager',name:'рҹ‘” QuбәЈn lГҪ',cost:1200,sk:1,auto:'+100%/phГәt'},
];
const UPGRADES=[
  {id:'u1',name:'рҹӘ‘ BГ n ghбәҝ mб»ӣi',desc:'+10% doanh thu',cost:1500,type:'rev',v:.1},
  {id:'u2',name:'рҹҺө NhбәЎc nб»Ғn',desc:'+5% doanh thu',cost:800,type:'rev',v:.05},
  {id:'u3',name:'рҹӘ§ BбәЈng hiб»Үu LED',desc:'+20% khГЎch',cost:5000,type:'cust',v:.2},
  {id:'u4',name:'вқ„пёҸ Дҗiб»Ғu hГІa',desc:'+15% doanh thu',cost:3500,type:'rev',v:.15},
];
const QUESTS=[
  {id:'q1',title:'NgГ y Д‘бә§u khai trЖ°ЖЎng',desc:'Phб»Ҙc vб»Ҙ 10 khГЎch',type:'serve',target:10,reward:200,xp:50,done:false,p:0},
  {id:'q2',title:'Thu thбәӯp meme',desc:'Sб»ҹ hб»Ҝu 1 item',type:'collect',target:1,reward:300,xp:75,done:false,p:0},
  {id:'q3',title:'Triб»Үu phГә cГ  phГӘ',desc:'Kiбәҝm 5000 coin',type:'earn',target:5000,reward:1000,xp:150,done:false,p:0},
  {id:'q4',title:'Thu thбәӯp bб»ҷ sЖ°u tбәӯp',desc:'CГі 5 items',type:'collect_all',target:5,reward:3000,xp:300,done:false,p:0},
  {id:'q5',title:'King of Trendy',desc:'Sб»ҹ hб»Ҝu hбәҝt items',type:'complete_all',target:TREND.length,reward:20000,xp:2000,done:false,p:0},
];
const WEATHERS=[
  {e:'вҳҖпёҸ',n:'NбәҜng',rm:1.0},{e:'вӣ…',n:'MГЎt',rm:1.05},{e:'рҹҢ§пёҸ',n:'MЖ°a',rm:0.75},
  {e:'рҹ”Ҙ',n:'NГіng',rm:1.15},{e:'рҹҺҠ',n:'Tбәҝt',rm:2.5}
];

// === STATE ===
let G={coins:500,lv:1,xp:0,xpn:100,loc:'street',ul:['street'],rc:[],items:{},ups:[],qs:JSON.parse(JSON.stringify(QUESTS)),rev:0,totalRev:0,served:0,day:1,staff:[],filter:'all'};

const fm=n=>n?.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')||'0';
function save(){try{localStorage.setItem('tc',JSON.stringify(G))}catch(e){}}
function load(){try{const s=localStorage.getItem('tc');if(s){const d=JSON.parse(s);for(let k in d)if(k!=='qs')G[k]=d[k]}}catch(e){}}

function getBuff(){
  let r=1;
  for(let id in G.items){const t=TREND.find(x=>x.id===id);if(t){if(t.ef==='rev')r+=t.v*(G.items[id]||0);if(t.ef==='all')r+=t.v*(G.items[id]||0)}}
  for(let ui of G.ups){const u=UPGRADES.find(x=>x.id===ui);if(u&&u.type==='rev')r+=u.v}
  const w=getWeather();r*=w.rm;return r;
}
function getCustomers(){
  const l=LOCS.find(x=>x.id===G.loc);let base=l.cust;
  for(let id in G.items){const t=TREND.find(x=>x.id===id);if(t&&t.ef==='cust')base+=t.v*(G.items[id]||0)}
  for(let ui of G.ups){const u=UPGRADES.find(x=>x.id===ui);if(u&&u.type==='cust')base=Math.floor(base*(1+u.v))}
  return base;
}
function getWeather(){const idx=Math.floor(Math.sin(G.day*.3)*1000)%WEATHERS.length;const i=((idx%WEATHERS.length)+WEATHERS.length)%WEATHERS.length;return WEATHERS[i]}
function addXP(a){G.xp+=a;while(G.xp>=G.xpn){G.xp-=G.xpn;G.lv++;G.xpn=Math.floor(G.xpn*1.5);show('вӯҗ UP Lv'+G.lv+'!')}}
function checkQuest(type,val){G.qs.forEach(q=>{if(!q.done&&q.type===type){q.p=(q.p||0)+val;if(q.p>=q.target){q.done=true;G.coins+=q.reward;addXP(q.xp);show('вң… Quest: '+q.title+'! +'+q.reward+'рҹ’°')}}})}

function getAutoServeCount(){
  // Returns how many orders per tick (2s) can staff auto-serve
  if(G.staff.length===0)return 0;
  let rate=0;
  G.staff.forEach(s=>{rate+=s.sk*(s.mood/100)});
  // Each staff serves ~1 order every ~2 seconds (base rate of 1/2s)
  // Scale by skill
  return Math.max(0,Math.floor(rate/2));
}

function autoServeOrders(){
  const rate=getAutoServeCount();
  if(rate<=0||G.staff.length===0)return;
  const el=document.getElementById('ol');if(!el)return;
  const cards=el.querySelectorAll('.card');
  const toServe=Math.min(rate,cards.length);
  for(let i=0;i<toServe;i++){
    const card=cards[i];const btn=card.querySelector('.btn.g');
    if(!btn)continue;
    const mi=MENU[Math.floor(Math.random()*MENU.length)];
    const buff=getBuff();const earned=Math.floor(mi.price*buff*0.8);
    G.coins+=earned;G.rev+=earned;G.totalRev+=earned;G.served++;
    addXP(10);checkQuest('serve',1);checkQuest('earn',earned);
    // Reduce mood of serving staff
    const si=G.staff[i%G.staff.length];if(si)si.mood=Math.max(0,si.mood-3);
    card.style.opacity='0';card.style.transition='opacity .3s';
    setTimeout(()=>card.remove(),300);
  }
}

function render(){
  const c=document.getElementById('coins');if(c)c.textContent=fm(G.coins);
  const l=document.getElementById('lv');if(l)l.textContent=G.lv;
  const x=document.getElementById('xp');if(x)x.textContent=G.xp;
  const xn=document.getElementById('xpn');if(xn)xn.textContent=G.xpn;
  const xb=document.getElementById('xp-bar');if(xb)xb.style.width=(G.xp/G.xpn*100)+'%';
  renderLocs();renderWeather();renderCafe();renderOrders();
  renderMenu();renderStats();renderShop();renderStaff();renderItems();renderQuests();renderUpgrades();
}
function renderLocs(){
  const el=document.getElementById('locs');if(!el)return;el.innerHTML='';
  LOCS.forEach(l=>{
    const b=document.createElement('button');b.className='lb'+(G.loc===l.id?' on':'');
    b.textContent=l.emoji+' '+l.name;b.disabled=G.ul.indexOf(l.id)<0;
    if(G.ul.indexOf(l.id)>=0)b.onclick=()=>{G.loc=l.id;save();render()};
    else b.onclick=()=>{if(G.coins>=l.cost){G.coins-=l.cost;G.ul.push(l.id);show('рҹ”“ Mб»ҹ khГіa: '+l.name+'!');checkQuest('upgrade',1)}else show('вқҢ Cбә§n '+fm(l.cost)+'рҹ’°');save();render()};
    el.appendChild(b);
  });
}
function renderWeather(){const el=document.getElementById('weather');if(!el)return;const w=getWeather();el.textContent=w.e+' '+w.n+' (x'+w.rm+')'}
function renderCafe(){
  const bg=document.getElementById('cafe-bg');const sc=document.getElementById('custs');
  const l=LOCS.find(x=>x.id===G.loc);if(bg)bg.style.background=l.bg;sc.innerHTML='';
  const n=Math.min(getCustomers(),12);
  const emojis=['рҹ‘ЁвҖҚрҹ’»','рҹ‘©вҖҚрҹҺ®','рҹ§‘вҖҚрҹҺЁ','рҹ‘ҙ','рҹ§’','рҹӨ“','рҹҳҺ','рҹҘі','рҹ‘Ұ','рҹ‘§','рҹ‘©вҖҚрҹҸ«','рҹ§”'];
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='cust';d.textContent=emojis[Math.floor(Math.random()*emojis.length)];d.style.animationDelay=(Math.random()*1)+'s';d.style.fontSize=(20+Math.random()*8)+'px';sc.appendChild(d)}
}
function renderOrders(){
  const el=document.getElementById('ol');if(!el)return;
  const l=LOCS.find(x=>x.id===G.loc);
  const n=Math.min(l.cust+Math.floor(getCustomers()*0.4),8);
  if(n===0){el.innerHTML='<div class="empty">вҸі Chб»қ khГЎch...</div>';return;}
  el.innerHTML='';
  for(let i=0;i<n;i++){
    const mi=MENU[Math.floor(Math.random()*MENU.length)];
    const buff=getBuff();const price=Math.floor(mi.price*buff);
    const d=document.createElement('div');d.className='card';
    d.innerHTML='<div><span class="nm">'+mi.icon+' '+mi.name+'</span></div><div><span class="pr">'+fm(price)+'вӮ«</span> <button class="btn g" onclick="serve('+i+',\''+mi.id+'\')">SERVE</button></div>';
    el.appendChild(d);
  }
}
function serve(idx,itemId){const mi=MENU.find(x=>x.id===itemId);if(!mi)return;const buff=getBuff();const earned=Math.floor(mi.price*buff);G.coins+=earned;G.rev+=earned;G.totalRev+=earned;G.served++;addXP(10);checkQuest('serve',1);checkQuest('earn',earned);show('вң… +'+fm(earned)+'вӮ« | '+mi.name);save();render()}
function renderMenu(){const el=document.getElementById('ml');if(!el)return;el.innerHTML='';MENU.forEach(mi=>{const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+mi.icon+' '+mi.name+'</span><div style="color:#a0a0b0;font-size:7px">Cost: '+fm(mi.cost)+'вӮ«</div></div><div style="text-align:right"><span class="pr">~'+fm(Math.floor(mi.price*getBuff()))+'вӮ«</span></div>';el.appendChild(d)})}
function renderStats(){const el=document.getElementById('sl');if(!el)return;el.innerHTML='';const autoCount=getAutoServeCount();const rows=[['NgГ y',G.day],['Level','Lv'+G.lv+' ('+G.xp+'/'+G.xpn+')'],['ДҗГЈ phб»Ҙc vб»Ҙ',G.served],['Doanh thu hГҙm nay',fm(G.rev)+'вӮ«'],['Tб»•ng doanh thu',fm(G.totalRev)+'вӮ«'],['Coin',fm(G.coins)+'вӮ«'],['Items',Object.keys(G.items).length],['Auto-serve',autoCount+' Д‘ЖЎn/tick'],['NhГўn viГӘn',G.staff.length+'/6']];rows.forEach(r=>{const d=document.createElement('div');d.className='st-row';d.innerHTML='<span class="st-l">'+r[0]+'</span><span class="st-v">'+r[1]+'</span>';el.appendChild(d)})}
function renderShop(){const el=document.getElementById('so');if(!el)return;el.innerHTML='';const avail=TREND.filter(t=>!G.items[t.id]||G.items[t.id]<1);if(avail.length===0){el.innerHTML='<div class="empty">вң… ДҗГЈ hбәҝt!</div>';return}const rc={common:'#b0b0b0',rare:'#4169E1',epic:'#9932CC',legendary:'#FFD700'};avail.forEach(t=>{const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(rc[t.r]||'#b0b0b0');d.innerHTML='<div><span class="nm">'+t.name+'</span><div style="color:#a0a0b0;font-size:7px">'+t.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(t.cost)+'вӮ«</span> <button class="btn" onclick="buyItem(\''+t.id+'\')">MUA</button></div>';el.appendChild(d)})}
function buyItem(id){const t=TREND.find(x=>x.id===id);if(!t)return;if(G.coins<t.cost){show('вқҢ KhГҙng Д‘б»§ coin!');return}G.coins-=t.cost;G.items[id]=(G.items[id]||0)+1;show('вң… Mua: '+t.name+'!');checkQuest('collect',1);checkQuest('collect_all',1);save();render()}
function renderItems(){const el=document.getElementById('il');if(!el)return;el.innerHTML='';const fl=document.getElementById('fl');if(!fl)return;fl.innerHTML='';const rc={common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary'};['all','common','rare','epic','legendary'].forEach(f=>{const b=document.createElement('button');b.className='flt-btn'+(G.filter===f?' on':'');b.textContent=f==='all'?'All':rc[f];b.onclick=()=>{G.filter=f;render()};fl.appendChild(b)});const owned=Object.entries(G.items).filter(([k,v])=>v>0);const filtered=G.filter==='all'?owned:owned.filter(([id])=>{const t=TREND.find(x=>x.id===id);return t&&t.r===G.filter});if(filtered.length===0){el.innerHTML='<div class="empty">рҹ“Ұ ChЖ°a cГі items!</div>';return}filtered.forEach(([id,cnt])=>{const t=TREND.find(x=>x.id===id);if(!t)return;const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid var(--'+(t.r==='legendary'?'gold':'dim')+')';d.innerHTML='<span class="nm">'+t.name+'</span><span class="pr">'+rc[t.r]+' Г—'+cnt+'</span>';el.appendChild(d)})}
function renderQuests(){const el=document.getElementById('ql');if(!el)return;el.innerHTML='';G.qs.forEach(q=>{const pct=Math.min(100,(q.p||0)/q.target*100);const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(q.done?'var(--gold)':'var(--dim)');d.innerHTML='<div><span class="nm">'+(q.done?'вң…':'рҹ“Ң')+' '+q.title+'</span><div style="color:#a0a0b0;font-size:7px">'+q.desc+'</div><div style="color:var(--gold);font-size:7px">рҹҺҒ '+q.reward+'рҹ’° '+q.xp+'XP</div></div><div><div class="r-bar"><div class="r-fill" style="width:'+pct+'%"></div></div><div style="font-size:7px;color:var(--dim)">'+Math.floor(q.p||0)+'/'+q.target+'</div></div>';el.appendChild(d)})}
function renderUpgrades(){const el=document.getElementById('ul');if(!el)return;el.innerHTML='';UPGRADES.forEach(u=>{const bought=G.ups.includes(u.id);const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+u.name+'</span><div style="color:#a0a0b0;font-size:7px">'+u.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(u.cost)+'вӮ«</span><button class="btn" onclick="buyUpgrade(\''+u.id+'\')" '+(bought||G.coins<u.cost?'disabled':'')+'>'+(bought?'вң…ДҗГЈ mua':'MUA')+'</button></div>';el.appendChild(d)})}
function buyUpgrade(id){const u=UPGRADES.find(x=>x.id===id);if(!u||G.coins<u.cost||G.ups.includes(id))return;G.coins-=u.cost;G.ups.push(id);show('в¬ҶпёҸ '+u.name+'!');checkQuest('upgrade',1);save();render()}

function renderStaff(){
  const hl=document.getElementById('hl');if(!hl)return;hl.innerHTML='';
  const ll=document.getElementById('sll');if(!ll)return;ll.innerHTML='';
  const hTitle=document.createElement('div');hTitle.style.cssText='font-size:10px;color:var(--gold);margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';hTitle.textContent='рҹ“Ӣ THUГҠ NHГӮN VIГҠN (AUTO-SERVE)';hl.appendChild(hTitle);
  const autoLabel=document.createElement('div');autoLabel.style.cssText='font-size:7px;color:#28a745;margin-bottom:6px';autoLabel.textContent='рҹ’Ў NhГўn viГӘn tб»ұ Д‘б»ҷng phб»Ҙc vб»Ҙ dб»ұa trГӘn skill + mood!';hl.appendChild(autoLabel);
  STAFF.forEach(s=>{const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">Skill: '+Math.floor(s.sk*100)+'% | '+s.auto+'</div></div><div style="text-align:right"><span class="pr">'+fm(s.cost)+'вӮ«</span> <button class="btn g" onclick="hireStaff(\''+s.id+'\')">THUГҠ</button></div>';hl.appendChild(d)});
  const sTitle=document.createElement('div');sTitle.style.cssText='font-size:10px;color:var(--gold);margin-top:10px;margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';sTitle.textContent='рҹ‘Ҙ Дҗб»ҳI NGЕЁ ('+G.staff.length+'/6)';ll.appendChild(sTitle);
  if(G.staff.length===0){const e=document.createElement('div');e.className='empty';e.textContent='рҹ“Ұ ChЖ°a thuГӘ ai вҖ” hГЈy thuГӘ nhГўn viГӘn Д‘б»ғ auto-serve!';ll.appendChild(e);return}
  G.staff.forEach(s=>{const d=document.createElement('div');d.className='card';const moodClass=s.mood>60?'high':s.mood>30?'mid':'low';d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">Skill: '+Math.floor(s.sk*100)+'%</div><div style="font-size:7px;color:#a0a0b0">Mood:</div></div><div style="text-align:right"><div class="r-bar" style="width:50px"><div class="r-fill '+moodClass+'" style="width:'+s.mood+'%"></div></div><span style="font-size:7px">'+Math.floor(s.mood)+'%</span> <button class="btn o" onclick="fireStaff(\''+s.id+'\')">SAГҒT</button></div>';ll.appendChild(d)})}

function hireStaff(id){const s=STAFF.find(x=>x.id===id);if(!s)return;if(G.coins<s.cost){show('вқҢ KhГҙng Д‘б»§ coin!');return}if(G.staff.length>=6){show('вқҢ Дҗбә§y nhГўn viГӘn!');return}G.coins-=s.cost;G.staff.push({id:'s'+Date.now(),name:s.name,sk:s.sk,mood:100});show('вң… ThuГӘ: '+s.name+'! Auto-serve '+s.auto);save();render()}
function fireStaff(sid){const idx=G.staff.findIndex(x=>x.id===sid);if(idx>=0){const s=G.staff.splice(idx,1)[0];show('рҹ’” ДҗГЈ sa thбәЈi: '+s.name);save();render()}}

function show(msg){const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2500)}

function initTabs(){document.querySelectorAll('.nb').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.pan').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('p-'+b.dataset.tab)?.classList.add('on')}})}

// === GAME LOOP ===
function gameLoop(){
  // Mood recovery
  G.staff.forEach(s=>{if(s.mood<100)s.mood=Math.min(100,s.mood+0.5)});
  // Auto-serve
  autoServeOrders();
  // Day change (every 60s)
  if(!G._dayTick)G._dayTick=Date.now();
  if(Date.now()-G._dayTick>60000){G.day++;G._dayTick=Date.now();save()}
  render();
}

function init(){load();initTabs();render();setTimeout(()=>document.getElementById('loading').style.display='none',1000);setInterval(gameLoop,2000);setInterval(save,10000)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
</html>
