<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Café</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#1a1a2e}

/* Header */
.header{display:flex;justify-content:space-between;padding:12px;background:linear-gradient(90deg,#16213e,#0f3460);border-bottom:2px solid #8B4513;font-size:13px}
.header span{font-weight:bold;color:#FFD700}

/* Weather */
.weather-bar{padding:8px;background:linear-gradient(90deg,#2196F3,#03A9F4);text-align:center;font-size:12px;font-weight:bold}

/* Location tabs */
.loc-tabs{display:flex;gap:4px;padding:8px;background:#0f0f1a;overflow-x:auto}
.loc-tab{flex:1;min-width:60px;padding:8px 4px;border:none;border-radius:6px;background:#0f3460;color:#a0a0b0;font-size:11px;cursor:pointer;text-align:center}
.loc-tab.active{background:#8B4513;color:#fff}
.loc-tab:disabled{opacity:.3;cursor:not-allowed}

/* Cafe scene */
.cafe-scene{position:relative;height:200px;background:#87CEEB;overflow:hidden}
.cafe-scene::after{content:'';position:absolute;bottom:0;width:100%;height:100px;background:linear-gradient(to top,#228B22,transparent)}
.cafe-customers{position:absolute;bottom:20px;left:0;width:100%;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cust{font-size:32px;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Orders */
.orders-section{padding:10px;border-bottom:1px solid #8B4513}
.orders-section h3{font-size:14px;margin-bottom:8px;color:#FFD700}
.order-card{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#0f3460;border-radius:8px;margin-bottom:6px;border-left:3px solid #FF6347}
.order-card .name{font-weight:bold}
.order-card .price{color:#FFD700;font-weight:bold}
.btn-order{padding:6px 12px;border:none;border-radius:6px;background:#FF6347;color:#fff;cursor:pointer;font-weight:bold}
.btn-order:active{transform:scale(.95)}

/* Menu */
.menu-section{padding:10px;border-bottom:1px solid #8B4513}
.menu-section h3{font-size:14px;margin-bottom:8px;color:#FFD700}
.menu-item{display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.05);border-radius:6px;margin-bottom:4px}
.menu-item .name{font-size:13px}
.menu-item .price{color:#FFD700;font-weight:bold}

/* Stats */
.stats-section{padding:10px;border-bottom:1px solid #8B4513}
.stats-section h3{font-size:14px;margin-bottom:8px;color:#FFD700}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-row .val{color:#FFD700;font-weight:bold}

/* Nav */
.bottom-nav{display:flex;position:sticky;bottom:0;background:#0f0f1a;border-top:2px solid #8B4513;z-index:100}
.nav-btn{flex:1;padding:12px 4px;border:none;background:transparent;color:#a0a0b0;font-size:11px;cursor:pointer;text-align:center}
.nav-btn.active{color:#FFD700;background:rgba(255,215,0,.1)}

/* Panels */
.panels-container{position:relative;min-height:300px;max-height:50vh;overflow-y:auto}
.panel{display:none;padding:12px}
.panel.active{display:block}
.panel h3{font-size:15px;margin-bottom:10px;color:#FFD700}
.item-card{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#0f3460;border-radius:8px;margin-bottom:6px;border-left:3px solid #b0b0b0}
.item-card .info{flex:1}
.item-card .title{font-weight:bold;font-size:13px}
.item-card .desc{font-size:11px;color:#a0a0b0;margin-top:2px}
.item-card .cost{color:#FFD700;font-weight:bold;font-size:12px;margin-bottom:4px}
.btn-buy{padding:6px 14px;border:none;border-radius:6px;background:#FF6347;color:#fff;cursor:pointer;font-size:12px}
.btn-buy:disabled{background:#555;cursor:not-allowed}

/* Staff */
.staff-card{padding:12px;background:#0f3460;border-radius:8px;margin-bottom:8px}
.staff-card .nm{font-weight:bold;font-size:14px}
.staff-card .tier{font-size:11px;color:#a0a0b0}
.staff-skills{display:flex;gap:10px;margin:6px 0;font-size:12px}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.stat-row .lbl{color:#a0a0b0}
.stat-row .val{color:#FFD700}
.btn-action{padding:4px 10px;border:none;border-radius:5px;font-size:11px;cursor:pointer;margin:2px}
.btn-train{background:#FF9800;color:#fff}
.btn-fire{background:#f44336;color:#fff}
.btn-hire{background:#4CAF50;color:#fff}

/* Supply */
.sup-row{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f3460;border-radius:6px;margin-bottom:4px;font-size:12px;flex-wrap:wrap;gap:4px}
.sup-row .nm{font-weight:bold}
.sup-row .stock{color:#FFD700}
.sup-row .cost{color:#a0a0b0;font-size:10px}
.btn-sup{padding:4px 10px;border:none;border-radius:5px;background:#4CAF50;color:#fff;cursor:pointer;font-size:11px}
.btn-sup:disabled{background:#555;cursor:not-allowed}

/* Price */
.price-row{padding:10px;background:#0f3460;border-radius:8px;margin-bottom:6px}
.price-row .nm{font-weight:bold;font-size:13px;margin-bottom:4px}
.price-row input[type=range]{width:100%;accent-color:#8B4513}
.price-row .pct{font-size:12px;color:#FFD700;text-align:center;margin-top:4px}

/* Trend */
.trend-bar{padding:8px;background:linear-gradient(90deg,#FF6347,#FF8C00);text-align:center;font-size:13px;font-weight:bold}

/* Notification */
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#8B4513;color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;font-size:13px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}

/* Badge */
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-top:3px}
.badge.common{background:#b0b0b0;color:#333}
.badge.rare{background:#4169E1;color:#fff}
.badge.epic{background:#9932CC;color:#fff}
.badge.legend{background:#FFD700;color:#333}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>💰<span id="coins">500</span> ⚡<span id="stamina">50/50</span></div>
    <div>📅 Ngày <span id="day">1</span> ⭐Lv.<span id="lvl">1</span></div>
  </div>
  
  <div class="weather-bar" id="weather">☀️ Nắng</div>
  
  <div class="loc-tabs" id="loc-tabs"></div>
  
  <div class="cafe-scene">
    <div class="cafe-customers" id="customers"></div>
  </div>
  
  <div class="orders-section">
    <h3>📋 Đơn hàng (<span id="order-count">0</span>)</h3>
    <div id="orders"></div>
  </div>
  
  <div class="menu-section">
    <h3>☕ Menu</h3>
    <div id="menu"></div>
  </div>
  
  <div class="stats-section">
    <h3>📊 Thống kê</h3>
    <div id="stats"></div>
  </div>
  
  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="shop">🏪 Shop</button>
    <button class="nav-btn" data-tab="items">🎒 Items</button>
    <button class="nav-btn" data-tab="staff">👨‍🍳 Nhân sự</button>
    <button class="nav-btn" data-tab="supply">📦 Nguyên liệu</button>
    <button class="nav-btn" data-tab="price">⚙️ Giá</button>
    <button class="nav-btn" data-tab="mp">🌐 Multi</button>
  </div>
  
  <div class="panels-container">
    <div id="panel-shop" class="panel active"><h3>🏪 Cửa hàng trendy items</h3><div id="shop-items"></div></div>
    <div id="panel-items" class="panel"><h3>🎒 Bộ sưu tập</h3><div id="my-items"></div></div>
    <div id="panel-staff" class="panel"><h3>👨‍🍳 Nhân sự</h3><div id="staff-list"></div></div>
    <div id="panel-supply" class="panel"><h3>📦 Nhập nguyên liệu</h3><div id="supply-list"></div></div>
    <div id="panel-price" class="panel"><h3>⚙️ Điều chỉnh giá</h3><div id="price-list"></div></div>
    <div id="panel-mp" class="panel"><h3>🌐 Multiplayer</h3><div id="mp-content"></div></div>
  </div>
  
  <div class="trend-bar">🔥 Trend: Cà phê sạch đang HOT!</div>
</div>

<script>
// ===== GAME DATA =====
const LOCATIONS = [
  {id:'street',name:'Vỉa hè',cost:0,revMult:1,baseCust:3,maxStaff:4,bg:'#87CEEB'},
  {id:'mall',name:'TMall',cost:5000,revMult:2.5,baseCust:5,maxStaff:8,bg:'#f5f5f5'},
  {id:'garden',name:'Sân vườn',cost:15000,revMult:2,baseCust:4,maxStaff:10,bg:'#228B22'},
  {id:'rooftop',name:'Rooftop',cost:50000,revMult:3.5,baseCust:6,maxStaff:12,bg:'#0a0a2e'},
  {id:'festival',name:'Lễ hội',cost:100000,revMult:4,baseCust:8,maxStaff:16,bg:'#FF69B4'}
];

const MENU_ITEMS = [
  {id:'coffee',name:'Cà phê đen',icon:'☕',price:25,needs:['beans','ice','cup'],locked:false},
  {id:'milk_coffee',name:'Cà phê sữa',icon:'🥛',price:30,needs:['beans','milk','sugar','ice','cup'],locked:false},
  {id:'espresso',name:'Espresso',icon:'☕',price:35,needs:['beans','ice','cup'],locked:true,unlockCost:500},
  {id:'matcha',name:'Trà matcha',icon:'🍵',price:40,needs:['matcha','milk','sugar','cup'],locked:true,unlockCost:3000},
  {id:'smoothie',name:'Sinh tố',icon:'🥤',price:45,needs:['milk','sugar','ice','cup'],locked:true,unlockCost:2000},
  {id:'cake',name:'Bánh mì',icon:'🥪',price:35,needs:['bread','cheese','cup'],locked:false},
  {id:'ice_tea',name:'Trà đá',icon:'🧊',price:15,needs:['tea','ice','cup'],locked:false},
  {id:'bubble_tea',name:'Trà sữa',icon:'🧋',price:50,needs:['tea','milk','tapioca','sugar','ice','cup'],locked:true,unlockCost:4000},
  {id:'tropical',name:'Nước ép dừa',icon:'🥥',price:55,needs:['milk','ice','cup'],locked:true,unlockCost:5000},
  {id:'signature',name:'Signature',icon:'🍸',price:80,needs:['beans','milk','syrup','topping','ice','cup'],locked:true,unlockCost:15000}
];

const TREND_ITEMS = [
  {id:'t1',name:'🐶 Meme Chó Vàng',rarity:'common',effect:'revenue',value:0.05,desc:'+5% DT',cost:200},
  {id:'t2',name:'🐱 Mèo hoang',rarity:'common',effect:'revenue',value:0.03,desc:'+3% DT',cost:150},
  {id:'t3',name:'⚽ Áo MU',rarity:'common',effect:'customers',value:1,desc:'+1 khách',cost:300},
  {id:'t4',name:'💃 Cô Bé Chú Bé',rarity:'rare',effect:'revenue',value:0.1,desc:'+10% DT',cost:1000},
  {id:'t5',name:'💯 Ba Trăm',rarity:'rare',effect:'customers',value:2,desc:'+2 khách',cost:1500},
  {id:'t6',name:'🎤 Tú Hien Style',rarity:'rare',effect:'revenue',value:0.15,desc:'+15% DT',cost:2000},
  {id:'t7',name:'🏆 Lam Phẩm',rarity:'epic',effect:'revenue',value:0.2,desc:'+20% DT',cost:5000},
  {id:'t8',name:'⚡ Siêu Tốc',rarity:'epic',effect:'customers',value:5,desc:'+5 khách',cost:8000},
  {id:'t9',name:'👑 Vua Cà Phê',rarity:'legend',effect:'revenue',value:0.5,desc:'+50% DT!',cost:20000},
  {id:'t10',name:'🔥 Hoảng Thủ',rarity:'legend',effect:'revenue',value:0.4,desc:'+40% DT',cost:25000},
  {id:'t11',name:'💫 Omega Plus',rarity:'legend',effect:'all',value:0.3,desc:'+30%!',cost:50000}
];

const STAFF_TIERS = [
  {id:'fresher',name:'Fresher',emoji:'🎓',salary:250,skill:0.5},
  {id:'junior',name:'Junior',emoji:'☕',salary:350,skill:0.7},
  {id:'senior',name:'Senior',emoji:'👨‍🍳',salary:500,skill:0.9},
  {id:'master',name:'Master',emoji:'🏆',salary:850,skill:1.0}
];

const SUPPLIERS = {
  beans:[{name:'Robusta thường',price:50,quality:0.5},{name:'Robusta Đà Lạt',price:80,quality:0.7},{name:'Arabica',price:120,quality:0.85},{name:'Specialty',price:200,quality:1.0}],
  milk:[{name:'Sữa đặc',price:8,quality:0.4},{name:'Vinamilk',price:12,quality:0.7},{name:'TH True',price:18,quality:0.85},{name:'Fresh Cream',price:28,quality:1.0}],
  sugar:[{name:'Đường trắng',price:10,quality:0.8},{name:'Đường thốt nốt',price:15,quality:1.0}],
  ice:[{name:'Đá viên',price:2,quality:1.0}],
  tea:[{name:'Trà thường',price:20,quality:0.6},{name:'Trà cao cấp',price:40,quality:0.9}],
  matcha:[{name:'Matcha thường',price:40,quality:0.6},{name:'Matcha Nhật',price:120,quality:1.0}],
  tapioca:[{name:'Trân châu',price:15,quality:0.8}],
  syrup:[{name:'Syrup vanilla',price:20,quality:0.9},{name:'Syrup caramel',price:20,quality:0.9},{name:'Syrup hazelnut',price:22,quality:1.0}],
  topping:[{name:'Topping thạch',price:15,quality:0.8},{name:'Cheese foam',price:18,quality:0.9}],
  cup:[{name:'Cốc giấy',price:0.15,quality:0.8},{name:'Cốc premium',price:0.4,quality:1.0},{name:'Ly kính',price:2,quality:1.0}],
  bread:[{name:'Bánh mì',price:5,quality:0.7},{name:'Bánh premium',price:10,quality:0.9}],
  cheese:[{name:'Phô mai',price:8,quality:0.7},{name:'Phô premium',price:15,quality:0.9}]
};

const WEATHER_MAP = {
  sunny:{emoji:'☀️',name:'Nắng',mod:1.0},
  cloudy:{emoji:'⛅',name:'Nhiều mây',mod:1.05},
  rainy:{emoji:'🌧️',name:'Mưa',mod:0.75},
  hot:{emoji:'🔥',name:'Nóng',mod:1.15},
  tet:{emoji:'🎊',name:'Tết',mod:2.5}
};
const SEASON_W = {
  summer:{sunny:0.35,cloudy:0.25,rainy:0.20,hot:0.15,tet:0},
  rainy:{sunny:0.10,cloudy:0.15,rainy:0.45,hot:0.0,tet:0.10},
  cool:{sunny:0.15,cloudy:0.30,rainy:0.15,hot:0.0,tet:0.35}
};

// ===== GAME STATE =====
let game = {
  coins: 500,
  level: 1,
  xp: 0,
  xpNeeded: 100,
  currentLoc: 'street',
  unlocked: ['street'],
  ownedItems: {},
  ownedRecipes: [],
  menuPrices: {},
  autoServeRate: 0,
  upgradesBought: [],
  staff: [],
  supplierStock: {beans:10, milk:20, sugar:30, ice:100, tea:20, matcha:5, tapioca:5, syrup:5, topping:5, cup:200, bread:10, cheese:5},
  orders: [],
  gameDay: 1,
  lastDayTick: Date.now(),
  totalRevenue: 0,
  totalServed: 0,
  dailyRevenue: 0,
  dailyCosts: 0
};

// Init menu prices
MENU_ITEMS.forEach(m => { game.menuPrices[m.id] = 1.0; });

// ===== HELPERS =====
function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function showNotif(text) {
  const div = document.createElement('div');
  div.className = 'notif';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

function getWeather() {
  const cycle = game.gameDay % 180;
  const season = cycle < 60 ? 'summer' : (cycle < 120 ? 'rainy' : 'cool');
  const probs = SEASON_W[season];
  const rand = Math.random();
  let cum = 0;
  const keys = Object.keys(probs);
  for (let i = 0; i < keys.length; i++) {
    cum += probs[keys[i]];
    if (rand <= cum) return WEATHER_MAP[keys[i]];
  }
  return WEATHER_MAP.sunny;
}

// ===== CORE =====
function getRevMult() {
  const loc = LOCATIONS.find(l => l.id === game.currentLoc);
  let mult = loc.revMult;
  for (const id of Object.keys(game.ownedItems)) {
    const item = TREND_ITEMS.find(t => t.id === id);
    if (item && item.effect === 'revenue') mult += item.value * game.ownedItems[id];
  }
  const w = getWeather();
  mult *= w.mod;
  return mult;
}

function getBaseCust() {
  const loc = LOCATIONS.find(l => l.id === game.currentLoc);
  let cust = loc.baseCust;
  for (const id of Object.keys(game.ownedItems)) {
    const item = TREND_ITEMS.find(t => t.id === id);
    if (item && item.effect === 'customers') cust += item.value * game.ownedItems[id];
  }
  return cust;
}

function addXP(amount) {
  game.xp += amount;
  while (game.xp >= game.xpNeeded) {
    game.xp -= game.xpNeeded;
    game.level++;
    game.xpNeeded = Math.floor(game.xpNeeded * 1.5);
    showNotif('⭐ Lên cấp ' + game.level + '!');
  }
}

// ===== ACTIONS =====
function serveOrder(idx) {
  if (!game.orders || idx < 0 || idx >= game.orders.length) return;
  const order = game.orders[idx];
  const item = MENU_ITEMS.find(m => m.id === order.menuId);
  if (!item) return;
  
  // Check stock
  for (const need of item.needs) {
    if ((game.supplierStock[need] || 0) <= 0) {
      showNotif('⚠️ Hết ' + need + '!');
      return;
    }
  }
  
  // Consume stock
  for (const need of item.needs) {
    game.supplierStock[need]--;
  }
  
  // Calculate revenue
  let price = item.price * game.menuPrices[item.id];
  for (const id of Object.keys(game.ownedItems)) {
    const item2 = TREND_ITEMS.find(t => t.id === id);
    if (item2 && item2.effect === 'revenue') price *= (1 + item2.value * game.ownedItems[id]);
  }
  const w = getWeather();
  price *= w.mod;
  const earned = Math.floor(price);
  
  game.coins += earned;
  game.dailyRevenue += earned;
  game.totalRevenue += earned;
  game.totalServed++;
  
  showNotif('✅ Phục vụ: ' + item.name + '! +' + fmt(earned) + '₫');
  addXP(10);
  
  // Remove order
  game.orders.splice(idx, 1);
  
  saveGame();
  renderAll();
}

function buyItem(itemId) {
  const item = TREND_ITEMS.find(t => t.id === itemId);
  if (!item) return;
  if (game.coins < item.cost) {
    showNotif('❌ Không đủ coin!');
    return;
  }
  game.coins -= item.cost;
  game.ownedItems[itemId] = (game.ownedItems[itemId] || 0) + 1;
  showNotif('✅ Mua: ' + item.name + '!');
  saveGame();
  renderAll();
}

function buyRecipe(menuId) {
  const item = MENU_ITEMS.find(m => m.id === menuId);
  if (!item || !item.locked) return;
  if (game.coins < item.unlockCost) {
    showNotif('❌ Không đủ!');
    return;
  }
  game.coins -= item.unlockCost;
  game.ownedRecipes.push(menuId);
  item.locked = false;
  showNotif('📜 Mở khóa: ' + item.name + '!');
  saveGame();
  renderAll();
}

function hireStaff(tierId) {
  const loc = LOCATIONS.find(l => l.id === game.currentLoc);
  if (game.staff.length >= loc.maxStaff) {
    showNotif('⚠️ Đủ nhân viên!');
    return;
  }
  const tier = STAFF_TIERS.find(t => t.id === tierId);
  if (!tier) return;
  const cost = tier.salary * 3;
  if (game.coins < cost) {
    showNotif('❌ Cần ' + fmt(cost) + '₫!');
    return;
  }
  game.staff.push({
    id: 's_' + Date.now(),
    name: 'Staff ' + (game.staff.length + 1),
    tier: tierId,
    brew: tier.skill,
    quality: tier.skill,
    service: tier.skill,
    mood: 80,
    loyalty: 70,
    daysWorked: 0,
    servedCount: 0
  });
  game.coins -= cost;
  showNotif('✅ Thuê staff mới!');
  saveGame();
  renderAll();
}

function orderSupply(resourceType, tierIdx) {
  const list = SUPPLIERS[resourceType];
  if (!list || !list[tierIdx]) return;
  const item = list[tierIdx];
  const cost = Math.ceil(item.price * 10);
  if (game.coins < cost) {
    showNotif('❌ Không đủ!');
    return;
  }
  game.coins -= cost;
  game.supplierStock[resourceType] += 10;
  showNotif('✅ Nhập ' + resourceType + ' 10 đơn vị!');
  saveGame();
  renderAll();
}

function setPrice(menuId, value) {
  game.menuPrices[menuId] = value / 100;
  renderAll();
}

function unlockLocation(locId) {
  const loc = LOCATIONS.find(l => l.id === locId);
  if (game.coins < loc.cost) {
    showNotif('❌ Không đủ ' + fmt(loc.cost) + '₫!');
    return;
  }
  game.coins -= loc.cost;
  game.unlocked.push(locId);
  game.currentLoc = locId;
  showNotif('✅ Mở khóa: ' + loc.name + '!');
  saveGame();
  renderAll();
}

// ===== SAVE/LOAD =====
function saveGame() {
  localStorage.setItem('trendyCafeSave', JSON.stringify(game));
}

function loadGame() {
  const saved = localStorage.getItem('trendyCafeSave');
  if (saved) {
    const parsed = JSON.parse(saved);
    // Merge with defaults
    for (const key of Object.keys(game)) {
      if (parsed[key] !== undefined) {
        game[key] = parsed[key];
      }
    }
    // Ensure menu prices exist
    MENU_ITEMS.forEach(m => {
      if (game.menuPrices[m.id] === undefined) {
        game.menuPrices[m.id] = 1.0;
      }
    });
  }
}

// ===== RENDER FUNCTIONS =====
function renderAll() {
  renderHeader();
  renderWeather();
  renderLocationTabs();
  renderCustomers();
  renderOrders();
  renderMenu();
  renderStats();
  renderShop();
  renderItems();
  renderStaff();
  renderSupply();
  renderPrice();
  renderMP();
}

function renderHeader() {
  document.getElementById('coins').textContent = fmt(game.coins);
  document.getElementById('day').textContent = game.gameDay;
  document.getElementById('lvl').textContent = game.level;
}

function renderWeather() {
  const w = getWeather();
  document.getElementById('weather').textContent = w.emoji + ' ' + w.name + ' (×' + w.mod + ')';
}

function renderLocationTabs() {
  const container = document.getElementById('loc-tabs');
  container.innerHTML = '';
  LOCATIONS.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'loc-tab' + (game.currentLoc === loc.id ? ' active' : '');
    const unlocked = game.unlocked.includes(loc.id);
    btn.disabled = !unlocked;
    btn.innerHTML = loc.name + (unlocked ? '' : '<br><small>' + fmt(loc.cost) + '₫</small>');
    btn.onclick = function() {
      if (unlocked) {
        game.currentLoc = loc.id;
      } else {
        unlockLocation(loc.id);
      }
      renderAll();
    };
    container.appendChild(btn);
  });
}

function renderCustomers() {
  const container = document.getElementById('customers');
  container.innerHTML = '';
  const cust = getBaseCust();
  for (let i = 0; i < Math.min(cust, 15); i++) {
    const div = document.createElement('div');
    div.className = 'cust';
    div.textContent = ['👨', '👩', '👦', '👧'][i % 4];
    div.style.animationDelay = (i * 0.1) + 's';
    container.appendChild(div);
  }
}

function renderOrders() {
  const container = document.getElementById('orders');
  document.getElementById('order-count').textContent = game.orders.length;
  container.innerHTML = '';
  
  if (!game.orders || game.orders.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#a0a0b0;text-align:center">⏳ Đang chờ khách...</div>';
    return;
  }
  
  game.orders.forEach((order, idx) => {
    const item = MENU_ITEMS.find(m => m.id === order.menuId);
    if (!item) return;
    
    const div = document.createElement('div');
    div.className = 'order-card';
    div.innerHTML = `
      <div>
        <div class="name">${item.icon} ${item.name}</div>
        <div class="price">${item.price}₫</div>
      </div>
      <button class="btn-order" onclick="serveOrder(${idx})">Phục vụ</button>
    `;
    container.appendChild(div);
  });
}

function renderMenu() {
  const container = document.getElementById('menu');
  container.innerHTML = '';
  const unlocked = MENU_ITEMS.filter(m => !m.locked || game.ownedRecipes.includes(m.id));
  
  unlocked.forEach(item => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = `
      <span class="name">${item.icon} ${item.name}</span>
      <span class="price">${fmt(item.price)}₫</span>
    `;
    container.appendChild(div);
  });
}

function renderStats() {
  const container = document.getElementById('stats');
  container.innerHTML = '';
  const profit = game.dailyRevenue - game.dailyCosts;
  
  const stats = [
    ['Tổng phục vụ', game.totalServed],
    ['Doanh thu hôm nay', fmt(game.dailyRevenue) + '₫'],
    ['Chi phí hôm nay', fmt(game.dailyCosts) + '₫'],
    ['Profit hôm nay', fmt(profit) + '₫'],
    ['Items sở hữu', Object.keys(game.ownedItems).length],
    ['Nhân viên', game.staff.length + '/' + LOCATIONS.find(l => l.id === game.currentLoc).maxStaff],
    ['Ngày thứ', game.gameDay]
  ];
  
  stats.forEach(([label, value]) => {
    const div = document.createElement('div');
    div.className = 'stat-row';
    div.innerHTML = `<span>${label}</span><span class="val">${value}</span>`;
    container.appendChild(div);
  });
}

function renderShop() {
  const container = document.getElementById('shop-items');
  container.innerHTML = '';
  
  const available = TREND_ITEMS.filter(t => !game.ownedItems[t.id] || game.ownedItems[t.id] <= 0);
  
  if (available.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#a0a0b0;text-align:center">✅ Đã sở hữu hết!</div>';
    return;
  }
  
  const rarityColors = { common: '#b0b0b0', rare: '#4169E1', epic: '#9932CC', legend: '#FFD700' };
  
  available.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.style.borderLeftColor = rarityColors[item.rarity];
    div.innerHTML = `
      <div class="info">
        <div class="title">${item.name}</div>
        <div class="desc">${item.desc}</div>
        <span class="badge ${item.rarity}">${item.rarity}</span>
      </div>
      <div>
        <div class="cost">${fmt(item.cost)}₫</div>
        <button class="btn-buy" onclick="buyItem('${item.id}')" ${game.coins < item.cost ? 'disabled' : ''}>Mua</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderItems() {
  const container = document.getElementById('my-items');
  container.innerHTML = '';
  
  const owned = Object.entries(game.ownedItems).filter(([id, count]) => count > 0);
  
  if (owned.length === 0) {
    container.innerHTML = '<div style="padding:10px;color:#a0a0b0;text-align:center">Chưa có items!</div>';
    return;
  }
  
  owned.forEach(([id, count]) => {
    const item = TREND_ITEMS.find(t => t.id === id);
    if (!item) return;
    
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="info">
        <div class="title">${item.name}</div>
        <div class="desc">${item.desc} ×${count}</div>
        <span class="badge ${item.rarity}">${item.rarity}</span>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderStaff() {
  const container = document.getElementById('staff-list');
  container.innerHTML = '';
  
  const loc = LOCATIONS.find(l => l.id === game.currentLoc);
  container.innerHTML += '<div style="margin-bottom:8px;font-size:12px;color:#a0a0b0">Số lượng: ' + game.staff.length + '/' + loc.maxStaff + '</div>';
  
  // Hire buttons
  STAFF_TIERS.forEach(tier => {
    const cost = tier.salary * 3;
    const div = document.createElement('div');
    div.className = 'item-card';
    div.style.borderLeftColor = '#2196F4';
    div.innerHTML = `
      <div class="info">
        <div class="title">${tier.emoji} ${tier.name}</div>
        <div class="desc">Lương: ${fmt(tier.salary)}₫/ngày | Skill: ${tier.skill}</div>
      </div>
      <div>
        <div class="cost">${fmt(cost)}₫</div>
        <button class="btn-buy" style="background:#4CAF50" onclick="hireStaff('${tier.id}')" ${game.coins < cost || game.staff.length >= loc.maxStaff ? 'disabled' : ''}>Thuê</button>
      </div>
    `;
    container.appendChild(div);
  });
  
  // Staff list
  game.staff.forEach(s => {
    const tier = STAFF_TIERS.find(t => t.id === s.tier);
    const div = document.createElement('div');
    div.className = 'staff-card';
    div.innerHTML = `
      <div class="nm">${tier ? tier.emoji : ''} ${s.name}</div>
      <div class="tier">${tier ? tier.name : '?'}</div>
      <div class="staff-skills">
        <span>⚡${s.brew}</span>
        <span>⭐${s.quality}</span>
        <span>🎯${s.service}</span>
      </div>
      <div class="stat-row">
        <span class="lbl">Mood</span>
        <span class="val">${s.mood.toFixed(0)}%</span>
      </div>
      <div class="stat-row">
        <span class="lbl">Loyalty</span>
        <span class="val">${s.loyalty.toFixed(0)}%</span>
      </div>
      <div>
        <button class="btn-action btn-train" onclick="trainStaff('${s.id}')">Huấn luyện</button>
        <button class="btn-action btn-fire" onclick="fireStaff('${s.id}')">Sa thải</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function trainStaff(sid) {
  const s = game.staff.find(x => x.id === sid);
  if (!s) return;
  if (game.coins < 500) {
    showNotif('❌ Cần 500₫!');
    return;
  }
  game.coins -= 500;
  s.skill += 0.1;
  showNotif('📚 Huấn luyện ' + s.name + '!');
  saveGame();
  renderAll();
}

function fireStaff(sid) {
  const idx = game.staff.findIndex(x => x.id === sid);
  if (idx < 0) return;
  game.staff.splice(idx, 1);
  showNotif('👋 Đã sa thải!');
  saveGame();
  renderAll();
}

function renderSupply() {
  const container = document.getElementById('supply-list');
  container.innerHTML = '';
  
  // Show stock
  Object.entries(game.supplierStock).forEach(([key, val]) => {
    const div = document.createElement('div');
    div.className = 'sup-row';
    div.innerHTML = `<span class="nm">${key}</span><span class="stock">${val}</span>`;
    container.appendChild(div);
  });
  
  // Order buttons
  Object.entries(SUPPLIERS).forEach(([key, list]) => {
    list.forEach((item, ti) => {
      const cost = Math.ceil(item.price * 10);
      const div = document.createElement('div');
      div.className = 'sup-row';
      div.innerHTML = `
        <span class="nm">${key} (Tier ${ti+1}: ${item.quality*100}%)</span>
        <span class="cost">${fmt(item.price)}đ/đv</span>
        <span class="stock">×10</span>
        <button class="btn-sup" onclick="orderSupply('${key}',${ti})" ${game.coins < cost ? 'disabled' : ''}>Mua (${fmt(cost)}₫)</button>
      `;
      container.appendChild(div);
    });
  });
}

function renderPrice() {
  const container = document.getElementById('price-list');
  container.innerHTML = '';
  
  MENU_ITEMS.forEach(item => {
    const unlocked = !item.locked || game.ownedRecipes.includes(item.id);
    const pricePct = Math.round(game.menuPrices[item.id] * 100);
    
    const div = document.createElement('div');
    div.className = 'price-row';
    div.innerHTML = `
      <div class="nm">${item.icon} ${item.name}</div>
      ${unlocked ? `
        <input type="range" min="70" max="130" value="${pricePct}" oninput="setPrice('${item.id}',this.value);this.nextElementSibling.textContent=this.value+'%'">
        <div class="pct">${pricePct}%</div>
      ` : `
        <button class="btn-buy" onclick="buyRecipe('${item.id}')" ${game.coins < item.unlockCost ? 'disabled' : ''}>Mở khóa (${fmt(item.unlockCost)}₫)</button>
      `}
    `;
    container.appendChild(div);
  });
}

function renderMP() {
  const container = document.getElementById('mp-content');
  container.innerHTML = `
    <div style="padding:10px;background:#0f3460;border-radius:8px;margin-bottom:8px">
      <div style="font-size:14px;margin-bottom:8px;color:#FFD700">🌐 Multiplayer</div>
      <div style="font-size:12px">Player ID: guest</div>
      <div style="font-size:12px">Leaderboard Score: ${fmt(game.totalRevenue)}₫</div>
      <div style="font-size:12px">Khách phục vụ: ${game.totalServed}</div>
    </div>
    <div style="padding:10px;background:#0f3460;border-radius:8px">
      <div style="font-size:14px;margin-bottom:8px;color:#FFD700">🏆 Top 10</div>
      <div style="font-size:12px;color:#a0a0b0">Coming soon...</div>
    </div>
  `;
}

// ===== EVENT LISTENERS =====
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tabId = 'panel-' + btn.dataset.tab;
    document.getElementById(tabId).classList.add('active');
  });
});

// ===== GAME LOOP =====
function startGameLoop() {
  // Daily tick every 60 seconds
  setInterval(() => {
    const now = Date.now();
    if (now - game.lastDayTick >= 60000) {
      game.gameDay++;
      game.lastDayTick = now;
      
      // Calculate daily costs (staff salaries)
      game.dailyCosts = game.staff.reduce((total, s) => {
        const tier = STAFF_TIERS.find(t => t.id === s.tier);
        return total + (tier ? tier.salary : 250);
      }, 0);
      
      showNotif('📅 Ngày ' + game.gameDay + ' — Chi phí: ' + fmt(game.dailyCosts) + '₫');
      
      saveGame();
      renderAll();
    }
  }, 1000);
  
  // Spawn customers every 15 seconds
  setInterval(() => {
    const loc = LOCATIONS.find(l => l.id === game.currentLoc);
    const w = getWeather();
    const expectedCust = Math.floor(loc.baseCust * w.mod);
    
    if (game.orders.length < expectedCust) {
      // Pick a random menu item
      const availableItems = MENU_ITEMS.filter(m => !m.locked || game.ownedRecipes.includes(m.id));
      if (availableItems.length > 0) {
        const item = availableItems[Math.floor(Math.random() * availableItems.length)];
        game.orders.push({ menuId: item.id });
      }
    }
    renderOrders();
  }, 15000);
  
  // Auto-save every 30 seconds
  setInterval(saveGame, 30000);
  
  // Render every 2 seconds
  setInterval(renderAll, 2000);
}

// ===== INIT =====
function init() {
  loadGame();
  renderAll();
  startGameLoop();
  showNotif('☕ Quán Trendy Café v3.2 — Bắt đầu nhé!');
}

// Make functions global
window.serveOrder = serveOrder;
window.buyItem = buyItem;
window.buyRecipe = buyRecipe;
window.hireStaff = hireStaff;
window.fireStaff = fireStaff;
window.trainStaff = trainStaff;
window.orderSupply = orderSupply;
window.setPrice = setPrice;

// Start on load
window.onload = init;
</script>
</body>
