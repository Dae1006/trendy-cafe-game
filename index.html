<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Cafe Trendy Simulator</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1410;font-family:'Courier New',monospace;color:#f5e6d3;display:flex;height:100vh;overflow:hidden}#topbar{position:fixed;top:0;left:0;right:0;z-index:10;background:#2a1f15;border-bottom:2px solid #4a3520;padding:8px 16px;display:flex;gap:10px;font-size:13px}
.stat{background:#3d2b1a;padding:4px 10px;border-radius:6px;display:flex;align-items:center;gap:4px}.val{color:#ffd700;font-weight:bold;font-size:15px}
#main{margin-top:48px;display:flex;flex:1;height:calc(100vh - 48px)}#gameCanvas{width:512px;height:384px;background:#0f0b08;border-right:2px solid #4a3520}
#panel{width:400px;display:flex;flex-direction:column;background:#2a1f15}#tabs{display:flex;border-bottom:2px solid #4a3520}
.tab{flex:1;padding:10px;text-align:center;background:#3d2b1a;border:none;color:#c9a96e;cursor:pointer;font-size:12px;font-family:'Courier New',monospace;border-right:1px solid #4a3520}.tab.active{background:#2a1f15;color:#ffd700}
#content{flex:1;overflow-y:auto;padding:10px}
.card{background:#3d2b1a;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:.15s}.card:hover{border-color:#ffd700;background:#4a3520}
.sec h3{color:#ffd700;font-size:14px;margin-bottom:8px}.nm{font-size:14px;font-weight:bold}.ds{font-size:11px;color:#b89a6e}.pr{font-size:12px;color:#ffd700}
.bu{background:#2d6b2d;color:white;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;margin-top:4px;font-family:'Courier New',monospace}.bu:hover{background:#3d8b3d}
.bar{width:100%;height:6px;background:#1a1410;border-radius:3px;margin:3px 0}.barFill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4ecdc4,#27ae60)}
.barHp{background:linear-gradient(90deg,#ff6b6b,#ffd700)}.barSt{background:#4ecdc4}.barFu{background:#a855f7}
.msgLog{position:absolute;bottom:10px;left:10px;background:rgba(42,31,21,.9);border:1px solid #4a3520;border-radius:6px;padding:5px 8px;font-size:11px;color:#b89a6e;max-width:280px}
.mg{margin-bottom:1px}.gd{color:#4ecdc4}.bd{color:#ff6b6b}.inf{color:#ffd700}
.kr{display:flex;gap:5px;margin-bottom:3px}.ki{flex:1;background:#1a1410;border-radius:3px;padding:4px;text-align:center}.ki .kl{font-size:9px;color:#b89a6e}.ki .kv{font-size:12px;font-weight:bold;color:#ffd700}
#pauseBtn{position:absolute;top:8px;left:8px;z-index:5;background:#3d2b1a;border:1px solid #4a3520;color:#c9a96e;padding:4px 8px;font-size:14px;cursor:pointer;border-radius:4px}#pauseBtn:hover{background:#4a3520}
</style></head><body>

<div id="topbar">
<div class="stat">&#x1F4B0; <span class="val" id="vMoney">$500</span></div>
<div class="stat">&#x2B50; <span class="val" id="vRep">0</span></div>
<div class="stat">&#x1F550; <span class="val" id="vTime">Day 1 - 6:00 AM</span></div>
<div class="stat">&#x2600; <span class="val" id="vWeather">Sunny</span></div>
<div class="stat">&#x1F465; <span class="val" id="vCust">0/8</span></div>
<button class="stat" style="cursor:pointer" onclick="G.paused=!G.paused">&#x23F8;</button>
</div>

<div id="main">
<canvas id="gameCanvas" width="512" height="384"></canvas>
<div id="panel"><div id="tabs"><button class="tab active" onclick="switchTab(0)">Menu</button><button class="tab" onclick="switchTab(1)">Staff</button><button class="tab" onclick="switchTab(2)">Shop</button><button class="tab" onclick="switchTab(3)">Economy</button></div><div id="content"></div></div>
</div>

<div class="msgLog" id="msgLog"></div>

<script>
// ===== CONFIGURATION =====
const TILE=32,COLS=16,ROWS=12,TICK=500,HPT=0.5;

const MENU=[{id:'espresso',n:'Espresso',p:3,w:10},{id:'americano',n:'Americano',p:4,w:12},{id:'latte',n:'Latte',p:5,w:18},{id:'cappuccino',n:'Cappuccino',p:5,w:20},
{id:'mocha',n:'Mocha',p:6,w:24},{id:'coldbrew',n:'Cold Brew',p:5,w:15},{id:'egg_coffee',n:'Viet Egg Coffee',p:8,w:30},{id:'coconut',n:'Coconut Coffee',p:7,w:28},
{id:'green_tea',n:'Green Tea',p:3,w:10},{id:'matcha',n:'Matcha Latte',p:6,w:22},{id:'juice',n:'Fresh Juice',p:5,w:18},{id:'smoothie',n:'Smoothie',p:6,w:20},
{id:'lemonade',n:'Lemonade',p:4,w:15},{id:'milkshake',n:'Milkshake',p:6,w:22},{id:'cake',n:'Cake Slice',p:5,w:5},{id:'croissant',n:'Croissant',p:4,w:5},
{id:'cookies',n:'Cookies x3',p:3,w:3},{id:'sandwich',n:'Sandwich',p:6,w:30},{id:'pho',n:'Pho',p:8,w:45},{id:'fried_rice',n:'Fried Rice',p:7,w:40}];

const CTYPES=[
{id:'cl',n:'Coffee Lover',e:'☕',sp:[8,15],pa:30,w:{6:25,8:40,10:15,17:30},tip:.8,tm:1.3,c:'#8B4513'},
{id:'nomad',n:'Digital Nomad',e:'💻',sp:[12,25],pa:180,w:{9:60,12:50,15:70},tip:.4,tm:.8,c:'#4a90d9'},
{id:'couple',n:'Couple',e:'💑',sp:[15,35],pa:120,w:{14:15,17:50,21:40},tip:.9,tm:1.5,c:'#e84393'},
{id:'family',n:'Family',e:'👨‍👩‍👧',sp:[18,45],pa:90,w:{14:45,17:30},tip:.6,tm:1.0,c:'#fdcb6e'},
{id:'tourist',n:'Tourist',e:'📷',sp:[8,18],pa:60,w:{10:25,14:55},tip:.3,tm:.5,c:'#00b894'},
{id:'biz',n:'Business Person',e:'💼',sp:[12,22],pa:20,w:{6:35,8:65,10:40},tip:.7,tm:1.1,c:'#636e72'},
{id:'artist',n:'Artist',e:'🎨',sp:[8,18],pa:240,w:{10:20,14:30,17:25},tip:.4,tm:.9,c:'#a855f7'}];

const STAFF_T=[
{id:'barista',n:'Barista',e:'☕',cost:500,sal:8,c:'#c48b3a'},
{id:'cook',n:'Cook',e:'🍳',cost:400,sal:7,c:'#d4502e'},
{id:'server',n:'Server',e:'🧹',cost:300,sal:6,c:'#2980b9'},
{id:'cashier',n:'Cashier',e:'💰',cost:250,sal:5,c:'#27ae60'}];

const DECOS=[
{id:'neon_cat',n:'Neon Cat Sign',ap:5,cost:200,co:'#ff69b4'},
{id:'poster',n:'Vintage Posters',ap:3,cost:150,co:'#c9a96e'},
{id:'moss_wall',n:'Live Moss Wall',ap:4,cost:500,co:'#27ae60'},
{id:'bookshelf',n:'Bookshelf Display',ap:6,cost:400,co:'#8B6914'},
{id:'led_strip',n:'LED Strip Lights',ap:2,cost:100,co:'#ffd700'},
{id:'mirror',n:'Mirror Frame',ap:3,cost:180,co:'#b0c4de'},
{id:'succulent',n:'Potted Succulent',ap:2,cost:30,co:'#6b8e23'},
{id:'candle',n:'Candle Holder',ap:3,cost:40,co:'#ff8c00'},
{id:'flower_vase',n:'Flower Vase',ap:3,cost:35,co:'#db7093'},
{id:'bean_planter',n:'Coffee Bean Planter',ap:2,cost:25,co:'#8B4513'},
{id:'palm_tree',n:'Potted Palm Tree',ap:4,cost:200,co:'#2d6b2d'},
{id:'floor_lamp',n:'Floor Lamp',ap:3,cost:150,co:'#ffd700'},
{id:'fountain',n:'Water Fountain',ap:5,cost:600,co:'#4169e1'},
{id:'record_player',n:'Vintage Record Player',ap:7,cost:800,co:'#2f2f2f'},
{id:'painting',n:'Art Painting',ap:4,cost:250,co:'#9370db'},
{id:'string_lights',n:'String Lights',ap:3,cost:80,co:'#ffd700'},
{id:'hanging_plant',n:'Hanging Plant Basket',ap:4,cost:60,co:'#32cd32'},
{id:'pendant_lamp',n:'Pendant Lamp',ap:5,cost:200,co:'#daa520'}];

// ===== GAME STATE =====
let G={m:500,r:0,d:1,tick:0,w:'sunny',seats:[],queue:[],staff:[],decs:[],orders:[],ct:0,revenue:0,exp:0,tipsT:0,tipsAll:0,qd:{},paused:false,over:false};
let cid=0,mapData=[],seatData=[];

// ===== MAP + SEATS =====
function genMap(){let m=[];for(let y=0;y<ROWS;y++){m[y]=[];for(let x=0;x<COLS;x++){if(y===0||x===0||x===COLS-1)m[y][x]={t:'wall',c:'#5C4A32'};else if(x>=4&&x<=9&&y<=2)m[y][x]={t:'counter',c:'#7B4A3A'};else m[y][x]={t:'walkable',c:(x+y)%2===0?'#3d2b1a':'#4a3520'}}}return m;}
function genSeats(){let s=[];for(let x=5;x<=8;x++)s.push({x:x,y:3,type:'counter',occ:null});for(let r=7;r<=9;r++){s.push({x:7,y:r,type:'table',occ:null});s.push({x:8,y:r,type:'table',occ:null});}for(let r=10;r<=11;r++){s.push({x:7,y:r,type:'sofa',occ:null});s.push({x:8,y:r,type:'sofa',occ:null});}return s;}
function isWalkable(x,y){return y>=0&&y<ROWS&&x>=0&&x<COLS&&mapData[y]&&mapData[y][x]&&mapData[y][x].t!=='wall';}

// ===== PATHFINDING =====
function astar(sx,sy,ex,ey){let open=[{x:sx,y:sy,g:0,f:0,p:[sx+','+sy]}],cl=new Set(),i=0;while(open.length>0&&i<200){i++;open.sort((a,b)=>a.f-b.f);let c=open.shift();if(c.x===ex&&c.y===ey)return c.p.map(p=>p.split(',').map(Number));cl.add(c.x+','+c.y);for(let[dx,dy]of[[0,1],[0,-1],[1,0],[-1,0]]){let nx=c.x+dx,ny=c.y+dy;if(nx<0||ny<0||nx>=COLS||ny>=ROWS)continue;let k=nx+','+ny;if(cl.has(k))continue;let w=mapData[ny][nx].t==='wall'?99:1,g2=c.g+w,f2=g2+(Math.abs(nx-ex)+Math.abs(ny-ey));if(!open.find(o=>o.x===nx&&o.y===ny))open.push({x:nx,y:ny,g:g2,f:f2,p:[...c.p,nx+','+ny]}}}return[{x:sx,y:sy}];}

// ===== HELPERS =====
function addMsg(t,cls){let l=document.getElementById('msgLog'),d=document.createElement('div');d.className='mg';d.style.color=cls==='gd'?'#4ecdc4':cls==='bd'?'#ff6b6b':'#ffd700';d.textContent=t;l.prepend(d);if(l.children.length>8)l.removeChild(l.lastChild);}
function getAp(){return G.decs.reduce((s,d)=>{let def=DECOS.find(dd=>dd.id===d.id);return s+(def?def.ap:0);},0);}

// ===== CUSTOMERS =====
function spawnCust(){let free=seatData.find(s=>!s.occ);if(!free||G.queue.length>=8)return null;
let best=CTYPES[0],bs=0,totalH=G.tick*HPT,curH=(6+totalH)%24;
for(let ct of CTYPES){let w=ct.w||{},base=w[Math.floor(curH)]||w[12]||15,mult=(G.r/100+.5)*(G.w==='rainy'?1.3:1);let s=base*mult/CTYPES.length;if(s>bs){bs=s;best=ct}}if(bs<3)return null;
let c={id:++cid,type:best,x:-1,y:-1,seat:free,st:'enter',pat:40+Math.random()*80|0,mp:0,ord:null};c.mp=c.pat;G.queue.push(c);return c;}

function updateCust(){for(let ci of G.queue){if(ci.st==='enter'){ci.x=2;ci.y=3;ci.st='move';}
else if(ci.st==='move'&&!ci.seat.occ){let p=astar(ci.x,ci.y,ci.seat?ci.seat.x:7,ci.seat?ci.seat.y:6);if(p.length>1&&isWalkable(p[1][0],p[1][1])){ci.x=p[1][0];ci.y=p[1][1]}else{ci.seat.occ=ci;ci.st='seated';ci.pat=40+Math.random()*80|0;ci.mp=ci.pat}}}
else if(ci.st==='seated'&&!ci.ord){ci.pat--;if(ci.pat<=5){addMsg(ci.type.e+' Bỏ đi vì chờ lâu!','bd')}else{let items=MENU.filter(m=>m.p>0);if(items.length){let it=items[Math.floor(Math.random()*items.length)];ci.ord={...it};G.orders.push({cid:ci.id,prep:it.w,el:0});addMsg(ci.type.e+' '+ci.type.n+' gọi '+it.n,'gd')}}}
else if(ci.st==='cooking'){let ord=G.orders.find(o=>o.cid===ci.id);if(ord){ord.el++;if(ord.el>=ord.prep){ord.status='done';addMsg('✅ Đã xong!','gd')}if(ci.pat<=0){G.r=Math.max(0,G.r-2);addMsg(ci.type.e+' Giận dữ bỏ đi!','bd')}}
else if(ci.st==='eating'){ci.et++;if(ci.et>3){let tip=Math.floor(ci.ord.p*0.15);G.m+=ci.ord.p+tip;G.tipsAll+=tip;G.revenue+=ci.ord.p+tip;if(ci.seat)ci.seat.occ=null;addMsg(ci.type.e+' trả $'+(ci.ord.p+tip),'gd')}}}}

// ===== STAFF =====
function hireStaff(id){let s=STAFF_T.find(t=>t.id===id);if(!s||G.m<s.cost)return;G.m-=s.cost;G.staff.push({id:s.id,name:s.n,stamina:100,tasks:0,x:6,y:1});addMsg('Đã tuyển '+s.e+' '+s.n+' cho $'+s.cost,'gd');renderPanel();}
function updateStaff(){for(let s of G.staff){let pend=G.orders.find(o=>!o.status||o.status!=='done');if(pend){s.x=7;s.y=2;if(Math.random()<0.3){pend.status='done';s.tasks++;addMsg(s.name+' phục vụ xong!','gd')}}else{s.x=6;s.y=1}}}

// ===== GAME LOOP =====
let lt=0;function gameLoop(ts){if(!lt)lt=ts;let d=ts-lt;lt=ts;if(d>TICK)d=TICK;if(!G.paused&&d>=TICK){let ticks=Math.floor(d/TICK);for(let i=0;i<ticks;i++){G.tick++;let tH=G.tick*HPT;let curH=(6+tH)%24;if(curH>=21){endDay();break}if(G.tick%30===0)G.w=G.w==='sunny'?'sunny':'rainy';let sp=3,h=(6+G.tick*HPT)%24;if(h>=7&&h<=9)sp=18;else if(h>=11&&h<=13)sp=12;else if(h>=17&&h<=20)sp=15;if(G.r>50)sp+=3;if(Math.random()*100<sp){if(spawnCust())G.ct++}updateCust()}
// staff work on orders
for(let s of G.staff){let pend=G.orders.find(o=>!o.status||o.status!=='done');if(pend){s.x=7;s.y=2;if(Math.random()<0.3){pend.status='done';s.tasks++;addMsg(s.name+' phục vụ xong!','gd')}}else{s.x=6;s.y=1}}}
renderGame();updateUI();requestAnimationFrame(gameLoop)}

function endDay(){G.d++;G.m-=G.exp;G.revenue=0;G.exp=0;G.queue=[];G.orders=[];seatData.forEach(s=>s.occ=null);addMsg('Ngày '+G.d+' bắt đầu!','inf');if(G.m<-500){G.over=true;alert('Ngân sách âm! Game over.');}}

// ===== RENDERING =====
function renderGame(){let ctx=canvas.getContext('2d');ctx.fillStyle='#0f0b08';ctx.fillRect(0,0,512,384);for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){let t=mapData[y]?mapData[y][x]:null;if(!t)continue;ctx.fillStyle=t.c;ctx.fillRect(x*TILE,y*TILE,TILE,TILE);if(t.t==='wall'){ctx.fillStyle='#4a3520';ctx.fillRect(x*TILE,y*TILE,TILE,3)}else if(t.t==='counter'){ctx.fillStyle='#8B5A3A';ctx.fillRect(x*TILE+1,y*TILE+1,TILE-2,TILE/2)}}// occupied seats
G.seats.forEach(s=>{if(s.occ){ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(s.x*TILE,s.y*TILE,TILE,TILE)}})// decorations
G.decs.forEach((d,i)=>{let col=d.co||'#888';ctx.fillStyle=col;ctx.globalAlpha=.7;ctx.beginPath();ctx.arc((7+i%5)*TILE+16,(2+Math.floor(i/5))*TILE+16,10,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})// customers
G.queue.forEach(c=>{if(c.x>=-1){let px=c.x*TILE,py=c.y*TILE;ctx.fillStyle=c.type.c;ctx.fillRect(px+8,py+6,16,14);ctx.fillStyle='#f0d0a0';ctx.fillRect(px+10,py,12,8);
let pct=Math.max(0,c.pat/c.mp),col=pct>.5?'#4ecdc4':pct>.2?'#ffd700':'#ff6b6b';ctx.fillStyle='#1a1410';ctx.fillRect(px+4,py-10,24,3);ctx.fillStyle=col;ctx.fillRect(px+4,py-10,24*pct,3)}})// staff
G.staff.forEach(s=>{let px=s.x*TILE,py=s.y*TILE;ctx.fillStyle='#c48b3a';ctx.fillRect(px+8,py+6,16,14);ctx.fillStyle='#f0d0a0';ctx.fillRect(px+10,py,12,8);ctx.fillStyle='#c48b3a';ctx.fillRect(px+8,py-2,20,4)})// orders
G.orders.forEach((o,i)=>{if(!o.status){let ox=7*TILE+((i%4)*6),oy=1*TILE-8;ctx.font='bold 10px sans-serif';ctx.fillStyle='#ff8c00';ctx.fillText('🔥',ox,oy)}})// night
let tH=G.tick*HPT,h2=6+tH;let dk=0;if(h2>20)dk=(h2-20)*.08;if(h2<7)dk=(7-h2)*.06;if(dk>0){ctx.fillStyle='rgba(0,0,25,'+Math.min(dk,.3)+')';ctx.fillRect(0,0,512,384)}}// rain
if(G.w==='rainy'){for(let i=0;i<30;i++){let rx=(Date.now()/8+i*41)%512,ry=(Date.now()/3+i*49)%384;ctx.strokeStyle='rgba(100,180,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+1,ry+7);ctx.stroke()}}

// ===== UI =====
let curTab=0;function switchTab(i){curTab=i;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));renderPanel()}
function renderPanel(){let c=document.getElementById('content');if(curTab===0)c.innerHTML=rMenu();else if(curTab===1)c.innerHTML=rStaff();else if(curTab===2)c.innerHTML=rShop();else c.innerHTML=rEco()}

function rMenu(){let h='<div class="sec"><h3>☕ MENU — Click để phục vụ khách</h3>';
[['coffee','☕'],['special','🧋'],['tea','🍵'],['bev','🥤'],['dessert','🍰'],['food','🍜']].forEach(([cat,ic])=>{let items=MENU.filter(m=>m.p>0);if(items.length){h+='<div style="margin:5px 0"><b>'+ic+' '+cat.toUpperCase()+'</b>';items.forEach(it=>{h+='<div class="card" onclick="serveCust(\''+it.id+'\')"><span class="nm">'+it.n+'</span><br><span class="ds">Prep: '+it.w+'s</span><br><span class="pr">$'+it.p+'</span></div>'});}});return h}

function rStaff(){let h='<div class="sec"><h3>👤 Staff (đã có: '+G.staff.length+' người)</h3>';
G.staff.forEach(s=>{h+='<div class="card"><span class="nm">'+s.name+'</span><br>Stamina: <div class="bar"><div class="barFill" style="width:'+s.stamina+'%"></div></div>Tasks: '+s.tasks+'</div>'});
STAFF_T.forEach(s=>{h+='<div class="card"><span class="nm">'+s.e+' '+s.n+'</span><br><button class="bu" onclick="hireStaff(\''+s.id+'\')">'+(G.m>=s.cost?'HIRE $'+s.cost:'Không đủ tiền')+'</button></div>'});return h}

function rShop(){let h='<div class="sec"><h3>🛒 Decorations (AP:'+getAp()+')</h3>';
DECOS.forEach(d=>{let owned=G.decs.find(dd=>dd.id===d.id);h+='<div class="card">'+d.n+'<br><span class="ds">+'+d.ap+' AP</span><br>$'+d.cost+' '+(owned?'✅':'<button class="bu" onclick="buyDeco(\''+d.id+'\')">BUY</button>')+'</div>'});return h}

function rEco(){let prof=G.revenue-G.exp;return'<div class="sec"><h3>💼 Economy</h3><div class="kr"><div class="ki"><div class="kl">Tiền mặt</div><div class="kv">$'+G.m+'</div></div><div class="ki"><div class="kl">Doanh thu</div><div class="kv">$'+G.revenue+'</div></div><div class="ki"><div class="kl">Chi phí</div><div class="kv">$'+G.exp+'</div></div></div><div class="barHp" style="margin:8px 0;height:10px;width:'+Math.max(0,G.r)+'%"></div><p>Reputation: '+Math.round(G.r)+'/100 ⭐</p><h3>Tips hôm nay: $'+G.tipsT+' | Tổng tips: $'+G.tipsAll+'</h3><h3>🏆 Win: $10K + Rep 80 ❌ Lose: <$500</h3></div>'}

// ===== SERVE =====
function serveCust(id){let item=MENU.find(m=>m.id===id);if(!item)return;let seated=G.queue.find(c=>c.st==='seated'&&!c.ord);if(!seated)return addMsg('Chưa có khách ngồi!','bd');seated.ord=item;seated.st='cooking';G.orders.push({cid:seated.id,prep:item.w,el:0});addMsg('Phục vụ '+item.n+' cho khách','gd');renderPanel()}

function buyDeco(id){let d=DECOS.find(dd=>dd.id===id);if(!d||G.m<d.cost)return;G.m-=d.cost;G.decs.push(d);addMsg('Mua '+d.n,'gd');renderPanel()}

// ===== UI UPDATE =====
function updateUI(){document.getElementById('vMoney').textContent='$'+G.m.toLocaleString();document.getElementById('vRep').textContent=Math.round(G.r);let h=Math.floor((6+G.tick*HPT)%24),m=Math.floor(((6+G.tick*HPT)%1)*60),h12=h%12||12;
document.getElementById('vTime').textContent='Day '+G.d+' - '+String(h12).padStart(2,'0')+':'+String(m).padStart(2,'0')+' '+(h<12?'AM':'PM');document.getElementById('vWeather').textContent=G.w==='rainy'?'🌧️ Rainy':'☀️ Sunny';document.getElementById('vCust').textContent=G.queue.length+'/8';renderPanel()}
