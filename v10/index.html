<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Trendy Simulator V7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#2d1b69;color:#333;width:100%;min-height:100vh;overflow-x:hidden}
#game-container{position:relative;width:480px;height:700px;margin:0 auto;background:url('https://www.transparenttextures.com/patterns/dark-matter.png'),linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#sky{position:absolute;top:0;width:100%;height:50%;background:linear-gradient(to bottom,#4facfe 0%,#00f2fe 100%);transition:all 1s;z-index:1}
#stars{position:absolute;top:0;width:100%;height:100%;z-index:2;transition:opacity 1s}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite alternate}
@keyframes twinkle{from{opacity:.3}to{opacity:1}}
#sun-moon{position:absolute;top:40px;width:60px;height:60px;border-radius:50%;transition:all 2s;z-index:3}
.sun{background:#ff9a56;box-shadow:0 0 40px #ff9a56}
.moon{background:#e0e7ff;box-shadow:0 0 30px #fff}
#cloud{position:absolute;width:120px;height:60px;background:white;border-radius:60px;z-index:4;opacity:.8}
.cloud-puff{position:absolute;width:40px;height:40px;background:white;border-radius:50%}
#ground{position:absolute;bottom:0;width:100%;height:300px;background:#8B4513;transition:all .5s}
.grass{position:absolute;width:100%;height:30px;background:#228B22;z-index:1}
#cafe-building{position:absolute;bottom:30px;left:100px;width:280px;height:200px;background:#f5e6d3;border-radius:10px 10px 0 0;z-index:5;box-shadow:0 10px 30px rgba(0,0,0,.2);transition:all .5s}
#cafe-roof{position:absolute;top:-40px;left:-20px;width:320px;height:40px;background:#8B0000;clip-path:polygon(10% 100%,90% 100%,100% 0%,0% 0%)}
#cafe-window{position:absolute;top:50px;width:60px;height:80px;background:#FFD700;border-radius:5px;opacity:.9}
#door{position:absolute;bottom:0;left:110px;width:60px;height:100px;background:#4a2c0f;border-radius:30px 30px 0 0}
#cafe-sign{position:absolute;top:-80px;left:50%;transform:translateX(-50%);background:#FFD700;padding:10px 20px;font-weight:bold;font-size:14px;border-radius:5px;box-shadow:0 4px 15px rgba(0,0,0,.2)}
#table-container{position:absolute;bottom:240px;left:30px;width:420px;display:flex;gap:20px;z-index:6}
.table-slot{width:80px;height:80px;border-radius:50%;background:#4a3c2a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:white;box-shadow:inset 0 -3px 10px rgba(0,0,0,.3)}
.table-slot.occupied{background:#8B6914}
.table-slot .customer-icon{font-size:32px;margin-bottom:4px}
.table-slot .order-text{font-size:9px;color:#FFD700}
.patience-bar{width:60px;height:6px;background:#ff0000;border-radius:3px;overflow:hidden;margin-top:4px}
.patience-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd700,#2ecc71);transition:all .3s}
#patience{margin-top:5px;width:80px;height:6px;background:#4a3c2a;border-radius:3px;overflow:hidden}
.patience-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd700,#2ecc71);transition:width .3s}
.staff-queue{position:absolute;bottom:40px;left:30px;width:420px;display:flex;gap:15px;z-index:7}
.staff-member{font-size:24px;animation:bounce 2s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
#ui-panel{position:absolute;right:-320px;top:10px;width:300px;background:white;border-radius:15px;padding:20px;box-shadow:-5px 5px 20px rgba(0,0,0,.2)}
.menu-item{background:#f8f9fa;padding:12px;margin-bottom:8px;border-radius:8px;display:flex;justify-content:space-between}
.btn{display:inline-block;padding:10px 20px;background:#FFD700;color:#333;font-weight:bold;text-align:center;cursor:pointer;border-radius:5px;margin-top:5px;transition:.3s}
.btn:hover{background:#ffc107;transform:scale(1.05)}
#notifications{position:absolute;bottom:-60px;left:0;width:100%;z-index:8}
.notification{padding:12px;margin-top:4px;font-size:14px;border-radius:5px;color:white;opacity:0;animation:slideIn .3s forwards}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
#time-weather{position:absolute;top:20px;right:20px;background:white;padding:8px 12px;border-radius:8px;font-size:14px;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.1)}
#stats{position:absolute;top:60px;left:20px;background:rgba(255,255,255,.9);padding:12px;border-radius:8px;z-index:10}
.stat-item{display:flex;justify-content:space-between;margin:4px 0}
</style>
</head>
<body>
<div id="game-container">
<!-- Sky & Weather -->
<div id="sky"></div>
<div id="sun-moon" class="sun"></div>
<div id="cloud"><div class="cloud-puff"></div><div class="cloud-puff"></div></div>

<!-- Ground & Building -->
<div id="ground">
<div class="grass"></div>
</div>
<div id="cafe-building">
<div id="cafe-roof"></div>
<div id="cafe-window" style="left:30px"></div>
<div id="cafe-window" style="right:30px"></div>
<div class="door"></div>
<div id="cafe-sign">☕ Trendy Café</div>
</div>

<!-- Table Area -->
<div id="table-container"></div>
<div id="staff-queue" class="staff-queue"></div>

<!-- Time & Weather Widget -->
<div id="time-weather">⏰ <span id="clock">6:00 AM</span><br>🌤️ <span id="weather-icon">☀️</span></div>

<!-- Stats Panel -->
<div id="stats">
<span style="font-size:18px;font-weight:bold;">💰 <span id="coins">2000</span></span>
<div class="stat-item">⭐ Rep: <span id="rep">50</span></div>
<div class="stat-item">👥 Orders: <span id="orders-count">0</span></div>
<div class="stat-item">🎖️ Lv: <span id="lv">1</span></div>
</div>

<!-- Notifications -->
<div id="notifications"></div>
</div>

<script>
// ===== GAME ENGINE V7 =====
var G = {coins:2000, rep:50, lv:1, xp:0, staff:[], tables:[], orders:[], menu:['Espresso','Latte','Cappuccino','Mocha','Matcha'], time:360}; // time=360 (6AM)

// Initialize
function init() {
    createTables();
    updateClock();
    setInterval(gameLoop, 1000);
}

function createTables() {
    var container = document.getElementById('table-container');
    for(var i=0;i<4;i++){
        var table = document.createElement('div');
        table.className = 'table-slot';
        table.innerHTML = '<div class="customer-icon">☕</div><div>Bàn '+i+'</div>';
        container.appendChild(table);
    }
}

function updateClock(){
    var hour=Math.floor(G.time/60)%24;
    var min=G.time%60;
    var ampm=hour>=12?'PM':'AM';
    var h12=hour>12?hour-12:hour;
    document.getElementById('clock').textContent=h12+':'+(min<10?'0':'')+min+' '+ampm;
    
    // Sky transitions
    if(hour>=6&&hour<8){document.getElementById('sky').style.background='linear-gradient(to bottom,#ffd700,#ff4500)';}
    else if(hour>=18&&hour<20){document.getElementById('sky').style.background='linear-gradient(to bottom,#ff9a56,#e65c00)';}
    else if(hour>=20||hour<5){document.getElementById('sky').style.background='linear-gradient(to bottom,#4facfe,#0f2027)';document.getElementById('sun-moon').className='moon';}
    else{document.getElementById('sun-moon').className='sun';}
}

function gameLoop() {
    G.time+=1;
    if(G.time>=1440){G.time=0;}
    
    // Auto-spawn orders (simulating customers arriving)
    if(Math.random()<0.3&&G.orders.length<5){
        var item=G.menu[Math.floor(Math.random()*G.menu.length)];
        G.orders.push({item:item,price:Math.floor(Math.random()*20)+10,timeLeft:60});
        updateOrders();
    }
    
    // Update patience bars (not used in this simplified version but needed for layout)
    if(G.orders.length>0){updateClock();}
}

function updateOrders(){
    document.getElementById('orders-count').textContent=G.orders.length;
}

// Initialize game
init();
</script>
</body>
</html>
