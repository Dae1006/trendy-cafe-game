<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Café</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e8e8e8;min-height:100vh}
#game{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
/* Header */
.hdr{display:flex;justify-content:space-between;padding:8px 12px;background:#16213e;border-bottom:2px solid #8B4513;font-size:13px;flex-wrap:wrap;gap:4px}
.hdr span{font-weight:bold;color:#FFD700}
/* Weather */
.weather{padding:6px 12px;background:linear-gradient(90deg,#2196F3,#03A9F4);font-size:12px;text-align:center}
/* Location tabs */
.loc-bar{display:flex;gap:4px;padding:6px 8px;background:#0f0f1a;overflow-x:auto}
.loc-btn{flex:1;min-width:55px;padding:6px 4px;border:none;border-radius:6px;background:#0f3460;color:#a0a0b0;font-size:10px;cursor:pointer;transition:.3s}
.loc-btn.active{background:#8B4513;color:#fff}
.loc-btn:disabled{opacity:.3;cursor:not-allowed}
/* Cafe scene */
.cafe-scene{position:relative;height:180px;overflow:hidden;border-bottom:1px solid #8B4513}
.cafe-bg{position:absolute;width:100%;height:100%}
.cust-area{position:absolute;bottom:10px;left:0;width:100%;display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.cust{font-size:24px;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* Orders */
.orders{padding:8px 12px;border-bottom:1px solid #8B4513}
.orders h3{font-size:13px;margin-bottom:4px;color:#a0a0b0}
.order{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f3460;border-radius:8px;margin-bottom:4px;border-left:3px solid #FF6347}
.order-info{font-size:12px}
.order-price{color:#FFD700;font-weight:bold}
.btn-serve{padding:4px 10px;border:none;border-radius:5px;background:#FF6347;color:#fff;cursor:pointer;font-size:11px}
/* Menu */
.menu-section{padding:8px 12px;border-bottom:1px solid #8B4513}
.menu-section h3{font-size:13px;margin-bottom:4px;color:#a0a0b0}
.mi{display:flex;justify-content:space-between;padding:4px 8px;background:rgba(255,255,255,.04);border-radius:4px;font-size:12px;margin-bottom:2px}
.mi .price{color:#FFD700;font-weight:bold}
/* Stats */
.stats{padding:8px 12px;border-bottom:1px solid #8B4513}
.stats h3{font-size:13px;margin-bottom:4px;color:#a0a0b0}
.sr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.sr .val{color:#FFD700;font-weight:bold}
/* Nav */
.nav{display:flex;position:sticky;bottom:0;background:#0f0f1a;border-top:2px solid #8B4513;z-index:100}
.nav-btn{flex:1;padding:10px 2px;border:none;background:transparent;color:#a0a0b0;font-size:11px;cursor:pointer}
.nav-btn.active{color:#FFD700;background:rgba(255,215,0,.1)}
/* Panels */
.panels{position:relative;min-height:150px}
.pnl{display:none;padding:12px}
.pnl.active{display:block}
.pnl h3{font-size:14px;margin-bottom:8px;color:#FFD700}
.pnl-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f3460;border-radius:8px;margin-bottom:6px;border-left:3px solid #b0b0b0}
.pnl-item .nm{font-weight:bold;font-size:13px}
.pnl-item .desc{font-size:10px;color:#a0a0b0}
.pnl-item .cost{color:#FFD700;font-weight:bold}
.btn-buy{padding:4px 12px;border:none;border-radius:5px;background:#FF6347;color:#fff;cursor:pointer;font-size:11px}
.btn-buy:disabled{background:#555;cursor:not-allowed}
/* Staff */
.staff-card{padding:10px;background:#0f3460;border-radius:8px;margin-bottom:6px}
.staff-card .nm{font-weight:bold;font-size:13px}
.staff-card .tier{font-size:10px;color:#a0a0b0}
.skill-row{display:flex;gap:8px;margin:4px 0;font-size:11px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
.stat-row .label{color:#a0a0b0}
.stat-row .val{color:#FFD700}
/* Supply */
.sup-item{display:flex;justify-content:space-between;align-items:center;padding:6px;background:#0f3460;border-radius:6px;margin-bottom:3px;font-size:11px;flex-wrap:wrap;gap:4px}
.sup-item .nm{font-weight:bold}
.sup-item .stock{color:#FFD700}
.sup-item .cost{color:#a0a0b0;font-size:10px}
.btn-order{padding:4px 10px;border:none;border-radius:5px;background:#4CAF50;color:#fff;cursor:pointer;font-size:10px}
.btn-order:disabled{background:#555;cursor:not-allowed}
/* Price slider */
.price-ctrl{display:flex;align-items:center;gap:4px;margin-top:4px}
.price-ctrl input[type=range]{flex:1;accent-color:#8B4513}
.price-ctrl .pct{font-size:10px;color:#a0a0b0;min-width:30px;text-align:center}
/* Trend */
.trend{padding:6px 12px;background:linear-gradient(90deg,#FF6347,#FF8C00);font-size:12px;font-weight:bold;text-align:center}
/* Notification */
.notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#8B4513;color:#fff;padding:8px 16px;border-radius:8px;z-index:9999;font-size:12px}
/* Items */
.badge{font-size:9px;padding:2px 5px;border-radius:3px;display:inline-block;margin-top:2px}
.badge.common{background:#b0b0b0;color:#333}
.badge.rare{background:#4169E1;color:#fff}
.badge.epic{background:#9932CC;color:#fff}
.badge.legend{background:#FFD700;color:#333}
</style>
</head>
<body>
<div id="game">
  <div class="hdr">
    <div>💰<span id="coins">500</span>⚡<span id="stamina">50/50</span></div>
    <div>📅 Ngày <span id="day">1</span>⭐Lv.<span id="lvl">1</span></div>
  </div>
  <div class="weather" id="weather">☀️ Nắng</div>
  <div class="loc-bar" id="loc-bar"></div>
  <div class="cafe-scene"><div class="cafe-bg" id="cafe-bg"></div><div class="cust-area" id="cust-area"></div></div>
  <div class="orders"><h3>📋 Đơn hàng</h3><div id="order-list"></div></div>
  <div class="menu-section"><h3>☕ Menu</h3><div id="menu-list"></div></div>
  <div class="stats"><h3>📊 Thống kê</h3><div id="stats-list"></div></div>
  <div class="nav">
    <button class="nav-btn active" data-tab="shop">🏪 Shop</button>
    <button class="nav-btn" data-tab="items">🎒 Items</button>
    <button class="nav-btn" data-tab="staff">👨‍🍳 Nhân sự</button>
    <button class="nav-btn" data-tab="supply">📦 Nguyên liệu</button>
    <button class="nav-btn" data-tab="menu-set">⚙️ Menu</button>
    <button class="nav-btn" data-tab="mp">🌐 Multi</button>
  </div>
  <div class="panels">
    <div id="shop" class="pnl active"><h3>🏪 Cửa hàng trendy items</h3><div id="shop-list"></div></div>
    <div id="items" class="pnl"><h3>🎒 Bộ sưu tập</h3><div id="items-list"></div></div>
    <div id="staff" class="pnl"><h3>👨‍🍳 Nhân sự</h3><div id="staff-list"></div></div>
    <div id="supply" class="pnl"><h3>📦 Nguyên liệu</h3><div id="supply-list"></div></div>
    <div id="menu-set" class="pnl"><h3>⚙️ Giá món</h3><div id="menu-set-list"></div></div>
    <div id="mp" class="pnl"><h3>🌐 Multiplayer</h3><div id="mp-list"></div></div>
  </div>
  <div class="trend">🔥 Trend: Cà phê sạch đang HOT!</div>
</div>
<script>
// ===== DATA =====
const LOCS={
  street:{name:"Vỉa hè",cost:0,revMult:1,baseCust:3,maxStaff:4,bg:"linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)"},
  mall:{name:"TMall",cost:5000,revMult:2.5,baseCust:5,maxStaff:8,bg:"linear-gradient(to bottom,#f5f5f5 0%,#c0c0c0 60%,#808080 100%)"},
  garden:{name:"Sân vườn",cost:15000,revMult:2,baseCust:4,maxStaff:10,bg:"linear-gradient(to bottom,#87CEEB 0%,#228B22 60%,#006400 100%)"},
  rooftop:{name:"Rooftop",cost:50000,revMult:3.5,baseCust:6,maxStaff:12,bg:"linear-gradient(to bottom,#0a0a2e 0%,#1a1a4e 60%,#2a2a6e 100%)"},
  festival:{name:"Lễ hội",cost:100000,revMult:4,baseCust:8,maxStaff:16,bg:"linear-gradient(to bottom,#FF69B4 0%,#FF8C00 50%,#9370DB 100%)"}
};
const MENU_ITEMS=[
  {id:"coffee",name:"Cà phê đen",icon:"☕",price:25,needs:["beans","ice","cup"],locked:false},
  {id:"milk_coffee",name:"Cà phê sữa",icon:"🥛",price:30,needs:["beans","milk","sugar","ice","cup"],locked:false},
  {id:"espresso",name:"Espresso",icon:"☕",price:35,needs:["beans","ice","cup"],locked:true,unlockCost:500},
  {id:"matcha",name:"Trà matcha",icon:"🍵",price:40,needs:["matcha","milk","sugar","cup"],locked:true,unlockCost:3000},
  {id:"smoothie",name:"Sinh tố",icon:"🥤",price:45,needs:["milk","sugar","ice","cup"],locked:true,unlockCost:2000},
  {id:"cake",name:"Bánh mì",icon:"🥪",price:35,needs:["bread","cheese","cup"],locked:false},
  {id:"ice_tea",name:"Trà đá",icon:"🧊",price:15,needs:["tea","ice","cup"],locked:false},
  {id:"bubble_tea",name:"Trà sữa",icon:"🧋",price:50,needs:["tea","milk","tapioca","sugar","ice","cup"],locked:true,unlockCost:4000},
  {id:"tropical",name:"Nước ép dừa",icon:"🥥",price:55,needs:["milk","ice","cup"],locked:true,unlockCost:5000},
  {id:"signature",name:"Signature",icon:"🍸",price:80,needs:["beans","milk","syrup","topping","ice","cup"],locked:true,unlockCost:15000}
];
const TREND_ITEMS=[
  {id:"t_meme_dog",name:"🐶 Meme Chó Vàng",rarity:"common",effect:"revenue",value:.05,desc:"+5% DT",cost:200},
  {id:"t_meme_cat",name:"🐱 Mèo hoang",rarity:"common",effect:"revenue",value:.03,desc:"+3% DT",cost:150},
  {id:"t_mu_jersey",name:"⚽ Áo MU",rarity:"common",effect:"customers",value:1,desc:"+1 khách",cost:300},
  {id:"t_girl_boy",name:"💃 Cô Bé Chú Bé",rarity:"rare",effect:"revenue",value:.1,desc:"+10% DT",cost:1000},
  {id:"t_ba_tram",name:"💯 Ba Trăm",rarity:"rare",effect:"customers",value:2,desc:"+2 khách",cost:1500},
  {id:"t_tu_hien",name:"🎤 Tú Hien Style",rarity:"rare",effect:"revenue",value:.15,desc:"+15% DT",cost:2000},
  {id:"t_lam_pham",name:"🏆 Lam Phẩm",rarity:"epic",effect:"revenue",value:.2,desc:"+20% DT",cost:5000},
  {id:"t_sieu_toc",name:"⚡ Siêu Tốc",rarity:"epic",effect:"customers",value:5,desc:"+5 khách",cost:8000},
  {id:"t_vua_cafe",name:"👑 Vua Cà Phê",rarity:"legend",effect:"revenue",value:.5,desc:"+50% DT!",cost:20000},
  {id:"t_hoang_thu",name:"🔥 Hoảng Thủ",rarity:"legend",effect:"revenue",value:.4,desc:"+40% DT",cost:25000},
  {id:"t_omega",name:"💫 Omega Plus",rarity:"legend",effect:"all",value:.3,desc:"+30%!",cost:50000}
];
const STAFF_TIERS=[
  {id:"fresher",name:"Fresher",emoji:"🎓",salary:250,skill:.5},
  {id:"junior",name:"Junior",emoji:"☕",salary:350,skill:.7},
  {id:"senior",name:"Senior",emoji:"👨‍🍳",salary:500,skill:.9},
  {id:"master",name:"Master",emoji:"🏆",salary:850,skill:1.0}
];
const SUPPLIERS={
  beans:[{name:"Robusta thường",price:50,quality:.5},{name:"Robusta Đà Lạt",price:80,quality:.7},{name:"Arabica",price:120,quality:.85},{name:"Specialty",price:200,quality:1.0}],
  milk:[{name:"Sữa đặc",price:8,quality:.4},{name:"Vinamilk",price:12,quality:.7},{name:"TH True",price:18,quality:.85},{name:"Fresh Cream",price:28,quality:1.0}],
  sugar:[{name:"Đường trắng",price:10,quality:.8},{name:"Đường thốt nốt",price:15,quality:1.0}],
  ice:[{name:"Đá viên",price:2,quality:1.0}],
  tea:[{name:"Trà thường",price:20,quality:.6},{name:"Trà cao cấp",price:40,quality:.9}],
  matcha:[{name:"Matcha thường",price:40,quality:.6},{name:"Matcha Nhật",price:120,quality:1.0}],
  tapioca:[{name:"Trân châu",price:15,quality:.8}],
  syrup:[{name:"Syrup vanilla",price:20,quality:.9},{name:"Syrup caramel",price:20,quality:.9},{name:"Syrup hazelnut",price:22,quality:1.0}],
  topping:[{name:"Topping thạch",price:15,quality:.8},{name:"Cheese foam",price:18,quality:.9}],
  cup:[{name:"Cốc giấy",price:.15,quality:.8},{name:"Cốc premium",price:.4,quality:1.0},{name:"Ly kính",price:2,quality:1.0}],
  bread:[{name:"Bánh mì",price:5,quality:.7},{name:"Bánh premium",price:10,quality:.9}],
  cheese:[{name:"Phô mai",price:8,quality:.7},{name:"Phô premium",price:15,quality:.9}]
};
const WEATHER_MAP={sunny:{emoji:"☀️",name:"Nắng",mod:1.0},cloudy:{emoji:"⛅",name:"Nhiều mây",mod:1.05},rainy:{emoji:"🌧️",name:"Mưa",mod:.75},hot:{emoji:"🔥",name:"Nóng",mod:1.15},tet:{emoji:"🎊",name:"Tết",mod:2.5}};
const SEASON_W={summer:{sunny:.35,cloudy:.25,rainy:.20,hot:.15,tet:0},rainy:{sunny:.10,cloudy:.15,rainy:.45,hot:0,tet:.10},cool:{sunny:.15,cloudy:.30,rainy:.15,hot:0,tet:.35}};

// ===== GAME STATE =====
let GS={
  coins:500,level:1,xp:0,xpNeeded:100,
  currentLocation:"street",unlockedLocations:["street"],
  ownedItems:{}, ownedRecipes:[], menuUnlocked:0,
  autoServeRate:0, upgradesBought:[], questsCompleted:[],
  dailyRevenue:0, dailyCosts:0, totalRevenue:0, totalServed:0,
  gameDay:1, lastDayChange:Date.now(),
  staff:[],
  supplierStock:{beans:10,milk:20,sugar:30,ice:100,tea:20,matcha:5,tapioca:5,syrup:5,topping:5,cup:200,bread:10,cheese:5},
  menuPrices:{},
  sellPrices:{}
};
MENU_ITEMS.forEach(m=>{GS.menuPrices[m.id]=1.0;});

// ===== HELPERS =====
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"tr";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toString();}
function showNotif(t){const d=document.createElement("div");d.className="notif";d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}
function getCurrentWeather(){
  const cycle=GS.gameDay%180,season=cycle<60?"summer":(cycle<120?"rainy":"cool"),probs=SEASON_W[season],rand=Math.random(),cum=0,keys=Object.keys(probs);
  for(let i=0;i<keys.length;i++){cum+=probs[keys[i]];if(rand<=cum)return WEATHER_MAP[keys[i]]}
  return WEATHER_MAP.sunny;
}

// ===== CORE =====
function getRevMult(){
  const loc=LOCS[GS.currentLocation];let m=loc.revMult;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="revenue")m+=it.value*cnt;}
  for(const uid of GS.upgradesBought){const u=UPGRADES.find(x=>x.id===uid);if(u&&u.type==="revenue")m+=u.value;}
  const w=getCurrentWeather();m*=(w.mod||1);return m;
}
function getBaseCust(){
  const loc=LOCS[GS.currentLocation];let c=loc.baseCust;
  for(const[id,cnt]of Object.entries(GS.ownedItems)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="customers")c+=it.value*cnt;}
  return c;
}
function addXP(v){GS.xp+=v;while(GS.xp>=GS.xpNeeded){GS.xp-=GS.xpNeeded;GS.level++;GS.xpNeeded=Math.floor(GS.xpNeeded*1.5);showNotif("⭐ Lên cấp "+GS.level+"!")}}

// ===== SERVE =====
function serveOrder(idx){
  if(!GS.orders||idx<0||idx>=GS.orders.length)return;
  const order=GS.orders[idx];
  const item=MENU_ITEMS.find(m=>m.id===order.menuId);if(!item)return;
  for(const need of item.needs){if((GS.supplierStock[need]||0)<=0){showNotif("⚠️ Hết "+need+"!");return;}}
  for(const need of item.needs){GS.supplierStock[need]--;}
  let price=item.price*GS.menuPrices[item.id];
  for(const[id,cnt]of Object.entries(GS.ownedItems)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="revenue")price*=(1+it.value*cnt);}
  const w=getCurrentWeather();price*=w.mod;
  const earned=Math.floor(price);
  GS.coins+=earned;GS.dailyRevenue+=earned;GS.totalRevenue+=earned;GS.totalServed++;
  showNotif("✅ Phục vụ: "+item.name+"! +"+fmt(earned)+"₫");
  addXP(10);saveGame();renderAll();
}

// ===== BUY ITEM =====
function buyItem(itemId){
  const item=TREND_ITEMS.find(i=>i.id===itemId);if(!item)return;
  if(GS.coins<item.cost){showNotif("❌ Không đủ coin!");return;}
  GS.coins-=item.cost;GS.ownedItems[itemId]=(GS.ownedItems[itemId]||0)+1;
  if(item.effect==="recipe")GS.ownedRecipes.push(itemId);
  showNotif("✅ Mua: "+item.name+"!");saveGame();renderAll();
}

// ===== BUY RECIPE =====
function buyRecipe(menuId){
  const item=MENU_ITEMS.find(m=>m.id===menuId);if(!item||!item.locked)return;
  if(GS.coins<item.unlockCost){showNotif("❌ Không đủ!");return;}
  GS.coins-=item.unlockCost;GS.ownedRecipes.push(menuId);item.locked=false;
  showNotif("📜 Mở khóa: "+item.name+"!");saveGame();renderAll();
}

// ===== HIRE STAFF =====
function hireStaff(tierId){
  const loc=LOCS[GS.currentLocation];
  if(GS.staff.length>=loc.maxStaff){showNotif("⚠️ Đủ nhân viên!");return;}
  const tier=STAFF_TIERS.find(t=>t.id===tierId);if(!tier)return;
  if(GS.coins<tier.salary*3){showNotif("❌ Cần "+fmt(tier.salary*3)+"₫!");return;}
  GS.staff.push({id:"s_"+Date.now(),name:"Staff",tier:tierId,brew:tier.skill,quality:tier.skill,service:tier.skill,mood:80,loyalty:70,daysWorked:0,servedCount:0});
  GS.coins-=tier.salary*3;showNotif("✅ Thuê staff!");saveGame();renderAll();
}

// ===== ORDER SUPPLY =====
function orderSupply(resourceType,tierIdx){
  const list=SUPPLIERS[resourceType];if(!list||!list[tierIdx])return;
  const item=list[tierIdx],cost=Math.ceil(item.price*10);
  if(GS.coins<cost){showNotif("❌ Không đủ!");return;}
  GS.coins-=cost;GS.supplierStock[resourceType]+=10;
  showNotif("✅ Nhập "+resourceType+"!");saveGame();renderAll();
}

// ===== SET PRICE =====
function setPrice(menuId,pct){GS.menuPrices[menuId]=pct;renderAll();}

// ===== UNLOCK LOCATION =====
function unlockLocation(locKey){
  const loc=LOCS[locKey];if(GS.coins<loc.cost){showNotif("❌ Không đủ "+fmt(loc.cost)+"₫!");return;}
  GS.coins-=loc.cost;GS.unlockedLocations.push(locKey);GS.currentLocation=locKey;
  GS.sellPrices[locKey]=Math.floor(loc.cost*.9);
  showNotif("✅ Mở khóa: "+loc.name+"!");saveGame();renderAll();
}
function sellLocation(locKey){
  const idx=GS.unlockedLocations.indexOf(locKey);if(idx<1)return;
  const sellPrice=GS.sellPrices[locKey]||Math.floor(LOCS[locKey].cost*.6);
  GS.unlockedLocations.splice(idx,1);GS.coins+=sellPrice;
  if(GS.currentLocation===locKey)GS.currentLocation="street";
  showNotif("💰 Bán "+LOCS[locKey].name+"!");saveGame();renderAll();
}

// ===== SAVE/LOAD =====
function saveGame(){localStorage.setItem("trendyCafeSave",JSON.stringify(GS));}
function loadGame(){const s=localStorage.getItem("trendyCafeSave");if(s){const p=JSON.parse(s);Object.assign(GS,p);MENU_ITEMS.forEach(m=>{if(!GS.menuPrices[m.id])GS.menuPrices[m.id]=1.0;});}}

// ===== RENDER =====
function renderAll(){
  renderHeader();renderWeather();renderLocBar();renderCafe();renderOrders();renderMenu();renderStats();renderShop();renderItems();renderStaff();renderSupply();renderMenuSet();renderMP();
}

function renderHeader(){
  document.getElementById("coins").textContent=fmt(GS.coins);
  document.getElementById("day").textContent=GS.gameDay;
  document.getElementById("lvl").textContent=GS.level;
}
function renderWeather(){
  const w=getCurrentWeather();document.getElementById("weather").textContent=w.emoji+" "+w.name+" (×"+w.mod+")";
}
function renderLocBar(){
  const el=document.getElementById("loc-bar");el.innerHTML="";
  Object.entries(LOCS).forEach(([k,v])=>{
    const owned=GS.unlockedLocations.includes(k),active=GS.currentLocation===k;
    const btn=document.createElement("button");btn.className="loc-btn"+(active?" active":"");btn.disabled=!owned;
    btn.innerHTML=v.name+(owned?"":"<br>"+fmt(v.cost)+"₫");
    btn.onclick=()=>{if(owned){GS.currentLocation=k;}else{unlockLocation(k);}};
    el.appendChild(btn);
  });
}
function renderCafe(){
  const loc=LOCS[GS.currentLocation];const bg=document.getElementById("cafe-bg");bg.style.background=loc.bg;
  const area=document.getElementById("cust-area");area.innerHTML="";
  for(let i=0;i<Math.min(getBaseCust(),12);i++){
    const d=document.createElement("div");d.className="cust";d.textContent="👨";area.appendChild(d);
  }
}
function renderOrders(){
  const list=document.getElementById("order-list");list.innerHTML="";
  if(!GS.orders||GS.orders.length===0){list.innerHTML='<div style="padding:10px;color:#a0a0b0">Đang chờ khách...</div>';return;}
  GS.orders.forEach((order,i)=>{
    const item=MENU_ITEMS.find(m=>m.id===order.menuId);if(!item)return;
    const div=document.createElement("div");div.className="order";
    div.innerHTML='<div class="order-info">'+item.icon+' '+item.name+'</div><div><span class="order-price">'+item.price+'₫</span> <button class="btn-serve" onclick="serveOrder('+i+')">Phục vụ</button></div>';
    list.appendChild(div);
  });
}
function renderMenu(){
  const list=document.getElementById("menu-list");list.innerHTML="";
  const unlocked=MENU_ITEMS.filter(m=>!m.locked||GS.ownedRecipes.includes(m.id));
  unlocked.forEach(item=>{
    const div=document.createElement("div");div.className="mi";
    div.innerHTML='<span>'+item.icon+' '+item.name+'</span><span class="price">'+fmt(item.price)+'₫</span>';
    list.appendChild(div);
  });
}
function renderStats(){
  const list=document.getElementById("stats-list");list.innerHTML="";
  const profit=GS.dailyRevenue-GS.dailyCosts;
  const rows=[
    ["Tổng phục vụ",GS.totalServed],
    ["Doanh thu hôm nay",GS.dailyRevenue+"₫"],
    ["Chi phí hôm nay",GS.dailyCosts+"₫"],
    ["Profit hôm nay",profit+"₫"],
    ["Items sở hữu",Object.values(GS.ownedItems).reduce((a,b)=>a+b,0)],
    ["Nhân viên",GS.staff.length+"/"+LOCS[GS.currentLocation].maxStaff],
    ["Ngày thứ",GS.gameDay],
    ["Quán mở",GS.unlockedLocations.length]
  ];
  rows.forEach(([l,v])=>{const d=document.createElement("div");d.className="sr";d.innerHTML='<span>'+l+'</span><span class="val">'+v+'</span>';list.appendChild(d);});
}
function renderShop(){
  const list=document.getElementById("shop-list");list.innerHTML="";
  const available=TREND_ITEMS.filter(item=>!GS.ownedItems[item.id]||GS.ownedItems[item.id]<=0);
  if(available.length===0){list.innerHTML='<div style="padding:10px;color:#a0a0b0">Đã sở hữu hết!</div>';return;}
  const rc={common:"#b0b0b0",rare:"#4169E1",epic:"#9932CC",legend:"#FFD700"};
  available.forEach(item=>{
    const div=document.createElement("div");div.className="pnl-item";div.style.borderLeftColor=rc[item.rarity];
    div.innerHTML='<div class="detail"><div class="nm">'+item.name+'</div><div class="desc">'+item.desc+'</div><span class="badge '+item.rarity+'">'+item.rarity+'</span></div><div style="text-align:right"><div class="cost">'+fmt(item.cost)+'₫</div><button class="btn-buy" onclick="buyItem(\''+item.id+'\')" '+(GS.coins<item.cost?'disabled':'')+'>Mua</button></div>';
    list.appendChild(div);
  });
}
function renderItems(){
  const list=document.getElementById("items-list");list.innerHTML="";
  const owned=Object.entries(GS.ownedItems).filter(([k,v])=>v>0);
  if(owned.length===0){list.innerHTML='<div style="padding:10px;color:#a0a0b0">Chưa có items!</div>';return;}
  const rc={common:"#b0b0b0",rare:"#4169E1",epic:"#9932CC",legend:"#FFD700"};
  owned.forEach(([itemId,count])=>{
    const item=TREND_ITEMS.find(i=>i.id===itemId);if(!item)return;
    const div=document.createElement("div");div.className="pnl-item";div.style.borderLeftColor=rc[item.rarity];
    div.innerHTML='<div><div class="nm">'+item.name+'</div><div class="desc">'+item.desc+' ×'+count+'</div><span class="badge '+item.rarity+'">'+item.rarity+'</span></div>';
    list.appendChild(div);
  });
}
function renderStaff(){
  const list=document.getElementById("staff-list");list.innerHTML="";
  const loc=LOCS[GS.currentLocation];
  list.innerHTML+='<div style="margin-bottom:10px;font-size:12px;color:#a0a0b0">Số lượng: '+GS.staff.length+'/'+loc.maxStaff+'</div>';
  STAFF_TIERS.forEach(tier=>{
    const div=document.createElement("div");div.className="pnl-item";div.style.borderLeftColor="#4285F4";
    div.innerHTML='<div><div class="nm">'+tier.emoji+' '+tier.name+'</div><div class="desc">Lương: '+fmt(tier.salary)+'₫/ngày | Skill: '+tier.skill+'</div></div><div style="text-align:right"><div class="cost">'+fmt(tier.salary*3)+'₫</div><button class="btn-buy" onclick="hireStaff(\''+tier.id+'\')" '+(GS.coins<tier.salary*3||GS.staff.length>=loc.maxStaff?'disabled':'')+'>Thuê</button></div>';
    list.appendChild(div);
  });
  GS.staff.forEach(s=>{
    const tier=STAFF_TIERS.find(t=>t.id===s.tier);
    const div=document.createElement("div");div.className="staff-card";
    div.innerHTML='<div class="nm">'+tier?tier.emoji:''+' '+s.name+'</div><div class="tier">'+(tier?tier.name:'?')+'</div><div class="skill-row"><span>⚡'+s.brew+'</span><span>⭐'+s.quality+'</span><span>🎯'+s.service+'</span></div><div class="stat-row"><span class="label">Mood</span><span class="val">'+s.mood.toFixed(0)+'</span></div><div class="stat-row"><span class="label">Loyalty</span><span class="val">'+s.loyalty.toFixed(0)+'</span></div><div style="margin-top:4px"><button class="btn-buy" style="background:#FF9800" onclick="trainStaff(\''+s.id+'\')">Huấn luyện</button> <button class="btn-buy" style="background:#f44336" onclick="fireStaff(\''+s.id+'\')">Sa thải</button></div>';
    list.appendChild(div);
  });
}
function trainStaff(sid){
  const s=GS.staff.find(x=>x.id===sid);if(!s)return;if(GS.coins<500){showNotif("❌ Cần 500₫!");return;}GS.coins-=500;s.skill+=0.1;showNotif("📚 Huấn luyện "+s.name+"!");saveGame();renderAll();
}
function fireStaff(sid){const i=GS.staff.findIndex(x=>x.id===sid);if(i<0)return;GS.staff.splice(i,1);showNotif("👋 Đã sa thải");saveGame();renderAll();}
function renderSupply(){
  const list=document.getElementById("supply-list");list.innerHTML="";
  Object.entries(GS.supplierStock).forEach(([key,val])=>{
    const div=document.createElement("div");div.className="sup-item";
    div.innerHTML='<span class="nm">'+key+'</span><span class="stock">'+val+'</span>';
    list.appendChild(div);
  });
  Object.entries(SUPPLIERS).forEach(([key,list2])=>{
    list2.forEach((item,ti)=>{
      const cost=Math.ceil(item.price*10);
      const div=document.createElement("div");div.className="sup-item";
      div.innerHTML='<span class="nm">'+key+' (Tier '+ti+') '+item.quality*100+'%</span><span class="cost">'+fmt(item.price)+'đ/đv</span><span class="stock">×10</span><button class="btn-order" onclick="orderSupply(\''+key+'\',\''+ti+'\')" '+(GS.coins<cost?'disabled':'')+'>Mua ('+fmt(cost)+'₫)</button>';
      list.appendChild(div);
    });
  });
}
function renderMenuSet(){
  const list=document.getElementById("menu-set-list");list.innerHTML="";
  MENU_ITEMS.forEach(item=>{
    const unlocked=!item.locked||GS.ownedRecipes.includes(item.id);
    const pricePct=Math.round(GS.menuPrices[item.id]*100);
    const div=document.createElement("div");div.className="sup-item";
    div.innerHTML='<span class="nm">'+item.icon+' '+item.name+(unlocked?'':' <span class="badge locked">🔒</span>')+'</span>';
    if(unlocked){
      div.innerHTML+='<div class="price-ctrl"><span class="pct">70%</span><input type="range" min="70" max="130" value="'+pricePct+'" oninput="setPrice(\''+item.id+'\',this.value/100)" step="5"><span class="pct">130%</span></div>';
    }else{
      div.innerHTML+='<button class="btn-buy" onclick="buyRecipe(\''+item.id+'\')" '+(GS.coins<item.unlockCost?'disabled':'')+'>Mở khóa ('+fmt(item.unlockCost)+'₫)</button>';
    }
    list.appendChild(div);
  });
}
function renderMP(){
  const list=document.getElementById("mp-list");list.innerHTML="";
  list.innerHTML+='<div style="padding:10px;background:#0f3460;border-radius:8px;margin-bottom:8px"><h4 style="color:#FFD700;margin-bottom:8px">🌐 Multiplayer</h4><div>Player ID: guest_1</div><div>Leaderboard Score: '+fmt(GS.totalRevenue)+'₫</div><div>Khách phục vụ: '+GS.totalServed+'</div></div>';
  list.innerHTML+='<div style="padding:10px;background:#0f3460;border-radius:8px"><h4 style="color:#FFD700;margin-bottom:8px">🏆 Top 10</h4><div style="color:#a0a0b0;font-size:12px">Coming soon...</div></div>';
}

// ===== EVENT LISTENERS =====
document.querySelectorAll(".nav-btn").forEach(btn=>{btn.addEventListener("click",()=>{document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".pnl").forEach(p=>p.classList.remove("active"));btn.classList.add("active");document.getElementById(btn.dataset.tab).classList.add("active");})});

// ===== GAME LOOP =====
function startGameLoop(){
  setInterval(()=>{
    const now=Date.now();const delta=(now-GS.lastTick)/1000;GS.lastTick=now;
    if(GS.autoServeRate>0){const served=Math.floor(GS.autoServeRate*delta/60);if(served>0){GS.coins+=served*25;GS.dailyRevenue+=served*25;GS.totalRevenue+=served*25;GS.totalServed+=served;saveGame();}}
    if(now-GS.lastDayChange>60000){GS.gameDay++;GS.lastDayChange=now;GS.dailyCosts=GS.staff.reduce((a,s)=>a+STAFF_TIERS.find(t=>t.id===s.tier)?.salary||0,0);}
    renderAll();
  },1000);
  // Spawn orders every 15 seconds
  setInterval(()=>{
    const loc=LOCS[GS.currentLocation];
    const w=getCurrentWeather();
    const expected=Math.floor(loc.baseCust*w.mod);
    if(GS.orders&&GS.orders.length<expected){
      const item=MENU_ITEMS[Math.floor(Math.random()*MENU_ITEMS.filter(m=>!m.locked||GS.ownedRecipes.includes(m.id)).length)];
      if(item){GS.orders.push({menuId:item.id})}
    }
  },15000);
  // Auto-save every 30s
  setInterval(saveGame,30000);
}

// ===== INIT =====
function init(){loadGame();renderAll();startGameLoop();showNotif("☕ Quán Trendy Café v3.1!");}

// Make global
window.serveOrder=serveOrder;window.buyItem=buyItem;window.buyRecipe=buyRecipe;
window.hireStaff=hireStaff;window.fireStaff=fireStaff;window.trainStaff=trainStaff;
window.orderSupply=orderSupply;window.setPrice=setPrice;window.unlockLocation=unlockLocation;window.sellLocation=sellLocation;
window.onload=init;
</script>
</body>
</html>
