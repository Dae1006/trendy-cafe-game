<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Trendy Cafe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#1a1a2e;color:#e8e8e8;max-width:480px;margin:0 auto;min-height:100vh;font-size:12px}
#hdr{padding:10px 15px;background:#16213e;border-bottom:3px solid #FFD700;display:flex;justify-content:space-between}
.gold{color:#FFD700}
#tabs{display:flex;overflow-x:auto;border-bottom:2px solid #0f3460}
.tab{padding:10px 15px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;cursor:pointer;white-space:nowrap;font-size:12px}
.tab.active{color:#FFD700;background:rgba(255,215,0,0.15)}
#content{min-height:400px;padding:15px;background:#1a1a2e}
.card{padding:10px;margin:8px 0;background:#0f3460;border:2px solid #000;display:flex;justify-content:space-between;align-items:center}
.btn{padding:8px 16px;border:2px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:12px;margin:4px}
.btn:disabled{background:#555;cursor:not-allowed}
.btn.green{background:#28a745}
.empty{padding:20px;text-align:center;color:#a0a0b0}
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#0f3460;color:#FFD700;padding:8px 16px;border:2px solid #FFD700;font-size:12px;z-index:999;display:none}
</style>
</head>
<body>
<div id="notif"></div>

<div id="hdr">
  <span>💰 <span class="gold" id="coins">500</span></span>
  <span>Lv<span class="gold" id="lv">1</span> | Rep <span class="gold" id="rep">50</span></span>
</div>

<div id="tabs">
  <button class="tab active" data-tab="orders">📋Orders</button>
  <button class="tab" data-tab="menu">🍽️Menu</button>
  <button class="tab" data-tab="stats">📊Stats</button>
  <button class="tab" data-tab="staff">👥Staff</button>
  <button class="tab" data-tab="shop">🛒Shop</button>
</div>

<div id="content">
  <div id="panel-orders"></div>
  <div id="panel-menu" style="display:none"></div>
  <div id="panel-stats" style="display:none"></div>
  <div id="panel-staff" style="display:none"></div>
  <div id="panel-shop" style="display:none"></div>
</div>

<script>
// GAME STATE
var G = {
  coins: 500,
  lv: 1,
  rep: 50,
  tab: 'orders',
  staff: [],
  items: {},
  orders: [
    {id: 1, name: 'Black Coffee', icon: '☕', price: 25},
    {id: 2, name: 'Milk Coffee', icon: '🥛', price: 30},
    {id: 3, name: 'Espresso', icon: '☕', price: 35}
  ]
};

var MENU = [
  {id: 'coffee', name: 'Black Coffee', icon: '☕', price: 25, cost: 5},
  {id: 'milk_coffee', name: 'Milk Coffee', icon: '🥛', price: 30, cost: 8},
  {id: 'espresso', name: 'Espresso', icon: '☕', price: 35, cost: 5},
  {id: 'matcha', name: 'Matcha Tea', icon: '🍵', price: 40, cost: 10},
  {id: 'bubble_tea', name: 'Bubble Tea', icon: '🧋', price: 50, cost: 12},
  {id: 'smoothie', name: 'Smoothie', icon: '🥤', price: 45, cost: 12}
];

var TREND = [
  {id: 't_dog', name: 'Golden Doge', r: 'common', cost: 200, desc: '+5% revenue'},
  {id: 't_cat', name: 'Stray Cat', r: 'common', cost: 150, desc: '+3% revenue'},
  {id: 't_girl', name: 'Girly Style', r: 'rare', cost: 1000, desc: '+10% revenue'},
  {id: 't_sieu', name: 'Super Speed', r: 'epic', cost: 8000, desc: '+5 customers'}
];

var STAFF = [
  {id: 'barista', name: '☕ Barista', cost: 300, sk: 0.6},
  {id: 'chef', name: '👨‍🍳 Chef', cost: 400, sk: 0.7},
  {id: 'senior', name: '🧑‍💼 Senior', cost: 800, sk: 0.9}
];

// === SHOW NOTIFICATION ===
function show(msg) {
  var el = document.getElementById('notif');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2000);
}

// === RENDER FUNCTIONS ===
function renderOrders() {
  var el = document.getElementById('panel-orders');
  if (!el) return;
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">📋 Orders</h3>';
  if (G.orders.length === 0) {
    html += '<div class="empty">⏳ No orders yet...</div>';
  } else {
    for (var i = 0; i < G.orders.length; i++) {
      var o = G.orders[i];
      html += '<div class="card">' +
        '<div><strong>' + o.icon + ' ' + o.name + '</strong></div>' +
        '<div><span class="gold">' + o.price + '₫</span> ' +
        '<button class="btn green" onclick="serveOrder(' + i + ')">SERVE</button></div></div>';
    }
  }
  el.innerHTML = html;
}

function renderMenu() {
  var el = document.getElementById('panel-menu');
  if (!el) return;
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">🍽️ Menu</h3>';
  for (var i = 0; i < MENU.length; i++) {
    var m = MENU[i];
    html += '<div class="card"><div><strong>' + m.icon + ' ' + m.name + '</strong><div style="color:#a0a0b0;font-size:10px">Cost: ' + m.cost + '₫</div></div><div><span class="gold">~' + m.price + '₫</span></div></div>';
  }
  el.innerHTML = html;
}

function renderStats() {
  var el = document.getElementById('panel-stats');
  if (!el) return;
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">📊 Statistics</h3>' +
    '<div style="font-size:12px;line-height:2">' +
    '<span style="color:#a0a0b0">Coins:</span> <span class="gold">' + G.coins + '₫</span><br>' +
    '<span style="color:#a0a0b0">Level:</span> <span class="gold">Lv' + G.lv + '</span><br>' +
    '<span style="color:#a0a0b0">Reputation:</span> <span class="gold">' + G.rep + '</span><br>' +
    '<span style="color:#a0a0b0">Staff:</span> <span class="gold">' + G.staff.length + '/6</span><br>' +
    '<span style="color:#a0a0b0">Items:</span> <span class="gold">' + Object.keys(G.items).length + '</span></div>';
  el.innerHTML = html;
}

function renderStaff() {
  var el = document.getElementById('panel-staff');
  if (!el) return;
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">👥 Hire Staff (' + G.staff.length + '/6)</h3>';
  for (var i = 0; i < STAFF.length; i++) {
    var s = STAFF[i];
    html += '<div class="card">' +
      '<div><strong>' + s.name + '</strong><div style="color:#a0a0b0;font-size:10px">Skill: ' + Math.floor(s.sk * 100) + '%</div></div>' +
      '<div><span class="gold">' + s.cost + '₫</span> ' +
      '<button class="btn green" onclick="hireStaff(\'' + s.id + '\')">HIRE</button></div></div>';
  }
  el.innerHTML = html;
}

function renderShop() {
  var el = document.getElementById('panel-shop');
  if (!el) return;
  var html = '<h3 style="color:#FFD700;margin-bottom:8px">🛒 Trend Shop</h3>';
  for (var i = 0; i < TREND.length; i++) {
    var t = TREND[i];
    var bought = G.items[t.id];
    html += '<div class="card">' +
      '<div><strong>' + t.name + '</strong><div style="color:#a0a0b0;font-size:10px">' + t.desc + '</div></div>' +
      '<div><span class="gold">' + t.cost + '₫</span> ' +
      '<button class="btn" onclick="buyItem(\'' + t.id + '\')" ' + (bought ? 'disabled' : '') + '>' + (bought ? 'OWNED' : 'BUY') + '</button></div></div>';
  }
  el.innerHTML = html;
}

// === ACTIONS ===
function serveOrder(idx) {
  if (idx < 0 || idx >= G.orders.length) return;
  var o = G.orders[idx];
  G.coins += o.price;
  G.orders.splice(idx, 1);
  show('✅ Served: ' + o.name + ' (+' + o.price + '₫)');
  updateUI();
}

function buyItem(id) {
  var t = TREND.filter(function(x) { return x.id === id; })[0];
  if (!t || G.coins < t.cost || G.items[id]) return;
  G.coins -= t.cost;
  G.items[id] = 1;
  show('✅ Bought: ' + t.name);
  updateUI();
}

function hireStaff(id) {
  if (G.staff.length >= 6) { show('❌ Staff full!'); return; }
  var s = STAFF.filter(function(x) { return x.id === id; })[0];
  if (!s) return;
  if (G.coins < s.cost) { show('❌ Not enough coins!'); return; }
  G.coins -= s.cost;
  G.staff.push({id: id, name: s.name, skill: s.sk, mood: 100});
  show('✅ Hired: ' + s.name);
  updateUI();
}

// === UPDATE UI ===
function updateUI() {
  document.getElementById('coins').textContent = G.coins;
  document.getElementById('lv').textContent = G.lv;
  document.getElementById('rep').textContent = G.rep;
  
  if (G.tab === 'orders') renderOrders();
  else if (G.tab === 'menu') renderMenu();
  else if (G.tab === 'stats') renderStats();
  else if (G.tab === 'staff') renderStaff();
  else if (G.tab === 'shop') renderShop();
}

// === TAB SWITCHING ===
var tabs = document.querySelectorAll('.tab');
for (var i = 0; i < tabs.length; i++) {
  (function(tab) {
    tab.addEventListener('click', function() {
      var tabName = this.getAttribute('data-tab');
      G.tab = tabName;
      
      // Update tab buttons
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].classList.remove('active');
      }
      this.classList.add('active');
      
      // Update panels
      var panels = document.querySelectorAll('[id^="panel-"]');
      for (var k = 0; k < panels.length; k++) {
        panels[k].style.display = 'none';
      }
      var panel = document.getElementById('panel-' + tabName);
      if (panel) panel.style.display = 'block';
      
      updateUI();
    });
  })(tabs[i]);
}

// === AUTO SERVE (every 8s if staff hired) ===
setInterval(function() {
  if (G.staff.length === 0 || G.orders.length === 0) return;
  for (var i = 0; i < G.staff.length; i++) {
    var s = G.staff[i];
    var served = Math.floor(s.skill * (s.mood / 100));
    if (served > 0) {
      var o = G.orders[0];
      G.coins += Math.floor(o.price * 0.8);
      G.orders.splice(0, 1);
      s.mood = Math.max(0, s.mood - 3);
      show('🤖 Auto: ' + s.name + ' served ' + o.name);
      updateUI();
    }
  }
}, 8000);

// === START ===
console.log('✅ Game started!');
console.log('✅ Tabs:', tabs.length);
console.log('✅ Orders:', G.orders.length);
updateUI();
</script>
</body>
</html>
