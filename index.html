<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Café — Pixel Art Edition</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* Pixel font fallback for emoji sprites */
  .pixel-emoji {
    image-rendering: pixelated;
    display: inline-block;
    width: 32px;
    height: 32px;
    text-align: center;
    line-height: 32px;
  }
</style>
</head>
<body>
<div id="game-container">
    <!-- HEADER -->
    <div id="header">
        <div id="player-info">
            <span>💰</span>
            <span id="coin-amount">500</span>
        </div>
        <div id="level-info">
            <span>Lv</span>
            <span id="player-level">1</span>
            <span>⭐</span>
            <span id="xp-amount">0</span>/<span id="xp-needed">100</span>
        </div>
    </div>
    <div id="xp-bar-container">
        <div id="xp-bar" style="width:0%"></div>
    </div>

    <!-- WEATHER -->
    <div id="weather-display">
        <span id="weather-emoji">☀️</span>
        <span id="weather-text">Nắng — Trời nắng — khách mua nước đá tăng!</span>
    </div>

    <!-- TREND BANNER -->
    <div id="trend-banner">
        <span>🔥</span>
        <div id="trend-text">Chào mừng đến Quán Trendy Café! 🎮 Pixel Art Edition ☕</div>
        <span>🔥</span>
    </div>

    <!-- LOCATION BAR -->
    <div id="location-bar">
        <button class="loc-btn active" data-loc="street">🚶 Vỉa hè</button>
        <button class="loc-btn" data-loc="mall">🏬 Mall</button>
        <button class="loc-btn" data-loc="garden">🌳 Sân vườn</button>
        <button class="loc-btn" data-loc="rooftop" disabled>🌃 Rooftop</button>
        <button class="loc-btn" data-loc="festival" disabled>🎪 Lễ hội</button>
    </div>

    <!-- CAFE SCENE DISPLAY -->
    <div id="cafe-display">
        <div id="cafe-scene">
            <div id="cafe-bg" class="weather-sunny"></div>
            <div id="customers-container"></div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div id="bottom-nav">
        <button class="nav-btn active" data-tab="orders">📋 Order</button>
        <button class="nav-btn" data-tab="menu">🍽️ Menu</button>
        <button class="nav-btn" data-tab="stats">📊 Stats</button>
        <button class="nav-btn" data-tab="staff">👥 Staff</button>
        <button class="nav-btn" data-tab="shop">🛒 Shop</button>
        <button class="nav-btn" data-tab="items">🎒 Items</button>
        <button class="nav-btn" data-tab="market">⚡ Market</button>
        <button class="nav-btn" data-tab="quests">📌 Quest</button>
        <button class="nav-btn" data-tab="upgrades">⬆️ Upgrade</button>
    </div>

    <!-- PANELS CONTAINER -->
    <div id="panels-container">
        <!-- ORDERS PANEL -->
        <div id="orders-panel" class="panel active">
            <h3>📋 ĐƠN HÀNG</h3>
            <div id="orders-list"></div>
        </div>

        <!-- MENU PANEL -->
        <div id="menu-panel" class="panel">
            <h3>🍽️ MENU</h3>
            <div id="menu-list"></div>
        </div>

        <!-- STATS PANEL -->
        <div id="stats-panel" class="panel">
            <h3>📊 THỐNG KÊ</h3>
            <div id="stats-list"></div>
        </div>

        <!-- STAFF PANEL -->
        <div id="staff-panel" class="panel">
            <h3>👥 NHÂN VIÊN</h3>
            <div id="staff-hire-area"></div>
            <h3 style="margin-top:10px">👥 ĐỘI NGŨ</h3>
            <div id="staff-list"></div>
        </div>

        <!-- SHOP PANEL -->
        <div id="shop-panel" class="panel">
            <h3>🛒 SHOP TRENDY</h3>
            <div id="shop-menu-list"></div>
        </div>

        <!-- ITEMS PANEL -->
        <div id="items-panel" class="panel">
            <h3>🎒 BỘ SƯU TẬP</h3>
            <div id="items-filter">
                <button class="filter-btn active" data-filter="all">Tất cả</button>
                <button class="filter-btn" data-filter="common">Common</button>
                <button class="filter-btn" data-filter="rare">Rare</button>
                <button class="filter-btn" data-filter="epic">Epic</button>
                <button class="filter-btn" data-filter="legendary">Legendary</button>
            </div>
            <div id="items-list"></div>
        </div>

        <!-- MARKET PANEL -->
        <div id="market-panel" class="panel">
            <h3>⚡ CHỢ ĐỔI LỘC</h3>
            <div id="market-tabs">
                <button class="market-tab active">Mua</button>
                <button class="market-tab">Bán</button>
            </div>
            <div id="market-list"></div>
        </div>

        <!-- QUESTS PANEL -->
        <div id="quests-panel" class="panel">
            <h3>📌 NHIỆM VỤ</h3>
            <div id="quest-trend-banner">🎮 Hoàn thành nhiệm vụ để nhận phần thưởng!</div>
            <div id="quests-list"></div>
        </div>

        <!-- UPGRADES PANEL -->
        <div id="upgrades-panel" class="panel">
            <h3>⬆️ NÂNG CẤP</h3>
            <div id="upgrades-list"></div>
        </div>
    </div>
</div>

<script src="src/weather.js"></script>
<script src="src/staff.js"></script>
<script src="src/suppliers.js"></script>
<script src="src/feedback.js"></script>
<script src="src/ads.js"></script>
<script src="game_engine_v2.js"></script>
</body>
</html>
