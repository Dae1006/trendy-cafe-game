<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trendy Cafe v2.0</title>
<style>
/* === RESET === */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#1a1a2e;color:#e8e8e8;min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.6}

/* === VARIABLES === */
:root{--primary:#8B4513;--accent:#FF6347;--gold:#FFD700;--bg:#1a1a2e;--mid:#16213e;--card:#0f3460;--dim:#a0a0b0}

/* === HEADER === */
#hdr{display:flex;justify-content:space-between;padding:10px 15px;background:linear-gradient(135deg,var(--bg),var(--card));border-bottom:4px solid var(--gold)}
.coin-display,.level-display{display:flex;gap:6px;align-items:center;font-size:12px}
#coins,#xp,#xpn{color:#FFD700}

/* === XP BAR === */
#xp-wrap{width:100%;height:8px;background:#333;border-bottom:2px solid #000}
#xp-bar{height:100%;background:linear-gradient(90deg,#4169E1,#9932CC)}

/* === WEATHER === */
#weather{padding:6px 15px;background:#FF6347;display:flex;align-items:center;font-size:12px;border-bottom:4px solid #000}

/* === TABS === */
.tab-bar{display:flex;gap:4px;padding:8px 10px;background:var(--bg);overflow-x:auto;border-bottom:4px solid var(--primary)}
.nav-btn{flex:1;min-width:55px;padding:7px 4px;border:2px solid #000;background:var(--card);color:var(--dim);font-size:11px;cursor:pointer;font-family:'Courier New',monospace}
.nav-btn.on{background:#8B4513;color:#fff;border-color:#FFD700}

/* === CANVAS === */
#scene-wrap{position:relative;height:220px;overflow:hidden;background:#000;border-bottom:4px solid var(--primary)}
#scene-canvas{width:100%;height:100%;display:block}

/* === PANELS === */
#pnl{min-height:200px}
.pan{display:none;padding:15px;background:var(--mid)}
.pan.on{display:block}

/* === LISTS === */
#ol,#ml,#cl,#fl,#il,#ql,#ul,#al,#sll,#slp,#so,#hl{display:flex;flex-direction:column;gap:5px}

/* === CARDS === */
.card{display:flex;align-items:center;padding:10px;background:var(--card);margin-bottom:8px;border:2px solid #000;border-left:4px solid var(--dim)}
.card .pr{color:#FFD700;font-weight:bold}
.card .name{flex:1;font-weight:bold;font-size:12px;line-height:1.8}

/* === BUTTONS === */
button,.btn{padding:6px 14px;border:2px solid #000;background:#FF6347;color:#fff;font-size:12px;cursor:pointer;font-family:'Courier New',monospace}
button:hover, .btn:hover{background:#E55A3D}
button:disabled{background:#555;cursor:not-allowed}

/* === MODAL === */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal.hidden{display:none}
.modal-content{background:var(--mid);width:90%;max-width:400px;border:4px solid var(--gold);padding:15px;font-family:'Courier New',monospace}

/* === NOTIFICATION === */
#notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#8B4513;color:#fff;padding:10px 20px;border:3px solid var(--gold);z-index:9999;font-size:12px;display:none}

/* === LOADING === */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;font-family:'Courier New',monospace}
.spinner{width:48px;height:48px;border:6px solid #D2691E;border-top-color:#FFD700;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#8B451E;border:1px solid #000}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div style="margin-top:12px;font-size:12px;color:#a0a0b0">Opening cafe...</div></div>
<div id="notif"></div>

<div id="hdr">
  <div class="coin-display"><span style="color:#FFD700">$</span><span id="coins" style="color:#FFD700;font-weight:bold">500</span></div>
  <div class="level-display">Lv.<span id="lv" style="color:#FFD700;font-weight:bold">1</span> XP:<span id="xp" style="color:#FFD700;font-weight:bold">0</span>/<span id="xpn" style="color:#FFD700">100</span></div>
</div>
<div id="xp-wrap"><div id="xp-bar"></div></div>

<div id="weather">☀️ Sunny</div>
<div id="scene-wrap"><canvas id="scene-canvas"></canvas></div>
<div id="locs" class="tab-bar"></div>
<div id="nav" class="tab-bar"></div>

<div id="pnl">
  <div class="pan on" id="p-orders"><div id="ol"></div></div>
  <div class="pan" id="p-menu"><div id="ml"></div></div>
  <div class="pan" id="p-chart"><div id="cl"></div></div>
  <div class="pan" id="p-staff"><div id="hl"></div><div id="sll"></div></div>
  <div class="pan" id="p-supplier"><div id="slp"></div></div>
  <div class="pan" id="p-shop"><div id="so"></div></div>
  <div class="pan" id="p-items"><div id="fl"></div><div id="il"></div></div>
  <div class="pan" id="p-quests"><div id="ql"></div></div>
  <div class="pan" id="p-up"><div id="ul"></div></div>
  <div class="pan" id="p-achieve"><div id="al"></div></div>
</div>

<div id="modal" class="modal hidden"><div class="modal-content"><div id="modal-body"></div><button class="btn" onclick="closeModal()">Close</button></div></div>

<script src="game.js"></script>
</body>
</html>
