<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Trendy Cafe v7 — Play Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #FFD700;
    }
    .loading {
      font-size: 24px;
      color: #FFD700;
      text-align: center;
      padding: 40px;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      color: #FF6347;
      background: #1a0a0a;
      padding: 16px;
      border-radius: 8px;
      max-width: 500px;
      text-align: center;
      display: none;
    }
    .play-btn {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a2e;
      border: none;
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      margin: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(255, 215, 0, 0.4);
    }
    #game-container {
      display: none;
      width: 100%;
      max-width: 800px;
    }
    iframe {
      width: 100%;
      border: 2px solid #FFD700;
      border-radius: 8px;
      background: #0a0a1a;
    }
    .footer {
      margin-top: 20px;
      color: #555;
      font-size: 12px;
      text-align: center;
    }
    .footer a { color: #FFD700; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>☕ Đang tải Trendy Cafe...</div>
  </div>

  <div class="error" id="error"></div>

  <button class="play-btn" id="playBtn" style="display:none" onclick="loadGame()">
    ▶ CHƠI NGAY
  </button>

  <div id="game-container"></div>

  <div class="footer">
    Trendy Cafe v7 by <a href="https://github.com/Dae1006" target="_blank">Dae1006</a>
  </div>

  <script>
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
    }

    function loadGame() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('playBtn').style.display = 'none';

      const container = document.getElementById('game-container');
      container.style.display = 'block';

      // Load game.js as iframe
      const iframe = document.createElement('iframe');
      iframe.src = 'game.js';
      iframe.title = 'Trendy Cafe v7';
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms');
      container.appendChild(iframe);
    }

    // Try to load game.js directly
    fetch('game.js', { method: 'HEAD' })
      .then(res => {
        if (res.ok) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('playBtn').style.display = 'inline-block';
        } else {
          showError('Không thể tải game.js. Vui lòng kiểm tra lại.');
        }
      })
      .catch(err => {
        // If fetch fails (CORS), still show play button
        document.getElementById('loading').style.display = 'none';
        document.getElementById('playBtn').style.display = 'inline-block';
      });
  </script>
</body>
</html>
