*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.btn.g{background:var(--green)}.btn.o{background:var(--red)}

#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--gold);padding:8px 16px;border:3px solid var(--gold);box-shadow:0 4px 0 #000;font-size:8px;z-index:999;display:none;white-space:pre-line}
.flt-row{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}

.st-l{color:var(--dim)}.st-v{color:var(--gold)}

.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#1a1a2e,#0f3460);border:4px solid var(--gold);box-shadow:0 8px 0 #000;padding:16px 24px;font-size:9px;z-index:1000;transition:transform .3s cubic-bezier(.17,.67,.77,.33);white-space:nowrap;pointer-events:none}

.feedback-float{position:fixed;font-size:8px;z-index:998;pointer-events:none;animation:feedbackUp 2s forwards;white-space:nowrap}
@keyframes feedbackUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.mood-boost-btn{padding:2px 4px;font-size:7px;background:#9b59b6;border:2px solid #000;color:#fff;cursor:pointer;font-family:inherit;box-shadow:1px 1px 0 #000}

.combo-counter{text-align:center;padding:4px 0;font-size:8px;color:var(--gold)}
.urgent-order{border-left:4px solid #dc3545;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.rep-bar{height:8px;background:#333;border:1px solid #000;margin:4px 0;overflow:hidden}
.rep-fill{height:100%;background:linear-gradient(90deg,#dc3545,#FFD700,#28a745);width:50%}
</style>

function makeQs(){return[

  {id:'q3',title:'Triß╗çu ph├║ c├á ph├¬',desc:'Kiß║┐m 5000 coin',type:'earn',target:5000,reward:1000,xp:150,done:false,p:0},

]}
var G={coins:500,lv:1,xp:0,xpn:100,loc:'street',ul:['street'],items:{},ups:[],qs:makeQs(),rev:0,totalRev:0,served:0,day:1,
  staff:[],filter:'all',pendingOrders:[],comboCount:0,comboTimer:0,maxCombo:0,comboBuff:0,

// Tß║ío 3 ─æ╞ín h├áng mß║½u ngay khi mß╗ƒ game
for(var i=0;i<3;i++){var mi=MENU[i%MENU.length];G.pendingOrders.push(Object.assign({},mi,{uid:Date.now()+Math.random(),arrivedAt:Date.now(),patience:120000}));G.currentCustomers=3;}
var _lastTick=0;
function fm(n){return n?n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','):0;}
function getRepMod(){var r=G.reputation||50;if(r<=20)return .3;if(r<=40)return .6;if(r<=60)return 1.0;if(r<=80)return 1.3;return 1.6;}
function getBuff(){var r=1;r+=(G.comboBuff||0);var ids=Object.keys(G.items);for(var i=0;i<ids.length;i++){var id=ids[i];var t=TREND.filter(function(x){return x.id===id;})[0];if(t){if(t.ef==='rev')r+=t.v*(G.items[id]||0);if(t.ef==='all')r+=t.v*(G.items[id]||0);}}var uids=Object.keys(G.ups).map(Number);for(var i=0;i<uids.length;i++){var u=UPGRADES.filter(function(x){return x.id===uids[i];})[0];if(u&&u.type==='rev')r+=u.v}var w=getWeather();r*=w.rm;r*=getRepMod();return r;}
function getCusts(){var l=LOCS.filter(function(x){return x.id===G.loc;})[0];var base=l.cust;base=Math.floor(base*getRepMod());var w=getWeather();base=Math.floor(base*(w.cMod||1));var ids=Object.keys(G.items);for(var i=0;i<ids.length;i++){var id=ids[i];var t=TREND.filter(function(x){return x.id===id;})[0];if(t&&t.ef==='cust')base+=t.v*(G.items[id]||0);}var uids=Object.keys(G.ups).map(Number);for(var i=0;i<uids.length;i++){var u=UPGRADES.filter(function(x){return x.id===uids[i];})[0];if(u&&u.type==='cust')base=Math.floor(base*(1+u.v));}return base;}

function getComboBuff(){if(G.comboCount>=3){var levels=Math.min(G.comboCount-2,5);return levels*.05;}return 0;}

function showFb(taste,svc,amb){var fB={1:'≡ƒÿí',2:'≡ƒÿò',3:'≡ƒÖé',4:'≡ƒÿè',5:'≡ƒñ⌐'};var fT={1:'Qu├í tß╗ç!',2:'Kh├┤ng ngon...',3:'Kh├í ß╗òn.',4:'Ngon lß║»m!',5:'Tuyß╗çt vß╗¥i! Γ¥ñ∩╕Å'};var el=document.createElement('div');el.className='feedback-float';el.style.left=(20+Math.random()*60)+'%';el.style.top=(30+Math.random()*30)+'%';el.innerHTML='<span style="font-size:16px">'+fB[taste]+'</span> <span style="color:'+(taste>=4?'#FFD700':'#dc3545')+'">'+fT[taste]+'</span>';document.body.appendChild(el);setTimeout(function(){el.remove()},2000);}
function recFb(isCombo,isFast){var base=3;if(G.staff.length>0){var s=0;for(var i=0;i<G.staff.length;i++)s+=G.staff[i].sk;var avg=s/G.staff.length;base+=Math.floor(avg*.5);}if(isCombo)base=Math.min(5,base+1);var taste=Math.max(1,Math.min(5,base+Math.floor(Math.random()*3-1)));var svc=Math.max(1,Math.min(5,(isFast?4:2)+Math.floor(Math.random()*2-1)));var amb=Math.max(1,Math.min(5,3+Math.floor(Math.random()*3-1)));G.feedbackHistory.push({taste:taste,service:svc,ambiance:amb,time:Date.now()});if(G.feedbackHistory.length>20)G.feedbackHistory.shift();return {taste:taste,service:svc,ambiance:amb};}

function calcAuto(){if(G.staff.length===0)return 0;var c=0;for(var i=0;i<G.staff.length;i++)c+=Math.floor(G.staff[i].sk*(G.staff[i].mood/100));return Math.max(0,c);}
function render(){document.getElementById('coins').textContent=fm(G.coins);document.getElementById('lv').textContent=G.lv;document.getElementById('xp').textContent=G.xp;document.getElementById('xpn').textContent=G.xpn;document.getElementById('xp-bar').style.width=(G.xp/G.xpn*100)+'%';document.getElementById('rep-val').textContent=G.reputation||50;document.getElementById('rep-bar').style.width=((G.reputation||50)/100*100)+'%';renderLocs();renderWeather();renderCafe();renderOrders();renderMenu();renderStats();renderShop();renderStaff();renderItems();renderQuests();renderUpgrades();}
function renderLocs(){var el=document.getElementById('locs');if(!el)return;el.innerHTML='';for(var i=0;i<LOCS.length;i++){var l=LOCS[i];var b=document.createElement('button');b.className='lb'+(G.loc===l.id?' on':'');b.textContent=l.emoji+' '+l.name;b.disabled=G.ul.indexOf(l.id)<0;if(G.ul.indexOf(l.id)>=0)b.onclick=function(l){return function(){G.loc=l.id;render();}}(l);else b.onclick=function(l){return function(){if(G.coins>=l.cost){G.coins-=l.cost;G.ul.push(l.id);show('≡ƒöô Mß╗ƒ kh├│a: '+l.name+'!');chkQ('upgrade',1)}else show('Γ¥î Cß║ºn '+fm(l.cost)+'≡ƒÆ░');render();}}(l);el.appendChild(b);}}
function renderWeather(){var el=document.getElementById('weather');if(!el)return;var w=getWeather();el.textContent=w.e+' '+w.n+' (x'+w.rm+')'}
function renderCafe(){var bg=document.getElementById('cafe-bg');var sc=document.getElementById('custs');var l=LOCS.filter(function(x){return x.id===G.loc;})[0];if(bg)bg.style.background=l.bg;sc.innerHTML='';var n=Math.min(getCusts(),12);var emojis=['≡ƒæ¿ΓÇì≡ƒÆ╗','≡ƒæ⌐ΓÇì≡ƒÄ«','≡ƒºæΓÇì≡ƒÄ¿','≡ƒæ┤','≡ƒºÆ','≡ƒñô','≡ƒÿÄ','≡ƒÑ│','≡ƒæª','≡ƒæº','≡ƒæ⌐ΓÇì≡ƒÅ½','≡ƒºö'];for(var i=0;i<n;i++){var d=document.createElement('div');d.className='cust';d.textContent=emojis[Math.floor(Math.random()*emojis.length)];d.style.animationDelay=(Math.random()*1)+'s';d.style.fontSize=(20+Math.random()*8)+'px';if(G.staff.length>0){var am=0;for(var j=0;j<G.staff.length;j++)am+=G.staff[j].mood;am=am/G.staff.length;if(am<40)d.textContent+=' ≡ƒÿƒ';}sc.appendChild(d);}}
function custInterval(){var t=(getCusts()||3)*getRepMod();if(G.pendingOrders.length<t)return Math.max(3000,8000/(1+Math.floor(t/2)));return 15000;}
function addOrder(){var now=Date.now();if(!G._orderTimer)G._orderTimer=now;if(now-G._orderTimer<custInterval())return;G._orderTimer=now;var l=LOCS.filter(function(x){return x.id===G.loc;})[0];var maxO=Math.min(l.cust+Math.floor((getCusts()||3)*.3),8);if(G.pendingOrders.length>=maxO)return;var mi=MENU[Math.floor(Math.random()*MENU.length)];G.pendingOrders.push(Object.assign({},mi,{uid:Date.now()+Math.random(),arrivedAt:Date.now(),patience:120000}));if(G.pendingOrders.length>G.currentCustomers)G.currentCustomers=G.pendingOrders.length;}
function renderOrders(){var el=document.getElementById('ol');if(!el)return;var now=Date.now();chkCombo();for(var i=G.pendingOrders.length-1;i>=0;i--){var o=G.pendingOrders[i];if(now-o.arrivedAt>o.patience){G.reputation=Math.max(0,(G.reputation||50)-2);G.pendingOrders.splice(i,1);if(G.pendingOrders.length>G.currentCustomers)G.currentCustomers=G.pendingOrders.length;show('≡ƒÿí Khach bo di! Reputation -2');}}addOrder();if(!G._lastAutoServe)G._lastAutoServe=now;if(now-G._lastAutoServe>=3000){G._lastAutoServe=now;var sc=calcAuto();var as=Math.min(sc,G.pendingOrders.length);var ss=0;for(var i=0;i<as&&i<G.staff.length;i++){var s=G.staff[i];if(s.sk*(s.mood/100)>=.5){var o=G.pendingOrders[i];var b=getBuff();var e=Math.floor(o.price*b*.8);G.coins+=e;G.rev+=e;G.totalRev+=e;G.served++;G.totalServedToday++;addXP(5);chkQ('serve',1);chkQ('earn',e);G.staff[i].mood=Math.max(0,G.staff[i].mood-3);ss++;if(G.served%10===0){var f=recFb(false,false);showFb(f.taste,f.service,f.ambiance);}}if(ss>0)G.pendingOrders=G.pendingOrders.slice(ss);else G.pendingOrders=G.pendingOrders.slice(as);}if(G.pendingOrders.length===0){el.innerHTML='<div class="empty">ΓÅ│ Chß╗¥ kh├ích...</div>';return;}el.innerHTML='';if(G.comboCount>0){var ce=document.createElement('div');ce.className='combo-counter';ce.textContent='≡ƒöÑ Combo x'+G.comboCount+' (+'+Math.floor(G.comboBuff*100)+'%) c├▓n '+G.comboTimer+'s';ce.style.color=G.comboBuff>.15?'#28a745':'#FFD700';el.appendChild(ce);}for(var i=0;i<G.pendingOrders.length;i++){var o=G.pendingOrders[i];var b=getBuff();var p=Math.floor(o.price*b);var isU=i<2&&G.comboCount===0;var d=document.createElement('div');d.className='card'+(isU?' urgent-order':'');d.innerHTML='<div><span class="nm">'+o.icon+' '+o.name+'</span></div><div><span class="pr">'+fm(p)+'Γé½</span> <button class="btn g" onclick="serveOrder('+i+')">SERVE</button></div>';el.appendChild(d);}}
function serveOrder(idx){if(typeof idx!=='number'||idx<0||idx>=G.pendingOrders.length)return;var o=G.pendingOrders[idx];var b=getBuff();var e=Math.floor(o.price*b);var wt=(Date.now()-(o.arrivedAt||Date.now()))/1000;var isF=wt<30;G.coins+=e;G.rev+=e;G.totalRev+=e;G.served++;G.totalServedToday++;startCombo();var ic=G.comboCount>=3;addXP(10);chkQ('serve',1);chkQ('earn',e);G.pendingOrders.splice(idx,1);if(G.pendingOrders.length>0)G.currentCustomers=G.pendingOrders.length;var f=recFb(ic,isF);if(isF)G.reputation=Math.min(100,(G.reputation||50)+1);var msg='Γ£à +'+fm(e)+'Γé½ | '+o.name;if(ic)msg+=' ≡ƒöÑx'+G.comboCount;if(isF)msg+=' ΓÜíFast!';show(msg);showFb(f.taste,f.service,f.ambiance);render();}
function renderMenu(){var el=document.getElementById('ml');if(!el)return;el.innerHTML='';for(var i=0;i<MENU.length;i++){var mi=MENU[i];var d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+mi.icon+' '+mi.name+'</span><div style="color:#a0a0b0;font-size:7px">Cost: '+fm(mi.cost)+'Γé½</div></div><div style="text-align:right"><span class="pr">~'+fm(Math.floor(mi.price*getBuff()))+'Γé½</span></div>';el.appendChild(d);}}
function renderStats(){var el=document.getElementById('sl');if(!el)return;el.innerHTML='';var ac=calcAuto();var af=G.feedbackHistory.length>0?G.feedbackHistory.slice(-5).reduce(function(a,f){return a+f.taste;},0)/5:3;var rows=[['Ng├áy',G.day],['Level','Lv'+G.lv+' ('+G.xp+'/'+G.xpn+')'],['─É├ú phß╗Ñc vß╗Ñ',G.served],['Doanh thu h├┤m nay',fm(G.rev)+'Γé½'],['Tß╗òng doanh thu',fm(G.totalRev)+'Γé½'],['Coin',fm(G.coins)+'Γé½'],['Items',Object.keys(G.items).length],['Auto-serve','1nv/8s'],['Nh├ón vi├¬n',G.staff.length+'/6'],['Reputation',(G.reputation||50)+'/100'],['Combo hiß╗çn tß║íi',G.comboCount>0?'x'+G.comboCount+' (+'+Math.floor(G.comboBuff*100)+'%)':'Kh├┤ng c├│'],['Combo max','x'+(G.maxCombo||0)],['─É├ính gi├í TB',af.toFixed(1)+'Γ¡É']];for(var i=0;i<rows.length;i++){var r=rows[i];var d=document.createElement('div');d.className='st-row';d.innerHTML='<span class="st-l">'+r[0]+'</span><span class="st-v">'+r[1]+'</span>';el.appendChild(d);}}
function renderShop(){var el=document.getElementById('so');if(!el)return;el.innerHTML='';var avail=[];for(var id in G.items){if(!G.items[id])continue;}avail=TREND.filter(function(t){return !G.items[t.id]||G.items[t.id]<1;});if(avail.length===0){el.innerHTML='<div class="empty">Γ£à ─É├ú hß║┐t!</div>';return}var rc={common:'#b0b0b0',rare:'#4169E1',epic:'#9932CC',legendary:'#FFD700'};for(var i=0;i<avail.length;i++){var t=avail[i];var d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(rc[t.r]||'#b0b0b0');d.innerHTML='<div><span class="nm">'+t.name+'</span><div style="color:#a0a0b0;font-size:7px">'+t.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(t.cost)+'Γé½</span> <button class="btn" onclick="buyItem(\''+t.id+'\')">MUA</button></div>';el.appendChild(d);}}
function buyItem(id){var t=TREND.filter(function(x){return x.id===id;})[0];if(!t)return;if(G.coins<t.cost){show('Γ¥î Kh├┤ng ─æß╗º coin!');return;}G.coins-=t.cost;G.items[id]=(G.items[id]||0)+1;show('Γ£à Mua: '+t.name+'!');chkQ('collect',1);chkQ('collect_all',1);render();}
function renderItems(){var el=document.getElementById('il');if(!el)return;el.innerHTML='';var fl=document.getElementById('fl');if(!fl)return;fl.innerHTML='';var rc={common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary'};['all','common','rare','epic','legendary'].forEach(function(f){var b=document.createElement('button');b.className='flt-btn'+(G.filter===f?' on':'');b.textContent=f==='all'?'All':rc[f];b.onclick=function(){G.filter=f;render();};fl.appendChild(b)});var owned=[];for(var id in G.items)if(G.items[id]>0)owned.push([id,G.items[id]]);var filtered=G.filter==='all'?owned:owned.filter(function(pair){var t=TREND.filter(function(x){return x.id===pair[0];})[0];return t&&t.r===G.filter;});if(filtered.length===0){el.innerHTML='<div class="empty">≡ƒôª Ch╞░a c├│ items!</div>';return}for(var i=0;i<filtered.length;i++){var t=TREND.filter(function(x){return x.id===filtered[i][0];})[0];if(!t)continue;var d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid var(--'+(t.r==='legendary'?'gold':'dim')+')';d.innerHTML='<span class="nm">'+t.name+'</span><span class="pr">'+rc[t.r]+' ├ù'+filtered[i][1]+'</span>';el.appendChild(d)}}
function renderQuests(){var el=document.getElementById('ql');if(!el)return;el.innerHTML='';for(var i=0;i<G.qs.length;i++){var q=G.qs[i];var pct=Math.min(100,(q.p||0)/q.target*100);var d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(q.done?'var(--gold)':'var(--dim)');d.innerHTML='<div><span class="nm">'+(q.done?'Γ£à':'≡ƒôî')+' '+q.title+'</span><div style="color:#a0a0b0;font-size:7px">'+q.desc+'</div><div style="color:var(--gold);font-size:7px">≡ƒÄü '+q.reward+'≡ƒÆ░ '+q.xp+'XP</div></div><div><div class="r-bar"><div class="r-fill" style="width:'+pct+'%"></div></div><div style="font-size:7px;color:var(--dim)">'+Math.floor(q.p||0)+'/'+q.target+'</div></div>';el.appendChild(d)}}
function renderUpgrades(){var el=document.getElementById('ul');if(!el)return;el.innerHTML='';for(var i=0;i<UPGRADES.length;i++){var u=UPGRADES[i];var bought=G.ups.includes(u.id);var d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+u.name+'</span><div style="color:#a0a0b0;font-size:7px">'+u.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(u.cost)+'Γé½</span><button class="btn" onclick="buyUpgrade(\''+u.id+'\')" '+(bought||G.coins<u.cost?'disabled':'')+'>'+(bought?'Γ£à─É├ú mua':'MUA')+'</button></div>';el.appendChild(d)}}
function buyUpgrade(id){var u=UPGRADES.filter(function(x){return x.id===id;})[0];if(!u||G.coins<u.cost||G.ups.includes(id))return;G.coins-=u.cost;G.ups.push(id);show('Γ¼å∩╕Å '+u.name+'!');chkQ('upgrade',1);render();}
function renderStaff(){var hl=document.getElementById('hl');if(!hl)return;hl.innerHTML='';var ll=document.getElementById('sll');if(!ll)return;ll.innerHTML='';if(G.comboCount>0){var cd=document.createElement('div');cd.className='combo-counter';cd.innerHTML='≡ƒöÑ COMBO: x'+G.comboCount+' | +'+Math.floor(G.comboBuff*100)+'% rev';cd.style.color=G.comboBuff>.15?'#28a745':'#FFD700';hl.appendChild(cd);}var ct=document.createElement('div');ct.style.cssText='font-size:7px;color:#28a745;margin-bottom:6px';ct.textContent='≡ƒÆí Serve tay = COMBO! +5% rev mß╗ùi level!';hl.appendChild(ct);var hT=document.createElement('div');hT.style.cssText='font-size:10px;color:var(--gold);margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';hT.textContent='≡ƒôï THU├è NH├éN VI├èN';hl.appendChild(hT);var aL=document.createElement('div');aL.style.cssText='font-size:7px;color:#28a745;margin-bottom:6px';aL.textContent='≡ƒÆí Auto-serve mß╗ùi 8s (1nv=1─æ╞ín)';hl.appendChild(aL);for(var i=0;i<STAFF_TYPES.length;i++){var s=STAFF_TYPES[i];var d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">'+s.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(s.cost)+'Γé½</span> <button class="btn g" onclick="hireStaff(\''+s.id+'\')">THU├è</button></div>';hl.appendChild(d)}var sT=document.createElement('div');sT.style.cssText='font-size:10px;color:var(--gold);margin-top:10px;margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';sT.textContent='≡ƒæÑ ─Éß╗ÿI NG┼¿ ('+G.staff.length+'/6)';ll.appendChild(sT);if(G.staff.length===0){var e=document.createElement('div');e.className='empty';e.textContent='≡ƒôª Ch╞░a thu├¬ ai!';ll.appendChild(e);return}for(var i=0;i<G.staff.length;i++){var s=G.staff[i];var d=document.createElement('div');d.className='card';var mc=s.mood>60?'high':s.mood>30?'mid':'low';var er=s.sk*(s.mood/100);var cb=s.mood<80;var mb='';if(cb)mb='<button class="mood-boost-btn" onclick="boostMood(\''+s.id+'\')">Γÿò</button>';d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">Skill: '+Math.floor(s.sk*100)+'% | Auto: '+er.toFixed(2)+'/8s</div><div style="font-size:7px;color:#a0a0b0">Mood:</div></div><div style="text-align:right"><div class="r-bar" style="width:50px"><div class="r-fill '+mc+'" style="width:'+s.mood+'%"></div></div><span style="font-size:7px">'+Math.floor(s.mood)+'%</span> '+mb+' <button class="btn o" onclick="fireStaff(\''+s.id+'\')">SA├üT</button></div>';ll.appendChild(d);}}
function hireStaff(id){var s=STAFF_TYPES.filter(function(x){return x.id===id;})[0];if(!s)return;if(G.coins<s.cost){show('Γ¥î Kh├┤ng ─æß╗º coin!');return;}if(G.staff.length>=6){show('Γ¥î ─Éß║ºy nh├ón vi├¬n!');return;}G.coins-=s.cost;G.staff.push({id:'s'+Date.now(),name:s.name,sk:s.sk,mood:100});show('Γ£à Thu├¬: '+s.name+'!');render();}
function fireStaff(sid){var idx=G.staff.filter(function(x){return x.id===sid;});if(idx.length>0){G.staff.splice(G.staff.indexOf(idx[0]),1);show('≡ƒÆö ─É├ú sa thß║úi: '+idx[0].name);render();}}
function show(msg){var el=document.getElementById('notif');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none'},3000)}
function initTabs(){var bts=document.querySelectorAll('.nb');for(var i=0;i<bts.length;i++){(function(b){b.tabIndex=i;b.onclick=function(){var j=b.tabIndex;var btns=document.querySelectorAll('.nb');for(var k=0;k<btns.length;k++){btns[k].classList.remove('on');}btns[j].classList.add('on');var pnls=document.querySelectorAll('.pan');for(var k=0;k<pnls.length;k++){pnls[k].classList.remove('on');}var tab=document.getElementById('p-'+b.getAttribute('data-tab'));if(tab)tab.classList.add('on');}};})(bts[i]);}}
function gameLoop(ts){var dt=ts-_lastTick;_lastTick=ts;for(var i=0;i<G.staff.length;i++){if(G.staff[i].mood<100)G.staff[i].mood=Math.min(100,G.staff[i].mood+.05*dt);}if(!G._dayStart)G._dayStart=ts;if(ts-G._dayStart>=60000){G.day++;G._dayStart=ts;}render();requestAnimationFrame(gameLoop);}
function init(){try{var coinsEl=document.getElementById('coins');var olEl=document.getElementById('ol');var mlEl=document.getElementById('ml');var slEl=document.getElementById('sl');var hlEl=document.getElementById('hl');var soEl=document.getElementById('so');var ilEl=document.getElementById('il');var qlEl=document.getElementById('ql');var ulEl=document.getElementById('ul');if(!coinsEl||!olEl||!mlEl||!slEl||!hlEl||!soEl||!ilEl||!qlEl||!ulEl){console.log('DOM missing, retrying...');setTimeout(init,200);return;}console.log('init() starting...');initTabs();render();var ld=document.getElementById('loading');if(ld)ld.style.display='none';requestAnimationFrame(gameLoop);console.log('Game OK!');}catch(e){console.error('init() error:',e);var ld=document.getElementById('loading');if(ld){ld.innerHTML='<div style="color:#ff4444;font-size:12px">Error: '+e.message+'<br><br>Click ─æß╗â thß╗¡ lß║íi</div>';ld.style.cursor='pointer';ld.onclick=function(){location.reload();}}}}
function startGame(){console.log('startGame() called');init();}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){setTimeout(startGame,0);});}else{setTimeout(startGame,0);}

</script>
