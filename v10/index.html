<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cafe Trendy Simulator V9 - Debug Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1410;
  font-family: 'Courier New', monospace;
  color: #f5e6d3;
  height: 100vh;
  overflow: hidden;
}
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: #2a1f15; border-bottom: 2px solid #4a3520;
  padding: 8px 16px; display: flex; gap: 10px; font-size: 13px;
}
.stat {
  background: #3d2b1a; padding: 4px 10px; border-radius: 6px;
  display: flex; align-items: center; gap: 4px;
}
.val { color: #ffd700; font-weight: bold; font-size: 15px; }
#main {
  margin-top: 48px;
  display: flex;
  height: calc(100vh - 48px);
  width: 100%;
}
#gameCanvas {
  width: 512px;
  height: 384px;
  background: #0f0b08;
  border-right: 2px solid #4a3520;
  display: block;
  flex-shrink: 0;
}
#panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #2a1f15;
  min-width: 300px;
}
#tabs { display: flex; border-bottom: 2px solid #4a3520; }
.tab {
  flex: 1; padding: 10px; text-align: center; background: #3d2b1a;
  border: none; color: #c9a96e; cursor: pointer; font-size: 12px;
  font-family: 'Courier New', monospace;
  border-right: 1px solid #4a3520;
}
.tab.active { background: #2a1f15; color: #ffd700; }
#content { flex: 1; overflow-y: auto; padding: 10px; }
.card {
  background: #3d2b1a; border-radius: 6px; padding: 8px;
  margin-bottom: 6px; cursor: pointer; border: 1px solid transparent;
  transition: .15s;
}
.card:hover { border-color: #ffd700; background: #4a3520; }
.sec h3 { color: #ffd700; font-size: 14px; margin-bottom: 8px; }
.nm { font-size: 14px; font-weight: bold; }
.ds { font-size: 11px; color: #b89a6e; }
.pr { font-size: 12px; color: #ffd700; }
.bu {
  background: #2d6b2d; color: white; border: none; padding: 5px 12px;
  border-radius: 4px; cursor: pointer; margin-top: 4px;
  font-family: 'Courier New', monospace;
}
.bu:hover { background: #3d8b3d; }
.bar { width: 100%; height: 6px; background: #1a1410; border-radius: 3px; margin: 3px 0; }
.barFill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4ecdc4, #27ae60); }
.barHp { background: linear-gradient(90deg, #ff6b6b, #ffd700); }
.kr { display: flex; gap: 5px; margin-bottom: 3px; }
.ki {
  flex: 1; background: #1a1410; border-radius: 3px; padding: 4px; text-align: center;
}
.ki .kl { font-size: 9px; color: #b89a6e; }
.ki .kv { font-size: 12px; font-weight: bold; color: #ffd700; }
#debugLog {
  position: fixed; bottom: 5px; left: 5px; z-index: 100;
  background: rgba(0,0,0,0.9); border: 1px solid #4ecdc4;
  border-radius: 6px; padding: 8px; font-size: 11px; color: #4ecdc4;
  max-width: 400px; max-height: 200px; overflow-y: auto;
}
#debugLog .err { color: #ff6b6b; }
#debugLog .ok { color: #4ecdc4; }
#debugLog .warn { color: #ffd700; }
</style>
</head>
<body>

<div id="topbar">
  <div class="stat"><span class="val" id="vMoney">$500</span></div>
  <div class="stat">REP:<span class="val" id="vRep">0</span></div>
  <div class="stat">DAY:<span class="val" id="vDay">1</span></div>
  <div class="stat">TIME:<span class="val" id="vTime">6:00AM</span></div>
  <div class="stat">GUESTS:<span class="val" id="vCust">0/8</span></div>
</div>

<div id="main">
  <canvas id="gameCanvas" width="512" height="384"></canvas>
  <div id="panel">
    <div id="tabs">
      <button class="tab active" onclick="switchTab(0)">Menu</button>
      <button class="tab" onclick="switchTab(1)">Staff</button>
      <button class="tab" onclick="switchTab(2)">Shop</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="debugLog"><b>[DEBUG]</b></div>

<script>
// =========================================
// V9 - CLEAN DEBUG VERSION
// =========================================

var debug = function(msg, cls) {
  var d = document.getElementById('debugLog');
  if (!d) return;
  var span = document.createElement('div');
  span.className = cls || 'ok';
  span.textContent = msg;
  d.appendChild(span);
  if (d.children.length > 50) d.removeChild(d.firstChild);
};

// ===== CONFIG =====
var TILE = 32, COLS = 16, ROWS = 12, TICK = 200, HPT = 0.25; // faster ticks for visibility

var MENU = [
  {id:'espresso', n:'Espresso', p:3, w:5},
  {id:'latte', n:'Latte', p:5, w:8},
  {id:'cappuccino', n:'Cappuccino', p:5, w:8},
  {id:'egg_coffee', n:'Viet Egg Coffee', p:8, w:12},
  {id:'pho', n:'Pho', p:8, w:15},
  {id:'sandwich', n:'Sandwich', p:6, w:8},
  {id:'cake', n:'Cake Slice', p:5, w:3}
];

var CTYPES = [
  {id:'cl', n:'Coffee Lover', e:'\u2615', c:'#8B4513', pa:30, tip:.8},
  {id:'nomad', n:'Digital Nomad', e:'\uD83D\uDCBB', c:'#4a90d9', pa:90, tip:.4},
  {id:'couple', n:'Couple', e:'\uD83D\uDC91', c:'#e84393', pa:60, tip:.9},
  {id:'biz', n:'Business Person', e:'\uD83D\uDCBC', c:'#636e72', pa:20, tip:.7}
];

var STAFF_T = [
  {id:'barista', n:'Barista', e:'\u2615', cost:300, sal:5},
  {id:'cook', n:'Cook', e:'\uD83C\uDF73', cost:250, sal:4},
  {id:'server', n:'Server', e:'\uD83E\uDDF9', cost:200, sal:3}
];

// ===== GAME STATE =====
var G = {
  m: 500, r: 0, d: 1, tick: 0, w: 'sunny',
  queue: [], staff: [], decs: [], orders: [],
  paused: false, over: false
};

var cid = 0;
var mapData = [];
var seatData = [];
var canvasEl, ctx;

// ===== INIT MAP =====
function initMap() {
  debug('=== INIT MAP ===', 'ok');
  for (var y = 0; y < ROWS; y++) {
    mapData[y] = [];
    for (var x = 0; x < COLS; x++) {
      if (y === 0 || x === 0 || x === COLS - 1) {
        mapData[y][x] = { t: 'wall', c: '#5C4A32' };
      } else if (x >= 4 && x <= 9 && y <= 2) {
        mapData[y][x] = { t: 'counter', c: '#7B4A3A' };
      } else {
        mapData[y][x] = { t: 'walkable', c: (x + y) % 2 === 0 ? '#3d2b1a' : '#4a3520' };
      }
    }
  }

  // Seats
  seatData = [];
  for (var x = 5; x <= 8; x++) {
    seatData.push({ x: x, y: 3, type: 'counter', occ: null });
  }
  for (var r = 7; r <= 10; r++) {
    seatData.push({ x: 7, y: r, type: 'table', occ: null });
    seatData.push({ x: 8, y: r, type: 'table', occ: null });
  }

  debug('Map created: ' + mapData.length + ' rows', 'ok');
  debug('Seats: ' + seatData.length + ' available', 'ok');

  // Walkable check
  var wCount = 0;
  for (var y2 = 1; y2 < ROWS - 1; y2++) {
    for (var x2 = 1; x2 < COLS - 1; x2++) {
      if (mapData[y2][x2].t === 'walkable') wCount++;
    }
  }
  debug('Walkable tiles: ' + wCount, 'ok');
}

// ===== PATHFINDING A* =====
function astar(sx, sy, ex, ey) {
  if (sx === ex && sy === ey) return [{ x: sx, y: sy }];
  var open = [{ x: sx, y: sy, g: 0, f: 0, p: [sx + ',' + sy] }];
  var cl = {};
  while (open.length > 0) {
    open.sort(function(a, b) { return a.f - b.f; });
    var c = open.shift();
    if (c.x === ex && c.y === ey) return c.p;
    if (cl[c.x + ',' + c.y]) continue;
    cl[c.x + ',' + c.y] = true;
    var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    for (var d2 = 0; d2 < 4; d2++) {
      var nx = c.x + dirs[d2][0], ny = c.y + dirs[d2][1];
      if (nx < 1 || ny < 1 || nx >= COLS - 1 || ny >= ROWS - 1) continue;
      if (mapData[ny] && mapData[ny][nx] && mapData[ny][nx].t === 'wall') continue;
      if (cl[nx + ',' + ny]) continue;
      var g2 = c.g + 1;
      var f2 = g2 + Math.abs(nx - ex) + Math.abs(ny - ey);
      open.push({ x: nx, y: ny, g: g2, f: f2, p: c.p.concat([nx + ',' + ny]) });
    }
  }
  return [{ x: sx, y: sy }]; // fallback
}

// ===== HELPERS =====
function addMsg(t) {
  debug('[MSG] ' + t);
}

function findFreeSeat() {
  for (var i = 0; i < seatData.length; i++) {
    if (!seatData[i].occ) return seatData[i];
  }
  return null;
}

// ===== CUSTOMERS =====
function spawnCust(type) {
  var freeSeat = findFreeSeat();
  if (!freeSeat) {
    debug('No free seats!', 'warn');
    return false;
  }

  var ct = type || CTYPES[Math.floor(Math.random() * CTYPES.length)];
  var cust = {
    id: ++cid,
    type: ct,
    x: -1, y: -1,
    seat: freeSeat,
    st: 'enter', // enter -> move -> seated -> cooking -> eating -> leave
    pat: 60 + Math.random() * 60,
    mp: 0,
    ord: null,
    elapse: 0
  };
  cust.mp = cust.pat;

  debug('New customer: ' + ct.n + ' (ID:' + cust.id + ')', 'ok');
  G.queue.push(cust);
  return true;
}

function updateCustomers() {
  for (var i = 0; i < G.queue.length; i++) {
    var c = G.queue[i];
    if (!c) continue;

    if (c.st === 'enter') {
      c.x = 1; c.y = ROWS - 2; c.st = 'move';
    }
    else if (c.st === 'move' && !c.seat.occ) {
      var path = astar(c.x, c.y, c.seat ? c.seat.x : 7, c.seat ? c.seat.y : 8);
      if (path.length > 1) {
        var next = path[1].split(',').map(Number);
        c.x = next[0]; c.y = next[1];
      } else {
        // Reached seat
        c.seat.occ = c;
        c.st = 'seated';
        c.pat = 60 + Math.random() * 60;
        c.mp = c.pat;
        debug(c.type.e + ' Sit down at (' + c.seat.x + ',' + c.seat.y + ')', 'ok');

        // Auto-order after 1 tick
        setTimeout(function(cid2) {
          var found = G.queue.find(function(cc) { return cc.id === cid2; });
          if (found && found.st === 'seated' && !found.ord) {
            var item = MENU[Math.floor(Math.random() * MENU.length)];
            found.ord = { name: item.n, prepTime: item.w, elapse: 0, done: false };
            G.orders.push({ cid: cid2, name: item.n, prepTime: item.w, elapse: 0, done: false });
            found.st = 'cooking';
            debug(c.type.e + ' Order: ' + item.n, 'ok');
          }
        }, 300); // 1 tick to place order
      }
    }
    else if (c.st === 'seated') {
      c.pat--;
      if (c.pat <= 5) {
        debug(c.type.e + ' Leave! Too impatient!', 'err');
        removeCustomer(c);
      } else {
        // Wait for cooking to complete
      }
    }
    else if (c.st === 'cooking') {
      var ord = G.orders.find(function(o) { return o.cid === c.id; });
      if (ord && !ord.done) {
        ord.elapse++;
        if (ord.elapse >= ord.prepTime) {
          ord.done = true;
          ord.status = 'done';
          G.r = Math.min(100, G.r + 3);
          debug(c.type.e + ' Order done: ' + ord.name + ' (+REP)', 'ok');
          c.st = 'eating';
          c.et = 0;
        }
      }
      if (c.pat <= 5) {
        G.r = Math.max(0, G.r - 3);
        debug(c.type.e + ' Leave! Angry!', 'err');
        removeCustomer(c);
      }
    }
    else if (c.st === 'eating') {
      c.et++;
      var ord2 = G.orders.find(function(o) { return o.cid === c.id; });
      if (c.et >= 5 && ord2) {
        var menuItem = MENU.find(function(m) { return m.n === ord2.name; });
        var price = menuItem ? menuItem.p : 3;
        var tip = Math.floor(price * 0.15);
        G.m += price + tip;
        debug(c.type.e + ' Pay $' + (price + tip) + ' (' + price + '+$'+tip+')', 'ok');
        removeCustomer(c);
      }
    }
  }
}

function removeCustomer(c) {
  var idx = G.queue.indexOf(c);
  if (idx >= 0) G.queue.splice(idx, 1);
  if (c.seat) c.seat.occ = null;
}

// ===== STAFF =====
function hireStaff(id) {
  var s = STAFF_T.find(function(t) { return t.id === id; });
  if (!s || G.m < s.cost) return;
  G.m -= s.cost;
  G.staff.push({ id: s.id, name: s.n, tasks: 0, x: 6, y: 1 });
  debug('Hired: ' + s.e + ' ' + s.n + ' for $' + s.cost, 'ok');
  renderPanel();
}

function updateStaff() {
  for (var si = 0; si < G.staff.length; si++) {
    var staff = G.staff[si];
    var pending = G.orders.find(function(o) { return !o.done; });
    if (pending) {
      staff.x = 7; staff.y = 2;
      var speed = (staff.id === 'cook') ? 3 : (staff.id === 'barista') ? 5 : 8;
      if (G.tick % speed === 0) {
        pending.elapse++;
        if (pending.elapse >= pending.prepTime) {
          pending.done = true;
          pending.status = 'done';
          G.r = Math.min(100, G.r + 2);
          staff.tasks++;
          debug(staff.name + ' done: ' + pending.name, 'ok');
        }
      }
    } else {
      staff.x = 6; staff.y = 1;
    }
  }
}

// ===== RENDERING =====
function renderGame() {
  if (!canvasEl || !ctx) {
    debug('Canvas NOT ready!', 'err');
    return;
  }

  var c2 = canvasEl.getContext('2d');
  if (!c2) { debug('getContext failed!', 'err'); return; }

  // Clear
  c2.fillStyle = '#0f0b08';
  c2.fillRect(0, 0, 512, 384);

  // Map tiles
  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var t = mapData[y] && mapData[y][x];
      if (!t) continue;
      c2.fillStyle = t.c;
      c2.fillRect(x * TILE, y * TILE, TILE - 1, TILE - 1);

      // Wall top line
      if (t.t === 'wall') {
        c2.fillStyle = '#4a3520';
        c2.fillRect(x * TILE, y * TILE + TILE - 3, TILE, 3);
      } else if (t.t === 'counter') {
        c2.fillStyle = '#8B5A3A';
        c2.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, 14);
      }
    }
  }

  // Seats labels
  for (var si = 0; si < seatData.length; si++) {
    var seat = seatData[si];
    c2.fillStyle = '#ffd700';
    c2.font = '10px monospace';
    c2.fillText('S' + si, seat.x * TILE + 8, seat.y * TILE + 28);
  }

  // Customers (walking)
  for (var ci = 0; ci < G.queue.length; ci++) {
    var cust = G.queue[ci];
    if (cust.st === 'enter' || cust.st === 'move') {
      c2.fillStyle = cust.type.c;
      c2.fillRect(cust.x * TILE + 8, cust.y * TILE + 6, 16, 14);
      // Head
      c2.fillStyle = '#f0d0a0';
      c2.fillRect(cust.x * TILE + 10, cust.y * TILE, 12, 8);
      // Patience bar
      var pct = Math.max(0, cust.pat / cust.mp);
      var col = pct > .5 ? '#4ecdc4' : pct > .2 ? '#ffd700' : '#ff6b6b';
      c2.fillStyle = '#1a1410';
      c2.fillRect(cust.x * TILE + 4, cust.y * TILE - 8, 24, 3);
      c2.fillStyle = col;
      c2.fillRect(cust.x * TILE + 4, cust.y * TILE - 8, 24 * pct, 3);
    }
    // Seated/cooking/eating
    if ((cust.st === 'seated' || cust.st === 'cooking' || cust.st === 'eating') && cust.seat) {
      c2.fillStyle = cust.type.c;
      c2.fillRect(cust.seat.x * TILE + 10, cust.seat.y * TILE + 8, 12, 10);
    }
  }

  // Staff
  for (var sti = 0; sti < G.staff.length; sti++) {
    var stf = G.staff[sti];
    c2.fillStyle = '#c48b3a';
    c2.fillRect(stf.x * TILE + 6, stf.y * TILE + 4, 20, 18);
    c2.fillStyle = '#f0d0a0';
    c2.fillRect(stf.x * TILE + 8, stf.y * TILE, 16, 10);
    // Staff ID label
    c2.fillStyle = '#fff';
    c2.font = '9px monospace';
    c2.fillText('SF', stf.x * TILE + 4, stf.y * TILE - 4);
  }

  // Cooking flames
  for (var oi = 0; oi < G.orders.length; oi++) {
    var ord = G.orders[oi];
    if (!ord.done) {
      c2.fillStyle = '#ff8c00';
      c2.font = 'bold 14px sans-serif';
      c2.fillText('\uD83D\uDD25', 7 * TILE + (oi % 4) * 16, TILE - 4);
    }
  }

  // Night overlay
  var h = Math.floor((6 + G.tick * HPT) % 24);
  var dk = 0;
  if (h > 20) dk = (h - 20) * .08;
  if (h < 7) dk = (7 - h) * .06;
  if (dk > 0 && dk <= .3) {
    c2.fillStyle = 'rgba(0,0,25,' + dk + ')';
    c2.fillRect(0, 0, 512, 384);
  }

  // Debug overlay info
  c2.fillStyle = '#4ecdc4';
  c2.font = '12px monospace';
  c2.fillText('TICK:' + G.tick + ' QUEUE:' + G.queue.length + ' ORDERS:' + G.orders.length, 10, 380);
}

// ===== UI =====
var curTab = 0;

function switchTab(i) {
  curTab = i;
  var tabs = document.querySelectorAll('.tab');
  for (var ti = 0; ti < tabs.length; ti++) {
    tabs[ti].classList.toggle('active', ti === i);
  }
  renderPanel();
}

function renderPanel() {
  var content = document.getElementById('content');
  if (!content) return;

  if (curTab === 0) {
    content.innerHTML = '<div class="sec"><h3>MENU</h3>';
    for (var mi = 0; mi < MENU.length; mi++) {
      var item = MENU[mi];
      content.innerHTML += '<div class="card" onclick="serveOrder(\'' + item.id + '\')">';
      content.innerHTML += '<span class="nm">' + item.n + '</span><br>';
      content.innerHTML += '<span class="ds">Prep: ' + item.w + 's</span> ';
      content.innerHTML += '<span class="pr">$' + item.p + '</span></div>';
    }
    content.innerHTML += '</div>';
  } else if (curTab === 1) {
    content.innerHTML = '<div class="sec"><h3>STAFF (' + G.staff.length + ')</h3>';
    for (var si = 0; si < G.staff.length; si++) {
      content.innerHTML += '<div class="card"><span class="nm">' + G.staff[si].name + '</span><br>Tasks: ' + G.staff[si].tasks + '</div>';
    }
    for (var sti2 = 0; sti2 < STAFF_T.length; sti2++) {
      var st = STAFF_T[sti2];
      content.innerHTML += '<div class="card"><span class="nm">' + st.e + ' ' + st.n + '</span><br>';
      content.innerHTML += '<button class="bu" onclick="hireStaff(\'' + st.id + '\')">';
      content.innerHTML += (G.m >= st.cost ? 'HIRE $' + st.cost : 'NO MONEY') + '</button></div>';
    }
    content.innerHTML += '</div>';
  } else if (curTab === 2) {
    content.innerHTML = '<div class="sec"><h3>DECORATIONS (' + G.decs.length + '/18)</h3><p style="color:#b89a6e;font-size:11px">Coming in V10...</p></div>';
  }
}

function serveOrder(id) {
  var item = MENU.find(function(m) { return m.id === id; });
  if (!item) return;

  var seated = G.queue.find(function(c) { return c.st === 'seated' && !c.ord; });
  if (!seated) {
    addMsg('No customer seated!');
    return;
  }

  seated.ord = { name: item.n, prepTime: item.w, elapse: 0, done: false };
  seated.st = 'cooking';
  G.orders.push({ cid: seated.id, name: item.n, prepTime: item.w, elapse: 0, done: false });
  addMsg('Serve ' + item.n);
  renderPanel();
}

// ===== UI UPDATE =====
function updateUI() {
  var vMoney = document.getElementById('vMoney');
  var vRep = document.getElementById('vRep');
  var vDay = document.getElementById('vDay');
  var vTime = document.getElementById('vTime');
  var vCust = document.getElementById('vCust');

  if (vMoney) vMoney.textContent = '$' + G.m;
  if (vRep) vRep.textContent = Math.round(G.r);
  if (vDay) vDay.textContent = G.d;
  if (vTime) {
    var h = Math.floor((6 + G.tick * HPT) % 24);
    var m = Math.floor(((6 + G.tick * HPT) % 1) * 60);
    var h12 = h % 12 || 12;
    vTime.textContent = String(h12).padStart(2, '0') + ':' + String(m).padStart(2, '0') + (h < 12 ? 'AM' : 'PM');
  }
  if (vCust) vCust.textContent = G.queue.length + '/8';

  renderPanel();
}

// ===== GAME LOOP =====
var lt = 0;

function gameLoop(ts) {
  if (!lt) lt = ts;
  var d = ts - lt;
  lt = ts;
  if (d > TICK * 4) d = TICK * 4; // cap delta for tab switch

  if (!G.paused && d >= TICK) {
    var ticks = Math.floor(d / TICK);
    for (var ti = 0; ti < ticks; ti++) {
      G.tick++;

      // Spawn customers (every few ticks during business hours)
      var curH = Math.floor((6 + G.tick * HPT) % 24);
      var spawnChance = 3; // base chance per tick
      if (curH >= 7 && curH <= 9) spawnChance = 15; // morning rush
      else if (curH >= 10 && curH <= 14) spawnChance = 8; // lunch
      else if (curH >= 17 && curH <= 20) spawnChance = 12; // evening

      var freeSeat = findFreeSeat();
      if (G.queue.length < 8 && Math.random() * 100 < spawnChance && freeSeat) {
        if (!spawnCust()) {
          debug('Spawn failed!', 'err');
        }
      }

      updateCustomers();
      updateStaff();

      // End day check
      if (curH >= 21) {
        addMsg('Day ' + G.d + ' ended!');
        G.d++;
        G.m -= G.exp;
        G.revenue = 0;
        G.queue = [];
        G.orders = [];
        for (var sr = 0; sr < seatData.length; sr++) { seatData[sr].occ = null; }
      }
    }

    renderGame();
    updateUI();
  }

  requestAnimationFrame(gameLoop);
}

// ===== INIT (FINAL) =====
debug('=== GAME STARTING ===', 'ok');
debug('Checking DOM elements...', 'warn');

var testCanvas = document.getElementById('gameCanvas');
if (!testCanvas) { debug('ERROR: canvas element NOT found!', 'err'); } else { debug('canvas element FOUND', 'ok'); }

var testContent = document.getElementById('content');
if (!testContent) { debug('ERROR: content panel NOT found!', 'err'); } else { debug('content panel FOUND', 'ok'); }

debug('Initializing...', 'warn');
initMap();
debug('Map initialized, starting game loop...', 'ok');

// Now get canvas element for rendering
canvasEl = document.getElementById('gameCanvas');
ctx = canvasEl ? canvasEl.getContext('2d') : null;
if (!canvasEl) { debug('FATAL: canvasEl is null!', 'err'); }
else if (!ctx) { debug('FATAL: getContext returned null!', 'err'); }
else { debug('Canvas context ready: ' + canvasEl.width + 'x' + canvasEl.height, 'ok'); }

debug('Starting game loop...', 'ok');
requestAnimationFrame(gameLoop);

// Spawn first customer immediately
setTimeout(function() {
  debug('--- Auto-spawning first customer ---', 'warn');
  if (!spawnCust()) { debug('First spawn FAILED!', 'err'); }
}, 500);

debug('=== GAME READY ===', 'ok');
</script>
</body>
</html>
