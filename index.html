<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>☕ Quán Trendy Café — Pixel Art Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--gold:#FFD700;--accent:#FF6347;--green:#28a745;--red:#dc3545;--txt:#e8e8e8;--dim:#a0a0b0}
body{font-family:'Press Start 2P',monospace;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto;image-rendering:pixelated;font-size:10px;line-height:1.6;overflow-x:hidden}
#hdr{display:flex;justify-content:space-between;padding:10px 15px;background:linear-gradient(135deg,var(--bg),var(--bg3));border-bottom:4px solid var(--gold);font-size:9px;position:sticky;top:0;z-index:10}
#hdr .v{color:var(--gold);text-shadow:1px 1px 0 #000}
#xp-wrap{height:6px;background:#333;border-bottom:2px solid #000}
#xp-bar{height:100%;background:linear-gradient(90deg,#4169E1,#9932CC);width:0%;transition:width .3s}
#weather{padding:6px 15px;background:linear-gradient(90deg,#FF6347,#FF8C00);border-bottom:4px solid #000;font-size:8px}
#scene{height:160px;position:relative;overflow:hidden;border-bottom:4px solid var(--bg3)}
#cafe-bg{position:absolute;inset:0;background:linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)}
#cafe-bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);background-size:4px 4px;pointer-events:none}
#custs{position:absolute;bottom:5px;left:0;width:100%;height:60px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.cust{font-size:24px;animation:bot .8s infinite alternate;filter:drop-shadow(2px 2px 0 #000)}
@keyframes bot{from{transform:translateY(0)}to{transform:translateY(-6px)}}
#locs{display:flex;gap:4px;padding:6px;background:var(--bg);border-bottom:4px solid var(--bg3);overflow-x:auto}
.lb{flex:1;min-width:55px;padding:6px 3px;border:2px solid #000;background:var(--bg3);color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit;text-align:center}
.lb.on{background:var(--bg);color:var(--gold);border-color:var(--gold)}
.lb:disabled{opacity:.3;cursor:not-allowed}
#nav{display:flex;position:sticky;bottom:0;background:var(--bg);border-top:4px solid var(--gold);z-index:10;overflow-x:auto}
.nb{flex:1;min-width:40px;padding:8px 2px;border:none;background:transparent;color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit;white-space:nowrap;border-top:3px solid transparent}
.nb.on{color:var(--gold);background:rgba(255,215,0,.12);border-top-color:var(--gold)}
#pnl{min-height:300px;background:var(--bg2)}
.pan{display:none;padding:10px}
.pan.on{display:block}
.pan h3{font-size:10px;color:var(--gold);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--bg3)}
.btn{padding:6px 12px;border:2px solid #000;border-radius:0;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-size:8px;box-shadow:2px 2px 0 #000;transition:all .05s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #000}
.btn:active{transform:translate(2px,2px);box-shadow:none}
.btn:disabled{background:#555;cursor:not-allowed;transform:none;box-shadow:2px 2px 0 #000;opacity:.5}
.btn.g{background:var(--green)}.btn.o{background:var(--red)}
.card{padding:8px;margin:4px 0;background:var(--bg3);border:2px solid #000;border-bottom:3px solid #000;display:flex;justify-content:space-between;align-items:center;font-size:8px}
.card .nm{font-weight:bold;line-height:2}
.card .pr{color:var(--gold)}
.r-bar{height:6px;background:#333;border:1px solid #000;margin:3px 0;overflow:hidden}
.r-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
.r-fill.high{background:#28a745}.r-fill.mid{background:#FFD700}.r-fill.low{background:#dc3545}
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--gold);padding:8px 16px;border:3px solid var(--gold);box-shadow:0 4px 0 #000;font-size:8px;z-index:999;display:none;white-space:pre-line}
.flt-row{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.flt-btn{padding:4px 8px;border:2px solid #000;background:var(--bg3);color:var(--dim);font-size:7px;cursor:pointer;font-family:inherit}
.flt-btn.on{background:var(--bg);color:var(--gold);border-color:var(--gold)}
.st-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;font-size:8px}
.st-l{color:var(--dim)}.st-v{color:var(--gold)}
.empty{padding:20px;text-align:center;color:var(--dim);font-size:9px}
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#1a1a2e,#0f3460);border:4px solid var(--gold);box-shadow:0 8px 0 #000;padding:16px 24px;font-size:9px;z-index:1000;transition:transform .3s cubic-bezier(.17,.67,.77,.33);white-space:nowrap;pointer-events:none}
.combo-popup.show{transform:translate(-50%,-50%) scale(1)}
.combo-popup .combo-emoji{font-size:32px;display:block;text-align:center;margin-bottom:4px}
.combo-popup .combo-title{color:var(--gold);font-size:11px;text-align:center}
.combo-popup .combo-desc{color:var(--txt);font-size:8px;text-align:center;margin-top:4px}
.feedback-float{position:fixed;font-size:8px;z-index:998;pointer-events:none;animation:feedbackUp 2s forwards;white-space:nowrap}
@keyframes feedbackUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.mood-boost-btn{padding:2px 4px;font-size:7px;background:#9b59b6;border:2px solid #000;color:#fff;cursor:pointer;font-family:inherit;box-shadow:1px 1px 0 #000}
.mood-boost-btn:active{transform:translate(1px,1px);box-shadow:none}
.combo-counter{text-align:center;padding:4px 0;font-size:8px;color:var(--gold)}
.urgent-order{border-left:4px solid #dc3545;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div id="loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;font-size:14px;color:var(--gold);flex-direction:column;gap:10px">
  <div class="spinner" style="width:40px;height:40px;border:4px solid var(--bg3);border-top-color:var(--gold);animation:spin .8s linear infinite;border-radius:50%"></div>
  <div>☕ Đang mở quán...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="notif"></div>

<div id="hdr">
  <div>💰 <span class="v" id="coins">500</span></div>
  <div>Lv<span class="v" id="lv">1</span> ⭐<span class="v" id="xp">0</span>/<span class="v" id="xpn">100</span></div>
</div>
<div id="xp-wrap"><div id="xp-bar"></div></div>
<div id="weather">☀️ Nắng</div>
<div id="locs"></div>
<div id="scene"><div id="cafe-bg"></div><div id="custs"></div></div>

<div id="nav">
  <button class="nb on" data-tab="orders">📋Order</button>
  <button class="nb" data-tab="menu">🍽️Menu</button>
  <button class="nb" data-tab="stats">📊Stats</button>
  <button class="nb" data-tab="staff">👥Staff</button>
  <button class="nb" data-tab="shop">🛒Shop</button>
  <button class="nb" data-tab="items">🎒Items</button>
  <button class="nb" data-tab="quests">📌Quest</button>
  <button class="nb" data-tab="up">⬆️Up</button>
</div>

<div id="pnl">
  <div class="pan on" id="p-orders"><div id="ol"></div></div>
  <div class="pan" id="p-menu"><div id="ml"></div></div>
  <div class="pan" id="p-stats"><div id="sl"></div></div>
  <div class="pan" id="p-staff"><div id="hl"></div><div id="sll"></div></div>
  <div class="pan" id="p-shop"><div id="so"></div></div>
  <div class="pan" id="p-items"><div id="fl"></div><div id="il"></div></div>
  <div class="pan" id="p-quests"><div id="ql"></div></div>
  <div class="pan" id="p-up"><div id="ul"></div></div>
</div>

<script>
const LOCS=[
  {id:'street',name:'Vỉa hè',emoji:'🚶',cost:0,rm:1,cust:3,bg:'linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)'},
  {id:'mall',name:'TMall',emoji:'🏬',cost:5000,rm:2.5,cust:5,bg:'linear-gradient(to bottom,#f5f5f5 0%,#c0c0c0 60%,#808080 100%)'},
  {id:'garden',name:'Sân vườn',emoji:'🌳',cost:15000,rm:2,cust:4,bg:'linear-gradient(to bottom,#87CEEB 0%,#228B22 60%,#006400 100%)'},
  {id:'rooftop',name:'Rooftop',emoji:'🌃',cost:50000,rm:3.5,cust:6,bg:'linear-gradient(to bottom,#0a0a2e 0%,#1a1a4e 60%,#2a2a6e 100%)'},
  {id:'festival',name:'Lễ hội',emoji:'🎪',cost:100000,rm:4,cust:8,bg:'linear-gradient(to bottom,#FF69B4 0%,#FF8C00 50%,#9370DB 100%)'}
];
const MENU=[
  {id:'coffee',name:'Cà phê đen',icon:'☕',price:25,cost:5},
  {id:'milk_coffee',name:'Cà phê sữa',icon:'🥛',price:30,cost:8},
  {id:'espresso',name:'Espresso',icon:'☕',price:35,cost:5},
  {id:'matcha',name:'Trà matcha',icon:'🍵',price:40,cost:10},
  {id:'smoothie',name:'Sinh tố',icon:'🥤',price:45,cost:12},
  {id:'cake',name:'Bánh mì',icon:'🥪',price:35,cost:8},
  {id:'ice_tea',name:'Trà đá',icon:'🧊',price:15,cost:3},
  {id:'bubble_tea',name:'Trà sữa',icon:'🧋',price:50,cost:12},
  {id:'tropical',name:'Nước ép dừa',icon:'🥥',price:55,cost:15},
  {id:'signature',name:'Signature',icon:'🍸',price:80,cost:20}
];
const TREND=[
  {id:'t_dog',name:'🐶 Meme Chó Vàng',r:'common',ef:'rev',v:.05,cost:200,desc:'+5% rev'},
  {id:'t_cat',name:'🐱 Mèo hoang',r:'common',ef:'rev',v:.03,cost:150,desc:'+3% rev'},
  {id:'t_mu',name:'⚽ Áo MU',r:'common',ef:'cust',v:1,cost:300,desc:'+1 khách'},
  {id:'t_astro',name:'🧋 Trà Astro',r:'common',ef:'rev',v:.1,cost:400,desc:'+10% trà sữa'},
  {id:'t_girl',name:'💃 Cô Bé',r:'rare',ef:'rev',v:.1,cost:1000,desc:'+10% rev'},
  {id:'t_ba',name:'💯 Ba Trăm',r:'rare',ef:'cust',v:2,cost:1500,desc:'+2 khách'},
  {id:'t_sieu',name:'⚡ Siêu Tốc',r:'epic',ef:'cust',v:5,cost:8000,desc:'+5 khách'},
  {id:'t_vua',name:'👑 Vua Cà Phê',r:'legendary',ef:'rev',v:.5,cost:20000,desc:'+50% rev'},
  {id:'t_omega',name:'💫 Omega Plus',r:'legendary',ef:'all',v:.3,cost:50000,desc:'+30% all'},
];
const STAFF_TYPES=[
  {id:'s_barista',name:'☕ Barista',cost:300,sk:.6,desc:'Skill: 60%'},
  {id:'s_chef',name:'👨‍🍳 Đầu bếp',cost:400,sk:.7,desc:'Skill: 70%'},
  {id:'s_senior',name:'🧑‍💼 Senior Barista',cost:800,sk:.9,desc:'Skill: 90%'},
  {id:'s_manager',name:'👔 Quản lý',cost:1200,sk:1.0,desc:'Skill: 100%'},
];
const UPGRADES=[
  {id:'u1',name:'🪑 Bàn ghế mới',desc:'+10% doanh thu',cost:1500,type:'rev',v:.1},
  {id:'u2',name:'🎵 Nhạc nền',desc:'+5% doanh thu',cost:800,type:'rev',v:.05},
  {id:'u3',name:'🪧 Bảng hiệu LED',desc:'+20% khách',cost:5000,type:'cust',v:.2},
  {id:'u4',name:'❄️ Điều hòa',desc:'+15% doanh thu',cost:3500,type:'rev',v:.15},
];
const QUESTS=[
  {id:'q1',title:'Ngày đầu khai trương',desc:'Phục vụ 10 khách',type:'serve',target:10,reward:200,xp:50,done:false,p:0},
  {id:'q2',title:'Thu thập meme',desc:'Sở hữu 1 item',type:'collect',target:1,reward:300,xp:75,done:false,p:0},
  {id:'q3',title:'Triệu phú cà phê',desc:'Kiếm 5000 coin',type:'earn',target:5000,reward:1000,xp:150,done:false,p:0},
  {id:'q4',title:'Thu thập bộ sưu tập',desc:'Có 5 items',type:'collect_all',target:5,reward:3000,xp:300,done:false,p:0},
  {id:'q5',title:'King of Trendy',desc:'Sở hữu hết items',type:'complete_all',target:TREND.length,reward:20000,xp:2000,done:false,p:0},
];
const WEATHERS=[
  {e:'☀️',n:'Nắng',rm:1.0},{e:'⛅',n:'Mát',rm:1.05},{e:'🌧️',n:'Mưa',rm:0.75},
  {e:'🔥',n:'Nóng',rm:1.15},{e:'🎊',n:'Tết',rm:2.5}
];

// === STATE ===
let G={coins:500,lv:1,xp:0,xpn:100,loc:'street',ul:['street'],items:{},ups:[],qs:JSON.parse(JSON.stringify(QUESTS)),rev:0,totalRev:0,served:0,day:1,staff:[],filter:'all',pendingOrders:[],
  comboCount:0, comboTimer:0, maxCombo:0, comboBuff:0,
  feedbackHistory:[],
  autoServeTick:0, // track which tick auto-serve runs (every 4 ticks = 8s)
  tickCount:0     // total ticks for auto-serve pacing
};

const fm=n=>n?.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')||'0';
function save(){try{localStorage.setItem('tc',JSON.stringify(G))}catch(e){}}
function load(){try{const s=localStorage.getItem('tc');if(s){const d=JSON.parse(s);for(let k in d)if(k!=='qs'&&k!=='comboCount'&&k!=='comboTimer'&&k!=='maxCombo'&&k!=='comboBuff'&&k!=='feedbackHistory'&&k!=='autoServeTick'&&k!=='tickCount')G[k]=d[k]}}catch(e){}}

function getBuff(){
  let r=1;
  r += G.comboBuff;
  for(let id in G.items){const t=TREND.find(x=>x.id===id);if(t){if(t.ef==='rev')r+=t.v*(G.items[id]||0);if(t.ef==='all')r+=t.v*(G.items[id]||0)}}
  for(let ui of G.ups){const u=UPGRADES.find(x=>x.id===ui);if(u&&u.type==='rev')r+=u.v}
  const w=getWeather();r*=w.rm;return r;
}
function getCustomers(){
  const l=LOCS.find(x=>x.id===G.loc);let base=l.cust;
  for(let id in G.items){const t=TREND.find(x=>x.id===id);if(t&&t.ef==='cust')base+=t.v*(G.items[id]||0)}
  for(let ui of G.ups){const u=UPGRADES.find(x=>x.id===ui);if(u&&u.type==='cust')base=Math.floor(base*(1+u.v))}
  return base;
}
function getWeather(){const idx=Math.floor(Math.sin(G.day*.3)*1000)%WEATHERS.length;const i=((idx%WEATHERS.length)+WEATHERS.length)%WEATHERS.length;return WEATHERS[i]}
function addXP(a){G.xp+=a;while(G.xp>=G.xpn){G.xp-=G.xpn;G.lv++;G.xpn=Math.floor(G.xpn*1.5);show('⭐ UP Lv'+G.lv+'!')}}
function checkQuest(type,val){G.qs.forEach(q=>{if(!q.done&&q.type===type){q.p=(q.p||0)+val;if(q.p>=q.target){q.done=true;G.coins+=q.reward;addXP(q.xp);show('✅ Quest: '+q.title+'! +'+q.reward+'💰')}}})}

// === ENHANCED: Combo System (longer timer!) ===
function getComboBuff(){
  if(G.comboCount>=3){const levels=Math.min(G.comboCount-2,5);return levels*0.05;}
  return 0;
}
function startCombo(){
  G.comboCount=(G.comboCount||0)+1;
  G.comboTimer=15; // 15 ticks = 30s (was 10 ticks = 20s)
  if(G.comboCount>G.maxCombo)G.maxCombo=G.comboCount;
  G.comboBuff=getComboBuff();
  if(G.comboCount>=3)showCombo(G.comboCount,G.comboBuff);
}
function checkComboExpire(){
  if(G.comboTimer>0){
    G.comboTimer--;
    if(G.comboTimer<=0){G.comboCount=0;G.comboBuff=0;}
  }
}
function showCombo(count,buff){
  const emojis={3:'☕',4:'🔥',5:'⚡',6:'💎',7:'👑'};
  const names={3:'Combo!',4:'Great Combo!',5:'Super Combo!',6:'Ultra Combo!',7:'Legend Combo!'};
  const el=document.createElement('div');
  el.className='combo-popup show';
  el.innerHTML='<div class="combo-emoji">'+(emojis[count]||'🔥')+'</div><div class="combo-title">'+(names[count]||'Combo!')+'</div><div class="combo-desc">x'+count+' orders = +'+Math.floor(buff*100)+'% revenue!</div>';
  document.body.appendChild(el);
  setTimeout(()=>el.classList.remove('show'),1500);
  setTimeout(()=>el.remove(),2000);
}
function showFeedback(taste,service,ambiance){
  const fB={1:'😡',2:'😕',3:'🙂',4:'😊',5:'🤩'};
  const fT={1:'Quá tệ!',2:'Không ngon...',3:'Khá ổn.',4:'Ngon lắm!',5:'Tuyệt vời! ❤️'};
  const el=document.createElement('div');
  el.className='feedback-float';
  el.style.left=(20+Math.random()*60)+'%';
  el.style.top=(30+Math.random()*30)+'%';
  el.innerHTML='<span style="font-size:16px">'+fB[taste]+'</span> <span style="color:'+(taste>=4?'#FFD700':'#dc3545')+'">'+fT[taste]+'</span>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}
function recordFeedback(isCombo,isAuto){
  let base=3;
  if(G.staff.length>0){const avgSk=G.staff.reduce((a,s)=>a+s.sk,0)/G.staff.length;base+=Math.floor(avgSk*0.5);}
  if(isCombo)base=Math.min(5,base+1);
  const taste=Math.max(1,Math.min(5,base+Math.floor(Math.random()*3-1)));
  const service=Math.max(1,Math.min(5,(isAuto?2:4)+Math.floor(Math.random()*2-1)));
  const ambiance=Math.max(1,Math.min(5,3+Math.floor(Math.random()*3-1)));
  G.feedbackHistory.push({taste,service,ambiance,time:Date.now()});
  if(G.feedbackHistory.length>20)G.feedbackHistory.shift();
  return {taste,service,ambiance};
}

// === ENHANCED: Staff Mood Boost (FREE - "☕ Pha cà phê") ===
function boostStaffMood(sid){
  const s=G.staff.find(x=>x.id===sid);
  if(!s)return;
  if(s.mood>=80)return; // already OK
  s.mood=Math.min(100,s.mood+30); // +30 mood, bigger boost
  show('☕ '+s.name+' mood +30%! ❤️');
  save();render();
}

// === AUTO-SERVE: Only runs every 4 ticks (8s) instead of every tick ===
function calcAutoServeCount(){
  if(G.staff.length===0)return 0;
  let count=0;
  G.staff.forEach(s=>{count+=Math.floor(s.sk*(s.mood/100));});
  return Math.max(0,count);
}

// === RENDER ===
function render(){
  const c=document.getElementById('coins');if(c)c.textContent=fm(G.coins);
  const l=document.getElementById('lv');if(l)l.textContent=G.lv;
  const x=document.getElementById('xp');if(x)x.textContent=G.xp;
  const xn=document.getElementById('xpn');if(xn)xn.textContent=G.xpn;
  const xb=document.getElementById('xp-bar');if(xb)xb.style.width=(G.xp/G.xpn*100)+'%';
  renderLocs();renderWeather();renderCafe();renderOrders();
  renderMenu();renderStats();renderShop();renderStaff();renderItems();renderQuests();renderUpgrades();
}

function renderLocs(){
  const el=document.getElementById('locs');if(!el)return;el.innerHTML='';
  LOCS.forEach(l=>{
    const b=document.createElement('button');b.className='lb'+(G.loc===l.id?' on':'');
    b.textContent=l.emoji+' '+l.name;b.disabled=G.ul.indexOf(l.id)<0;
    if(G.ul.indexOf(l.id)>=0)b.onclick=()=>{G.loc=l.id;save();render()};
    else b.onclick=()=>{if(G.coins>=l.cost){G.coins-=l.cost;G.ul.push(l.id);show('🔓 Mở khóa: '+l.name+'!');checkQuest('upgrade',1)}else show('❌ Cần '+fm(l.cost)+'💰');save();render()};
    el.appendChild(b);
  });
}
function renderWeather(){const el=document.getElementById('weather');if(!el)return;const w=getWeather();el.textContent=w.e+' '+w.n+' (x'+w.rm+')'}
function renderCafe(){
  const bg=document.getElementById('cafe-bg');const sc=document.getElementById('custs');
  const l=LOCS.find(x=>x.id===G.loc);if(bg)bg.style.background=l.bg;sc.innerHTML='';
  const n=Math.min(getCustomers(),12);
  const emojis=['👨‍💻','👩‍🎮','🧑‍🎨','👴','🧒','🤓','😎','🥳','👦','👧','👩‍🏫','🧔'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='cust';d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    d.style.animationDelay=(Math.random()*1)+'s';d.style.fontSize=(20+Math.random()*8)+'px';
    if(G.staff.length>0){const avgMood=G.staff.reduce((a,s)=>a+s.mood,0)/G.staff.length;if(avgMood<40)d.textContent+=' 😟';}
    sc.appendChild(d);
  }
}

function addPendingOrder(){
  const l=LOCS.find(x=>x.id===G.loc);
  const maxOrders=Math.min(l.cust+Math.floor(getCustomers()*0.4),8);
  if(G.pendingOrders.length>=maxOrders)return;
  if(Math.random()<0.6){const mi=MENU[Math.floor(Math.random()*MENU.length)];G.pendingOrders.push({...mi,uid:Date.now()+Math.random()});}
}

function renderOrders(){
  const el=document.getElementById('ol');if(!el)return;

  // Only add orders every 2 ticks (not every tick)
  if(G.tickCount%2===0){addPendingOrder();}

  // Combo tick decay (every tick)
  checkComboExpire();

  // === AUTO-SERVE: Only every 4 ticks = 8 seconds (was every 2s) ===
  if(G.tickCount>0 && G.tickCount%4===0){
    const autoCount=calcAutoServeCount();
    const autoServed=Math.min(autoCount,G.pendingOrders.length);

    for(let i=0;i<autoServed;i++){
      const order=G.pendingOrders[i];
      const buff=getBuff();
      const earned=Math.floor(order.price*buff*0.8); // auto = 80% (worse than manual 100%)
      G.coins+=earned;G.rev+=earned;G.totalRev+=earned;G.served++;
      addXP(5);checkQuest('serve',1);checkQuest('earn',earned);
      if(G.served%5===0){const fb=recordFeedback(false,true);showFeedback(fb.taste,fb.service,fb.ambiance);}
    }
    for(let i=0;i<autoServed&&i<G.staff.length;i++){G.staff[i].mood=Math.max(0,G.staff[i].mood-2);}
    G.pendingOrders=G.pendingOrders.slice(autoServed);
  }

  G.tickCount++;

  if(G.pendingOrders.length===0){el.innerHTML='<div class="empty">⏳ Chờ khách...</div>';return;}
  el.innerHTML='';

  if(G.comboCount>0){
    const comboEl=document.createElement('div');comboEl.className='combo-counter';
    comboEl.textContent='🔥 Combo x'+G.comboCount+' (+'+Math.floor(G.comboBuff*100)+'% rev) | còn '+G.comboTimer+'s';
    comboEl.style.color=G.comboBuff>0.15?'#28a745':'#FFD700';
    el.appendChild(comboEl);
  }

  G.pendingOrders.forEach((order,i)=>{
    const buff=getBuff();const price=Math.floor(order.price*buff);
    // Urgent orders (older ones) get red border
    const isUrgent = i < 2 && G.comboCount === 0;
    const urgentClass = isUrgent ? ' urgent-order' : '';
    const d=document.createElement('div');d.className='card'+urgentClass;
    d.innerHTML='<div><span class="nm">'+order.icon+' '+order.name+'</span></div><div><span class="pr">'+fm(price)+'₫</span> <button class="btn g" onclick="serveOrder('+i+')">SERVE</button></div>';
    el.appendChild(d);
  });
}

function serveOrder(idx){
  if(typeof idx!=='number'||idx<0||idx>=G.pendingOrders.length)return;
  const order=G.pendingOrders[idx];
  const buff=getBuff();const earned=Math.floor(order.price*buff);
  G.coins+=earned;G.rev+=earned;G.totalRev+=earned;G.served++;
  startCombo();const isCombo=G.comboCount>=3;
  addXP(10);checkQuest('serve',1);checkQuest('earn',earned);
  G.pendingOrders.splice(idx,1);
  const fb=recordFeedback(isCombo,false);
  let msg='✅ +'+fm(earned)+'₫ | '+order.name;
  if(isCombo)msg+=' 🔥x'+G.comboCount;
  show(msg);showFeedback(fb.taste,fb.service,fb.ambiance);
  save();render();
}

function renderMenu(){const el=document.getElementById('ml');if(!el)return;el.innerHTML='';MENU.forEach(mi=>{const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+mi.icon+' '+mi.name+'</span><div style="color:#a0a0b0;font-size:7px">Cost: '+fm(mi.cost)+'₫</div></div><div style="text-align:right"><span class="pr">~'+fm(Math.floor(mi.price*getBuff()))+'₫</span></div>';el.appendChild(d)})}

function renderStats(){
  const el=document.getElementById('sl');if(!el)return;el.innerHTML='';
  const autoCount=calcAutoServeCount();
  const avgFb=G.feedbackHistory.length>0?G.feedbackHistory.slice(-5).reduce((a,f)=>a+f.taste,0)/5:3;
  const rows=[
    ['Ngày',G.day],['Level','Lv'+G.lv+' ('+G.xp+'/'+G.xpn+')'],['Đã phục vụ',G.served],
    ['Doanh thu hôm nay',fm(G.rev)+'₫'],['Tổng doanh thu',fm(G.totalRev)+'₫'],
    ['Coin',fm(G.coins)+'₫'],['Items',Object.keys(G.items).length],
    ['Auto-serve','1 đơn/'+(autoCount>0?'~'+(calcAutoServeCount()>0?'4'):'-')+'tick'],['Nhân viên',G.staff.length+'/6'],
    ['Combo hiện tại',G.comboCount>0?'x'+G.comboCount+' (+'+Math.floor(G.comboBuff*100)+'%)':'Không có'],
    ['Combo max (lịch sử)','x'+(G.maxCombo||0)],['Đánh giá TB',avgFb.toFixed(1)+'⭐']
  ];
  rows.forEach(r=>{const d=document.createElement('div');d.className='st-row';d.innerHTML='<span class="st-l">'+r[0]+'</span><span class="st-v">'+r[1]+'</span>';el.appendChild(d)})
}

function renderShop(){const el=document.getElementById('so');if(!el)return;el.innerHTML='';const avail=TREND.filter(t=>!G.items[t.id]||G.items[t.id]<1);if(avail.length===0){el.innerHTML='<div class="empty">✅ Đã hết!</div>';return}const rc={common:'#b0b0b0',rare:'#4169E1',epic:'#9932CC',legendary:'#FFD700'};avail.forEach(t=>{const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(rc[t.r]||'#b0b0b0');d.innerHTML='<div><span class="nm">'+t.name+'</span><div style="color:#a0a0b0;font-size:7px">'+t.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(t.cost)+'₫</span> <button class="btn" onclick="buyItem(\''+t.id+'\')">MUA</button></div>';el.appendChild(d)})}
function buyItem(id){const t=TREND.find(x=>x.id===id);if(!t)return;if(G.coins<t.cost){show('❌ Không đủ coin!');return}G.coins-=t.cost;G.items[id]=(G.items[id]||0)+1;show('✅ Mua: '+t.name+'!');checkQuest('collect',1);checkQuest('collect_all',1);save();render()}
function renderItems(){const el=document.getElementById('il');if(!el)return;el.innerHTML='';const fl=document.getElementById('fl');if(!fl)return;fl.innerHTML='';const rc={common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary'};['all','common','rare','epic','legendary'].forEach(f=>{const b=document.createElement('button');b.className='flt-btn'+(G.filter===f?' on':'');b.textContent=f==='all'?'All':rc[f];b.onclick=()=>{G.filter=f;render()};fl.appendChild(b)});const owned=Object.entries(G.items).filter(([k,v])=>v>0);const filtered=G.filter==='all'?owned:owned.filter(([id])=>{const t=TREND.find(x=>x.id===id);return t&&t.r===G.filter});if(filtered.length===0){el.innerHTML='<div class="empty">📦 Chưa có items!</div>';return}filtered.forEach(([id,cnt])=>{const t=TREND.find(x=>x.id===id);if(!t)return;const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid var(--'+(t.r==='legendary'?'gold':'dim')+')';d.innerHTML='<span class="nm">'+t.name+'</span><span class="pr">'+rc[t.r]+' ×'+cnt+'</span>';el.appendChild(d)})}
function renderQuests(){const el=document.getElementById('ql');if(!el)return;el.innerHTML='';G.qs.forEach(q=>{const pct=Math.min(100,(q.p||0)/q.target*100);const d=document.createElement('div');d.className='card';d.style.borderLeft='4px solid '+(q.done?'var(--gold)':'var(--dim)');d.innerHTML='<div><span class="nm">'+(q.done?'✅':'📌')+' '+q.title+'</span><div style="color:#a0a0b0;font-size:7px">'+q.desc+'</div><div style="color:var(--gold);font-size:7px">🎁 '+q.reward+'💰 '+q.xp+'XP</div></div><div><div class="r-bar"><div class="r-fill" style="width:'+pct+'%"></div></div><div style="font-size:7px;color:var(--dim)">'+Math.floor(q.p||0)+'/'+q.target+'</div></div>';el.appendChild(d)})}
function renderUpgrades(){const el=document.getElementById('ul');if(!el)return;el.innerHTML='';UPGRADES.forEach(u=>{const bought=G.ups.includes(u.id);const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+u.name+'</span><div style="color:#a0a0b0;font-size:7px">'+u.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(u.cost)+'₫</span><button class="btn" onclick="buyUpgrade(\''+u.id+'\')" '+(bought||G.coins<u.cost?'disabled':'')+'>'+(bought?'✅Đã mua':'MUA')+'</button></div>';el.appendChild(d)})}
function buyUpgrade(id){const u=UPGRADES.find(x=>x.id===id);if(!u||G.coins<u.cost||G.ups.includes(id))return;G.coins-=u.cost;G.ups.push(id);show('⬆️ '+u.name+'!');checkQuest('upgrade',1);save();render()}

function renderStaff(){
  const hl=document.getElementById('hl');if(!hl)return;hl.innerHTML='';
  const ll=document.getElementById('sll');if(!ll)return;ll.innerHTML='';

  if(G.comboCount>0){
    const cd=document.createElement('div');cd.className='combo-counter';
    cd.innerHTML='🔥 COMBO ACTIVE: x'+G.comboCount+' | +'+Math.floor(G.comboBuff*100)+'% rev';
    cd.style.color=G.comboBuff>0.15?'#28a745':'#FFD700';
    hl.appendChild(cd);
  }
  const ct=document.createElement('div');ct.style.cssText='font-size:7px;color:#28a745;margin-bottom:6px';ct.textContent='💡 Serve thủ công liên tiếp = COMBO! +5% rev mỗi level!';hl.appendChild(ct);

  const hTitle=document.createElement('div');hTitle.style.cssText='font-size:10px;color:var(--gold);margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';hTitle.textContent='📋 THUÊ NHÂN VIÊN (AUTO-SERVE)';hl.appendChild(hTitle);
  const autoLabel=document.createElement('div');autoLabel.style.cssText='font-size:7px;color:#28a745;margin-bottom:6px';autoLabel.textContent='💡 Auto-serve mỗi 8s (1 đơn/nv khi mood=100%)';hl.appendChild(autoLabel);
  STAFF_TYPES.forEach(s=>{const d=document.createElement('div');d.className='card';d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">'+s.desc+'</div></div><div style="text-align:right"><span class="pr">'+fm(s.cost)+'₫</span> <button class="btn g" onclick="hireStaff(\''+s.id+'\')">THUÊ</button></div>';hl.appendChild(d)});

  const sTitle=document.createElement('div');sTitle.style.cssText='font-size:10px;color:var(--gold);margin-top:10px;margin-bottom:6px;border-bottom:2px solid var(--bg3);padding-bottom:4px;';sTitle.textContent='👥 ĐỘI NGŨ ('+G.staff.length+'/6)';ll.appendChild(sTitle);
  if(G.staff.length===0){const e=document.createElement('div');e.className='empty';e.textContent='📦 Chưa thuê ai — hãy thuê nhân viên để auto-serve!';ll.appendChild(e);return}
  G.staff.forEach(s=>{
    const d=document.createElement('div');d.className='card';
    const moodClass=s.mood>60?'high':s.mood>30?'mid':'low';
    const effectiveRate=Math.floor(s.sk*(s.mood/100));
    const canBoost=s.mood<80;
    let moodBtn='';
    if(canBoost)moodBtn='<button class="mood-boost-btn" onclick="boostStaffMood(\''+s.id+'\')">☕</button>';
    d.innerHTML='<div><span class="nm">'+s.name+'</span><div style="color:#a0a0b0;font-size:7px">Skill: '+Math.floor(s.sk*100)+'% | Auto: '+effectiveRate+'/tick</div><div style="font-size:7px;color:#a0a0b0">Mood:</div></div><div style="text-align:right"><div class="r-bar" style="width:50px"><div class="r-fill '+moodClass+'" style="width:'+s.mood+'%"></div></div><span style="font-size:7px">'+Math.floor(s.mood)+'%</span> '+moodBtn+' <button class="btn o" onclick="fireStaff(\''+s.id+'\')">SAÁT</button></div>';
    ll.appendChild(d);
  });
}

function hireStaff(id){const s=STAFF_TYPES.find(x=>x.id===id);if(!s)return;if(G.coins<s.cost){show('❌ Không đủ coin!');return}if(G.staff.length>=6){show('❌ Đầy nhân viên!');return}G.coins-=s.cost;G.staff.push({id:'s'+Date.now(),name:s.name,sk:s.sk,mood:100});show('✅ Thuê: '+s.name+'! Auto: 1 đơn/tick');save();render()}
function fireStaff(sid){const idx=G.staff.findIndex(x=>x.id===sid);if(idx>=0){const s=G.staff.splice(idx,1)[0];show('💔 Đã sa thải: '+s.name);save();render()}}
function show(msg){const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3000)}
function initTabs(){document.querySelectorAll('.nb').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.pan').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('p-'+b.dataset.tab)?.classList.add('on')}})}

function gameLoop(){
  G.staff.forEach(s=>{if(s.mood<100)s.mood=Math.min(100,s.mood+0.5)});
  if(!G._dayTick)G._dayTick=Date.now();
  if(Date.now()-G._dayTick>60000){G.day++;G._dayTick=Date.now();save()}
  render();
}

function init(){
  try{load();}catch(e){console.log('No saved game, starting fresh');}
  initTabs();
  render();
  setTimeout(()=>{const ld=document.getElementById('loading');if(ld)ld.style.display='none'},500);
  setInterval(gameLoop,2000);
  setInterval(save,10000);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else if(document.body)init();
else setTimeout(init,100);
</script>
</body>
</html>
