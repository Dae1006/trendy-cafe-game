<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Pixel Art Cafe - Premium Scene</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#e8e8e8;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
#gameCanvas{image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid #FFD700;border-radius:8px;margin:10px 0}
#ui-panel{display:flex;gap:20px;padding:10px 20px;background:linear-gradient(135deg,#16213e,#1a1a4e);border:2px solid #FFD700;border-radius:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.ui-stat{text-align:center;min-width:80px}
.ui-stat .label{font-size:10px;color:#a0a0b0}
.ui-stat .value{font-size:14px;color:#FFD700;font-weight:bold}
</style>
</head>
<body>
<div id="ui-panel">
<div class="ui-stat"><div class="label">Coins</div><div class="value" id="ui-coins">1000</div></div>
<div class="ui-stat"><div class="label">Customers</div><div class="value" id="ui-customers">0</div></div>
<div class="ui-stat"><div class="label">Orders</div><div class="value" id="ui-orders">0</div></div>
<div class="ui-stat"><div class="label">Level</div><div class="value" id="ui-level">1</div></div>
<div class="ui-stat"><div class="label">Reputation</div><div class="value" id="ui-rep">⭐⭐⭐</div></div>
</div>
<canvas id="gameCanvas" width="100" height="60"></canvas>

<script>
// === PREMIUM PIXEL ART CAFÉ SCENE (Coffee Talk / Stardew Valley Inspired) ===
const P=2,W=100,H=60;
let af=0;

const COL={
  bg:'#0d0d1a',wall:'#16213e',floor:'#1a1a3e',
  counter:'#5C3317',counterTop:'#8B4513',counterEdge:'#3d2010',
  machine:'#777',machineDark:'#555',machineGold:'#FFD700',
  shelf:'#3d2b1f',shelfItem:'#F5DEB3',cup:'#fff8dc',coffee:'#3c2415',
  window:'#87CEEB',moon:'#fffde7',lampGlow:'rgba(255,215,0,0.03)',
  plant:'#27ae60',plantDark:'#1e8449',
  table:'#8B4513',tableTop:'#A0522D',tableLeg:'#5C3317',
  chair:'#3d2b1f',chairSeat:'#5C3317',
  skinTone:'#FFDBAC',skinShadow:'#E5B88A',
  neonPink:'#FF1493',neonGlow:'rgba(255,20,147,0.15)',
  payment:'#28a745',shadow:'rgba(0,0,0,0.2)',steam:'rgba(255,255,255,0.3)'
};

let customers=[],steamParticles=[];
let barista={x:80,y:65,phase:0};

function px(rx,ry,rw,rh,c){
  ctx.fillStyle=c;
  ctx.fillRect(Math.floor(rx*P),Math.floor(ry*P),Math.max(1,Math.floor(rw*P)),Math.max(1,Math.floor(rh*P)));
}

function drawBackground(){
  px(0,0,W,H,COL.bg);
  px(0,0,W,H/2,COL.wall);
  px(0,H/2,W,H/2,COL.floor);
  
  for(let i=0;i<W;i+=8){
    for(let j=Math.floor(H/2);j<H;j+=8){
      const highlight=(i+j)%16===0;
      px(i,j,7,7,highlight?'#22224a':'#16163e');
    }
  }
  
  px(0,H/2-2,W,2,'rgba(255,255,255,0.1)');
  px(0,H/2-3,W,1,'rgba(255,215,0,0.1)');
}

function drawWindow(){
  px(10,12,35,30,'rgba(0,0,0,0.8)');
  px(12,14,31,26,COL.window);
  px(11,13,33,28,COL.tableLeg);
  px(11,13,33,2,COL.tableLeg);
  px(11,13,2,28,COL.tableLeg);
  px(42,13,2,28,COL.tableLeg);
  px(11,39,33,2,COL.tableLeg);
  
  px(27,13,2,26,COL.tableLeg);
  px(11,26,33,2,COL.tableLeg);
  
  px(15,17,3,3,COL.moon);
  px(20,20,1,1,COL.moon);
  px(25,22,1,1,COL.moon);
  px(30,18,1,1,COL.moon);
  
  px(8,12,4,32,'#16213e');
  px(44,12,4,32,'#16213e');
}

function drawCounter(){
  px(45,55,70,15,COL.counter);
  px(45,55,70,2,COL.counterTop);
  px(45,55,70,1,'rgba(255,255,255,0.1)');
  px(45,70,70,1,COL.shadow);
  
  for(let i=45;i<115;i+=3){
    px(i,57,1,12,'rgba(0,0,0,0.05)');
  }
}

function drawEspressoMachine(){
  px(105,35,15,20,COL.machine);
  px(107,33,11,2,COL.machineDark);
  px(108,31,9,2,'#666');
  
  px(108,45,3,5,COL.machineDark);
  px(112,45,3,5,COL.machineDark);
  
  px(106,48,2,8,'#888');
  
  px(115,38,2,3,COL.cup);
  px(115,41,2,3,COL.cup);
  px(115,44,2,3,COL.cup);
  
  px(106,55,3,4,COL.cup);
  px(107,56,2,1,COL.coffee);
  
  px(108,36,7,1,COL.machineGold);
  px(109,37,1,1,COL.machineGold);
  px(110,37,1,1,COL.machineGold);
}

function drawShelves(){
  px(50,25,50,2,COL.shelf);
  px(50,23,50,1,'rgba(255,255,255,0.1)');
  
  px(52,18,3,7,COL.shelfItem);
  px(57,16,2,9,'#333');
  px(61,17,4,8,COL.shelfItem);
  px(67,15,3,10,'#27ae60');
  px(72,18,2,7,COL.cup);
  px(75,20,4,5,'#8e44ad');
  px(80,17,3,8,COL.cup);
  px(84,16,2,9,'#2980b9');
  px(88,18,4,7,COL.shelfItem);
  px(93,19,3,6,'#e74c3c');
  px(97,20,5,3,COL.cup);
  px(103,17,2,8,'#f39c12');
}

function drawLamps(){
  for(let i=0;i<3;i++){
    const lx=55+i*25;
    px(lx,8,1,47,'#444');
    px(lx-4,54,9,4,'#FFD700');
    px(lx-3,52,7,2,'#ddd');
    px(lx-4,52,9,2,'#ddd');
    
    const glow=0.03+Math.sin(af*0.05+i*1.5)*0.02;
    ctx.fillStyle='rgba(255,215,0,'+glow+')';
    ctx.fillRect((lx-6)*P,54*P,12*P,30*P);
    
    ctx.fillStyle='rgba(255,215,0,'+(glow+0.01)+')';
    ctx.fillRect((lx-4)*P,58*P,8*P,42*P);
  }
}

function drawTables(){
  const tablePositions=[
    {x:25,y:70},{x:60,y:70},{x:95,y:70},{x:130,y:70}
  ];
  
  for(let t of tablePositions){
    px(t.x+1,t.y+1,25,15,COL.shadow);
    px(t.x,t.y,25,3,COL.table);
    px(t.x,t.y-1,25,1,COL.tableTop);
    px(t.x+1,t.y,23,1,'rgba(255,255,255,0.1)');
    px(t.x+3,t.y+3,2,12,COL.tableLeg);
    px(t.x+20,t.y+3,2,12,COL.tableLeg);
    px(t.x+1,t.y-1,23,1,'rgba(255,255,255,0.15)');
    
    px(t.x+2,t.y-15,8,3,COL.chair);
    px(t.x+2,t.y-12,8,2,COL.chairSeat);
    px(t.x+15,t.y-15,8,3,COL.chair);
    px(t.x+15,t.y-12,8,2,COL.chairSeat);
    
    px(t.x+2,t.y-12,1,3,COL.chair);
    px(t.x+9,t.y-12,1,3,COL.chair);
    px(t.x+15,t.y-12,1,3,COL.chair);
    px(t.x+22,t.y-12,1,3,COL.chair);
    
    px(t.x+10,t.y-3,3,3,COL.cup);
    px(t.x+10.5,t.y-2.5,2,1,COL.coffee);
  }
}

function drawDecorations(){
  px(125,40,10,12,'#2c3e50');
  px(126,41,8,10,'#1a2744');
  px(127,42,6,1,COL.cup);
  px(127,44,4,1,COL.cup);
  px(127,46,5,1,COL.cup);
  px(127,48,3,1,COL.cup);
  
  px(75,10,20,2,COL.neonPink);
  px(75,12,20,2,COL.neonPink);
  const neonGlow=0.3+Math.sin(af*0.08)*0.2;
  ctx.fillStyle=COL.neonGlow+neonGlow+')';
  ctx.fillRect(75*P,10*P,20*P,4*P);
  
  px(125,55,15,10,'#e74c3c');
  px(126,56,13,8,'rgba(255,255,255,0.1)');
  
  px(100,50,4,6,COL.cup);
  px(101,51,2,3,'#FFD700');
  px(100,56,4,2,'#888');
  
  for(let i=0;i<4;i++){
    const pxPos=15+i*35;
    px(pxPos,60,6,8,COL.plant);
    px(pxPos+2,60,2,10,COL.plantDark);
    px(pxPos-2,58,10,3,COL.plant);
    px(pxPos+1,55,4,4,COL.plant);
    px(pxPos-1,52,8,4,COL.plant);
    px(pxPos+1,48,6,4,COL.plant);
    px(pxPos+2,44,4,4,COL.plant);
  }
}

function drawCustomers(){
  const time=af*0.1;
  for(let i=0;i<customers.length;i++){
    const c=customers[i];
    const bob=Math.sin(time+i*Math.PI/2)*0.3;
    const cx=c.x+Math.sin(time*0.3+i)*2;
    const cy=c.y+bob;
    
    px(cx,cy,8,10,c.shirt);
    px(cx-1,cy+2,1,6,COL.skinTone);
    px(cx+8,cy+2,1,6,COL.skinTone);
    px(cx+1,cy+10,3,4,'#333');
    px(cx+5,cy+10,3,4,'#333');
    px(cx+1,cy-10,6,6,COL.skinTone);
    px(cx+1,cy-13,6,3,c.hair);
    px(cx+2,cy-8,1,1,'#333');
    px(cx+5,cy-8,1,1,'#333');
    if(c.mood>0.7)px(cx+2,cy-6,4,1,'#e74c3c');
    else px(cx+2,cy-6,4,0.5,'#333');
    
    const patienceX=cx-2;
    px(patienceX,cy-16,10,1,'#333');
    const patienceColor=c.mood>0.7?'#28a745':c.mood>0.3?'#FFD700':'#e74c3c';
    px(patienceX,cy-16,10*c.mood,1,patienceColor);
  }
}

function drawBarista(){
  const bx=barista.x+Math.sin(af*0.1)*3;
  const by=barista.y+Math.cos(af*0.15)*0.5;
  
  px(bx,by,10,12,'#2c3e50');
  px(bx+1,by+1,8,10,'#2c3e50');
  
  const armWave=Math.sin(af*0.2)*0.5;
  px(bx-1,by+2+armWave,1,6,COL.skinTone);
  px(bx+10,by+2-armWave,1,6,COL.skinTone);
  px(bx+2,by+12,3,4,'#2c3e50');
  px(bx+6,by+12,3,4,'#2c3e50');
  px(bx+2,by-12,6,6,COL.skinTone);
  px(bx+2,by-14,6,3,'#2c1810');
  px(bx+2,by-10,6,1,'#4a3728');
  px(bx+3,by-8,1,1,'#333');
  px(bx+6,by-8,1,1,'#333');
  px(bx+4,by+3,2,2,'#FFD700');
  px(bx+3,by+7,4,1,'#FFD700');
}

function drawSteam(){
  for(let i=steamParticles.length-1;i>=0;i--){
    const s=steamParticles[i];
    s.x+=s.vx;s.y+=s.vy;s.life-=0.015;
    if(s.life<=0){steamParticles.splice(i,1);continue;}
    const alpha=s.life*0.5;
    ctx.fillStyle='rgba(255,255,255,'+alpha+')';
    ctx.fillRect(s.x*P,s.y*P,s.size*P,s.size*P);
  }
  if(Math.random()>0.92)steamParticles.push({x:107,y:30,vx:(Math.random()-0.5)*0.2,vy:-0.3-Math.random()*0.3,life:1,size:2});
  if(Math.random()>0.95)steamParticles.push({x:107,y:30,vx:(Math.random()-0.5)*0.2,vy:-0.2-Math.random()*0.2,life:1,size:3});
}

function updateCustomers(){
  for(let c of customers){c.mood-=0.0003;if(c.mood<0.2)c.mood=0.2;}
}

function createCustomer(){
  const shirts=['#e74c3c','#2980b9','#27ae60','#8e44ad','#f39c12','#1abc9c','#3498db','#e67e22'];
  const hairs=['#4a3728','#2c1810','#DAA520','#8B4513','#FF8C00','#C0C0C0'];
  return {
    x:Math.random()*120+20,
    y:75+Math.random()*10,
    shirt:shirts[Math.floor(Math.random()*shirts.length)],
    hair:hairs[Math.floor(Math.random()*hairs.length)],
    mood:0.5+Math.random()*0.5
  };
}

function init(){
  for(let i=0;i<4;i++)customers.push(createCustomer());
}

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawBackground();
  drawWindow();
  drawCounter();
  drawEspressoMachine();
  drawShelves();
  drawLamps();
  drawTables();
  drawDecorations();
  drawCustomers();
  drawBarista();
  drawSteam();
  updateCustomers();
}

function loop(){
  af++;
  render();
  requestAnimationFrame(loop);
}

init();
loop();

window.updateGameScene=function(coins,level,customers,n,orders,n,reputation){
  if(coins)COL.payment=coins>1000?'#28a745':'#FFD700';
};

window.toggleScene=function(){
  const b=document.getElementById('scene-toggle');
  cv.classList.toggle('hidden');
  b.textContent=cv.classList.contains('hidden')?'Show Scene ☕':'☕ Hide Scene';
};
})();
