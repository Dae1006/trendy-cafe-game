<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Cafe - v9 Customer AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0d0d1a;color:#e8e8e8;overflow:hidden;height:100vh;display:flex;flex-direction:column;width:100vw}
#top-bar{width:100%;display:flex;justify-content:space-around;padding:6px 8px;background:linear-gradient(135deg,#16213e,#1a1a4e);border-bottom:2px solid #FFD700;font-size:12px;flex-wrap:wrap;gap:2px}
.stat{padding:3px 6px;border:1px solid #333;border-radius:3px;font-size:11px}
.gold{color:#FFD700;font-weight:bold}
#scene-wrap{width:100%;flex:0 0 auto;background:#0d0d1a;overflow:hidden;position:relative}
#cafe-scene{width:100%;height:300px;display:block;background:#0d0d1a;border-bottom:2px solid #333}
#main{width:100%;flex:1;overflow:hidden;display:flex;flex-direction:column}
#tabs{display:flex;border-bottom:2px solid #0f3460;background:#0f3460;flex-shrink:0}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;cursor:pointer;white-space:nowrap;font-size:10px;text-align:center}
.tab.active{color:#FFD700;background:rgba(255,215,0,0.2)}
.tab:hover{background:rgba(255,215,0,0.1)}
#content{flex:1;overflow-y:auto;padding:8px;background:#1a1a2e}
.card{padding:8px;margin:5px 0;background:linear-gradient(145deg,#0f3460,#16213e);border:1px solid #2a3a5e;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.card:hover{border-color:#FFD700}
.btn{padding:6px 12px;border:1px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px}
.btn:hover{box-shadow:0 2px 8px rgba(255,99,71,0.4)}
.btn:disabled{background:#555;cursor:not-allowed;color:#999}
.btn.green{background:#28a745}
.blue{background:#3498db}
.gold-btn{background:#DAA520;color:#000}
.weather-bar{padding:4px 8px;background:#0d0d1a;border-bottom:1px solid #333;font-size:11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.upgrade-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.quest-card{padding:8px;margin:4px 0;background:#16213e;border:1px solid #333;border-radius:5px}
.quest-card.done{border-color:#28a745;background:rgba(40,167,69,.1)}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6347);transition:width .5s}
/* Orders panel styles */
.order-item{padding:8px;margin:4px 0;background:#16213e;border-radius:6px;display:flex;justify-content:space-between;align-items:center;font-size:11px;animation:fadeIn .3s ease}
.order-info{display:flex;gap:8px;align-items:center}
.order-price{color:#FFD700;font-weight:bold}
.serve-btn{background:#28a745;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;margin-top:3px}
.serve-btn:hover{background:#34ce57}
.urgent-serve{animation:blink .5s infinite alternate;background:#F44336!important}
@keyframes blink{0%{opacity:1}100%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:popIn .3s ease}
/* Tabs */
.tab-panel{display:none}.tab-panel.active{display:block}
.location-bar{display:flex;gap:4px;padding:6px;background:#0d0d1a;border-bottom:1px solid #333;flex-wrap:wrap}
.loc-btn{padding:4px 8px;border:1px solid #333;background:#16213e;color:#a0a0b0;cursor:pointer;border-radius:4px;font-size:10px;font-family:inherit}
.loc-btn.active{background:#FFD700;color:#000;border-color:#FFD700}
.loc-btn:disabled{opacity:.3;cursor:not-allowed}
#xp-bar-wrap{width:60px;height:8px;background:#333;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px}
#xp-bar{height:100%;background:linear-gradient(90deg,#9b59b6,#FFD700);transition:width .3s}
</style>
</head>
<body>

<div id="top-bar">
  <span class="stat">💰 <span class="gold" id="coin-amount">500</span></span>
  <span class="stat">📈 <span class="gold" id="income-amount">30</span>/phút</span>
  <span class="stat">⭐ Lv.<span class="gold" id="player-level">1</span>
    <span id="xp-bar-wrap"><span id="xp-bar"></span></span>
    <span id="xp-amount">0</span>/<span id="xp-needed">100</span>
  </span>
  <span class="stat" id="weather-display">☀️ Đang tải...</span>
</div>

<div class="location-bar">
  <button class="loc-btn active" data-loc="street">🚶 Vỉa hè</button>
  <button class="loc-btn" data-loc="mall">🏬 Trung tâm TM (5000₫)</button>
  <button class="loc-btn" data-loc="garden">🌳 Sân vườn (15K)</button>
  <button class="loc-btn" data-loc="rooftop">🌃 Rooftop (50K)</button>
  <button class="loc-btn" data-loc="festival">🎪 Lễ hội (100K)</button>
</div>

<div id="scene-wrap">
  <canvas id="cafe-scene" width="480" height="300"></canvas>
</div>

<div class="weather-bar">
  <span id="weather-emoji">☀️</span>
  <span id="weather-text">...</span>
</div>

<div id="main">
  <div id="tabs">
    <button class="tab active" data-tab="orders">📋 Đơn hàng</button>
    <button class="tab" data-tab="menu">☕ Menu</button>
    <button class="tab" data-tab="shop">🛒 Chợ trendy</button>
    <button class="tab" data-tab="items">🎒 Item</button>
    <button class="tab" data-tab="upgrades">⬆️ Nâng cấp</button>
    <button class="tab" data-tab="quests">📌 Nhiệm vụ</button>
    <button class="tab" data-tab="stats">📊 Thống kê</button>
  </div>

  <!-- Orders Panel -->
  <div id="content">
    <div id="orders-panel" class="tab-panel active"></div>
    <div id="menu-panel" class="tab-panel"></div>
    <div id="shop-panel" class="tab-panel"></div>
    <div id="items-panel" class="tab-panel"></div>
    <div id="upgrades-panel" class="tab-panel"></div>
    <div id="quests-panel" class="tab-panel"></div>
    <div id="stats-panel" class="tab-panel"></div>
  </div>
</div>

<script src="game_engine_v2.js"></script>
</body>
</html>
