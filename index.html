<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Quán Trendy Café — Professional Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#8B4513;--accent:#FF6347;--gold:#FFD700;--bg-dark:#1a1a2e;--bg-mid:#16213e;--bg-light:#0f3460;--text:#e8e8e8;--dim:#a0a0b0;--common:#b0b0b0;--rare:#4169E1;--epic:#9932CC;--legend:#FFD700;--green:#4CAF50;--red:#f44336;--orange:#FF9800}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh}
#g{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg-mid)}
/* Header */
#hdr{display:flex;justify-content:space-between;padding:8px 12px;background:linear-gradient(135deg,var(--bg-dark),var(--bg-light));border-bottom:2px solid var(--primary);font-size:13px;flex-wrap:wrap;gap:4px}
.hdr-item{display:flex;gap:6px;align-items:center}
.hdr-item b{font-weight:bold}
#stamina-bar{width:100px;height:10px;background:#333;border-radius:5px;overflow:hidden;display:inline-block;vertical-align:middle}
#stamina-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--green));transition:width .3s;width:100%}
/* Time */
#time-bar{padding:6px 12px;background:linear-gradient(90deg,#2196F3,#03A9F4);font-size:12px;font-weight:bold;text-align:center}
/* Location tabs */
#loc-bar{display:flex;gap:4px;padding:6px 8px;background:var(--bg-dark);overflow-x:auto;flex-wrap:wrap}
.loc-btn{flex:1;min-width:50px;padding:6px 4px;border:none;border-radius:6px;background:var(--bg-light);color:var(--dim);font-size:10px;cursor:pointer;transition:.3s}
.loc-btn.active{background:var(--primary);color:#fff;transform:scale(1.05)}
.loc-btn:disabled{opacity:.3;cursor:not-allowed}
.loc-btn .lock-cost{font-size:8px;color:var(--gold)}
/* Cafe scene */
#cafe{position:relative;height:180px;overflow:hidden}
#cafe-bg{position:absolute;width:100%;height:100%}
#cust-area{position:absolute;bottom:10px;left:0;width:100%;height:60px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.cust{font-size:24px;animation:pop .3s ease-out;cursor:pointer}
@keyframes pop{from{transform:scale(0) opacity:0}to{transform:scale(1) opacity:1}}
/* Orders */
#orders{padding:8px 12px;border-bottom:1px solid var(--primary)}
#orders h3{font-size:14px;margin-bottom:4px}
.order{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg-light);border-radius:8px;margin-bottom:4px;border-left:3px solid var(--accent)}
.order-info{font-size:12px}
.order-price{color:var(--gold);font-weight:bold;font-size:13px}
.serve-btn{padding:4px 10px;border:none;border-radius:5px;background:var(--accent);color:#fff;cursor:pointer;font-size:11px;position:relative;overflow:hidden}
.serve-timer{position:absolute;bottom:0;left:0;height:3px;background:var(--green);transition:width .1s linear}
.serve-timer.urgent{background:var(--red)}
/* Menu */
#menu-p{padding:8px 12px;border-bottom:1px solid var(--primary)}
#menu-p h3{font-size:14px;margin-bottom:4px}
.mi{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(255,255,255,.04);border-radius:4px;font-size:12px;margin-bottom:2px}
.mi .price{color:var(--gold)}
/* Stats */
#stats{padding:8px 12px;border-bottom:1px solid var(--primary)}
#stats h3{font-size:14px;margin-bottom:4px}
.sr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.sr .val{color:var(--gold);font-weight:bold}
/* Nav */
#nav{display:flex;position:sticky;bottom:0;background:var(--bg-dark);border-top:2px solid var(--primary);z-index:100}
.nav-btn{flex:1;padding:8px 2px;border:none;background:transparent;color:var(--dim);font-size:9px;cursor:pointer}
.nav-btn.active{color:var(--gold);background:rgba(255,215,0,.08)}
/* Panels */
#panels{position:relative;min-height:150px}
.pnl{display:none;padding:10px}
.pnl.active{display:block}
.pnl h3{font-size:14px;margin-bottom:8px}
/* Items */
.si{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg-light);border-radius:8px;margin-bottom:4px;border-left:3px solid var(--common)}
.si .detail{flex:1}
.si .nm{font-weight:bold;font-size:13px}
.si .ds{font-size:10px;color:var(--dim)}
.si .cost{color:var(--gold);font-weight:bold;font-size:12px}
.btn{padding:4px 12px;border:none;border-radius:5px;background:var(--accent);color:#fff;cursor:pointer;font-size:11px}
.btn:disabled{background:#555;cursor:not-allowed}
.btn.green{background:var(--green)}
.btn.orange{background:var(--orange)}
.card{display:flex;align-items:center;padding:8px;background:var(--bg-light);border-radius:8px;margin-bottom:4px;border-left:3px solid var(--common)}
.card.rare{border-left-color:var(--rare)}.card.epic{border-left-color:var(--epic)}.card.legend{border-left-color:var(--legend)}
.card .emoji{font-size:22px;margin-right:8px}
.card .info{flex:1}
.card .nm{font-weight:bold;font-size:12px}
.card .sub{font-size:10px;color:var(--dim)}
.badge{font-size:9px;padding:2px 5px;border-radius:3px;display:inline-block;margin-top:2px}
.badge.common{background:var(--common);color:#333}
.badge.rare{background:var(--rare);color:#fff}
.badge.epic{background:var(--epic);color:#fff}
.badge.legend{background:var(--legend);color:#333}
/* Staff */
.staff-card{padding:10px;background:var(--bg-light);border-radius:8px;margin-bottom:6px}
.staff-card .name{font-weight:bold;font-size:13px}
.staff-card .tier{font-size:10px;color:var(--dim)}
.skill-row{display:flex;gap:8px;margin:4px 0;font-size:11px}
.skill-row span{display:flex;align-items:center;gap:2px}
.mood-bar{width:60px;height:6px;background:#333;border-radius:3px;overflow:hidden;display:inline-block}
.mood-fill{height:100%;border-radius:3px;transition:width .3s}
.stat-row{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
.stat-row .label{color:var(--dim)}
.stat-row .val{color:var(--gold)}
/* Supply */
.sup-row{display:flex;justify-content:space-between;align-items:center;padding:6px;background:var(--bg-light);border-radius:6px;margin-bottom:3px;font-size:11px}
.sup-row .name{font-weight:bold}
.sup-row .stock{color:var(--gold)}
.sup-ctrl{display:flex;gap:2px}
.sup-ctrl .btn{padding:2px 8px;font-size:10px}
/* Pricing */
.price-ctrl{display:flex;align-items:center;gap:4px;margin-top:4px}
.price-ctrl input[type=range]{flex:1;accent-color:var(--primary)}
.price-ctrl .pct{font-size:10px;color:var(--dim);min-width:30px;text-align:center}
/* Notification */
.notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:8px 16px;border-radius:8px;z-index:9999;font-size:12px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
/* Demand indicator */
.demand{font-size:10px;padding:2px 4px;border-radius:3px}
.demand.high{background:var(--green);color:#fff}
.demand.med{background:var(--orange);color:#fff}
.demand.low{background:var(--red);color:#fff}
/* Trend banner */
#trend{padding:6px 12px;background:linear-gradient(90deg,#FF6347,#FF8C00);font-size:12px;font-weight:bold;text-align:center}
</style>
</head>
<body>
<div id="g">
  <div id="hdr">
    <div class="hdr-item">💰<b id="coins">500</b>
      <span style="margin-left:8px">⚡<span id="stamina-bar"><span id="stamina-fill"></span></span> <b id="stamina-text">50/50</b></span>
      <span style="margin-left:8px">📅 Ngày <b id="day">1</b></span>
    </div>
    <div class="hdr-item">⭐Lv.<b id="lvl">1</b> 🏆<b id="xp">0</b>/<b id="xpn">100</b></div>
  </div>
  <div id="time-bar">☀️ <span id="weather-text">Đang tải...</span></div>
  <div id="loc-bar"></div>
  <div id="cafe"><div id="cafe-bg"></div><div id="cust-area"></div></div>
  <div id="orders"><h3>📋 Đơn hàng (<span id="order-count">0</span>)</h3><div id="order-list"></div></div>
  <div id="menu-p"><h3>☕ Menu</h3><div id="menu-list"></div></div>
  <div id="stats"><h3>📊 Thống kê</h3><div id="stats-list"></div></div>
  <div id="nav">
    <button class="nav-btn active" data-tab="shop">🏪 Shop</button>
    <button class="nav-btn" data-tab="items">🎒 Items</button>
    <button class="nav-btn" data-tab="staff">👨‍🍳 Nhân sự</button>
    <button class="nav-btn" data-tab="supply">📦 Nguyên liệu</button>
    <button class="nav-btn" data-tab="menu-set">⚙️ Menu</button>
    <button class="nav-btn" data-tab="expansion">🏢 Mở rộng</button>
  </div>
  <div id="panels">
    <div id="shop-panel" class="panel pnl active"><h3>🏪 Cửa hàng menu</h3><div id="shop-list"></div></div>
    <div id="items-panel" class="panel pnl"><h3>🎒 Bộ sưu tập</h3><div id="items-list"></div></div>
    <div id="staff-panel" class="panel pnl"><h3>👨‍🍳 Quản lý nhân sự</h3><div id="staff-list"></div></div>
    <div id="supply-panel" class="panel pnl"><h3>📦 Nguyên liệu & Nhập hàng</h3><div id="supply-list"></div></div>
    <div id="menu-set-panel" class="panel pnl"><h3>⚙️ Điều chỉnh giá & Menu</h3><div id="menu-set-list"></div></div>
    <div id="expansion-panel" class="panel pnl"><h3>🏢 Mở rộng & Bán quán</h3><div id="expansion-list"></div></div>
  </div>
  <div id="trend">🔥 Trend: Cà phê sạch đang HOT!</div>
</div>
<script>
// === DATA ===
const LOCATIONS={
  street:{name:"Vỉa hè",emoji:"🚶",cost:0,revMult:1,baseCust:3,maxStaff:4,bg:"linear-gradient(to bottom,#87CEEB 0%,#8B7355 60%,#696969 100%)"},
  mall:{name:"TMall",emoji:"🏬",cost:5000,revMult:2.5,baseCust:5,maxStaff:8,bg:"linear-gradient(to bottom,#f5f5f5 0%,#c0c0c0 60%,#808080 100%)"},
  garden:{name:"Sân vườn",emoji:"🌳",cost:15000,revMult:2,baseCust:4,maxStaff:10,bg:"linear-gradient(to bottom,#87CEEB 0%,#228B22 60%,#006400 100%)"},
  rooftop:{name:"Rooftop",emoji:"🌃",cost:50000,revMult:3.5,baseCust:6,maxStaff:12,bg:"linear-gradient(to bottom,#0a0a2e 0%,#1a1a4e 60%,#2a2a6e 100%)"},
  festival:{name:"Lễ hội",emoji:"🎪",cost:100000,revMult:4,baseCust:8,maxStaff:16,bg:"linear-gradient(to bottom,#FF69B4 0%,#FF8C00 50%,#9370DB 100%)"}
};
const FIXED_COSTS={street:{rent:135,elec:30,water:10,tax:15,admin:10},mall:{rent:150,elec:80,water:30,tax:50,admin:30},garden:{rent:220,elec:100,water:40,tax:75,admin:50},rooftop:{rent:350,elec:150,water:60,tax:120,admin:80},festival:{rent:80,elec:50,water:20,tax:30,admin:20}};
function totalFixedCost(loc){const f=FIXED_COSTS[loc];return f.rent+f.elec+f.water+f.tax+f.admin}

const MENU_ITEMS=[
  {id:"coffee",name:"Cà phê đen",icon:"☕",basePrice:25,needs:["beans","ice","cup"],custType:["student","office","vip"]},
  {id:"milk_coffee",name:"Cà phê sữa",icon:"🥛",basePrice:30,needs:["beans","milk","sugar","ice","cup"],custType:["student","office","vip"]},
  {id:"espresso",name:"Espresso",icon:"☕",basePrice:35,needs:["beans","ice","cup"],custType:["office","vip"],locked:true,unlockCost:500},
  {id:"matcha",name:"Trà matcha",icon:"🍵",basePrice:40,needs:["matcha","milk","sugar","cup"],custType:["tourist","vip"],locked:true,unlockCost:3000},
  {id:"smoothie",name:"Sinh tố",icon:"🥤",basePrice:45,needs:["milk","sugar","ice","cup"],custType:["student","family","tourist"],locked:true,unlockCost:2000},
  {id:"cake",name:"Bánh mì",icon:"🥪",basePrice:35,needs:["bread","cheese","cup"],custType:["student","office","family"]},
  {id:"ice_tea",name:"Trà đá",icon:"🧊",basePrice:15,needs:["tea","ice","cup"],custType:["student","office"]},
  {id:"bubble_tea",name:"Trà sữa",icon:"🧋",basePrice:50,needs:["tea","milk","tapioca","sugar","ice","cup"],custType:["student","family","tourist"],locked:true,unlockCost:4000},
  {id:"tropical",name:"Nước ép dừa",icon:"🥥",basePrice:55,needs:["milk","ice","cup"],custType:["tourist","vip"],locked:true,unlockCost:5000},
  {id:"signature",name:"Signature Drink",icon:"🍸",basePrice:80,needs:["beans","milk","syrup","topping","ice","cup"],custType:["vip"],locked:true,unlockCost:15000}
];

const SUPPLIERS={
  beans:[{name:"Robusta thường",price:50,quality:.5},{name:"Robusta Đà Lạt",price:80,quality:.7},{name:"Arabica Lâm Đồng",price:120,quality:.85},{name:"Specialty Blend",price:200,quality:1.0}],
  milk:[{name:"Sữa đặc Ông Thọ",price:8,quality:.4},{name:"Vinamilk",price:12,quality:.7},{name:"TH True Milk",price:18,quality:.85},{name:"Fresh Cream",price:28,quality:1.0}],
  ice:[{name:"Đá viên",price:2,quality:1.0}],
  sugar:[{name:"Đường trắng",price:10,quality:.8},{name:"Đường thốt nốt",price:15,quality:1.0}],
  tea:[{name:"Trà thường",price:20,quality:.6},{name:"Trà cao cấp",price:40,quality:.9}],
  matcha:[{name:"Matcha thường",price:40,quality:.6},{name:"Matcha Nhật",price:120,quality:1.0}],
  tapioca:[{name:"Trân châu",price:15,quality:.8}],
  syrup:[{name:"Syrup vanilla",price:20,quality:.9},{name:"Syrup caramel",price:20,quality:.9},{name:"Syrup hazelnut",price:22,quality:1.0}],
  topping:[{name:"Topping thạch",price:15,quality:.8},{name:"Cheese foam",price:18,quality:.9}],
  cup:[{name:"Cốc giấy thường",price:.15,quality:.8},{name:"Cốc giấy premium",price:.4,quality:1.0},{name:"Ly kính tái sử dụng",price:2,quality:1.0}],
  bread:[{name:"Bánh mì",price:5,quality:.7},{name:"Bánh mì premium",price:10,quality:.9}],
  cheese:[{name:"Phô mai",price:8,quality:.7},{name:"Phô mai premium",price:15,quality:.9}]
};

const STAFF_TIERS=[
  {id:"fresher",name:"Fresher Barista",emoji:"🎓",salaryDay:250,brew:.5,quality:.4,service:.3},
  {id:"junior",name:"Junior Barista",emoji:"☕",salaryDay:350,brew:.7,quality:.6,service:.5},
  {id:"senior",name:"Senior Barista",emoji:"👨‍🍳",salaryDay:500,brew:.9,quality:.8,service:.8},
  {id:"master",name:"Master Barista",emoji:"🏆",salaryDay:850,brew:1.0,quality:1.0,service:1.0}
];

const TREND_ITEMS=[
  {id:"t_meme_dog",name:"🐶 Meme Chó Vàng",rarity:"common",type:"decoration",effect:"revenue",value:.05,desc:"+5% doanh thu",cost:200},
  {id:"t_meme_cat",name:"🐱 Mèo hoang",rarity:"common",type:"decoration",effect:"revenue",value:.03,desc:"+3% doanh thu",cost:150},
  {id:"t_mu_jersey",name:"⚽ Áo MU",rarity:"common",type:"decoration",effect:"customers",value:1,desc:"+1 khách",cost:300},
  {id:"t_girl_boy",name:"💃 Cô Bé Chú Bé",rarity:"rare",type:"decoration",effect:"revenue",value:.1,desc:"+10% doanh thu",cost:1000},
  {id:"t_ba_tram",name:"💯 Ba Trăm",rarity:"rare",type:"decoration",effect:"customers",value:2,desc:"+2 khách",cost:1500},
  {id:"t_tu_hien",name:"🎤 Tú Hien Style",rarity:"rare",type:"recipe",effect:"revenue",value:.15,desc:"+15% doanh thu",cost:2000},
  {id:"t_lam_pham",name:"🏆 Lam Phẩm",rarity:"epic",type:"recipe",effect:"revenue",value:.2,desc:"+20% doanh thu",cost:5000},
  {id:"t_sieu_toc",name:"⚡ Siêu Tốc",rarity:"epic",type:"decoration",effect:"customers",value:5,desc:"+5 khách",cost:8000},
  {id:"t_vua_cafe",name:"👑 Vua Cà Phê",rarity:"legend",type:"decoration",effect:"revenue",value:.5,desc:"+50% doanh thu!",cost:20000},
  {id:"t_hoang_thu",name:"🔥 Hoảng Thủ",rarity:"legend",type:"recipe",effect:"revenue",value:.4,desc:"+40% doanh thu",cost:25000},
  {id:"t_omega",name:"💫 Omega Plus",rarity:"legend",type:"decoration",effect:"all",value:.3,desc:"+30% tất cả!",cost:50000}
];

const WEATHER_MAP={sunny:{emoji:"☀️",name:"Nắng",mod:1.0,desc:"Trời nắng — khách mua nước đá tăng!"},cloudy:{emoji:"⛅",name:"Nhiều mây",mod:1.05,desc:"Trời mát mẻ — thời tiết lý tưởng!"},rainy:{emoji:"🌧️",name:"Mưa",mod:.75,desc:"Mưa lớn — khách giảm!"},thunder:{emoji:"⛈️",name:"Dông bão",mod:.4,desc:"Dông bão! Rất ít khách!"},hot:{emoji:"🔥",name:"Nóng gay gắt",mod:1.15,desc:"Nóng khủng khiếp!"},tet:{emoji:"🎊",name:"Tết",mod:2.5,desc:"Tết đến rồi! Khách đông!"}};
const SEASON_W={summer:{sunny:.35,cloudy:.25,rainy:.20,thunder:.10,hot:.10,tet:0},rainy:{sunny:.10,cloudy:.15,rainy:.45,thunder:.20,hot:0,tet:.10},cool:{sunny:.15,cloudy:.30,rainy:.15,thunder:.05,hot:0,tet:.35}};
const CUSTOMER_TYPES=[
  {type:"student",name:"Sinh viên",pct:.30,minP:15,maxP:30,loves:["coffee","milk_coffee","bubble_tea","ice_tea"]},
  {type:"office",name:"Văn phòng",pct:.25,minP:25,maxP:50,loves:["coffee","espresso","milk_coffee","cake"]},
  {type:"tourist",name:"Du khách",pct:.20,minP:40,maxP:80,loves:["tropical","signature","matcha","bubble_tea"]},
  {type:"vip",name:"VIP",pct:.15,minP:50,maxP:120,loves:["espresso","signature","matcha","tropical"]},
  {type:"family",name:"Gia đình",pct:.10,minP:20,maxP:45,loves:["smoothie","cake","bubble_tea","milk_coffee"]}
];

// === GAME STATE ===
let GS={
  coins:500,level:1,xp:0,xpN:100,
  curLoc:"street",unlocked:["street"],
  owned:{},recipes:[],menuLocked:0,
  menuPrices:{}, // dynamic pricing per item: {coffee:1.0, milk_coffee:0.95...}
  stamina:50,staminaMax:50,burnout:false,burnoutDay:0,
  staff:[], // [{id,name,tier,brew,quality,service,mood,loyalty,daysWorked,servedCount}]
  supplierStock:{beans:10,milk:20,sugar:30,ice:100,tea:20,matcha:5,tapioca:5,syrup:5,topping:5,cup:200,bread:10,cheese:5},
  supplierStockNames:{beans:"Cà phê",milk:"Sữa",sugar:"Đường",ice:"Đá",tea:"Trà",matcha:"Matcha",tapioca:"Trân châu",syrup:"Syrup",topping:"Topping",cup:"Cốc",bread:"Bánh mì",cheese:"Phô mai"},
  orders:[], // [{menuId,timer,maxTimer,quality,price,custType}]
  customersSpawned:0,
  gameDay:1,lastDay:0,rounds:0,
  dailyRevenue:0,dailyCosts:0,dailyTip:0,dailyFixed:0,todayServe:0,todayWaited:0,todayRevenue:0,todayProfit:0,
  totalRevenue:0,totalServed:0,totalTips:0,totalWaited:0,
  questsCompleted:[],questProgress:{},
  locationsOwned:1, // count of locations player has ever owned
  locationsSold:0, // count of locations sold
  nps:50, // 0-100
  totalReviews:0,promoters:0,detractors:0,
  sellPrices:{} // {locKey: sellPrice}
};
// Init menu prices
MENU_ITEMS.forEach(m=>{GS.menuPrices[m.id]=1.0;});

// === HELPERS ===
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"tr";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toString();}
function showNotif(t){const d=document.createElement("div");d.className="notif";d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

// === WEATHER ===
function getWeather(){
  const season=GS.gameDay%180<60?"summer":(GS.gameDay%180<120?"rainy":"cool"),probs=SEASON_W[season],rand=Math.random(),keys=Object.keys(probs),cum=0;
  for(let i=0;i<keys.length;i++){cum+=probs[keys[i]];if(rand<=cum)return{...WEATHER_MAP[keys[i]],type:keys[i],season}}
  return{...WEATHER_MAP.sunny,type:"sunny",season:"summer"}
}

// === CORE ===
function getRevMult(){
  const loc=LOCATIONS[GS.curLoc];let m=loc.revMult;
  for(const[id,cnt]of Object.entries(GS.owned)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="revenue")m+=it.value*cnt;}
  const w=getWeather();m*=(w.mod||1);
  return m;
}
function getBaseCust(){
  const loc=LOCATIONS[GS.curLoc];let c=loc.baseCust;
  for(const[id,cnt]of Object.entries(GS.owned)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="customers")c+=it.value*cnt;}
  return c;
}
function addXP(v){
  GS.xp+=v;while(GS.xp>=GS.xpN){GS.xp-=GS.xpN;GS.level++;GS.xpN=Math.floor(GS.xpN*1.5);showNotif("⭐ Lên cấp "+GS.level+"!")}
}
function getCustomerType(){
  const r=Math.random();let cum=0;
  for(const ct of CUSTOMER_TYPES){cum+=ct.pct;if(r<=cum)return ct;}
  return CUSTOMER_TYPES[0];
}
function getDemandLevel(){
  const w=getWeather();
  if(w.mod>=1.1)return"high";if(w.mod>=0.8)return"med";return"low";
}
function getDemandClass(){const d=getDemandLevel();return d==="high"?"high":(d==="med"?"med":"low")}
function getDemandEmoji(){const d=getDemandLevel();return d==="high"?"🟢":(d==="med"?"🟡":"🔴")}
function getServeTime(quality){
  const staffSkill=GS.staff.reduce((a,s)=>a+s.brew,0)/Math.max(1,GS.staff.length);
  const base=8;const skillMod=1-staffSkill*.4;return Math.max(3,Math.min(8,Math.floor(base*skillMod)));
}

// === SPAWN CUSTOMER ===
function spawnCustomer(){
  const baseCust=getBaseCust();
  const weather=getWeather();
  const wMod=weather.mod;
  const npsMod=GS.nps>=70?1.2:(GS.nps>=50?1.0:0.7);
  const expectedCust=Math.floor(baseCust*wMod*npsMod);
  if(GS.orders.length>=expectedCust)return; // cap orders
  if(Math.random()>0.3)return; // not every tick

  const custType=getCustomerType();
  // Pick random menu item compatible with this customer type
  const compatible=MENU_ITEMS.filter(m=>!m.locked||GS.recipes.includes(m.id));
  // Weight by what they love
  let weights=[];
  for(let i=0;i<compatible.length;i++){
    const m=compatible[i];
    let w=custType.loves.includes(m.id)?3:1;
    // Price sensitivity
    const actualPrice=m.basePrice*GS.menuPrices[m.id];
    if(actualPrice<custType.minP)w*=0.3;
    if(actualPrice>custType.maxP)w*=0.1;
    weights.push(w);
  }
  const totalW=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*totalW;let mi=compatible[0];
  for(let i=0;i<compatible.length;i++){r-=weights[i];if(r<=0){mi=compatible[i];break;}}

  const serveTime=getServeTime(mi.quality||0.7);
  GS.orders.push({
    menuId:mi.id,
    timer:serveTime,
    maxTimer:serveTime,
    custType:custType.type,
    customerName:custType.name,
    quality:0.7
  });
}

// === SERVE ORDER ===
function serveOrder(idx){
  if(GS.orders.length<=idx||idx<0)return;
  const order=GS.orders[idx];
  if(!order)return;

  // Check stamina
  if(GS.stamina<=0){showNotif("⚠️ Mất sức! Cần nghỉ ngơi!");return;}
  if(GS.burnout){showNotif("⚠️ Bạn bị kiệt sức! Nghỉ 3 ngày!");return;}

  // Check supplies
  const item=MENU_ITEMS.find(m=>m.id===order.menuId);
  if(!item)return;
  for(const need of item.needs){
    if((GS.supplierStock[need]||0)<=0){showNotif("⚠️ Hết "+GS.supplierStockNames[need]+"!");return;}
  }

  // Consume supplies
  for(const need of item.needs){GS.supplierStock[need]--;GS.supplierStock[need]||(GS.supplierStock[need]=0);}

  // Calculate revenue
  const actualPrice=item.basePrice*GS.menuPrices[item.id];
  const cust=GS.orders[idx].custType;
  const custInfo=CUSTOMER_TYPES.find(c=>c.type===cust);
  const priceDiff=actualPrice/custInfo.minP;
  const revenueMod=1+(priceDiff-1)*0.3; // if price>min, small mod

  let price=item.basePrice*GS.menuPrices[item.id]*revenueMod;

  // Item effects
  for(const[id,cnt]of Object.entries(GS.owned)){const it=TREND_ITEMS.find(i=>i.id===id);if(it&&it.effect==="revenue")price*=(1+it.value*cnt);}

  // Staff quality mod
  const staffQ=GS.staff.length>0?GS.staff.reduce((a,s)=>a+s.quality,0)/GS.staff.length:0.7;
  price*=(0.7+staffQ*0.3);

  // Weather mod
  const w=getWeather();price*=w.mod;

  const earned=Math.floor(price);
  GS.coins+=earned;GS.todayServe++;GS.totalServed++;GS.todayRevenue+=earned;GS.totalRevenue+=earned;
  GS.stamina-=3;

  // Tips based on serve speed and quality
  const serveRatio=order.timer/order.maxTimer;
  let tip=0;
  if(serveRatio<0.5){tip=Math.floor(item.basePrice*0.15);GS.todayTip+=tip;} // fast = tip!
  else if(serveRatio>0.8){GS.nps=Math.max(0,GS.nps-2);GS.todayWaited++;} // slow = lose NPS
  else{tip=Math.floor(item.basePrice*0.05);} // normal = small tip

  if(tip>0){GS.coins+=tip;GS.totalTips+=tip;}

  // NPS tracking
  GS.totalReviews++;
  GS.nps=Math.min(100,Math.max(0,GS.nps+(tip>0?2:-2)));
  if(tip>0)GS.promoters++;else GS.detractors++;

  // Remove order
  GS.orders.splice(idx,1);

  // Add XP
  addXP(10);

  showNotif("✅ Phục vụ: "+item.name+"! +"+fmt(earned)+"₫"+(tip>0?" (+"+fmt(tip)+"tip)":""));
  renderAll();
}

// === STAFF ===
function hireStaff(tierId){
  const loc=LOCATIONS[GS.curLoc];
  if(GS.staff.length>=loc.maxStaff){showNotif("⚠️ Đủ nhân viên! (max "+loc.maxStaff+")");return;}
  const tier=STAFF_TIERS.find(t=>t.id===tierId);
  if(!tier)return;
  if(GS.coins<tier.salaryDay*3){showNotif("⚠️ Cần "+fmt(tier.salaryDay*3)+"₫ để thuê!");return;}
  const names=["Lan","Hùng","Mai","Dũng","Hoa","Minh","Tuấn","Hương","Nam","Giang","Khoa","Trang","Phong","Linh","Hải"];
  const last=["Nguyễn","Trần","Lê","Phạm","Hoàng","Huỳnh","Phan","Vũ","Võ","Đặng","Bùi","Dương","Hồ","Ngô","Đoàn"];
  const name=last[Math.floor(Math.random()*last.length)]+" "+names[Math.floor(Math.random()*names.length)];
  GS.staff.push({
    id:"s_"+Date.now(),name:name,tier:tierId,
    brew:tier.brew,quality:tier.quality,service:tier.service,
    mood:80,loyalty:70,daysWorked:0,servedCount:0
  });
  GS.coins-=tier.salaryDay*3; // hiring cost
  showNotif("✅ Thuê "+name+" (Tier "+tier.name+")!");
  renderAll();
}

function promoteStaff(sid){
  const s=GS.staff.find(x=>x.id===sid);
  if(!s)return;
  const tiers=["fresher","junior","senior","master"];
  const idx=tiers.indexOf(s.tier);
  if(idx>=3)return showNotif("⚠️ Đã lên cao nhất!");
  if(s.daysWorked<10)return showNotif("⚠️ Cần làm 10 ngày để thăng cấp!");
  if(s.mood<50)return showNotif("⚠️ Tâm trạng thấp, không thăng cấp!");
  if(s.servedCount<20)return showNotif("⚠️ Cần phục vụ 20 đơn!");

  const newTier=STAFF_TIERS[idx+1];
  s.tier=newTier.id;s.brew=newTier.brew;s.quality=newTier.quality;s.service=newTier.service;
  s.mood=Math.min(100,s.mood+20);
  showNotif("🎉 Thăng cấp: "+s.name+" → "+newTier.name+"!");
  addXP(100);
  renderAll();
}

function fireStaff(sid){
  const idx=GS.staff.findIndex(x=>x.id===sid);
  if(idx<0)return;
  const s=GS.staff[idx];
  GS.coins+=s.salary?500:0; // severance
  GS.staff.splice(idx,1);
  showNotif("👋 Đã sa thải "+s.name);
  renderAll();
}

function trainStaff(sid){
  const s=GS.staff.find(x=>x.id===sid);
  if(!s)return;
  if(GS.coins<500)return showNotif("⚠️ Cần 500₫ để huấn luyện!");
  GS.coins-=500;
  const skills=["brew","quality","service"];
  const skill=skills[Math.floor(Math.random()*skills.length)];
  s[skill]+=0.1;
  showNotif("📚 Huấn luyện "+s.name+": "+skill+" +0.1!");
  renderAll();
}

// === SUPPLY ORDER ===
function orderSupply(resourceType,tierIdx){
  const list=SUPPLIERS[resourceType];
  if(!list||!list[tierIdx])return;
  const item=list[tierIdx];
  const cost=item.price*10; // order 10 units
  if(GS.coins<cost)return showNotif("⚠️ Không đủ tiền!");
  GS.coins-=cost;
  GS.supplierStock[resourceType]+=10;
  showNotif("✅ Nhập "+GS.supplierStockNames[resourceType]+" (tier "+(tierIdx+1)+") — 10 đơn vị, "+fmt(cost)+"₫");
  renderAll();
}

// === SET PRICE ===
function setPrice(menuId,pct){
  GS.menuPrices[menuId]=pct;
  renderAll();
}

// === EXPANSION ===
function unlockLocation(locKey){
  const loc=LOCATIONS[locKey];
  if(GS.coins<loc.cost)return showNotif("❌ Không đủ "+fmt(loc.cost)+"₫!");
  GS.coins-=loc.cost;
  GS.unlocked.push(locKey);
  GS.curLoc=locKey;
  GS.locationsOwned++;
  GS.sellPrices[locKey]=Math.floor(loc.cost*0.9); // start selling at 90%
  showNotif("🎉 Mở khóa: "+loc.name+"! Chi phí: "+fmt(loc.cost)+"₫");
  GS.staminaMax+=20;GS.stamina=GS.staminaMax;
  renderAll();
}
function sellLocation(locKey){
  const idx=GS.unlocked.indexOf(locKey);
  if(idx<1)return showNotif("⚠️ Không thể bán vị trí đầu tiên!"); // keep street
  const sellPrice=GS.sellPrices[locKey]||Math.floor(LOCATIONS[locKey].cost*0.6);
  GS.unlocked.splice(idx,1);
  GS.coins+=sellPrice;
  GS.locationsSold++;
  if(GS.curLoc===locKey)GS.curLoc="street";
  // Reduce staff if at sold location
  GS.staff=GS.staff.filter(()=>Math.random()>0.3); // 30% stay, 70% leave
  showNotif("💰 Bán "+LOCATIONS[locKey].name+" — thu "+fmt(sellPrice)+"₫!");
  renderAll();
}

// === BUY ITEM ===
function buyItem(itemId){
  const item=TREND_ITEMS.find(i=>i.id===itemId);
  if(!item)return;
  if(GS.coins<item.cost)return showNotif("❌ Không đủ coin!");
  GS.coins-=item.cost;
  GS.owned[itemId]=(GS.owned[itemId]||0)+1;
  if(item.type==="recipe")GS.recipes.push(itemId);
  showNotif("✅ Mua: "+item.name+"!");
  renderAll();
}

// === BUY RECIPE ===
function buyRecipe(menuId){
  const item=MENU_ITEMS.find(m=>m.id===menuId);
  if(!item||!item.locked)return;
  if(GS.coins<item.unlockCost)return showNotif("❌ Không đủ "+fmt(item.unlockCost)+"₫!");
  GS.coins-=item.unlockCost;
  GS.recipes.push(menuId);
  item.locked=false;
  showNotif("📜 Mở khóa recipe: "+item.name+"!");
  renderAll();
}

// === DAILY TICK ===
function dailyTick(){
  GS.gameDay++;GS.rounds++;
  const loc=LOCATIONS[GS.curLoc];

  // Fixed costs
  const fc=totalFixedCost(GS.curLoc);
  GS.dailyFixed=fc;GS.dailyCosts+=fc;GS.todayCosts+=fc;

  // Staff costs
  const wages=GS.staff.reduce((a,s)=>a+(STAFF_TIERS.find(t=>t.id===s.tier)?.salaryDay||250),0);
  GS.dailyCosts+=wages;GS.todayCosts+=wages;

  // Staff mood & growth
  GS.staff.forEach(s=>{
    s.daysWorked++;
    s.servedCount++;
    s.mood=Math.max(0,Math.min(100,s.mood-0.2)); // slow decay
    // Growth: every 20 served = +0.1 to random skill
    if(s.servedCount%20===0){
      const skills=["brew","quality","service"];
      s[skills[Math.floor(Math.random()*3)]]+=0.1;
    }
    // Loyalty decay
    if(s.mood<30)s.loyalty-=0.1;
    // Quit risk
    if(s.loyalty<20&&Math.random()<0.01){
      GS.staff=GS.staff.filter(x=>x.id!==s.id);
      showNotif("😢 "+s.name+" nghỉ việc vì lương thấp!");
    }
  });

  // Stamina regen
  GS.stamina=Math.min(GS.staminaMax,GS.stamina+1);

  // Update sell prices
  for(const lk of GS.unlocked){GS.sellPrices[lk]=Math.floor(LOCATIONS[lk].cost*0.6);}

  // Weather change chance
  if(Math.random()<0.1)showNotif("🌤️ Thời tiết đổi: "+getWeather().name);

  // Profit
  GS.todayProfit=GS.todayRevenue-GS.todayCosts;
  GS.todayCosts=0;GS.todayRevenue=0;GS.todayServe=0;GS.todayWaited=0;GS.todayTip=0;

  // Quest progress
  checkQuest("serve",GS.totalServed);
  checkQuest("earn",GS.totalRevenue);
  checkQuest("daily_earn",GS.todayRevenue);

  showNotif("📅 Ngày "+GS.gameDay+" — Profit: "+fmt(GS.todayProfit)+"₫");
}

function checkQuest(type,val){
  const qs=[
    {id:"q1",type:"serve",target:10,done:false},
    {id:"q2",type:"collect",target:1,done:false},
    {id:"q3",type:"earn",target:5000,done:false},
    {id:"q4",type:"upgrade",target:1,done:false},
    {id:"q5",type:"collect_all",target:5,done:false},
    {id:"q6",type:"daily_earn",target:20000,done:false}
  ];
  qs.forEach(q=>{
    if(!GS.questsCompleted.includes(q.id)&&q.type===type){
      if(val>=q.target&&!q._done){
        GS.questsCompleted.push(q.id);
        q._done=true;
        const reward=q.target*100;
        GS.coins+=reward;
        showNotif("✅ Quest hoàn thành! +"+fmt(reward)+"₫");
      }
    }
  });
}

function renderLocBar(){
  const el=document.getElementById("loc-bar");el.innerHTML="";

    el.appendChild(btn);
  });
}

  // Staff list
  GS.staff.forEach(s=>{
    const tier=STAFF_TIERS.find(t=>t.id===s.tier);
    const moodColor=s.mood>60?"var(--green)":(s.mood>30?"var(--orange)":"var(--red)");
    const d=document.createElement("div");d.className="staff-card";
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between"><span class="name">${tier?tier.emoji:""} ${s.name}</span><span class="tier">${tier?tier.name:"?"}</span></div>
      <div class="skill-row">
        <span>Brew:${s.brew.toFixed(1)} <span style="color:var(--green)">${'█'.repeat(Math.round(s.brew*10))}</span></span>
        <span>Quality:${s.quality.toFixed(1)} <span style="color:var(--orange)">${'█'.repeat(Math.round(s.quality*10))}</span></span>
        <span>Service:${s.service.toFixed(1)} <span style="color:var(--rare)">${'█'.repeat(Math.round(s.service*10))}</span></span>
      </div>
      <div style="margin:4px 0">
        Mood: <span style="font-size:10px">${s.mood.toFixed(0)}</span> <div class="mood-bar"><div class="mood-fill" style="width:${s.mood}%;background:${moodColor}"></div></div>
        | Loyalty: ${s.loyalty.toFixed(0)} <div class="mood-bar"><div class="mood-fill" style="width:${s.loyalty}%;background:var(--orange)"></div></div>
      </div>
      <div class="stat-row"><span class="label">Ngày làm</span><span class="val">${s.daysWorked}</span></div>
      <div class="stat-row"><span class="label">Đơn phục vụ</span><span class="val">${s.servedCount}</span></div>
      <div style="margin-top:4px;display:flex;gap:4px">
        <button class="btn orange" onclick="trainStaff('${s.id}')">Huấn luyện</button>
        <button class="btn" onclick="promoteStaff('${s.id}')" ${s.daysWorked<10||s.mood<50||s.servedCount<20?'disabled':''}>Thăng cấp</button>
        <button class="btn" style="background:var(--red)" onclick="fireStaff('${s.id}')">Sa thải</button>
      </div>`;
    list.appendChild(d);
  });
}

function renderSupply(){
  const list=document.getElementById("supply-list");list.innerHTML="";
  // Show stock
  Object.entries(GS.supplierStock).forEach(([key,val])=>{
    const d=document.createElement("div");d.className="sup-row";
    d.innerHTML=`<span><b>${GS.supplierStockNames[key]}</b></span><span class="stock">${val}</span>`;
    list.appendChild(d);
  });

  list.innerHTML+="<h4 style='margin-top:10px;font-size:13px'>📦 Nhập hàng:</h4>";

  // Order buttons
  Object.entries(SUPPLIERS).forEach(([key,list2])=>{
    list2.forEach((item,tierIdx)=>{
      const d=document.createElement("div");d.className="sup-row";
      d.innerHTML=`<span>${GS.supplierStockNames[key]} (Tier ${tierIdx+1}: ${item.quality?item.quality*100+"%":"standard"}) — ${fmt(item.price)}đ/đv</span>
        <div class="sup-ctrl">
          <button class="btn" onclick="orderSupply('${key}',${tierIdx})" ${GS.coins<item.price*10?'disabled':''}>Mua 10 (${fmt(item.price*10)}₫)</button>
        </div>`;
      list.appendChild(d);
    });
  });
}

function renderMenuSet(){
  const list=document.getElementById("menu-set-list");list.innerHTML="";
  MENU_ITEMS.forEach(item=>{
    const unlocked=!item.locked||GS.recipes.includes(item.id);
    const pricePct=Math.round(GS.menuPrices[item.id]*100);
    const custInfo=CUSTOMER_TYPES.find(c=>c.type===item.custType[0]||c.loves.includes(item.id));
    const demand=getDemandClass();
    const demandEmoji=getDemandEmoji();

    const d=document.createElement("div");d.className="sup-row";
    d.innerHTML=`<span><b>${item.icon} ${item.name}</b> ${unlocked?"":`<span class="badge" style="background:var(--red)">🔒</span>`} <span class="demand ${demand}">${demandEmoji}</span></span>`;
    if(unlocked){
      d.innerHTML+=`<div class="price-ctrl">
        <span class="pct">70%</span>
        <input type="range" min="70" max="130" value="${pricePct}" oninput="setPrice('${item.id}',this.value/100);renderAll()" step="5">
        <span class="pct">130%</span>
      </div>`;
    }else{
      d.innerHTML+=`<button class="btn" onclick="buyRecipe('${item.id}')" ${GS.coins<item.unlockCost?'disabled':''}>Mở khóa (${fmt(item.unlockCost)}₫)</button>`;
    }
    list.appendChild(d);
  });
}

function renderExpansion(){
  const list=document.getElementById("expansion-list");list.innerHTML="";
  Object.entries(LOCATIONS).forEach(([k,v])=>{
    const owned=GS.unlocked.includes(k);
    const d=document.createElement("div");d.className="sup-row";
    if(owned){
      d.innerHTML=`<span><b>${v.emoji} ${v.name}</b> ✅ Mở khóa | Fixed costs: ${fmt(totalFixedCost(k))}₫/ngày | Max staff: ${v.maxStaff}</span>
        <button class="btn" style="background:var(--red)" onclick="sellLocation('${k}')" ${GS.unlocked.length<=1?'disabled':''}>Bán (${fmt(GS.sellPrices[k]||0)}₫)</button>`;
    }else{
      d.innerHTML=`<span><b>${v.emoji} ${v.name}</b> ❌ Chưa mở | Chi phí: ${fmt(v.cost)}₫ | Khách/ngày: ${v.baseCust}×${v.revMult}</span>
        <button class="btn green" onclick="unlockLocation('${k}')" ${GS.coins<v.cost?'disabled':''}>Mở khóa</button>`;
    }
    list.appendChild(d);
  });

  // Chain summary
  const chainValue=GS.unlocked.reduce((a,k)=>a+Math.floor(LOCATIONS[k].cost*0.6),0);
  const chainValue2=GS.unlocked.reduce((a,k)=>a+GS.sellPrices[k]||Math.floor(LOCATIONS[k].cost*0.6),0);
  list.innerHTML+=`<div style="margin-top:10px;padding:10px;background:var(--bg-light);border-radius:8px;font-size:12px">
    <b>📊 Tổng quan chuỗi quán:</b><br>
    Số quán đang sở hữu: ${GS.unlocked.length}<br>
    Giá trị tổng kênh: ${fmt(chainValue2)}₫<br>
    Quán đã bán: ${GS.locationsSold}<br>
    Profit TB/ngày: ${GS.totalServed>0?fmt(GS.totalRevenue/GS.gameDay):0}₫
  </div>`;
}

// === INIT ===
function init(){
  loadGame();
  // Nav tabs
  document.querySelectorAll(".nav-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab+"-panel").classList.add("active");
    });
  });
  renderAll();

  // Game loop: every 60 seconds = 1 day
  setInterval(()=>{dailyTick();renderAll();},60000);

  // Spawn loop: every 15 seconds, try to spawn customer
  setInterval(()=>{spawnCustomer();renderOrders();},15000);

  // Auto-save every 30s
  setInterval(saveGame,30000);

  showNotif("☕ Chào mừng đến Quán Trendy Café!");
}

function saveGame(){localStorage.setItem("trendyCafeSave",JSON.stringify(GS));}
function loadGame(){const s=localStorage.getItem("trendyCafeSave");if(s){const p=JSON.parse(s);Object.assign(GS,p);}}

// Make globals
window.serveOrder=serveOrder;window.buyItem=buyItem;window.buyRecipe=buyRecipe;
window.unlockLocation=unlockLocation;window.sellLocation=sellLocation;
window.hireStaff=hireStaff;window.promoteStaff=promoteStaff;window.fireStaff=fireStaff;
window.trainStaff=trainStaff;window.orderSupply=orderSupply;window.setPrice=setPrice;
window.init=init;
window.onload=init;
</script>
</body>
</html>
