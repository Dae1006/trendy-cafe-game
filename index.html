<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendy Cafe Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #1a1410; color: #f5e6d3; height: 100vh; overflow: hidden; }

#gameContainer { display: flex; height: 100vh; width: 100%; }

/* Left side - cafe scene */
#cafeScene { width: 40%; background: #2a1f15; border-right: 3px solid #4a3520; padding: 20px; display: flex; flex-direction: column; }
#sceneTitle { font-size: 16px; color: #ffd700; margin-bottom: 10px; text-align: center; }

/* Table area */
#tablesContainer { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; overflow-y: auto; }
.table-slot { width: 90px; height: 90px; border: 2px solid #4a3520; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; text-align: center; padding: 5px; transition: all 0.3s; }
.table-slot.empty { background: #3d2b1a; color: #b89a6e; }
.table-slot.occupied { background: #4a3520; border-color: #ffd700; }
.table-slot .customer-icon { font-size: 24px; }
.table-slot .customer-name { font-size: 10px; margin-top: 4px; color: #c9a96e; }
.table-slot .order-text { font-size: 9px; color: #ffd700; margin-top: 2px; }
.table-slot .patience-bar { width: 80%; height: 4px; background: #1a1410; border-radius: 2px; margin-top: 4px; overflow: hidden; }
.table-slot .patience-fill { height: 100%; transition: all 0.3s; }

/* Right side - UI */
#uiPanel { width: 60%; display: flex; flex-direction: column; }

/* Top bar */
#topbar { background: #2a1f15; border-bottom: 3px solid #4a3520; padding: 10px 20px; display: flex; gap: 15px; font-size: 13px; }
.stat { background: #3d2b1a; padding: 6px 12px; border-radius: 6px; }
.stat .label { color: #c9a96e; }
.stat .value { color: #ffd700; font-weight: bold; margin-left: 5px; }

/* Tabs */
#tabs { display: flex; background: #3d2b1a; border-bottom: 2px solid #4a3520; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; color: #c9a96e; border-right: 1px solid #4a3520; transition: all 0.2s; }
.tab:hover { background: #4a3520; }
.tab.active { background: #2a1f15; color: #ffd700; font-weight: bold; }

/* Tab content */
#tabContent { flex: 1; padding: 15px; overflow-y: auto; }
.card { background: #3d2b1a; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid transparent; transition: all 0.2s; cursor: pointer; }
.card:hover { border-color: #ffd700; background: #4a3520; }
.card h4 { color: #ffd700; margin-bottom: 5px; }
.card .desc { font-size: 11px; color: #b89a6e; }
.card .price { color: #4ecdc4; font-weight: bold; }
.card button { background: #2d6b2d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-family: 'Courier New', monospace; }
.card button:hover { background: #3d8b3d; }
.card button:disabled { background: #555; cursor: not-allowed; }

/* Message log */
#msgLog { position: fixed; bottom: 10px; right: 10px; max-width: 300px; background: rgba(42,31,21,0.9); border-radius: 6px; padding: 8px; font-size: 11px; color: #b89a6e; max-height: 150px; overflow-y: auto; }
.msg-item { margin-bottom: 3px; }
.msg-item.good { color: #4ecdc4; }
.msg-item.bad { color: #ff6b6b; }
.msg-item.info { color: #ffd700; }

/* Entrance */
#entrance { padding: 15px; background: rgba(0,0,0,0.2); margin-bottom: 10px; text-align: center; font-size: 14px; color: #b89a6e; }
</style>
</head>
<body>

<div id="gameContainer">
<!-- Left side - Cafe Scene -->
<div id="cafeScene">
<div id="sceneTitle">☕ QUÁN TRENDY CAFÉ ☕</div>
<div id="entrance">🚪 Cửa hàng — Khách đi vào đây</div>
<div id="tablesContainer"></div>
</div>

<!-- Right side - UI -->
<div id="uiPanel">
<div id="topbar">
<div class="stat"><span class="label">💰:</span><span class="value" id="moneyDisplay">$500</span></div>
<div class="stat"><span class="label">⭐:</span><span class="value" id="repDisplay">0</span></div>
<div class="stat"><span class="label">👥:</span><span class="value" id="custDisplay">0/8</span></div>
<div class="stat"><span class="label">⏰:</span><span class="value" id="timeDisplay">6:00 AM</span></div>
</div>

<div id="tabs">
<div class="tab active" onclick="switchTab('menu')">📋 Menu</div>
<div class="tab" onclick="switchTab('staff')">👥 Nhân viên</div>
<div class="tab" onclick="switchTab('orders')">📦 Đơn hàng</div>
</div>

<div id="tabContent"></div>
</div>
</div>

<div id="msgLog"></div>

<script>
// =========================================
// TRENDY CAFÉ SIMULATOR - CLEAN VERSION
// =========================================

var G = {
  money: 500,
  reputation: 0,
  day: 1,
  tick: 0,
  time: 6 * 60, // minutes (start at 6 AM)
  customers: [],
  staff: [],
  tables: []
};

var curTab = 'menu';

// =========================================
// INIT TABLES
// =========================================
function initTables() {
  G.tables = [];
  var container = document.getElementById('tablesContainer');
  container.innerHTML = '';
  
  for (var i = 0; i < 8; i++) {
    G.tables.push({ id: i, occupied: null, order: null });
    
    var div = document.createElement('div');
    div.className = 'table-slot empty';
    div.id = 'table-' + i;
    div.innerHTML = '<span style="font-size:10px;color:#b89a6e">Bàn ' + (i+1) + '</span>';
    container.appendChild(div);
  }
}

// =========================================
// CUSTOMER MANAGEMENT
// =========================================
function spawnCustomer() {
  // Find empty table
  var emptyTable = null;
  for (var i = 0; i < G.tables.length; i++) {
    if (!G.tables[i].occupied) { emptyTable = i; break; }
  }
  
  if (emptyTable === null || G.customers.length >= 8) return false;
  
  var names = ['Coffee Lover', 'Digital Nomad', 'Couple', 'Business Person', 'Artiste', 'Tourist'];
  var icons = ['☕', '💻', '💑', '💼', '🎨', '📷'];
  var idx = Math.floor(Math.random() * names.length);
  
  var cust = {
    id: Date.now() + Math.random(),
    name: names[idx],
    icon: icons[idx],
    tableIndex: emptyTable,
    patience: 60, // seconds
    order: null,
    paying: false
  };
  
  G.customers.push(cust);
  
  // Assign to table
  G.tables[emptyTable].occupied = cust;
  addMsg(icons[idx] + ' ' + names[idx] + ' bước vào quán!', 'info');
  
  updateUI();
  return true;
}

function customerPlaceOrder(cust) {
  var menuItems = [
    { name: 'Espresso', price: 3 },
    { name: 'Latte', price: 5 },
    { name: 'Viet Egg Coffee', price: 8 },
    { name: 'Pho', price: 8 },
    { name: 'Sandwich', price: 6 }
  ];
  
  var item = menuItems[Math.floor(Math.random() * menuItems.length)];
  cust.order = item;
  G.tables[cust.tableIndex].order = item;
  
  addMsg(cust.icon + ' Gọi: ' + item.name + ' ($' + item.price + ')', 'good');
  updateUI();
}

function customerPay(cust) {
  var tip = Math.floor(cust.order.price * 0.1);
  G.money += cust.order.price + tip;
  
  addMsg(cust.icon + ' Trả $' + (cust.order.price + tip) + ' (gót $' + tip + ')', 'good');
  
  // Free table
  G.tables[cust.tableIndex].occupied = null;
  G.tables[cust.tableIndex].order = null;
  
  // Remove customer
  var idx = G.customers.indexOf(cust);
  if (idx > -1) G.customers.splice(idx, 1);
  
  updateUI();
}

// =========================================
// STAFF MANAGEMENT
// =========================================
function hireStaff() {
  var costs = { barista: 300, cook: 250, server: 200 };
  var names = { barista: 'Barista', cook: 'Cook', server: 'Server' };
  var icons = { barista: '☕', cook: '🍳', server: '🧹' };
  
  // Random staff type
  var types = ['barista', 'cook', 'server'];
  var type = types[Math.floor(Math.random() * types.length)];
  
  if (G.money < costs[type]) {
    addMsg('Không đủ tiền thuê ' + names[type] + '! Cần $' + costs[type], 'bad');
    return;
  }
  
  G.money -= costs[type];
  G.staff.push({ type: type, name: names[type], icon: icons[type] });
  
  addMsg(icons[type] + ' Tuyển ' + names[type] + '! ($' + costs[type] + ')', 'good');
  updateUI();
}

// =========================================
// SERVE ORDER (MANUAL)
// =========================================
function serveOrder(custId) {
  var cust = G.customers.find(function(c) { return c.id === custId; });
  if (!cust || !cust.order) return;
  
  // Simulate cooking time
  setTimeout(function() {
    addMsg('☕ Pha xong ' + cust.order.name + ' cho ' + cust.name, 'good');
    
    // Auto-pay after serving
    setTimeout(function() { customerPay(cust); }, 3000);
  }, 2000);
  
  G.tables[cust.tableIndex].order = null;
}

// =========================================
// UI UPDATES
// =========================================
function updateUI() {
  // Top bar
  document.getElementById('moneyDisplay').textContent = '$' + G.money;
  document.getElementById('repDisplay').textContent = G.reputation;
  document.getElementById('custDisplay').textContent = G.customers.length + '/8';
  
  var hours = Math.floor(G.time / 60) % 24;
  var mins = G.time % 60;
  var ampm = hours >= 12 ? 'PM' : 'AM';
  var h12 = hours % 12 || 12;
  document.getElementById('timeDisplay').textContent = h12 + ':' + String(mins).padStart(2, '0') + ' ' + ampm;
  
  // Update tables
  for (var i = 0; i < G.tables.length; i++) {
    var tableEl = document.getElementById('table-' + i);
    var table = G.tables[i];
    
    if (table.occupied) {
      var cust = table.occupied;
      var patiencePct = Math.max(0, cust.patience / 60 * 100);
      var patColor = patiencePct > 50 ? '#4ecdc4' : patiencePct > 20 ? '#ffd700' : '#ff6b6b';
      
      tableEl.className = 'table-slot occupied';
      tableEl.innerHTML = 
        '<div class="customer-icon">' + cust.icon + '</div>' +
        '<div class="customer-name">' + cust.name + '</div>' +
        (cust.order ? '<div class="order-text">📦 ' + cust.order.name + '</div>' : '') +
        '<div class="patience-bar"><div class="patience-fill" style="width:' + patiencePct + '%;background:' + patColor + '"></div></div>';
    } else {
      tableEl.className = 'table-slot empty';
      tableEl.innerHTML = '<span style="font-size:10px;color:#b89a6e">Bàn ' + (i+1) + '</span>';
    }
  }
  
  // Update tab content
  renderTab();
}

function renderTab() {
  var container = document.getElementById('tabContent');
  
  if (curTab === 'menu') {
    var html = '<h3 style="color:#ffd700;margin-bottom:10px">☕ THỰC ĐƠN</h3>';
    var menuItems = [
      { name: 'Espresso', price: 3 },
      { name: 'Americano', price: 4 },
      { name: 'Latte', price: 5 },
      { name: 'Cappuccino', price: 5 },
      { name: 'Viet Egg Coffee', price: 8 },
      { name: 'Coconut Coffee', price: 7 },
      { name: 'Pho', price: 8 },
      { name: 'Sandwich', price: 6 }
    ];
    
    for (var i = 0; i < menuItems.length; i++) {
      var item = menuItems[i];
      html += '<div class="card">';
      html += '<h4>' + item.name + '</h4>';
      html += '<div class="desc">Đồ uống & món ăn</div>';
      html += '<div class="price">$' + item.price + '</div></div>';
    }
    
    html += '<p style="color:#b89a6e;margin-top:10px;font-size:11px;">⚠️ Nhân viên tự động phục vụ khách hàng!</p>';
    container.innerHTML = html;
    
  } else if (curTab === 'staff') {
    var html = '<h3 style="color:#ffd700;margin-bottom:10px">👥 NHÂN VIÊN (' + G.staff.length + ' người)</h3>';
    
    // Current staff list
    for (var i = 0; i < G.staff.length; i++) {
      var s = G.staff[i];
      html += '<div class="card"><h4>' + s.icon + ' ' + s.name + '</h4><div class="desc">Đang làm việc</div></div>';
    }
    
    // Hire button
    html += '<div class="card">';
    html += '<h4>➕ Thuê nhân viên mới</h4>';
    html += '<div class="desc">Barista ($300) | Cook ($250) | Server ($200)</div>';
    html += '<button onclick="hireStaff()">Thuê ngay</button></div>';
    
    container.innerHTML = html;
    
  } else if (curTab === 'orders') {
    var html = '<h3 style="color:#ffd700;margin-bottom:10px">📦 ĐƠN HÀNG</h3>';
    
    if (G.customers.length === 0) {
      html += '<p style="color:#b89a6e;font-size:12px;">Chưa có khách nào. Hãy chờ!</p>';
    } else {
      for (var i = 0; i < G.customers.length; i++) {
        var c = G.customers[i];
        if (c.order) {
          html += '<div class="card">';
          html += '<h4>' + c.icon + ' ' + c.name + '</h4>';
          html += '<div class="desc">📦 ' + c.order.name + ' - $' + c.order.price;
          html += '<button onclick="serveOrder(' + c.id + ')">Phục vụ</button></div></div>';
        } else {
          html += '<div class="card"><h4>' + c.icon + ' ' + c.name + '</h4><div class="desc">🤔 Đang chọn món...</div></div>';
        }
      }
    }
    
    container.innerHTML = html;
  }
}

// =========================================
// TAB SWITCHING
// =========================================
function switchTab(tabName) {
  curTab = tabName;
  
  // Update active tab
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('onclick').includes("'" + tabName + "'")) {
      tabs[i].classList.add('active');
    }
  }
  
  renderTab();
}

// =========================================
// MESSAGE LOG
// =========================================
function addMsg(text, type) {
  var log = document.getElementById('msgLog');
  var msgEl = document.createElement('div');
  msgEl.className = 'msg-item ' + (type || 'info');
  msgEl.textContent = text;
  log.appendChild(msgEl);
  
  // Keep only last 20 messages
  while (log.children.length > 20) {
    log.removeChild(log.firstChild);
  }
}

// =========================================
// GAME LOOP
// =========================================
function gameLoop() {
  G.tick++;
  G.time += 5; // 5 minutes per tick
  
  // End of day check (10 PM = 22 * 60)
  if (G.time >= 22 * 60) {
    G.day++;
    G.time = 6 * 60; // Reset to 6 AM
    addMsg('🌅 Ngày ' + G.day + ' bắt đầu! Cửa hàng mở cửa.', 'info');
    
    // Clear all customers
    for (var i = 0; i < G.customers.length; i++) {
      var c = G.customers[i];
      G.tables[c.tableIndex].occupied = null;
      G.tables[c.tableIndex].order = null;
    }
    G.customers = [];
    
    updateUI();
  }
  
  // Customer patience countdown
  for (var i = G.customers.length - 1; i >= 0; i--) {
    var c = G.customers[i];
    if (!c.paying) {
      c.patience -= 0.5; // Lose 0.5 seconds per tick
      
      if (c.patience <= 20 && !c.order) {
        // Auto-order after 40 seconds waiting
        customerPlaceOrder(c);
      }
      
      if (c.patience <= 0) {
        // Customer leaves angry
        addMsg('😡 ' + c.name + ' bỏ đi! Quá đói chờ!', 'bad');
        G.reputation = Math.max(0, G.reputation - 1);
        
        // Free table
        G.tables[c.tableIndex].occupied = null;
        G.tables[c.tableIndex].order = null;
        
        G.customers.splice(i, 1);
      }
    }
  }
  
  // Auto-order if customer waiting without order
  for (var j = 0; j < G.customers.length; j++) {
    var c2 = G.customers[j];
    if (c2.patience <= 30 && !c2.order && c2.tableIndex !== null) {
      // Try to get staff to serve
      if (G.staff.length > 0) {
        customerPlaceOrder(c2);
      }
    }
  }
  
  // Spawn new customers periodically
  var curH = Math.floor(G.time / 60) % 24;
  var shouldSpawn = false;
  
  if (curH >= 7 && curH <= 9) shouldSpawn = true; // Morning rush
  else if (curH >= 10 && curH <= 15) shouldSpawn = true; // Lunch time
  else if (curH >= 17 && curH <= 20) shouldSpawn = true; // Evening
  
  if (shouldSpawn && G.customers.length < 8 && Math.random() < 0.1) {
    spawnCustomer();
  }
  
  // Staff auto-serve customers
  if (G.staff.length > 0 && G.tick % 20 === 0) {
    for (var k = 0; k < G.customers.length; k++) {
      var c3 = G.customers[k];
      if (c3.order && !c3.paying) {
        c3.paying = true;
        customerPay(c3);
      }
    }
  }
  
  updateUI();
}

// =========================================
// START GAME
// =========================================
initTables();
updateUI();
addMsg('☕ Chào mừng! Quán Trendy Café mở cửa!', 'info');

setInterval(gameLoop, 1000); // Game tick every second

</script>
</body>
</html>
