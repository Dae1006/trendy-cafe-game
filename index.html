<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Quán Trendy Café — Pixel Art Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <!-- Header -->
    <div class="header">
      <div class="coin-display">💰 <span id="coin-amount">500</span></div>
      <div class="income-display">📈 <span id="income-amount">90</span>/ph</div>
      <div class="level-display">⭐ Lv.<span id="player-level">1</span></div>
      <div class="xp-bar-wrap">
        <div class="xp-bar" id="xp-bar" style="width:0%"></div>
        <span class="xp-text"><span id="xp-amount">0</span>/<span id="xp-needed">100</span></span>
      </div>
    </div>

    <!-- Weather -->
    <div class="weather-bar">
      <span class="weather-emoji" id="weather-emoji">☀️</span>
      <span class="weather-text" id="weather-text">Nắng — Trời nắng!</span>
    </div>

    <!-- Location Bar -->
    <div class="location-bar">
      <button class="loc-btn active" data-loc="street">🚶 Vỉa hè</button>
      <button class="loc-btn" data-loc="mall">🏬 Mall</button>
      <button class="loc-btn" data-loc="garden">🌳 Sân vườn</button>
      <button class="loc-btn" data-loc="rooftop">🌃 Rooftop</button>
      <button class="loc-btn" data-loc="festival">🎪 Lễ hội</button>
    </div>

    <!-- Cafe Scene Canvas -->
    <canvas id="cafe-scene-canvas" width="480" height="240"></canvas>

    <!-- Customer Display -->
    <div class="customers-display" id="customers-container"></div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="nav-btn active" data-tab="orders">🏪 Quán</button>
      <button class="nav-btn" data-tab="menu">📋 Menu</button>
      <button class="nav-btn" data-tab="shop">🛒 Cửa hàng</button>
      <button class="nav-btn" data-tab="items">🎒 Items</button>
      <button class="nav-btn" data-tab="market">🏪 Market</button>
      <button class="nav-btn" data-tab="quests">📜 Quest</button>
      <button class="nav-btn" data-tab="upgrades">⬆️ UP</button>
      <button class="nav-btn" data-tab="supply">📦 Supply</button>
    </div>

    <!-- Panels -->
    <div class="panel active" id="orders-panel">
      <h3>📋 Đơn hàng</h3>
      <div id="orders-list"></div>
    </div>

    <div class="panel" id="menu-panel">
      <h3>📋 Menu</h3>
      <div id="menu-list"></div>
    </div>

    <div class="panel" id="shop-panel">
      <h3>🛒 Cửa hàng Trendy</h3>
      <div id="shop-menu-list"></div>
    </div>

    <div class="panel" id="items-panel">
      <h3>🎒 Items sở hữu</h3>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Tất cả</button>
        <button class="filter-btn" data-filter="common">Common</button>
        <button class="filter-btn" data-filter="rare">Rare</button>
        <button class="filter-btn" data-filter="epic">Epic</button>
        <button class="filter-btn" data-filter="legendary">Legendary</button>
      </div>
      <div id="items-list"></div>
    </div>

    <div class="panel" id="market-panel">
      <h3>🏪 Marketplace</h3>
      <div id="market-list"></div>
    </div>

    <div class="panel" id="quests-panel">
      <h3>📜 Nhiệm vụ</h3>
      <div id="quests-list"></div>
    </div>

    <div class="panel" id="upgrades-panel">
      <h3>⬆️ Nâng cấp</h3>
      <div id="upgrades-list"></div>
    </div>

    <div class="panel" id="supply-panel">
      <h3>📦 Nguyên liệu</h3>
      <div class="supply-grid">
        <div class="supply-item">☕ Cà phê: <span id="beans-stock">10</span></div>
        <div class="supply-item">🥛 Sữa: <span id="milk-stock">20</span></div>
        <div class="supply-item">🥤 Cốc: <span id="cups-stock">200</span></div>
        <div class="supply-item">🧊 Đá: <span id="ice-stock">100</span></div>
      </div>
      <div class="supply-actions" id="supply-actions"></div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <span>📅 Ngày <span id="game-day">1</span></span>
      <span>👥 Phục vụ: <span id="total-served">0</span></span>
      <span>💰 Tổng: <span id="total-revenue">0</span></span>
      <span>📈 Ngày: <span id="daily-revenue">0</span></span>
    </div>

    <!-- Trend Banner -->
    <div class="trend-banner">
      <span id="trend-text">🎮 Quán Trendy Café — Pixel Art Edition ☕</span>
    </div>
  </div>

  <script src="game_engine_v2.js"></script>
  <script src="cafe_scene_v7.js"></script>
  <script src="marketplace.js"></script>
  <script src="supplier_ui.js"></script>
  <script src="feedback.js"></script>
  <script src="weather.js"></script>
  <script src="ads.js"></script>
</body>
</html>
