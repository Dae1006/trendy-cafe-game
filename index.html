<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Trendy Cafe - V6 Enhanced</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;overflow-x:hidden}
html{overflow-x:hidden;position:relative}
body{font-family:'Courier New',monospace;background:#0d0d1a;color:#e8e8e8;max-width:480px;margin:0 auto;min-height:100vh;font-size:12px;overflow-x:hidden;position:relative}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes coinRain{0%{transform:translateY(-20px);opacity:1}100%{transform:translateY(30px);opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 5px #FFD700}50%{text-shadow:0 0 20px #FFD700,0 0 40px #FFD700}}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
#hdr{padding:10px 15px;background:linear-gradient(135deg,#16213e,#1a1a4e);border-bottom:3px solid #FFD700;display:flex;justify-content:space-between;flex-wrap:wrap;gap:5px}
.gold{color:#FFD700}
.gold:hover{animation:glow 1s ease-in-out}
.xp-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF6347);transition:width 0.5s}
#tabs{display:flex;overflow-x:auto;border-bottom:2px solid #0f3460;background:#0f3460}
.tab{padding:10px 12px;border:none;background:transparent;color:#a0a0b0;font-family:inherit;cursor:pointer;white-space:nowrap;font-size:12px;transition:all 0.3s}
.tab.active{color:#FFD700;background:rgba(255,215,0,0.2)}
.tab:hover{background:rgba(255,215,0,0.1)}
#content{min-height:400px;padding:15px;background:#1a1a2e}
.card{padding:12px;margin:8px 0;background:linear-gradient(145deg,#0f3460,#16213e);border:2px solid #000;border-radius:8px;display:flex;justify-content:space-between;align-items:center;transition:transform 0.2s,box-shadow 0.2s;animation:none}
.card.new-card{animation:none}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(255,215,0,0.2)}
.card.rare{border-color:#9b59b6;background:linear-gradient(145deg,#2c1a4a,#1a1a4e)}
.card.epic{border-color:#e74c3c;background:linear-gradient(145deg,#4a1a1a,#1a1a4e)}
.btn{padding:8px 16px;border:2px solid #000;background:#FF6347;color:#fff;cursor:pointer;font-family:inherit;font-size:12px;margin:4px;border-radius:5px;transition:all 0.2s}
.btn:hover{transform:scale(1.05);box-shadow:0 2px 10px rgba(255,99,71,0.4)}
.btn:active{transform:scale(0.95)}
.btn:disabled{background:#555;cursor:not-allowed;transform:none;box-shadow:none}
.btn.green{background:#28a745}
.btn.green:hover{box-shadow:0 2px 10px rgba(40,167,69,0.4)}
.btn.blue{background:#3498db}
.btn.blue:hover{box-shadow:0 2px 10px rgba(52,152,219,0.4)}
.btn.purple{background:#9b59b6}
.btn.purple:hover{box-shadow:0 2px 10px rgba(155,89,182,0.4)}
.empty{padding:20px;text-align:center;color:#a0a0b0}
#notif{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#0f3460;color:#FFD700;padding:8px 16px;border:2px solid #FFD700;border-radius:8px;font-size:12px;z-index:999;display:none;text-align:center;min-width:200px}
.float-text{position:fixed;pointer-events:none;font-size:16px;font-weight:bold;animation:floatUp 1s ease-out forwards;z-index:1000}
#notif-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:998;display:flex;flex-direction:column;gap:5px;align-items:center}
.notif-item{background:#16213e;color:#FFD700;padding:6px 14px;border:2px solid #FFD700;border-radius:20px;font-size:11px;animation:none}
.notif-item.animate{animation:none}
.equip-slot{padding:8px;margin:5px 0;background:#16213e;border:2px dashed #333;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.equip-slot.owned{border-color:#28a745;border-style:solid}
.equip-slot.locked{opacity:0.5;border-color:#555}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a3e}
.stat-label{color:#a0a0b0}
.stat-value{color:#FFD700}
.mood-bar{width:60px;height:8px;background:#333;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.mood-fill{height:100%;transition:width 0.5s}
.mood-high .mood-fill{background:#28a745}
.mood-med .mood-fill{background:#FFD700}
.mood-low .mood-fill{background:#FF6347}
.level-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold}
.l1{background:#666}.l2{background:#95a5a6}.l3{background:#3498db}
.l4{background:#9b59b6}.l5{background:#e74c3c}.l6{background:#FFD700;color:#000}
#daynight{position:absolute;top:5px;right:10px;font-size:20px}
.section-title{color:#FFD700;margin:15px 0 8px 0;font-size:13px;border-left:3px solid #FFD700;padding-left:8px}
.customer-avatar{font-size:24px;margin-right:8px}
.tip-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:1001}
.tip-content{background:#16213e;border:3px solid #FFD700;border-radius:12px;padding:20px;max-width:350px;text-align:center;animation:sparkle 0.5s ease-out}
.tip-content h3{color:#FFD700;margin-bottom:10px}
.tip-content p{color:#e8e8e8;margin-bottom:15px;line-height:1.6}
.reputation-stars{color:#FFD700;letter-spacing:2px}
</style>
</head>
<body>
<div id="notif"></div>
<div id="notif-area"></div>

<div id="hdr" style="position:relative">
  <span>💰 <span class="gold" id="coins">500</span></span>
  <span style="flex:1;text-align:center">
    Lv<span class="gold level-badge" id="lv-badge">1</span> 
    <span class="gold" id="lv-text">Lv1</span>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </span>
  <span>⭐ Rep: <span class="reputation-stars" id="rep-stars">☆☆☆☆☆</span></span>
</div>

<div id="tabs">
  <button class="tab active" data-tab="orders">📋 Orders</button>
  <button class="tab" data-tab="menu">🍽️Menu</button>
  <button class="tab" data-tab="stats">📊Stats</button>
  <button class="tab" data-tab="staff">👥Staff</button>
  <button class="tab" data-tab="equip">🔧Equip</button>
  <button class="tab" data-tab="shop">🛒Shop</button>
</div>

<div id="content">
  <div id="panel-orders"></div>
  <div id="panel-menu" style="display:none"></div>
  <div id="panel-stats" style="display:none"></div>
  <div id="panel-staff" style="display:none"></div>
  <div id="panel-equip" style="display:none"></div>
  <div id="panel-shop" style="display:none"></div>
</div>

<script>
// ============ GAME CONFIGURATION ============
const CONFIG = {
  xpPerLevel: [0, 100, 250, 500, 900, 1500, 2400, 3600, 5200, 7200, 10000, 13500, 18000, 24000, 32000, 42000, 55000, 72000, 95000, 125000, 165000, 220000, 290000, 380000, 500000, 660000, 880000, 1200000, 1600000, 2100000, 2800000, 3700000, 4900000, 6500000, 8700000, 11500000, 15000000, 20000000, 26000000, 35000000, 46000000, 60000000, 78000000, 100000000, 130000000, 170000000, 220000000, 290000000, 380000000, 500000000],
  maxStaff: 12,
  maxOrders: 8,
  orderInterval: [5000, 4500, 4000, 3500, 3000, 2500, 2200, 2000, 1800, 1600, 1400, 1200, 1000, 900, 800, 700, 600, 500, 400, 300],
  moodDecayRate: [2, 1.8, 1.5, 1.2, 1.0, 0.8, 0.6, 0.5, 0.4, 0.3],
  baseServeTime: 8000,
  repThresholds: [0, 10, 30, 60, 100, 150, 220],
  maxRep: 220,
  // === DIFFICULTY SETTINGS ===
  profitMultiplier: 0.6,       // Revenue chỉ còn 60% so với trước
  ingredientInflation: 1.4,     // Cost nguyên liệu tăng 40%
  staffSalaryInterval: 30000,   // Lương nhân viên mỗi 30s game
  fixedChargesInterval: 60000,  // Fixed charges mỗi 60s game
  bankruptcyWarningTime: 10000, // Cảnh báo: âm coins 10s
  bankruptcyTime: 20000,        // Bankruptcy: âm coins 20s
  rent: 200,                    // Thuê mặt bằng/cycle
  utilities: 100,               // Điện nước/cycle
  insurance: 80,                // Bảo hiểm/cycle
  tax: 50                       // Thuế/cycle
};

// ============ MENU ITEMS ============
const MENU = [
  {id:'coffee',name:'Black Coffee',icon:'☕',price:[15,20],cost:7,rarity:1},
  {id:'milk_coffee',name:'Milk Coffee',icon:'🥛',price:[20,28],cost:11,rarity:1},
  {id:'espresso',name:'Espresso',icon:'☕',price:[25,35],cost:14,rarity:1},
  {id:'latte',name:'Caramel Latte',icon:'🥤',price:[30,42],cost:17,rarity:2},
  {id:'matcha',name:'Matcha Tea',icon:'🍵',price:[35,45],cost:21,rarity:2},
  {id:'bubble_tea',name:'Bubble Tea',icon:'🧋',price:[38,55],cost:25,rarity:3},
  {id:'smoothie',name:'Berry Smoothie',icon:'🫐',price:[40,50],cost:21,rarity:2},
  {id:'mocha',name:'Mocha Frappe',icon:'🍫',price:[45,60],cost:28,rarity:3},
  {id:'cheesecake',name:'Cheesecake',icon:'🍰',price:[30,40],cost:17,rarity:3},
  {id:'croissant',name:'Butter Croissant',icon:'🥐',price:[25,35],cost:14,rarity:2},
  {id:'waffle',name:'Strawberry Waffle',icon:'🧇',price:[40,55],cost:25,rarity:3},
  {id:'tiramisu',name:'Tiramisu',icon:'🍮',price:[50,65],cost:31,rarity:4},
  {id:'special',name:'Chef Special',icon:'✨',price:[60,80],cost:35,rarity:5}
];

// ============ STAFF ============
const STAFF = [
  {id:'intern',name:'🧑‍🎓 Intern',cost:100,sk:[0.3,0.5],salary:15,desc:'Basic helper - 15₫ salary/cycle'},
  {id:'barista',name:'☕ Barista',cost:300,sk:[0.5,0.7],salary:40,desc:'Skilled coffee maker - 40₫ salary/cycle'},
  {id:'chef',name:'👨‍🍳 Chef',cost:500,sk:[0.7,0.85],salary:70,desc:'Expert cook - 70₫ salary/cycle'},
  {id:'senior',name:'🧑‍💼 Senior',cost:800,sk:[0.85,0.95],salary:120,desc:'Top performer - 120₫ salary/cycle'},
  {id:'master',name:'👨‍🏫 Master',cost:1500,sk:[0.95,1.1],salary:200,desc:'Legendary skill - 200₫ salary/cycle'},
  {id:'manager',name:'🎩 Manager',cost:2000,sk:[1.0,1.2],salary:300,desc:'Business wizard - 300₫ salary/cycle'}
];

// ============ EQUIPMENT ============
const EQUIPMENT = [
  {id:'espresso_mach',name:'Espresso Machine',icon:'☕',cost:200,maxLv:3,desc:'+5% revenue/lv',revenueBonus:0.05},
  {id:'seating',name:'Cozy Seating',icon:'🪑',cost:300,maxLv:3,desc:'+1 max order/lv',orderBonus:1},
  {id:'decoration',name:'Wall Decoration',icon:'🎨',cost:400,maxLv:3,desc:'+5 rep/lv',repBonus:5},
  {id:'speaker',name:'Bluetooth Speaker',icon:'🎵',cost:250,maxLv:2,desc:'+3% customer mood',moodBonus:0.03},
  {id:'fridge',name:'Premium Fridge',icon:'🧊',cost:600,maxLv:2,desc:'+10% order speed',speedBonus:0.10},
  {id:'wifi',name:'WiFi Hotspot',icon:'📶',cost:150,maxLv:2,desc:'+2 rep/lv',repBonus2:2},
  {id:'bakery',name:'Bakery Corner',icon:'🏪',cost:800,maxLv:2,desc:'+unlocks croissant/waffle',newMenu:2},
  {id:'bar_counter',name:'Bar Counter',icon:'🍸',cost:1200,maxLv:2,desc:'+unlocks mocha/tiramisu',newMenu2:2}
];

// ============ TREND DECORATIONS ============
const TRENDS = [
  {id:'t_doge',name:'Golden Doge',icon:'🐕',r:'common',cost:300,desc:'+5% revenue'},
  {id:'t_cat',name:'Stray Cat',icon:'🐱',r:'common',cost:200,desc:'+3% revenue'},
  {id:'t_plant',name:'Succulent Plant',icon:'🌱',r:'common',cost:150,desc:'+2 rep'},
  {id:'t_girl',name:'Girly Corner',icon:'💖',r:'rare',cost:1000,desc:'+10% revenue'},
  {id:'t_art',name:'Art Gallery',icon:'🖼️',r:'rare',cost:1500,desc:'+8 rep'},
  {id:'t_piano',name:'Piano Corner',icon:'🎹',r:'epic',cost:3000,desc:'+15% revenue'},
  {id:'t_sky',name:'Sky Lounge',icon:'🌃',r:'epic',cost:5000,desc:'+20% revenue'},
  {id:'t_chef',name:'Chef Statue',icon:'🗿',r:'legend',cost:10000,desc:'+30% revenue'}
];

// ============ LEVEL REWARDS ============
const LEVEL_REWARDS = {
  2: {coins:200,desc:'Unlock latte & matcha',rewardItems:['latte','matcha']},
  3: {coins:400,desc:'Unlock equipment shop',rewardItems:['seating','decoration']},
  4: {coins:600,desc:'Unlock bakery corner',rewardItems:['bakery']},
  5: {coins:1000,desc:'Unlock bar counter & master',rewardItems:['bar_counter','master']},
  6: {coins:2000,desc:'🎉 Grand Opening! All items unlocked',rewardItems:['special']},
  10: {coins:3000,desc:'Unlock pastry menu: croissant+waffle early',rewardItems:['croissant','waffle']},
  15: {coins:5000,desc:'Unlock espresso machine Lv3 & premium fridge',rewardItems:['espresso_mach_3','fridge_2']},
  20: {coins:8000,desc:'Unlock latte art corner (+15% revenue)',rewardItems:['t_girl']},
  30: {coins:15000,desc:'Unlock sky lounge decoration',rewardItems:['t_sky']},
  40: {coins:25000,desc:'Unlock piano corner (+15% revenue)',rewardItems:['t_piano']},
  50: {coins:50000,desc:'Unlock Chef Statue (+30% revenue)',rewardItems:['t_chef']},
  60: {coins:80000,desc:'Unlock all trend decorations',rewardItems:['t_doge','t_cat','t_plant','t_art']},
  75: {coins:150000,desc:'🌟 Legendary status! All equipment maxed',rewardItems:['all_equipment']},
  100: {coins:500000,desc:'👑☕ LEGENDARY CAFE OWNER! Congratulations!',rewardItems:[]}
};

// ============ GAME STATE ============
var G = {
  coins: 500,
  lv: 1,
  xp: 0,
  rep: 50,
  repStars: 0,
  tab: 'orders',
  staff: [],
  items: {},
  equipment: {espresso_mach:0,seating:0,decoration:0,speaker:0,fridge:0,wifi:0,bakery:0,bar_counter:0},
  orders: [],
  totalServed: 0,
  totalRevenue: 0,
  totalTips: 0,
  totalExpenses: 0,
  ordersToday: 0,
  bestDay: 0,
  lastOrderTime: Date.now(),
  trendItems: [],
  unlockedMenu: ['coffee','milk_coffee','espresso'],
  saveVersion: 7,
  // === FINANCIAL MANAGEMENT ===
  bankruptcyWatchdog: null, // timeout ID
  lastSalaryPaid: 0,
  lastChargesPaid: 0,
  isBankrupt: false,
  lastProfitCheck: Date.now(),
  dailyProfit: 0,
  monthlyProfit: 0
};

// ============ AUDIO ENGINE ============
const AudioEngine = {
  ctx: null,
  init: function() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  },
  play: function(freq, dur, type='sine') {
    if (!this.ctx) this.init();
    if (!this.ctx) return;
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
      gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start();
      osc.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  },
  coin: function() { this.play(880, 0.15); setTimeout(()=>this.play(1100, 0.1), 80); },
  serve: function() { this.play(660, 0.1); setTimeout(()=>this.play(880, 0.1), 60); setTimeout(()=>this.play(1100, 0.15), 120); },
  buy: function() { this.play(440, 0.2); setTimeout(()=>this.play(660, 0.15), 100); },
  levelUp: function() { 
    [523,659,784,1047].forEach((f,i) => setTimeout(()=>this.play(f,0.2,'square'), i*100)); 
  },
  error: function() { this.play(220, 0.3, 'sawtooth'); },
  click: function() { this.play(500, 0.05); },
  orderNew: function() { this.play(700, 0.1); setTimeout(()=>this.play(900, 0.1), 80); }
};

// ============ UTILITY FUNCTIONS ============
function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }
function clamp(v,min,max) { return Math.max(min,Math.min(max,v)); }
function pick(arr) { return arr[rand(0,arr.length-1)]; }

function notify(msg, duration=2000) {
  const area = document.getElementById('notif-area');
  const el = document.createElement('div');
  el.className = 'notif-item animate';
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, duration);
}

function floatText(x, y, text, color='#FFD700') {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = x+'px';
  el.style.top = y+'px';
  el.style.color = color;
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 1000);
}

// ============ ORDER GENERATION ============
function generateOrder() {
  const availableMenu = MENU.filter(m => G.unlockedMenu.includes(m.id));
  const menu = pick(availableMenu);
  const price = rand(menu.price[0], menu.price[1]);
  const customers = [
    {name:'Tourist',icon:'👤'},
    {name:'Student',icon:'🎒'},
    {name:'Office Worker',icon:'👔'},
    {name:'Girlfriend Date',icon:'💑'},
    {name:'Regular Customer',icon:'😊'},
    {name:'Food Blogger',icon:'📱'},
    {name:'Business Person',icon:'💼'},
    {name:'Artist',icon:'🎨'}
  ];
  const customer = pick(customers);
  
  const tipChance = G.rep / CONFIG.maxRep;
  const tipAmount = Math.random() < tipChance ? rand(5, 20) : 0;
  
  return {
    id: Date.now() + Math.random(),
    name: menu.name,
    icon: menu.icon,
    menuId: menu.id,
    price: price,
    cost: menu.cost,
    customer: customer,
    tip: tipAmount,
    patience: CONFIG.baseServeTime * (1 + (6-G.lv)*0.1), // more patience at higher levels
    timeLeft: CONFIG.baseServeTime * (1 + (6-G.lv)*0.1),
    created: Date.now()
  };
}

function autoGenerateOrder() {
  if (G.orders.length >= CONFIG.maxOrders + G.equipment.seating) return;
  
  const interval = CONFIG.orderInterval[G.lv-1] || 5000;
  const now = Date.now();
  
  if (now - G.lastOrderTime > interval) {
    const order = generateOrder();
    G.orders.push(order);
    G.lastOrderTime = now;
    AudioEngine.orderNew();
    updateUI();
  }
}

// ============ GAME ACTIONS ============
function serveOrder(idx) {
  if (idx < 0 || idx >= G.orders.length) return;
  const o = G.orders[idx];
  
  // COST INFLATION - nguyên liệu tăng giá
  const ingredientCost = Math.floor(o.cost * CONFIG.ingredientInflation);
  
  // PROFIT MULTIPLIER - profit chậm hơn
  const rawRevenue = o.price + o.tip;
  let revenue = Math.floor(rawRevenue * CONFIG.profitMultiplier);
  
  // Revenue bonus from trends
  let bonus = 1;
  G.trendItems.forEach(t => {
    if (t.revenueBonus) bonus += t.revenueBonus;
  });
  
  // Revenue bonus from equipment
  bonus += (G.equipment.espresso_mach || 0) * CONFIG.EQUIPMENT[0].revenueBonus;
  
  revenue = Math.floor(revenue * bonus);
  
  // NET PROFIT
  const netProfit = revenue - ingredientCost;
  
  G.coins += netProfit;
  G.totalRevenue += revenue;
  G.totalExpenses += ingredientCost;
  G.totalServed++;
  G.ordersToday++;
  G.totalTips += o.tip;
  
  // XP gain
  const xpGain = Math.floor(o.price * 1.5) + (o.tip > 0 ? 5 : 0);
  G.xp += xpGain;
  
  // Reputation gain
  const repGain = 1 + Math.floor(G.repStars * 0.3);
  G.rep = Math.min(CONFIG.maxRep, G.rep + repGain);
  
  // Clear bankruptcy watchdog if coins recovered
  if (G.coins >= 0 && G.bankruptcyWatchdog) {
    clearTimeout(G.bankruptcyWatchdog);
    G.bankruptcyWatchdog = null;
    G.bankruptcyStartTime = null;
  }
  
  AudioEngine.serve();
  notify(`✅ Served ${o.customer.icon} ${o.name}! +${revenue}₫ (-${ingredientCost}₫ = ${netProfit}₫ net)`);
  
  checkLevelUp();
  updateUI();
}

function checkLevelUp() {
  // DÙNG do...while để up nhiều level nếu XP dư
  while (G.lv < 100) {
    const nextXp = CONFIG.xpPerLevel[G.lv];
    if (G.xp < nextXp) break;
    
    G.xp -= nextXp;
    G.lv++;
    AudioEngine.levelUp();
    
    const reward = LEVEL_REWARDS[G.lv];
    if (reward) {
      G.coins += reward.coins;
      reward.rewardItems.forEach(id => {
        if (id === 'all_equipment') {
          EQUIPMENT.forEach(eq => { G.equipment[eq.id] = eq.maxLv; });
        } else if (id === 'espresso_mach_3') {
          G.equipment.espresso_mach = Math.max(G.equipment.espresso_mach, 3);
        } else if (id === 'fridge_2') {
          G.equipment.fridge = Math.max(G.equipment.fridge, 2);
        } else if (!G.unlockedMenu.includes(id)) {
          G.unlockedMenu.push(id);
        }
      });

function hireStaff(idx) {
  if (G.staff.length >= CONFIG.maxStaff) { notify('❌ Staff full!'); return; }
  const s = STAFF[idx];
  if (G.coins < s.cost) { notify('❌ Not enough coins!'); AudioEngine.error(); return; }
  
  G.coins -= s.cost;
  const skillRange = s.sk;
  G.staff.push({
    id: s.id,
    name: s.name,
    skill: (skillRange[0] + skillRange[1]) / 2 + (Math.random() * (skillRange[1]-skillRange[0]) / 2),
    mood: 100,
    hired: Date.now()
  });
  
  AudioEngine.buy();
  notify(`✅ Hired ${s.name}!`);
  updateUI();
}

function buyEquipment(id, event) {
  const eq = EQUIPMENT.find(e => e.id === id);
  if (!eq) return;
  
  const currentLv = G.equipment[id] || 0;
  if (currentLv >= eq.maxLv) { notify('❌ Max level!'); return; }
  
  const cost = Math.floor(eq.cost * (currentLv + 1));
  if (G.coins < cost) { notify('❌ Not enough coins!'); AudioEngine.error(); return; }
  
  G.coins -= cost;
  G.equipment[id] = currentLv + 1;
  
  AudioEngine.buy();
  notify(`🔧 ${eq.name} upgraded to Lv${G.equipment[id]}!`);
  
  // Check menu unlocks
  if (id === 'bakery' && G.equipment[id] >= 1 && !G.unlockedMenu.includes('croissant')) G.unlockedMenu.push('croissant');
  if (id === 'bakery' && G.equipment[id] >= 2 && !G.unlockedMenu.includes('waffle')) G.unlockedMenu.push('waffle');
  if (id === 'bar_counter' && G.equipment[id] >= 1 && !G.unlockedMenu.includes('mocha')) G.unlockedMenu.push('mocha');
  if (id === 'bar_counter' && G.equipment[id] >= 2 && !G.unlockedMenu.includes('tiramisu')) G.unlockedMenu.push('tiramisu');
  
  updateUI();
}

function buyTrend(id, event) {
  const t = TRENDS.find(x => x.id === id);
  if (!t || G.trendItems.find(x => x.id === id)) return;
  if (G.coins < t.cost) { notify('❌ Not enough coins!'); AudioEngine.error(); return; }
  
  G.coins -= t.cost;
  
  const revenueBonus = t.id === 't_doge' ? 0.05 :
                       t.id === 't_cat' ? 0.03 :
                       t.id === 't_girl' ? 0.10 :
                       t.id === 't_piano' ? 0.15 :
                       t.id === 't_sky' ? 0.20 :
                       t.id === 't_chef' ? 0.30 : 0;
  
  const repBonus = t.id === 't_plant' ? 2 :
                   t.id === 't_art' ? 8 : 0;
  
  G.trendItems.push({...t, revenueBonus, repBonus});
  G.rep = Math.min(CONFIG.maxRep, G.rep + repBonus);
  
  AudioEngine.buy();
  notify(`🛒 Bought ${t.icon} ${t.name}! ${t.desc}`);
  updateUI();
}

function restStaff(idx) {
  if (idx < 0 || idx >= G.staff.length) return;
  G.staff[idx].mood = Math.min(100, G.staff[idx].mood + 30);
  notify(`☕ ${G.staff[idx].name} is resting! Mood restored.`);
  AudioEngine.click();
  updateUI();
}

function fireStaff(idx) {
  if (idx < 0 || idx >= G.staff.length) return;
  const s = G.staff[idx];
  const staffDef = STAFF.find(st => st.id === s.id);
  const refund = staffDef ? Math.floor(staffDef.cost * 0.5) : 0;
  
  if (confirm(`🔥 Sa thải ${s.name}? Nhận lại ${refund}₫`)) {
    G.coins += refund;
    G.staff.splice(idx, 1);
    AudioEngine.error();
    notify(`🔥 Fired ${s.name}! Refund: ${refund}₫`);
    updateUI();
  }
}

// ============ FINANCIAL MANAGEMENT ============
function calculateStaffSalaries() {
  let total = 0;
  G.staff.forEach(s => {
    const staffDef = STAFF.find(st => st.id === s.id);
    if (staffDef && staffDef.salary) {
      total += staffDef.salary;
    }
  });
  return total;
}

function calculateFixedCharges() {
  const charges = CONFIG.fixedCharges || { rent: 150, electricity: 80, water: 40, internet: 30, insurance: 50, maintenance: 60 };
  return charges.rent + charges.electricity + charges.water + charges.internet + charges.insurance + charges.maintenance;
}

function processFinancialCycles() {
  const now = Date.now();
  
  // Pay staff salaries
  if (now - G.lastSalaryPaid >= CONFIG.staffSalaryInterval) {
    const salaries = calculateStaffSalaries();
    if (salaries > 0) {
      G.coins -= salaries;
      G.totalExpenses += salaries;
      G.lastSalaryPaid = now;
      notify(`💸 Lương nhân viên: -${salaries}₫ (G${G.staff.length} staff)`, 3000);
    }
  }
  
  // Pay fixed charges
  if (now - G.lastChargesPaid >= CONFIG.fixedChargesInterval) {
    const charges = calculateFixedCharges();
    G.coins -= charges;
    G.totalExpenses += charges;
    G.lastChargesPaid = now;
    notify(`🏦 Fixed charges: -${charges}₫ (rent+utilities+insurance+tax)`, 3000);
  }
  
  // Check bankruptcy
  checkBankruptcy();
  
  // Update daily profit
  if (now - G.lastProfitCheck >= 60000) {
    G.dailyProfit = G.totalRevenue - G.totalExpenses;
    G.lastProfitCheck = now;
    if (G.dailyProfit > G.bestDay) G.bestDay = G.dailyProfit;
  }
}

function checkBankruptcy() {
  if (G.coins <= CONFIG.bankruptcyThreshold) {
    if (!G.bankruptcyStartTime) {
      G.bankruptcyStartTime = Date.now();
      notify(`⚠️ WARNING! coins âm! ${Math.ceil((CONFIG.bankruptcyTime - CONFIG.bankruptcyWarningTime)/1000)}s until bankruptcy!`, 5000);
      setTimeout(() => {
        if (G.coins <= CONFIG.bankruptcyThreshold) {
          notify(`💀 BANKRUPTCY WARNING! ${Math.ceil((CONFIG.bankruptcyTime - (Date.now() - G.bankruptcyStartTime))/1000)}s remaining!`, 3000);
        }
      }, CONFIG.bankruptcyWarningTime);
    }
    
    if (Date.now() - G.bankruptcyStartTime >= CONFIG.bankruptcyTime) {
      gameOver();
    }
  } else {
    if (G.bankruptcyStartTime) {
      G.bankruptcyStartTime = null;
      notify(`✅ Recovered! Coins back to positive.`, 2000);
    }
  }
}

function gameOver() {
  AudioEngine.error();

// ============ FINANCIAL MANAGEMENT ============
function calculateFixedCharges() {
  // Fixed charges: rent + utilities + insurance + tax
  return CONFIG.rent + CONFIG.utilities + CONFIG.insurance + CONFIG.tax;
}

function calculateStaffSalary() {
  // Calculate total salary for all staff
  let total = 0;
  G.staff.forEach(s => {
    const staffDef = STAFF.find(st => st.id === s.id);
    if (staffDef) {
      total += staffDef.salary;
    }
  });
  return total;
}

function processFinancialCycles() {
  const now = Date.now();
  
  // Pay staff salary
  if (now - G.lastSalaryPaid >= CONFIG.staffSalaryInterval) {
    const salary = calculateStaffSalary();
    if (salary > 0) {
      G.coins -= salary;
      G.totalExpenses += salary;
      G.lastSalaryPaid = now;
      notify(`💸 Lương nhân viên: -${salary}₫`, 3000);
    }
  }
  
  // Pay fixed charges
  if (now - G.lastChargesPaid >= CONFIG.fixedChargesInterval) {
    const charges = calculateFixedCharges();
    G.coins -= charges;
    G.totalExpenses += charges;
    G.lastChargesPaid = now;
    notify(`🏦 Fixed charges: -${charges}₫ (rent+utilities+insurance+tax)`, 3000);
  }
  
  // Check bankruptcy
  checkBankruptcy();
  
  // Update daily profit
  if (now - G.lastProfitCheck >= 60000) { // Every 60s = 1 game-day
    G.dailyProfit = G.totalRevenue - G.totalExpenses;
    G.lastProfitCheck = now;
    if (G.dailyProfit > G.bestDay) G.bestDay = G.dailyProfit;
  }
}

function checkBankruptcy() {
  if (G.coins < 0) {
    if (!G.bankruptcyWatchdog) {
      G.bankruptcyWatchdog = setTimeout(() => {
        if (G.coins < 0) {
          // Bankruptcy!
          G.isBankrupt = true;
          gameOver();
        } else {
          G.bankruptcyWatchdog = null;
          notify(`✅ Survived! Coins recovered to positive.`, 3000);
        }
      }, CONFIG.bankruptcyTime);
      
      // Warning at 10s
      setTimeout(() => {
        if (G.coins < 0) {
          notify(`⚠️ WARNING! Coins negative! ${Math.ceil((CONFIG.bankruptcyTime - 10000)/1000)}s until bankruptcy!`, 5000);
        }
      }, CONFIG.bankruptcyWarningTime);
    }
  } else {
    if (G.bankruptcyWatchdog) {
      clearTimeout(G.bankruptcyWatchdog);
      G.bankruptcyWatchdog = null;
    }
  }
}

function gameOver() {
  AudioEngine.error();
  setTimeout(() => {
    alert(`💀 BANKRUPTCY! 💀\n\nYour cafe has gone bankrupt!\n\nFinal Stats:\n- Total Revenue: ${G.totalRevenue.toLocaleString()}₫\n- Total Expenses: ${G.totalExpenses.toLocaleString()}₫\n- Orders Served: ${G.totalServed}\n- Final Level: ${G.lv}\n- Reputation: ${G.rep}\n\nTry harder next time! 🕵️`);

}

      </div>
      <div>
        ${owned ? '<span style="color:#28a745">✅ OWNED</span>' : `<span class="gold">${t.cost}₫</span><br><button class="btn" onclick="buyTrend('${t.id}')">BUY</button>`}
      </div>
    </div>`;
  });
  
  el.innerHTML = html;
}

// ============ UPDATE UI ============
function updateUI() {
  const coins = document.getElementById('coins');
  if (coins) coins.textContent = G.coins;
  
  const lvBadge = document.getElementById('lv-badge');
  if (lvBadge) {
    lvBadge.textContent = G.lv;
    lvBadge.className = 'gold level-badge l'+G.lv;
  }
  
  const lvText = document.getElementById('lv-text');
  if (lvText) lvText.textContent = 'Lv'+G.lv;
  
  const xpFill = document.getElementById('xp-fill');
  if (xpFill) {
    const nextXp = CONFIG.xpPerLevel[G.lv] || 999999;
    const pct = Math.min(100, (G.xp / nextXp) * 100);
    xpFill.style.width = pct + '%';
  }
  
  const stars = getRepStars(G.rep);
  const repStars = document.getElementById('rep-stars');
  if (repStars) repStars.textContent = '★'.repeat(stars) + '☆'.repeat(5-stars);
  
  const tabs = document.querySelectorAll('.tab');
  for (let i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === G.tab);
  }
  
  const panels = document.querySelectorAll('[id^="panel-"]');
  panels.forEach(p => p.style.display = 'none');
  const panel = document.getElementById('panel-' + G.tab);
  if (panel) panel.style.display = 'block';
  
  switch(G.tab) {
    case 'orders': renderOrders(); break;
    case 'menu': renderMenu(); break;
    case 'stats': renderStats(); break;
    case 'staff': renderStaff(); break;
    case 'equip': renderEquip(); break;
    case 'shop': renderShop(); break;
  }
}

// ============ TAB SWITCHING ============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    G.tab = this.getAttribute('data-tab');
    AudioEngine.click();
    updateUI();
  });
});

// ============ PATIENCE TIMER ============
let lastOrderCount = 0;
setInterval(function() {
  processFinancialCycles(); // Process salaries + charges
  
  let changed = false;
  // Decrease patience for all orders
  for (let i = G.orders.length - 1; i >= 0; i--) {
    G.orders[i].timeLeft -= 1000;
    if (G.orders[i].timeLeft <= 0) {
      const lost = G.orders[i];
      G.orders.splice(i, 1);
      G.rep = Math.max(0, G.rep - 3);
      notify(`😡 ${lost.customer.icon} ${lost.customer.name} left! Rep -3`, 3000);
      changed = true;
    } else {
      // Chỉ cập nhật thanh patience, KHÔNG rebuild DOM
      const el = document.getElementById('patience-' + i);
      if (el) {
        const pct = Math.max(0, (G.orders[i].timeLeft / G.orders[i].patience) * 100);
        const color = pct > 60 ? '#28a745' : pct > 30 ? '#FFD700' : '#FF6347';
        el.style.width = pct + '%';
        el.style.background = color;
      }
    }
  }
  // Chỉ rebuild khi có đơn mới đến hoặc đơn bị mất (số đơn thay đổi)
  if (G.orders.length !== lastOrderCount) {
    lastOrderCount = G.orders.length;
    if (G.tab === 'orders') renderOrders();
  }
}, 1000);

// ============ AUTO ORDER GENERATION ============
setInterval(function() {
  autoGenerateOrder();
}, 1000);

// ============ AUTO SERVE (staff) ============
let lastAutoServe = 0;
setInterval(function() {
  const now = Date.now();
  if (now - lastAutoServe < 3500) return; // throttle 3.5s
  
  if (G.staff.length === 0 || G.orders.length === 0) return;
  
  let servedAny = false;
  
  for (let si = 0; si < G.staff.length; si++) {
    if (G.orders.length === 0) break;
    
    const s = G.staff[si];
    if (s.mood < 5) continue;
    
    // Tính skill thực tế
    const skillValue = s.skill * (s.mood / 100);
    const servedCount = Math.max(1, Math.floor(skillValue * 2)); // tối thiểu 1 nếu có skill
    
    for (let srv = 0; srv < servedCount && G.orders.length > 0; srv++) {
      const o = G.orders[0];
      let bonus = 1;
      G.trendItems.forEach(t => { if(t.revenueBonus) bonus += t.revenueBonus; });
      bonus += (G.equipment.espresso_mach || 0) * 0.05;
      
      const revenue = Math.floor((o.price + o.tip) * bonus);
      
      G.coins += revenue;
      G.totalRevenue += revenue;
      G.totalServed++;
      G.ordersToday++;
      G.totalTips += o.tip;
      G.xp += Math.floor(o.price * 1.5);
      G.rep = Math.min(CONFIG.maxRep, G.rep + 1);
      
      const decay = CONFIG.moodDecayRate[G.lv-1] || 2;
      s.mood = Math.max(0, s.mood - decay);
      
      G.orders.splice(0, 1);
      notify(`🤖 ${s.name} auto-served ${o.icon} ${o.name}! +${revenue}₫ (XP+${Math.floor(o.price*1.5)})`);
      AudioEngine.serve();
      servedAny = true;
      lastAutoServe = Date.now();
    }
  }
  
  if (servedAny) {
    checkLevelUp();
    updateUI();
  }
}, 3500); // Every 3.5s

// ============ MOOD RECOVERY ============
setInterval(function() {
  G.staff.forEach(s => {
    if (s.mood < 100) {
      s.mood = Math.min(100, s.mood + 2);
    }
  });
}, 10000); // Every 10s

// ============ SAVE / LOAD ============
function saveGame() {
  try {
    localStorage.setItem('trendyCafeV6', JSON.stringify(G));
  } catch(e) {}
}

function loadGame() {
  try {
    const data = localStorage.getItem('trendyCafeV6');
    if (data) {
      const saved = JSON.parse(data);
      // Merge with defaults
      Object.keys(saved).forEach(key => {
        if (G.hasOwnProperty(key)) {
          G[key] = saved[key];
        }
      });
      
      // Ensure trend items have bonus fields
      G.trendItems.forEach(t => {
        const trendDef = TRENDS.find(x => x.id === t.id);
        if (trendDef) {
          t.revenueBonus = trendDef.id === 't_doge' ? 0.05 :
                           trendDef.id === 't_cat' ? 0.03 :
                           trendDef.id === 't_girl' ? 0.10 :
                           trendDef.id === 't_piano' ? 0.15 :
                           trendDef.id === 't_sky' ? 0.20 :
                           trendDef.id === 't_chef' ? 0.30 : 0;
          t.repBonus = trendDef.id === 't_plant' ? 2 :
                       trendDef.id === 't_art' ? 8 : 0;
        }
      });
      
      notify('💾 Game loaded!', 1500);
    }
  } catch(e) {}
}

setInterval(saveGame, 30000); // Auto-save every 30s

// ============ START GAME ============
loadGame();
CONFIG.orderInterval = [5000, 4000, 3500, 3000, 2500, 2000];
G.lastOrderTime = Date.now();

// Initialize audio on first user interaction
document.addEventListener('click', function initAudio() {
  AudioEngine.init();
  document.removeEventListener('click', initAudio);
}, {once: true});

console.log('✅ Trendy Cafe V6 started!');
console.log('✅ Unlocked menu:', G.unlockedMenu);
console.log('✅ Staff:', G.staff.length);
console.log('✅ Equipment:', G.equipment);
console.log('✅ Trends:', G.trendItems.length);
updateUI();

</script>
